<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<script>(function(){try{var t=localStorage.getItem('bytheme')||((window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<title>角色圖鑑 — 塊頭勇者 Blockyusha</title>
<meta name="description" content="塊頭勇者 Blockyusha 全角色圖鑑：7 大物種隊、35 隻方塊頭動物勇者的屬性、HP、攻擊、回復、隊長技與主動技一覽。">
<link rel="icon" href="../play/art/cards/c15_thumb.webp">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#fff8ec;--ink:#2c2114;--ink2:#6b5a41;--fire:#ff6a3d;--water:#37b6ff;--thunder:#f0b410;--earth:#c8873f;--wind:#3fbf54}
body{background:var(--cream);color:var(--ink);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
.wrap{max-width:900px;margin:0 auto;padding:0 16px}
header{position:sticky;top:0;z-index:50;background:rgba(255,248,236,.92);backdrop-filter:blur(8px);border-bottom:2px solid rgba(255,178,32,.2)}
.nav{display:flex;align-items:center;justify-content:space-between;height:56px}
.brand{font-size:19px;font-weight:900;background:linear-gradient(120deg,#ff8a2a,#ff5a3d);-webkit-background-clip:text;background-clip:text;color:transparent}
.miniplay{background:linear-gradient(120deg,#ffdf6b,#ff8a2a);color:#3a1f00;font-weight:900;padding:8px 18px;border-radius:999px;font-size:14px;box-shadow:0 6px 16px rgba(255,140,40,.35)}
.title{text-align:center;padding:28px 0 4px}
.title h1{font-size:clamp(28px,7vw,40px);font-weight:900;background:linear-gradient(120deg,#ff8a2a,#ff5a3d);-webkit-background-clip:text;background-clip:text;color:transparent}
.title p{color:var(--ink2);font-size:14px;margin-top:4px}
.tools{max-width:900px;margin:16px auto 8px;padding:0 16px;display:flex;flex-direction:column;gap:12px;align-items:center}
.search{width:100%;max-width:380px;border:2px solid rgba(200,140,40,.3);border-radius:999px;padding:11px 18px;font-size:16px;background:#fff;outline:none}
.search:focus{border-color:var(--fire)}
.filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.filt{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:14px;padding:8px 16px;border-radius:999px;background:#fff;color:var(--ink2);box-shadow:0 3px 10px rgba(140,90,20,.12)}
.filt.on{color:#fff;background:var(--c,#ff8a2a)}
/* teams */
.teams{max-width:900px;margin:0 auto;padding:14px 16px 60px}
.team{margin-bottom:26px}
.team-h{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:900;padding:8px 14px;border-radius:14px;color:#3a2a10;
  background:linear-gradient(100deg,var(--tc),#fff8ec 90%);border-left:6px solid var(--tc);margin-bottom:12px}
.team-h .em{font-size:22px}
.team-h small{margin-left:auto;font-size:13px;font-weight:800;color:var(--ink2);background:rgba(255,255,255,.6);border-radius:999px;padding:2px 10px}
.team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.cell{background:#fff;border-radius:14px;padding:6px 4px 9px;text-align:center;box-shadow:0 4px 12px rgba(140,90,20,.13);border-bottom:4px solid var(--el);transition:transform .12s}
.cell:hover{transform:translateY(-3px)}
.cell .pic{position:relative;border-radius:10px;overflow:hidden;background:var(--el)}
.cell .pic img{width:100%;aspect-ratio:1;object-fit:cover}
.cell .num{position:absolute;left:4px;top:3px;font-size:10px;font-weight:800;color:#fff;background:rgba(0,0,0,.45);border-radius:5px;padding:0 5px}
.cell .hero{position:absolute;right:3px;top:2px;font-size:12px}
.cell .nm{font-size:13px;font-weight:800;margin-top:5px;line-height:1.25}
.empty{text-align:center;color:var(--ink2);padding:40px}
footer{background:#2c2114;color:#cbb99a;text-align:center;padding:26px 16px;font-size:13px}
footer a{color:#ffcf6b;margin:0 8px}
@media(max-width:440px){.cell .nm{font-size:11px}.team-grid{gap:6px}}
@media(min-width:640px){.team-grid{gap:12px}.cell .nm{font-size:15px}}
/* theme toggle + dark */
.navr{display:flex;align-items:center;gap:10px}
.themebtn{width:38px;height:38px;border:none;border-radius:50%;cursor:pointer;font-size:18px;line-height:1;background:rgba(255,255,255,.55);box-shadow:0 3px 10px rgba(140,90,20,.16)}
.themebtn:active{transform:scale(.9)}
:root[data-theme="dark"]{--cream:#16120b;--ink:#f0e7d6;--ink2:#b9a988}
[data-theme="dark"] body{background:#14110b}
[data-theme="dark"] header{background:rgba(20,16,10,.9);border-bottom-color:rgba(255,178,32,.16)}
[data-theme="dark"] .themebtn{background:rgba(255,255,255,.1)}
[data-theme="dark"] .search{background:#231d14;color:var(--ink);border-color:rgba(255,178,32,.25)}
[data-theme="dark"] .filt{background:#231d14;color:var(--ink2)}
[data-theme="dark"] .cell{background:#231d14}
[data-theme="dark"] .team-h{background:linear-gradient(100deg,var(--tc),#16120b 90%)}
[data-theme="dark"] .team-h small{background:rgba(0,0,0,.28)}
[data-theme="dark"] footer{background:#0d0b07}
</style>
</head>
<body>
<header><div class="wrap nav">
  <a class="brand" href="../">塊頭勇者</a>
  <div class="navr">
    <button class="themebtn" type="button" onclick="toggleTheme()" aria-label="切換日夜模式">🌙</button>
    <a class="miniplay" href="../play/">開始遊戲</a>
  </div>
</div></header>

<div class="title">
  <h1>角色圖鑑</h1>
  <p>7 大物種隊 · 35 隻方塊頭勇者 · 點擊看詳細數值</p>
</div>

<div class="tools">
  <input class="search" id="search" type="search" placeholder="🔍 搜尋名字或編號…" autocomplete="off">
  <div class="filters" id="filters"></div>
</div>

<div class="teams" id="teams"></div>

<footer>
  <a href="../">首頁</a><a href="../play/">開始遊戲</a><a href="../devlog/">開發日誌</a>
  <div style="margin-top:10px;font-size:12px;color:#8a795c">塊頭勇者 Blockyusha · © 2026 fightmon</div>
</footer>

<script src="./data.js"></script>
<script>
(function(){
  var D=window.DEX, EL=D.meta.elName, EC=D.meta.elColor, teams=D.meta.teams;
  var byId={}; D.cards.forEach(function(c){byId[c.id]=c;});
  var box=document.getElementById('teams'), search=document.getElementById('search'), fbox=document.getElementById('filters');
  var curEl='all', q='';
  ['all','fire','water','thunder','earth','wind'].forEach(function(e){
    var b=document.createElement('button');
    b.className='filt'+(e==='all'?' on':'');
    b.textContent=e==='all'?'全部':EL[e];
    b.style.setProperty('--c',e==='all'?'#ff8a2a':EC[e]);
    b.onclick=function(){curEl=e;[].forEach.call(fbox.children,function(x){x.classList.remove('on')});b.classList.add('on');render();};
    fbox.appendChild(b);
  });
  search.addEventListener('input',function(){q=search.value.trim().toLowerCase();render();});
  function cellHTML(c){
    return '<a class="cell" href="./card.html?id='+c.id+'" style="--el:'+EC[c.el]+'">'+
      '<div class="pic"><span class="num">'+c.n+'</span>'+(c.hero?'<span class="hero">⭐</span>':'')+
      '<img loading="lazy" src="../play/art/cards/'+c.id+'_thumb.webp" alt="'+c.name+'"></div>'+
      '<div class="nm">'+c.name+'</div></a>';
  }
  function render(){
    box.innerHTML=''; var any=false;
    teams.forEach(function(t){
      var cs=t.ids.map(function(id){return byId[id];}).filter(function(c){
        if(!c)return false;
        if(curEl!=='all'&&c.el!==curEl)return false;
        if(q&&!(c.name.toLowerCase().indexOf(q)>=0||c.n.indexOf(q)>=0))return false;
        return true;
      });
      if(!cs.length)return; any=true;
      var sec=document.createElement('section'); sec.className='team';
      sec.innerHTML='<div class="team-h" style="--tc:'+t.color+'"><span class="em">'+t.emoji+'</span>'+t.name+
        '<small>'+cs.length+' 隻</small></div><div class="team-grid">'+cs.map(cellHTML).join('')+'</div>';
      box.appendChild(sec);
    });
    if(!any)box.innerHTML='<div class="empty">找不到符合的角色 🥲</div>';
  }
  render();
})();
</script>
<script>
function toggleTheme(){var d=document.documentElement,t=d.getAttribute('data-theme')==='dark'?'light':'dark';
  d.setAttribute('data-theme',t);try{localStorage.setItem('bytheme',t);}catch(e){}
  document.querySelectorAll('.themebtn').forEach(function(b){b.textContent=t==='dark'?'☀️':'🌙';});}
(function(){var t=document.documentElement.getAttribute('data-theme');
  document.querySelectorAll('.themebtn').forEach(function(b){b.textContent=t==='dark'?'☀️':'🌙';});})();
</script>
</body>
</html>
