<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=400">
<title>卡冊</title>
<link rel="stylesheet" href="../style.css">
<style>
  body { background: transparent; }

  /* 標題:卡冊 + 容量(併回標題後方) */
  .cb-head { position: relative; background: var(--surf); border-bottom: 1px solid var(--divider); padding: 12px 14px 10px; text-align: center; }
  .cb-title { font-size: var(--fs-title); font-weight: 700; }
  .cb-cap { font-size: var(--fs-sub); font-weight: 700; color: var(--ink2); margin-left: 6px; }

  /* 排序 + 篩選(瘦身:數量移到統計列,頁籤只留圖示、等寬填滿,不溢出) */
  .cb-bar { display: flex; align-items: center; gap: 6px; padding: 10px 10px 6px; }
  .cb-sort { flex: none; height: 34px; border-radius: 17px; border: 1.5px solid var(--divider); background: var(--surf2);
    color: var(--ink); font-family: inherit; font-size: var(--fs-cap); font-weight: 700; padding: 0 8px; cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 2px 0 #ddd7cd; }
  .cb-bar .pill.sm { flex: 1; padding: 0; min-width: 0; display: inline-flex; align-items: center; justify-content: center; }
  .cb-bar .pill.sm .ei { width: 1.5em; height: 1.5em; }
  /* 擴充背包 icon 鈕:方塊+號,放篩選列最右;點了跳確認彈窗 */
  .cb-expbtn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; border-radius: 10px; cursor: pointer;
    border: 1.5px solid var(--divider); background: var(--surf2); color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 2px 0 #ddd7cd; }
  .cb-expbtn:active { transform: translateY(calc(-50% + 1px)); box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 1px 0 #ddd7cd; }

  /* 擴充背包確認彈窗 */
  .modal-mask { position: fixed; inset: 0; background: rgba(20,16,14,.5); display: none; align-items: center; justify-content: center; z-index: 50; }
  .modal-mask.show { display: flex; }
  .modal-card { width: 78%; max-width: 300px; background: var(--surf); border-radius: 18px; padding: 18px 18px 16px; text-align: center; box-shadow: 0 12px 34px rgba(0,0,0,.35); }
  .modal-title { font-size: var(--fs-sub); font-weight: 700; margin-bottom: 8px; }
  .modal-msg { font-size: var(--fs-cap); color: var(--ink2); line-height: 1.5; margin-bottom: 16px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns .pill { flex: 1; max-width: none; }

  /* 卡片格 */
  .cb-grid { flex: 1; overflow-y: auto; padding: 4px 12px 6px; }
  .cb-grid::-webkit-scrollbar { width: 0; }

  /* 分頁 */
  .cb-pager { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 6px 0 10px; }
  .cb-pager .pg-btn { width: 40px; height: 30px; border-radius: 15px; border: 1.5px solid var(--divider); background: var(--surf);
    color: var(--ink2); font-size: 13px; cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 2px 0 #ddd7cd; }
  .cb-pager .pg-num { font-size: var(--fs-cap); font-weight: 700; color: #cfd3d8; }   /* 深底→亮色分頁字 */

  .mini .battle { position: absolute; right: 4px; top: 4px; z-index: 2; padding: 1px 7px; border-radius: 8px;
    background: var(--gold); color: var(--onAccent); font-size: 11px; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,.3); }

  /* 底部操作列:space-between(整理 左、上一頁 右),寬按鈕 */
  .footbar { padding: 10px 14px 14px; background: var(--surf); border-top: 1px solid var(--divider);
    justify-content: space-between !important; }
  .footbar .pill { max-width: none !important; width: 46% !important; flex: 0 0 46% !important; }
  /* 售卡=危險但降權:琥珀謹慎色(不是大紅),真正的破壞放在後續「多選→確認」步驟 */
  .pill.sell { background-color: #fff6ea; border-color: #e6a54e; color: #b46a1c; --lip: #e8c78e; }
</style>
</head>
<body>

<!-- 擴充背包 確認彈窗 -->
<div class="modal-mask" id="expModal">
  <div class="modal-card">
    <div class="modal-title">🎒 擴充背包</div>
    <div class="modal-msg">擴充背包需要 <b>1 個鑽石 💎</b><br>（＋5 格），確定要擴充嗎？</div>
    <div class="modal-btns">
      <button class="pill ghost" onclick="hideExp()">不同意</button>
      <button class="pill primary" onclick="hideExp()">同意</button>
    </div>
  </div>
</div>
<script>
  function showExp(){ document.getElementById('expModal').classList.add('show'); }
  function hideExp(){ document.getElementById('expModal').classList.remove('show'); }
  document.getElementById('expModal').addEventListener('click', function(e){ if(e.target===this) hideExp(); });
</script>
