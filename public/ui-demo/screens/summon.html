<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=400">
<title>轉蛋</title>
<link rel="stylesheet" href="../style.css">
<style>
  body { background: transparent; }
  .sbody { flex: 1; overflow-y: auto; padding: 14px 14px 8px; }
  .sbody::-webkit-scrollbar { width: 0; }
  .page-title { text-align: center; font-size: var(--fs-title); font-weight: 700; margin: 4px 0 14px; color: #f0f2f5; }   /* 深底→亮色標題 */

  /* 轉蛋機台卡 */
  .summon-card { border-radius: 18px; padding: 14px 14px 16px; margin-bottom: 16px; border: 2px solid; background: var(--surf);
    box-shadow: 0 4px 14px rgba(43,51,58,.08); }
  .summon-card.seal { border-color: #8f6fe0; background: linear-gradient(160deg, #f5f0ff, #ece3fb); }
  .summon-card.normal { border-color: #4fb06e; background: linear-gradient(160deg, #eefaf0, #e0f3e5); }
  .sc-title { text-align: center; font-size: var(--fs-sub); font-weight: 700; }
  .sc-sub { text-align: center; font-size: var(--fs-cap); font-weight: 700; margin-top: 3px; }
  .seal .sc-sub { color: #7a54d0; }
  .normal .sc-sub { color: var(--okTx); }
  .sc-rates { text-align: center; font-size: var(--fs-micro); color: var(--ink2); margin: 8px 0 12px; }
  .sc-btns { display: flex; gap: 12px; }
  .sc-btns .pill { flex: 1; max-width: none; height: 46px; border-radius: 23px; color: #fff; }
  .sc-btns .pill.purple { background-color: #7c5cd6; border-color: #7c5cd6; --lip: #5c3fae; }
  .sc-btns .pill.green { background-color: var(--ok); border-color: var(--ok); --lip: #26824e; }
  .sc-note { text-align: center; font-size: var(--fs-micro); color: var(--ink3); padding: 6px 10px 4px; }
</style>
</head>
<body>
<div class="phone">

  <!-- 狀態列 -->
  <div class="statusbar">
    <div class="avatar">🐾</div>
    <div class="who">
      <div class="name">戰鬥大毛 <span class="chip">🔥 地獄歸來</span></div>
      <div class="lvline">
        <span class="lvtag">Lv.33</span>
        <span class="exp"><i style="width:42%"></i></span>
        <span class="coin" style="color:var(--okTx)"><img class="cur-ic" src="../assets/ui/cur_energy.png" alt="體力">114/114</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
      <span class="coin gem"><img class="cur-ic" src="../assets/ui/cur_gem.png" alt="鑽石"> 67</span>
      <span class="coin gold"><img class="cur-ic" src="../assets/ui/cur_coin.png" alt="金幣"> 317,100</span>
    </div>
  </div>

  <!-- 轉蛋內容 -->
  <div class="sbody">
    <div class="page-title">🥚 轉蛋</div>

    <div class="summon-card seal">
      <div class="sc-title">💎 結印轉蛋</div>
      <div class="sc-sub">✦ 影忍 SSR 限定 · 機率 3%</div>
      <div class="sc-rates">★ 50% ・ ★★ 35% ・ ★★★ 12% ・ ★★★★ 3%</div>
      <div class="sc-btns">
        <button class="pill purple">單抽 💎5</button>
        <button class="pill purple">十連 💎50</button>
      </div>
    </div>

    <div class="summon-card normal">
      <div class="sc-title">🪙 一般轉蛋</div>
      <div class="sc-sub">金錢轉蛋（無影忍）</div>
      <div class="sc-rates">★ 70% ・ ★★ 28% ・ ★★★ 2%</div>
      <div class="sc-btns">
        <button class="pill green">單抽 🪙1,000</button>
        <button class="pill green">十連 🪙9,000</button>
      </div>
    </div>

    <div class="sc-note">※ 機率已公示；影忍僅「結印轉蛋」可得</div>
  </div>

  <!-- 底部導覽(抽卡 亮) -->
  <div class="navbar">
    <div class="tab"><span class="ic"><img src="../assets/ui/nav_lobby.svg" alt="關卡"></span>關卡</div>
    <div class="tab"><span class="ic"><img src="../assets/ui/nav_cards.svg" alt="卡片"></span>卡片</div>
    <div class="tab"><span class="ic"><img src="../assets/ui/nav_shop.svg" alt="商店"></span>商店</div>
    <div class="tab on"><span class="ic"><img src="../assets/ui/nav_gacha.svg" alt="抽卡"></span>抽卡</div>
    <div class="tab"><span class="ic"><img src="../assets/ui/nav_village.svg" alt="村落"></span>村落</div>
  </div>

</div>
</body>
</html>
