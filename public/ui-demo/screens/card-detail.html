<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=400">
<title>卡片詳情</title>
<link rel="stylesheet" href="../style.css">
<style>
  body { background: transparent; }
  /* 全屏屬色漸層(左上暗→右下明) */
  .detail { position: relative; height: 100%; overflow: hidden;
    background: linear-gradient(135deg, #7a2417 0%, #c0402a 45%, #f07a4a 100%); }
  .topbtn { position: absolute; top: 16px; width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,.9); display: grid; place-items: center; font-size: 18px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.25); color: var(--ink); z-index: 5; }
  .stars { position: absolute; top: 22px; left: 50%; transform: translateX(-50%); z-index: 5;
    font-size: 26px; color: var(--gold); text-shadow: 0 2px 4px rgba(0,0,0,.4); letter-spacing: 2px; }
  .genblock { position: absolute; top: 62px; right: 18px; z-index: 5; width: 52px; height: 52px; border-radius: 12px;
    background: rgba(30,22,18,.55); display: grid; place-items: center; color: #ffd9a0; font-size: 22px; }
  .genblock small { position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); font-size:10px; color:#fff; white-space:nowrap; }
  .hero { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); z-index: 3;
    width: 260px; height: 260px; object-fit: contain; filter: drop-shadow(0 10px 18px rgba(0,0,0,.35)); }
  /* 白色資訊卡 */
  .info { position: absolute; left: 0; right: 0; bottom: 0; height: 460px; z-index: 4;
    background: var(--surf); border-radius: 24px 24px 0 0; box-shadow: 0 -8px 30px rgba(0,0,0,.25);
    padding: 20px 22px 96px; overflow-y: auto; }
  .info h1 { font-size: var(--fs-title); font-weight: 700; text-align: center; }
  .tags { display: flex; gap: 8px; justify-content: center; margin: 10px 0 16px; }
  .stat-row { display: flex; text-align: center; }
  .stat-row > div { flex: 1; }
  .stat-row .num { font-size: 30px; font-weight: 700; line-height: 1; }
  .stat-row .lab { font-size: var(--fs-micro); color: var(--ink2); margin-top: 4px; }
  .lvbox { display: flex; align-items: center; gap: 10px; margin: 18px 0; }
  .lvbox .lvtxt { font-size: var(--fs-cap); font-weight: 700; color: var(--goldTx); white-space: nowrap; }
  .skill { background: var(--surf2); border: 1px solid var(--divider); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; }
  .skill .head { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: var(--fs-cap); }
  .skill .cd { margin-left: auto; font-size: var(--fs-micro); background: var(--t-fire); color: var(--fire); padding: 1px 8px; border-radius: 8px; font-weight: 700; }
  .skill .desc { font-size: var(--fs-micro); color: var(--ink2); margin-top: 6px; }
  .footer { position: absolute; left: 0; right: 0; bottom: 0; z-index: 6; display: flex; gap: 10px;
    padding: 12px 18px 16px; background: linear-gradient(transparent, var(--surf) 30%); }
</style>
</head>
<body>
<div class="phone">
  <div class="detail">
    <div class="topbtn" style="left:16px">‹</div>
    <div class="topbtn" style="right:16px">♻️</div>
    <div class="stars">★★★</div>
    <div class="genblock"><i class="ei ei-fire" style="color:var(--fire)"></i><small>產生方塊</small></div>
    <img class="hero" src="../assets/cards/c03_full.webp" alt="炎助">

    <div class="info">
      <h1>炎助</h1>
      <div class="tags">
        <span class="tag tint-fire" style="color:var(--fire)"><i class="ei ei-fire"></i> 火屬</span>
        <span class="tag" style="background:var(--surf2);color:var(--ink2)">🐶 犬</span>
      </div>

      <div class="stat-row">
        <div><div class="num" style="color:var(--bad)">761</div><div class="lab">❤️ 生命</div></div>
        <div><div class="num" style="color:var(--ink)">259</div><div class="lab">⚔️ 攻擊</div></div>
        <div><div class="num" style="color:var(--ok)">57</div><div class="lab">💚 回復</div></div>
      </div>

      <div class="lvbox">
        <span class="lvtxt">Lv.20 最大</span>
        <span class="bar" style="flex:1"><i style="width:100%;background:var(--gold)"></i></span>
        <span class="lvtxt" style="color:var(--ink2)">持有 ×3</span>
      </div>

      <div class="skill">
        <div class="head"><i class="ei ei-fire" style="color:var(--fire)"></i> 主動技 · 群擊 <span class="cd">CD5</span></div>
        <div class="desc">對全體敵 攻×2（吃相剋）</div>
      </div>
      <div class="skill">
        <div class="head">👑 隊長技 · 犬·攻守雙修</div>
        <div class="desc">同屬 HP×1.2 ＋ 攻×1.2</div>
      </div>
    </div>

    <div class="footer">
      <button class="pill ok block" style="flex:2">⬆️ 強化合成</button>
      <button class="pill ghost" style="flex:1">✕ 關閉</button>
    </div>
  </div>
</div>
</body>
</html>
