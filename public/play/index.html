    // ===== 程序化音效(WebAudio 即時合成,零檔案/零版權/離線)=====
    const SFX = (() => {
      let ctx = null, sfxV = 0.8, bgmV = 0.6, _chanVol = 1;   // 音效/背景音 主音量(0~1);_chanVol=當下通道音量(T/N 共用,呼叫前設)
      const clp = v => Math.max(0, Math.min(1, isNaN(v) ? 0 : v));
      try {
        const a = localStorage.getItem('nb_sfxvol'); if (a != null) sfxV = clp(parseFloat(a)); else if (localStorage.getItem('nb_mute') === '1') sfxV = 0;   // 沿用舊靜音設定
        const b = localStorage.getItem('nb_bgmvol'); if (b != null) bgmV = clp(parseFloat(b));
      } catch (e) { }
      function ac() { if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { ctx = null; } } if (ctx && ctx.state === 'suspended') ctx.resume(); return ctx; }
      function T(freq, dur, o) {
        o = o || {}; const c = ac(); if (!c) return; const t = c.currentTime + (o.delay || 0), g = (o.gain || 0.18) * _chanVol;   // 低階單音(gain×通道音量;不檢查靜音,由呼叫端把關)
        const osc = c.createOscillator(), gn = c.createGain(); osc.type = o.type || 'sine';
        osc.frequency.setValueAtTime(freq, t); if (o.freq2) osc.frequency.exponentialRampToValueAtTime(Math.max(1, o.freq2), t + dur);
        gn.gain.setValueAtTime(0.0001, t); gn.gain.exponentialRampToValueAtTime(g, t + 0.005); gn.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.connect(gn).connect(c.destination); osc.start(t); osc.stop(t + dur + 0.02);
      }
      function N(dur, o) {
        o = o || {}; const c = ac(); if (!c) return; const t = c.currentTime + (o.delay || 0), g = (o.gain || 0.15) * _chanVol;
        const n = Math.max(1, Math.floor(c.sampleRate * dur)), buf = c.createBuffer(1, n, c.sampleRate), d = buf.getChannelData(0);
        for (let i = 0; i < n; i++)d[i] = (Math.random() * 2 - 1) * (1 - i / n);
        const src = c.createBufferSource(); src.buffer = buf; const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = o.lp || 2000;
        const gn = c.createGain(); gn.gain.setValueAtTime(g, t); gn.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        src.connect(f).connect(gn).connect(c.destination); src.start(t); src.stop(t + dur + 0.02);
      }

      // 背景音:緩慢五聲音階 loop + 墊底八度,低音量環境感(與音效靜音分開控制)
      const BGM = [392, 440, 523, 587, 659, 587, 523, 440];   // G A C D E D C A
      let bgmTimer = null, bgmIdx = 0;
      function bgmNote() {
        if (bgmV <= 0) { stopBgm(); return; } if (!ac()) return; _chanVol = bgmV; const f = BGM[bgmIdx % BGM.length]; bgmIdx++;   // 設通道音量=背景音量
        T(f, 1.7, { type: 'triangle', gain: 0.035 }); T(f / 2, 1.9, { type: 'sine', gain: 0.022 });
      }
      function startBgm() { if (bgmTimer || bgmV <= 0) return; if (!ac()) return; bgmNote(); bgmTimer = setInterval(bgmNote, 1350); }
      function stopBgm() { if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; } }

      spawnCardParticles(left, right, top, bottom) {   // 飄浮方塊粒子:固定在隊伍卡左右緣,一致向上升起成能量流(比照 demo tc-particles/tc-blk)

          const baseX = left + (s[0] / 100) * w, baseY = top + (s[1] / 100) * h;
          const sz = 6 + (i % 4) * 2, op = +(0.55 - (i % 4) * 0.06).toFixed(2), dx = ((i % 3) - 1) * 3;

        });

      restartStage() { this.playerHP = this.maxHP; this.startStage(); }

        scene: [HomeScene, TeamScene, GameScene, CollectionScene, FuseScene, DexScene],
      });
      track('open');   // 開遊戲心跳(回流追蹤;ANALYTICS_URL 空時自動 no-op)
      mutSave(s => { if (!s.stats) s.stats = { playMs: 0, sessions: 0 }; s.stats.sessions++; });   // 📊 開場次數 +1
      _playTick = Date.now();   // 📊 前景遊玩計時起點(見下方 _flushPlayMs)
      // 預載 HIT/COMBO 數字字型(Russo One)→ 首次展演就已是設計字型,不掉回退
      try {
        if (document.fonts && document.fonts.load) {
          document.fonts.load("400 40px 'Russo One'", '0123456789 HITCOMBO');
        }
      } catch (e) { }
      // 實驗室入口:網址加 #hitlab(招式)或 #enemylab(敵技)→ 直接進對應 lab 模式
      window.GAME.events.once('ready', function () {
        const team = ['fire', 'water', 'thunder', 'earth', 'wind'].map(el => ROSTER.find(c => c.el === el) || ROSTER[0]);
        if (location.hash === '#hitlab') { window.GAME.scene.start('game', { team: team, dungeonId: 'tower', lab: true }); window.GAME.scene.stop('home'); }
        else if (location.hash === '#enemylab') { window.GAME.scene.start('game', { team: team, dungeonId: 'tower', elab: true, diff: 'hell' }); window.GAME.scene.stop('home'); }   // 敵技實驗室(地獄=敵人帶行為,看意圖圖示)
      });
    }
    // ☁️ 開場閘門:new Phaser.Game 前先做雲端調和(hydrateFromCloud,硬上限 2.5 秒),逾時/失敗照常開場絕不卡玩家
    async function gatedBoot() {
      checkConfig();   // 公告/維護(fire-and-forget,不 await)
      try { await Promise.race([hydrateFromCloud(), new Promise(function (res) { setTimeout(res, 2500); })]); } catch (e) { }
      window._nbBootDone = true;   // 此後 hydrateFromCloud 不得再套雲端資料(本輪放棄,下次開場再調和)
      walletFetch(); flushPendingRuns(); cardsFetch();   // 🔐 伺服器錢包/待補通關獎勵/收藏校正(fire-and-forget,不阻塞開場)
      cloudFetch('/api/gacha/rates').then(r => r.ok ? r.json() : null).then(d => { if (d && d.pools) window._nbGachaRates = d; }).catch(() => { });   // 轉蛋機率公示改讀伺服器(失敗 fallback 前端常數,見 gachaBanner)
      bootGame();
    }
    // 主字源泉圓體(外部子集):先確保載入再開場→首屏即設計字型;逾時 1200ms 保險不卡死
    if (document.fonts && document.fonts.load) {
      var _boot = function () { gatedBoot(); try { document.fonts.load("700 16px 'GenSen'"); } catch (e) { } };   // 開場後非阻塞補載粗體 B700(先 faux-bold,載好自動換)→ 不擋首屏
      Promise.race([
        document.fonts.load("16px 'GenSen'"),   // 只等 R400(1.25MB);B700(1.3MB)延後→首屏字型少載一半、載入條更快跑完
        new Promise(function (res) { setTimeout(res, 1200); })
      ]).then(_boot, _boot);
    } else { gatedBoot(); }
    // 真機轉向 / 瀏覽器縮放 / 網址列伸縮 → 即時重算高度 + 重排(不黑邊、不用重整)
    window.addEventListener('resize', function () {
      if (!window.GAME) return;
      const o = H; recomputeLayout();
      if (Math.abs(H - o) > 3) {
        window.GAME.scale.setGameSize(W, H);
        const gs = window.GAME.scene.getScene('game');
        if (gs && window.GAME.scene.isActive('game') && gs.relayout) gs.relayout();
      }
    });
  </script>
</body>

</html>
