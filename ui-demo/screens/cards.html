<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=400">
<title>卡片管理</title>
<link rel="stylesheet" href="../style.css">
<style>
  body { background: transparent; }
  .cm-body { flex: 1; overflow-y: auto; padding: 20px 20px 12px; }
  .cm-body::-webkit-scrollbar { width: 0; }
  .cm-title { text-align: center; font-size: var(--fs-title); font-weight: 700; margin: 6px 0 20px; }

  /* 選單大按鈕(白底紅框 3D) */
  .menu-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; height: 58px;
    margin-bottom: 15px; border-radius: 29px; background: var(--surf); border: 2px solid #ee9c8a; color: var(--ink);
    font-family: inherit; font-size: var(--fs-sub); font-weight: 700; cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 3px 0 #dc7c66, 0 6px 10px rgba(43,51,58,.12);
    transition: transform .06s ease, box-shadow .06s ease; }
  .menu-btn:active { transform: translateY(2px); box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 1px 0 #dc7c66, 0 3px 6px rgba(43,51,58,.12); }
  /* 待做(停用感) */
  .menu-btn.todo { background: var(--surf2); border-color: var(--divider); color: var(--ink3);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 3px 0 #ddd7cd, 0 4px 7px rgba(43,51,58,.07); }
</style>
</head>
<body>
<div class="phone">

  <!-- 狀態列 -->
  <div class="statusbar">
    <div class="avatar">🐾</div>
    <div class="who">
      <div class="name">戰鬥大毛 <span class="chip">🔥 地獄歸來</span></div>
      <div class="lvline">
        <span class="lvtag">Lv.33</span>
        <span class="exp"><i style="width:42%"></i></span>
        <span class="coin" style="color:var(--okTx)">⚡114/114</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
      <span class="coin gem">💎 67</span>
      <span class="coin gold">🪙 317,100</span>
    </div>
  </div>

  <!-- 卡片管理選單 -->
  <div class="cm-body">
    <div class="cm-title">🎴 卡片管理</div>
    <button class="menu-btn">🛡️ 隊伍編成</button>
    <button class="menu-btn">🎴 卡片 BOX（104 / 300 格）</button>
    <button class="menu-btn">⬆️ 強化合成</button>
    <button class="menu-btn">✨ 進化合成（卡片詳細頁）</button>
    <button class="menu-btn todo">💰 卡片售出 — 待做</button>
  </div>

  <!-- 底部導覽(卡片 亮) -->
  <div class="navbar">
    <div class="tab"><span class="ic">⛩️</span>關卡</div>
    <div class="tab on"><span class="ic">🐾</span>卡片</div>
    <div class="tab"><span class="ic">🛒</span>商店</div>
    <div class="tab"><span class="ic">🥚</span>抽卡</div>
    <div class="tab"><span class="ic">🏆</span>排行</div>
    <div class="tab"><span class="ic">⚙️</span>其他</div>
  </div>

</div>
</body>
</html>
