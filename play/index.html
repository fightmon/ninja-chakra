  showMenu(){if(this.resultOpen)return;this.resultOpen=true;const g=this.overlay();const cy=H/2;
    g.add(this.add.text(CX,cy-110,'選單',{fontFamily:EMOJIFONT,fontSize:'22px',color:'#f3e9d8',fontStyle:'bold'}).setOrigin(0.5));
    this.mkBtn(g,cy-50,'繼續戰鬥',()=>{g.destroy();this.resultOpen=false;});
    this.mkBtn(g,cy+8,'🏠 回大廳(放棄本關)',()=>{this.scene.manager.start('home');this.scene.manager.stop('game');});
    this.mkBtn(g,cy+66,'📖 新手教學',()=>{g.destroy();this.resultOpen=false;this.showTutorial(true);},0x3a4a5c);
    this.mkBtn(g,cy+124,'📖 卡冊(放棄本關)',()=>{this.scene.manager.start('collection');this.scene.manager.stop('game');});}
  // 首次遊玩 3 步教學(replay=true 從選單重看,不影響已看過旗標)
  showTutorial(replay){
    this.resultOpen=true;
    const steps=[
      {ic:'🧩',t:'拼塊 × 打怪',b:'把方塊拖進 9×9 盤面,\n填滿一整「列 / 行 / 宮(3×3)」\n就會消除 → 攻擊敵人!'},
      {ic:'⭐',t:'屬塊保存(招牌玩法)',b:'消除一個「宮」會生成屬塊,\n存到對應的忍卡上。\n把它拖到盤面湊更多消除,\n還能囤到 boss 一次狂放!'},
      {ic:'⚡',t:'相剋 & 大招',b:'帶相剋屬性更強:\n火→風→雷→土→水→火。\n卡片「上方的小鈕」蓄滿會發亮,\n點一下放大招!'},
    ];
    let i=0;
    const show=()=>{
      const g=this.add.container(0,0).setDepth(1500);
      g.add(this.add.rectangle(CX,H/2,W,H,0x0a0805,0.92).setInteractive());
      const cy=H/2, s=steps[i], last=i>=steps.length-1;
      g.add(this.add.text(CX,cy-198,'新手教學   '+(i+1)+' / '+steps.length,{fontFamily:EMOJIFONT,fontSize:'13px',color:'#ffd56a',fontStyle:'bold'}).setOrigin(0.5));
      g.add(this.add.text(CX,cy-120,s.ic,{fontFamily:EMOJIFONT,fontSize:'58px'}).setOrigin(0.5));
      g.add(this.add.text(CX,cy-52,s.t,{fontFamily:EMOJIFONT,fontSize:'21px',color:'#ffe08a',fontStyle:'bold'}).setOrigin(0.5));
      g.add(this.add.text(CX,cy+30,s.b,{fontFamily:EMOJIFONT,fontSize:'15px',color:'#f3e9d8',align:'center',lineSpacing:7}).setOrigin(0.5));
      let dots='';for(let k=0;k<steps.length;k++)dots+=(k===i?'●':'○')+'  ';
      g.add(this.add.text(CX,cy+118,dots.trim(),{fontFamily:EMOJIFONT,fontSize:'15px',color:'#ffd56a'}).setOrigin(0.5));
      this.mkBtn(g,cy+166,last?'開始戰鬥! ⚔':'下一步 →',()=>{g.destroy();if(last){if(!replay){setTutSeen();track('tut_done');}this.resultOpen=false;}else{i++;show();}},last?0x3a5a2c:0x3a2c1d);
      if(!last){const sk=this.add.text(CX,cy+218,'跳過教學',{fontFamily:EMOJIFONT,fontSize:'13px',color:'#9fb0c0'}).setOrigin(0.5).setInteractive();
        sk.on('pointerup',()=>{g.destroy();if(!replay){setTutSeen();track('tut_skip');}this.resultOpen=false;});g.add(sk);}
    };
    show();
  }
}

/* ===== 卡冊 → 背包(怪物箱):網格 → 點卡進詳細頁 + 操作 ===== */
class CollectionScene extends Phaser.Scene{
  constructor(){super('collection');}
  init(d){this.sel=(d&&d.sel)||null;
    if(this.sortMode==null)this.sortMode=0;
    if(this.filterEl===undefined)this.filterEl=null;
    if(this.boxPage==null)this.boxPage=0;}
  create(){this.add.rectangle(CX,H/2,W,H,0x160f18);this.rebuild();
    this.scale.on('resize',()=>{const o=H;recomputeLayout();if(Math.abs(H-o)>3){this.scale.setGameSize(W,H);this.rebuild();}});}
  rebuild(){if(this.layer)this.layer.destroy();this.layer=this.add.container(0,0);this.draw();}
  L(o){this.layer.add(o);return o;}
  txt(x,y,s,size,col,ox,bold){return this.L(this.add.text(x,y,s,{fontFamily:EMOJIFONT,fontSize:Math.max(15,parseInt(size||'16',10)||16)+'px',color:col||'#f3e9d8',fontStyle:bold?'bold':'normal'}).setOrigin(ox==null?0.5:ox,0.5));}   // 全選單字級最小 15px(手機可讀)
  rect(x,y,w,h,col,a){return this.L(this.add.rectangle(x,y,w,h,col,a==null?1:a));}
  btn(x,y,w,h,label,cb,o){o=o||{};const r=this.L(this.add.rectangle(x,y,w,h,o.col==null?0x2b2014:o.col).setStrokeStyle(2,o.stroke==null?0x5a4128:o.stroke).setInteractive());
    if(label)this.txt(x,y,label,o.fs||'14px',o.color||'#f3e9d8',0.5,o.bold);r.on('pointerup',cb);return r;}
  toast(msg){const t=this.add.text(CX,Math.round(H*0.4),msg,{fontFamily:EMOJIFONT,fontSize:'15px',color:'#ffd56a',fontStyle:'bold',backgroundColor:'#000000cc',padding:{x:12,y:8}}).setOrigin(0.5).setDepth(2000);
    this.tweens.add({targets:t,alpha:0,delay:900,duration:400,onComplete:()=>t.destroy()});}
  // 擴背包慶祝動畫(直接掛場景、不進 layer→rebuild 不清掉):閃光+震+擴散環+四射星火+「背包+5」大字+新上限
  playExpandFX(newCap){
    const cyc=Math.round(H*0.42);
    this.cameras.main.flash(220,150,120,220,false); this.cameras.main.shake(180,0.006);
    const ring=this.add.circle(CX,cyc,34,0,0).setStrokeStyle(5,0xb18cff,1).setDepth(2998);
    this.tweens.add({targets:ring,scale:6,alpha:0,duration:640,ease:'Quad.out',onComplete:()=>ring.destroy()});
    for(let i=0;i<12;i++){const a=i/12*Math.PI*2, sp=this.add.text(CX,cyc,'✦',{fontFamily:EMOJIFONT,fontSize:'18px',color:i%2?'#ffe08a':'#d8c8ff'}).setOrigin(0.5).setDepth(2998);
      this.tweens.add({targets:sp,x:CX+Math.cos(a)*120,y:cyc+Math.sin(a)*120,alpha:0,scale:0.4,duration:640,ease:'Quad.out',onComplete:()=>sp.destroy()});}
    const t=this.add.text(CX,cyc,'✨ 背包 +5 ✨',{fontFamily:EMOJIFONT,fontSize:'32px',color:'#e8d8ff',fontStyle:'bold',stroke:'#3a2a5a',strokeThickness:7}).setOrigin(0.5).setDepth(3000).setScale(0.3);
    this.tweens.add({targets:t,scale:1.1,duration:300,ease:'Back.out'});
    this.tweens.add({targets:t,scaleX:1.18,scaleY:1.18,duration:420,yoyo:true,delay:300,ease:'Sine.inOut'});
    this.tweens.add({targets:t,y:cyc-46,alpha:0,delay:820,duration:520,onComplete:()=>t.destroy()});
    const c2=this.add.text(CX,cyc+44,'→ '+newCap+' 格',{fontFamily:EMOJIFONT,fontSize:'18px',color:'#cfe0ff',fontStyle:'bold',stroke:'#1a2030',strokeThickness:4}).setOrigin(0.5).setDepth(3000).setAlpha(0);
    this.tweens.add({targets:c2,alpha:1,duration:260,delay:180});
    this.tweens.add({targets:c2,alpha:0,delay:1300,duration:480,onComplete:()=>c2.destroy()});
    // 5 個新欄位一格格依序冒出來(像格子被加進背包)
    const sw=26, gp=7, tot=5*sw+4*gp, sx0=CX-tot/2+sw/2, sy=cyc+82;
    for(let i=0;i<5;i++){const b=this.add.rectangle(sx0+i*(sw+gp),sy,sw,sw,0x4a3a6a,1).setStrokeStyle(2,0xd8c8ff,1).setDepth(3000).setScale(0);
      this.tweens.add({targets:b,scale:1,duration:260,delay:280+i*150,ease:'Back.out'});   // 依序彈出
      this.tweens.add({targets:b,alpha:0,delay:280+i*150+820,duration:420,onComplete:()=>b.destroy()});}
  }
  draw(){
    const cards=loadSave().cards, cap=boxCap(), cnt=cards.length, full=cnt>=cap;
    this.txt(CX,30,'🎒 背包(卡冊)','19px','#f3e9d8',0.5,true);
    this.txt(CX,52,'BOX '+cnt+' / '+cap+'　·　收集 '+ownedCount()+'/'+ROSTER.length+' 種','11px',full?'#ff8f6a':'#b9a584',0.5);
    const g=loadSave().gems; this.txt(CX,70,'🔮 '+ELEM_DUNGEONS.map(e=>EL[e].name+(g[e]||0)).join(' '),'10px','#b9a0ff',0.5);
    // 排序 / 擴背包
    this.btn(108,96,150,26,'↕ 排序:'+SORT_MODES[this.sortMode].name,()=>{this.sortMode=(this.sortMode+1)%SORT_MODES.length;this.boxPage=0;this.rebuild();},{col:0x2b2014,stroke:0x5a6a8a,color:'#cfe0ff',fs:'11px'});
    this.btn(300,96,150,26,'➕ 擴背包 1💎+5格',()=>{const r=buyBoxSlots();if(r.ok){this.rebuild();this.playExpandFX(r.cap);}else this.toast(r.msg);},{col:0x2e2a3a,stroke:0x7a6aaa,color:'#d8c8ff',fs:'11px'});
    const chips=[['全',null]].concat(ELEM_DUNGEONS.map(e=>[EL[e].name,e]));
    chips.forEach((ch,i)=>{const x=38+i*64, on=this.filterEl===ch[1];
      this.btn(x,128,58,26,ch[0],()=>{this.filterEl=ch[1];this.boxPage=0;this.rebuild();},{col:on?(ch[1]?EL[ch[1]].color:0x3a5a2c):0x2b2014,stroke:on?0xffd56a:0x4a3824,color:(on&&ch[1])?'#1a1208':(on?'#cfe8b0':'#b9a584'),fs:'12px',bold:on});});
    // 個體清單:每張卡各佔一格(不疊×N),套元素篩選 + 排序
    let list=cards.map((c,i)=>{const r=ROSTER.find(x=>x.id===c.id)||{};return Object.assign({_i:i,u:c.u},r);});
    if(this.filterEl)list=list.filter(c=>c.el===this.filterEl);
    list=list.sort(SORT_MODES[this.sortMode].fn);
    if(!this.filterEl){const empties=Math.max(0,cap-list.length);for(let e=0;e<empties;e++)list.push(null);}   // 全屬視圖:卡片後補「空欄」到上限→看得到還剩幾格
    // 正方形、一排 5 欄、分頁(5×6=30/頁)
    const cols=5, perPage=30, cw=64, gx=76, gy=74, x0=CX-2*gx, y0=192;
    const pages=Math.max(1,Math.ceil(list.length/perPage));
    if(this.boxPage>=pages)this.boxPage=pages-1; if(this.boxPage<0)this.boxPage=0;
    const pageList=list.slice(this.boxPage*perPage,(this.boxPage+1)*perPage);
    if(!list.length)this.txt(CX,280,'(沒有符合條件的卡)','12px','#9a8a6a',0.5);
    pageList.forEach((cd,k)=>{const cx=x0+(k%cols)*gx, cy=y0+Math.floor(k/cols)*gy;
      if(!cd){this.rect(cx,cy,cw,cw,0x140f0a,0.5).setStrokeStyle(1.5,0x4a3a28,0.6);return;}   // 空欄:暗色框(一眼看出還剩幾格)
      const r=this.rect(cx,cy,cw,cw,EL[cd.el].color).setStrokeStyle(2,cd.rank==='kage'?0xffd54a:0x000000,cd.rank==='kage'?1:0.3).setInteractive();
      r.on('pointerup',()=>{this.sel=cd.id;this.rebuild();});
      this.txt(cx,cy-16,cd.name,'10px','#1a1208',0.5,true);
      this.txt(cx,cy+2,starStr(cd.id),'10px','#3a2c12',0.5);
      this.txt(cx,cy+19,'Lv'+getCardLv(cd.id),'10px','#3a2c12',0.5);});
    if(pages>1){const py=y0+6*gy-6;
      this.btn(CX-74,py,52,28,'◀',()=>{this.boxPage--;this.rebuild();},{fs:'15px'});
      this.txt(CX,py,(this.boxPage+1)+' / '+pages,'13px','#cfe0e8',0.5);
      this.btn(CX+74,py,52,28,'▶',()=>{this.boxPage++;this.rebuild();},{fs:'15px'});}
    this.btn(CX,H-36,220,42,'🏠 返回大廳',()=>{this.scene.manager.start('home');this.scene.manager.stop('collection');},{stroke:0x5a8a3c,color:'#cfe8b0'});
    if(this.sel)this.drawDetail();
  }
  drawDetail(){
    const cd=ROSTER.find(c=>c.id===this.sel); if(!cd)return;
    const owned=loadOwned(), n=owned[cd.id]||0, lv=getCardLv(cd.id), atk=cardAtk(cd.id), exp=getCardExp(cd.id), need=expToNext(lv), mx=lv>=MAXLV;
    const no='No.'+cd.id.replace(/\D/g,'').padStart(3,'0'), ev=getCardEvo(cd.id), atMax=ev>=EVO_MAX, chk=canEvolve(cd.id);
    this.rect(CX,H/2,W,H,0x000000,0.78).setInteractive();   // 遮罩(擋住後方網格)
    const py=Math.round(H/2);                                // 視窗上下置中
    this.rect(CX,py,406,536,0x1c140c).setStrokeStyle(2,0xffd56a);
    this.txt(CX,py-244,cd.name+'  '+starStr(cd.id),'20px','#f3e9d8',0.5,true);
    this.rect(CX,py-178,100,100,EL[cd.el].color).setStrokeStyle(3,0x000000,0.35);   // 正方形卡圖
    this.txt(CX,py-178,EL[cd.el].name,'46px','#1a1208',0.5,true);
    this.txt(CX,py-110,EL[cd.el].name+'屬 · '+RANKNAME[cd.rank]+(ev>0?' · 進化+'+ev:'')+' · '+no,'13px','#ffd56a',0.5);
    this.txt(CX,py-85,'持有 ×'+n+'      Lv.'+lv+(mx?' (MAX)':' / '+MAXLV),'14px','#cfe0e8',0.5);
    this.txt(CX,py-61,'⚔️ 攻擊 '+atk+'   (基礎 '+cd.atk+')','14px','#ffd9a0',0.5);
    this.rect(CX-172,py-40,344,10,0x000000,0.4).setOrigin(0,0.5);
    this.rect(CX-172,py-40,344*(mx?1:Math.min(1,exp/need)),10,0x6ac0ff).setOrigin(0,0.5);
    this.txt(CX,py-40,mx?'MAX':('EXP '+exp+' / '+need),'9px','#bfe0ff',0.5);
    this.rect(CX,py-22,362,1,0x5a4128);
    this.txt(CX-178,py-8,'【主技】'+(EL_SKILL[cd.el]||'—'),'12px','#dfeae8',0);
    const subs=cd.attrs.slice(1).filter(a=>SUB_SKILL[a]);
    this.txt(CX-178,py+12,'【副技】'+(subs.length?subs.map(a=>SUB_SKILL[a]).join('  '):'無'),'12px','#c8b8e8',0);
    {const ls=leadSkill(cd.id);this.txt(CX-178,py+32,'🎖【隊長技】'+(ls?ls.name+':'+ls.desc:'—'),'11px','#ffd9a0',0);}
    {const ac=activeSkill(cd.el);this.txt(CX-178,py+52,'⚡【主動技】'+(ac?ac.name+':'+ac.desc:'—'),'11px','#a8d8ff',0);}
    this.btn(CX,py+88,330,38,'⬆️ 強化合成',()=>{this.scene.manager.start('fuse',{target:cd.id});this.scene.manager.stop('collection');},{col:0x2e3a22,stroke:0x6aaa4c,color:'#eafce0',bold:true,fs:'14px'});
    let eL,eO;
    if(atMax){eL='✨ 進化已滿 '+starStr(cd.id);eO={col:0x241a10,stroke:0x3a2e1c,color:'#7a6a4a',fs:'13px'};}
    else if(chk.ok){eL='✨ 進化 → ★'+(cardStars(cd.id)+1)+'(消'+chk.req.gems+'寶玉)';eO={col:0x3a2a4a,stroke:0xb18cff,color:'#e8d8ff',bold:true,fs:'13px'};}
    else {eL='✨ 進化:'+chk.msg;eO={col:0x241a10,stroke:0x4a3a5a,color:'#9a8aba',fs:'10px'};}
    this.btn(CX,py+130,330,38,eL,()=>{const r=evolveCard(cd.id);this.toast(r.ok?('✨ 進化成功! '+starStr(cd.id)):r.msg);this.rebuild();},eO);
    this.btn(CX-87,py+172,158,36,'🛡️ 設為隊長',()=>{setLeader(cd.id);this.toast(cd.name+' → 隊長');this.rebuild();},{col:0x2e2a3a,stroke:0x5a6a8a,color:'#cfe0ff',fs:'12px'});
    this.btn(CX+87,py+172,158,36,'🗑️ 分解 💰',()=>{const r=dissolveCard(cd.id);this.toast(r.ok?('分解 +'+r.gain+' 金'):r.msg);this.rebuild();},{col:0x3a2a1a,stroke:0x8a6a3a,color:'#ffd9a0',fs:'12px'});
    this.btn(CX,py+212,158,34,'✖️ 關閉',()=>{this.sel=null;this.rebuild();},{stroke:0x5a4128,color:'#cfc0a8',fs:'12px'});
  }
}

/* ===== 大廳:龍族式系統殼(資源列 + 六分頁 + 內容區) ===== */
const DUNGEON_COST=10;
class HomeScene extends Phaser.Scene{
  constructor(){super('home');}

/* ===== 強化合成(養成) ===== */
class FuseScene extends Phaser.Scene{
  constructor(){super('fuse');}
  init(d){this.target=(d&&d.target)||this.target||loadTeam()[0];this.mode='feed';if(this.feedPage==null)this.feedPage=0;}
  create(){this.add.rectangle(CX,H/2,W,H,0x160f18);this.rebuild();
    this.scale.on('resize',()=>{const o=H;recomputeLayout();if(Math.abs(H-o)>3){this.scale.setGameSize(W,H);this.rebuild();}});}
  rebuild(){if(this.layer)this.layer.destroy();this.layer=this.add.container(0,0);this.draw();}
  L(o){this.layer.add(o);return o;}
  txt(x,y,s,size,col,ox,bold){return this.L(this.add.text(x,y,s,{fontFamily:EMOJIFONT,fontSize:Math.max(15,parseInt(size||'16',10)||16)+'px',color:col||'#f3e9d8',fontStyle:bold?'bold':'normal'}).setOrigin(ox==null?0.5:ox,0.5));}   // 全選單字級最小 15px(手機可讀)
  rect(x,y,w,h,col,a){return this.L(this.add.rectangle(x,y,w,h,col,a==null?1:a));}
  btn(x,y,w,h,label,cb,o){o=o||{};const r=this.L(this.add.rectangle(x,y,w,h,o.col==null?0x2b2014:o.col).setStrokeStyle(2,o.stroke==null?0x5a4128:o.stroke).setInteractive());
    if(label)this.txt(x,y,label,o.fs||'14px',o.color||'#f3e9d8',0.5,o.bold);r.on('pointerup',cb);return r;}
  toast(msg){const t=this.add.text(CX,Math.round(H*0.4),msg,{fontFamily:EMOJIFONT,fontSize:'15px',color:'#ffd56a',fontStyle:'bold',backgroundColor:'#000000cc',padding:{x:12,y:8}}).setOrigin(0.5).setDepth(2000);
    this.tweens.add({targets:t,alpha:0,delay:900,duration:400,onComplete:()=>t.destroy()});}
  back(){this.btn(CX,H-42,200,44,'🏠 返回大廳',()=>{this.scene.manager.start('home');this.scene.manager.stop('fuse');},{stroke:0x5a8a3c,color:'#cfe8b0'});}
  draw(){
    this.txt(CX,36,'⬆️ 強化合成','20px','#f3e9d8',0.5,true);
    this.txt(CX,62,'💰 '+getMeta().coins+' · 吃重複卡升級(同屬 ×1.5)· 每張 '+FEED_COST+'金','10px','#ffe08a',0.5);
    if(this.mode==='pick')return this.drawPick();
    const t=ROSTER.find(c=>c.id===this.target);
    if(!t){this.btn(CX,200,200,44,'選擇強化對象',()=>{this.mode='pick';this.rebuild();},{stroke:0x5a6a8a,color:'#cfe0ff'});this.back();return;}
    const lv=getCardLv(this.target),atk=cardAtk(this.target),exp=getCardExp(this.target),need=expToNext(lv),mx=lv>=MAXLV;
    this.rect(CX,124,360,86,EL[t.el].color).setStrokeStyle(2,0xffd56a);
    this.txt(44,104,t.name+'  Lv.'+lv+(mx?' MAX':''),'15px','#1a1208',0,true);
    this.txt(44,128,EL[t.el].name+'·'+RANKNAME[t.rank]+'  ⚔️atk '+atk+'(基'+t.atk+')','11px','#3a2c12',0);
    this.rect(44,150,300,10,0x000000,0.4).setOrigin(0,0.5);
    this.rect(44,150,300*(mx?1:Math.min(1,exp/need)),10,0x6ac0ff).setOrigin(0,0.5);
    this.txt(344,150,mx?'MAX':(exp+'/'+need),'9px','#10303f',1,true);
    this.btn(CX,192,150,32,'🔄 換強化對象',()=>{this.mode='pick';this.rebuild();},{col:0x2e2a3a,stroke:0x5a6a8a,color:'#cfe0ff',fs:'12px'});
    this.txt(CX,232,'點素材餵入(留最後一張保護)↓','11px','#9a8a6a',0.5);
    // 素材=可餵的「個體」各一格(不疊×N,比照背包):每種留 1 張保護、其餘可餵;正方形 5 欄
    const cards=loadSave().cards, byType={}; cards.forEach(c=>{(byType[c.id]=byType[c.id]||[]).push(c);});
    let feedList=[];
    Object.keys(byType).forEach(id=>{const arr=byType[id]; if(arr.length>=2){const cd=ROSTER.find(x=>x.id===id); for(let k=1;k<arr.length;k++)feedList.push(cd);}});
    feedList.sort((a,b)=>((b.el===t.el?1:0)-(a.el===t.el?1:0))||a.id.localeCompare(b.id));   // 同屬優先
    const cols=5, perPage=30, cw=64, gx=76, gy=74, x0=CX-2*gx, y0=270;
    const pages=Math.max(1,Math.ceil(feedList.length/perPage));
    if(this.feedPage>=pages)this.feedPage=pages-1; if(this.feedPage<0)this.feedPage=0;
    const pageList=feedList.slice(this.feedPage*perPage,(this.feedPage+1)*perPage);
    if(!feedList.length){this.txt(CX,318,'目前沒有多餘的卡可當素材','12px','#9a8a6a',0.5);this.txt(CX,340,'(去元素關多收幾張同卡)','10px','#7a6a4a',0.5);}
    pageList.forEach((c,k)=>{const cx=x0+(k%cols)*gx, cy=y0+Math.floor(k/cols)*gy, same=c.el===t.el;
      this.rect(cx,cy,cw,cw,EL[c.el].color).setStrokeStyle(2,same?0xffd56a:0x000000,same?1:0.3).setInteractive().on('pointerup',()=>this.feed(c.id));
      this.txt(cx,cy-15,c.name,'10px','#1a1208',0.5,true);
      this.txt(cx,cy+3,starStr(c.id),'9px','#3a2c12',0.5);
      this.txt(cx,cy+19,same?'同屬×1.5':'素材','9px',same?'#7a3000':'#3a2c12',0.5);});
    if(pages>1){const py=y0+6*gy-8;
      this.btn(CX-74,py,52,28,'◀',()=>{this.feedPage--;this.rebuild();},{fs:'15px'});
      this.txt(CX,py,(this.feedPage+1)+' / '+pages,'13px','#cfe0e8',0.5);
      this.btn(CX+74,py,52,28,'▶',()=>{this.feedPage++;this.rebuild();},{fs:'15px'});}
    this.back();
  }
  drawPick(){
    this.txt(CX,98,'選擇強化對象','13px','#ffd56a',0.5,true);
    // 強化對象=「種類」(同種共用等級)→ 每種一格,正方形 5 欄
    const owned=loadOwned(), list=ROSTER.filter(c=>owned[c.id]);
    const cols=5, cw=64, gx=76, gy=74, x0=CX-2*gx, y0=150;
    list.forEach((c,k)=>{const cx=x0+(k%cols)*gx, cy=y0+Math.floor(k/cols)*gy, on=c.id===this.target;
      this.rect(cx,cy,cw,cw,EL[c.el].color).setStrokeStyle(2,on?0xffd56a:0x000000,on?1:0.3).setInteractive().on('pointerup',()=>{this.target=c.id;this.mode='feed';this.feedPage=0;this.rebuild();});
      this.txt(cx,cy-15,c.name,'10px','#1a1208',0.5,true);
      this.txt(cx,cy+3,'Lv'+getCardLv(c.id),'10px','#3a2c12',0.5);
      this.txt(cx,cy+19,'持有'+owned[c.id],'9px','#3a2c12',0.5);});
    this.btn(CX,H-42,200,44,'返回',()=>{this.mode='feed';this.rebuild();},{stroke:0x5a6a8a,color:'#cfe0ff'});
  }
  feed(fid){const r=feedFodder(this.target,fid);if(!r.ok){this.toast(r.msg);return;}
    this.toast(r.ups>0?('🆙 升級! Lv.'+r.lv+(r.same?'(同屬)':'')):('+'+r.reward+' exp'+(r.same?'(同屬×1.5)':'')));this.rebuild();}
}

window.GAME = new Phaser.Game({
  type:Phaser.AUTO, parent:'game', backgroundColor:'#160f18',
  scale:{mode:Phaser.Scale.FIT, autoCenter:Phaser.Scale.CENTER_BOTH, width:W, height:H},
  scene:[HomeScene, TeamScene, GameScene, CollectionScene, FuseScene],
});
track('open');   // 開遊戲心跳(回流追蹤;ANALYTICS_URL 空時自動 no-op)
// 預載字型字符(招式名毛筆字的所有用字 + HIT 數字)→ 首次展演就已是設計字型,不掉回退
try{ if(document.fonts&&document.fonts.load){
  const _jc=KATA.join('')+Object.keys(JUTSU).map(e=>JUTSU[e].join('')).join('')+CONFIG.MORALE_NAMES.join('');
  document.fonts.load("700 28px 'LXGW WenKai TC'", _jc);
  document.fonts.load("400 40px 'Russo One'", '0123456789 HITCOMBO');
}}catch(e){}
// HIT 實驗室入口:網址加 #hitlab → 直接進戰鬥的 lab 模式(塊區放各 HIT 按鈕,演示招式規模)
window.GAME.events.once('ready',function(){
  if(location.hash==='#hitlab'){
    const team=['fire','water','thunder','earth','wind'].map(el=>ROSTER.find(c=>c.el===el)||ROSTER[0]);
    window.GAME.scene.start('game',{team:team,dungeonId:'tower',lab:true});
    window.GAME.scene.stop('home');
  }
});
// 真機轉向 / 瀏覽器縮放 / 網址列伸縮 → 即時重算高度 + 重排(不黑邊、不用重整)
window.addEventListener('resize',function(){
  const o=H; recomputeLayout();
  if(Math.abs(H-o)>3){
    window.GAME.scale.setGameSize(W,H);
    const gs=window.GAME.scene.getScene('game');
    if(gs && window.GAME.scene.isActive('game') && gs.relayout) gs.relayout();
  }
});
</script>
