function chakraShape(el,lv){const m=SHAPES_BY_EL[el]||SHAPES_BY_EL.fire;return (m[Math.max(1,Math.min(5,lv))]||m[1]).map(x=>x.slice());}
function normCells(cells){const mr=Math.min(...cells.map(c=>c[0])),mc=Math.min(...cells.map(c=>c[1]));return cells.map(([r,c])=>[r-mr,c-mc]);}
function rot90(cells){return normCells(cells.map(([r,c])=>[c,-r]));}
// 火/土/雷=生成時就隨機旋轉+鏡像(玩家不必手動轉);水/風=固定方向(直落/橫吹,可預測)
function randOrient(cells,el){if(el==='water'||el==='wind')return cells;
  let out=cells.map(x=>x.slice());const t=rnd(4);for(let k=0;k<t;k++)out=rot90(out);
  if(rnd(2))out=normCells(out.map(([r,c])=>[r,-c]));   // 隨機鏡像
  return out;}

function rnd(n){return Math.floor(Math.random()*n);}
function pickShape(){let r=rnd(WSUM);for(const s of SHAPES){r-=s.w;if(r<0)return s.c.map(x=>x.slice());}}
function boxOf(r,c){return Math.floor(r/3)*3+Math.floor(c/3);}
function canPlace(board,cells,r,c,kind){
  const inB=cells.every(([dr,dc])=>{const rr=r+dr,cc=c+dc;return rr>=0&&rr<N&&cc>=0&&cc<N;});
  if(!inB)return false;
  if(kind==='water')return cells.some(([dr,dc])=>!board[r+dr][c+dc]);   // 水塊:界內 + 至少一格空(可填)
  if(kind==='wind') return cells.some(([dr,dc])=> board[r+dr][c+dc]);   // 風刃:界內 + 至少一格有方塊(可消)
  if(kind==='earth')return cells.some(([dr,dc])=> board[r+dr][c+dc]);   // 土塊:界內 + 至少一格有方塊(可抓取搬移)
  return cells.every(([dr,dc])=>!board[r+dr][c+dc]);                    // 一般塊:全空
}
function computeClears(board, boxElement, boxCard, enemyEl, ampMult){
  let rows=[],cols=[],boxes=[];
  for(let r=0;r<N;r++)if(board[r].every(x=>x))rows.push(r);
  for(let c=0;c<N;c++){let f=true;for(let r=0;r<N;r++)if(!board[r][c])f=false;if(f)cols.push(c);}
  for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3;let f=true;
    for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)if(!board[r][c])f=false;if(f)boxes.push(b);}
  const groups=rows.length+cols.length+boxes.length;
  if(groups===0)return null;
  const cellSet=new Set();
  rows.forEach(r=>{for(let c=0;c<N;c++)cellSet.add(r+'_'+c);});
  cols.forEach(c=>{for(let r=0;r<N;r++)cellSet.add(r+'_'+c);});
  boxes.forEach(b=>{const br=Math.floor(b/3)*3,bc=(b%3)*3;for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)cellSet.add(r+'_'+c);});
  const mult=(el)=> el==='neutral'?1 : (EL[el].beats===enemyEl?CONFIG.ADV_MULT : (EL[enemyEl].beats===el?CONFIG.WEAK_MULT:CONFIG.NORM_MULT));
  let total=0,hitWeak=false,parts=[];
  boxes.forEach(b=>{const el=boxElement[b]||'neutral';const card=boxCard[b];
    let d = card ? Math.round(card.atk*mult(el)*ampMult) : Math.round(CONFIG.NEUTRAL_BOX_BASE*mult(el));
    total+=d;
    if(el!=='neutral'&&EL[el].beats===enemyEl)hitWeak=true;
    const br=Math.floor(b/3)*3,bc=(b%3)*3;parts.push({el,d,r:br+1,c:bc+1});});
  const lineDmg=(bx)=>{let d=CONFIG.LINE_BASE,best=null,weak=false;const byEl={};
    bx.forEach(b=>{const e=boxElement[b];if(e&&boxCard[b])(byEl[e]=byEl[e]||[]).push(boxCard[b]);});
    for(const e in byEl)if(byEl[e].length>=2){byEl[e].forEach(card=>{d+=Math.round(card.atk*CONFIG.LINE_SAME_RATE*mult(e));});best=e;if(EL[e].beats===enemyEl)weak=true;}
    return {d,best,weak};};
  rows.forEach(r=>{const br=Math.floor(r/3);const L=lineDmg([br*3,br*3+1,br*3+2]);
    total+=L.d;if(L.weak)hitWeak=true;parts.push({el:L.best||'neutral',d:L.d,r,c:4});});
  cols.forEach(c=>{const bc=Math.floor(c/3);const L=lineDmg([bc,bc+3,bc+6]);
    total+=L.d;if(L.weak)hitWeak=true;parts.push({el:L.best||'neutral',d:L.d,r:4,c});});
  const elemCells={};
  cellSet.forEach(k=>{const p=k.split('_');const e=boxElement[boxOf(+p[0],+p[1])];if(e)elemCells[e]=(elemCells[e]||0)+1;});
  const fx={};
  ELEMENT_BOXES.forEach(b=>{const card=boxCard[b];if(!card)return;const br=Math.floor(b/3)*3,bc=(b%3)*3;
    let hit=false;for(let r=br;r<br+3&&!hit;r++)for(let c=bc;c<bc+3;c++)if(cellSet.has(r+'_'+c))hit=true;
    if(!hit)return;const e=card.el;const o=fx[e]||(fx[e]={atk:0,attrs:[]});
    o.atk=Math.max(o.atk,card.atk);card.attrs.forEach(a=>{if(o.attrs.indexOf(a)<0)o.attrs.push(a);});});
  Object.keys(fx).forEach(e=>{fx[e].level=Math.min(7,Math.floor((elemCells[e]||0)/3))||1;});
  return {groups,cells:[...cellSet].map(k=>k.split('_').map(Number)),parts,total,hitWeak,fx};
}

let H,TRAY_Y,BY0,CARDS_Y,PHP_Y,INFO_Y,BG_H,BATTLE_CY,BOARD_CY;
function recomputeLayout(){
  // 讀「真正的容器尺寸」(#game),才與 Phaser FIT 進去的容器一致→零黑邊;取不到再 fallback 視窗
  const el=(typeof document!=='undefined')?document.getElementById('game'):null;
  const vw=(el&&el.clientWidth)?el.clientWidth:((typeof window!=='undefined'&&window.innerWidth)?window.innerWidth:390);
  const vh=(el&&el.clientHeight)?el.clientHeight:((typeof window!=='undefined'&&window.innerHeight)?window.innerHeight:844);
  H=Math.max(640,Math.min(1400,Math.round(W*vh/vw)));   // 涵蓋約 1.52~3.33 的長寬比
  TRAY_Y=H-46; BY0=TRAY_Y-52-9*CS; CARDS_Y=BY0-50; PHP_Y=BY0-16; INFO_Y=BY0-2;   // 板面/托盤盡量往下、卡列貼緊板面 → 上方戰鬥區留多一點

  if(getGems(c.el)<req.gems)return {ok:false,msg:'需 '+req.gems+' 顆'+EL[c.el].name+'寶玉(有'+getGems(c.el)+')'};
  if((getMeta().coins||0)<req.coins)return {ok:false,msg:'需 '+req.coins+' 金'};
  return {ok:true,req:req};}
function evolveCard(id){const chk=canEvolve(id);if(!chk.ok)return chk;const c=ROSTER.find(x=>x.id===id);
  mutSave(s=>{const req=evoReq(s.cardEvo[id]||0);s.gems[c.el]-=req.gems;s.meta.coins-=req.coins;
    s.cardEvo[id]=(s.cardEvo[id]||0)+1;s.cardLv[id]={lv:1,exp:0};});
  return {ok:true,tier:getCardEvo(id)};}
/* 經濟:體力(時間回復)/ 經驗·等級 / 金錢 / 魔法石 */
const REGEN_MS=20000;   // 體力每 20 秒 +1
function syncStamina(m){if(m.staTs==null){m.staTs=Date.now();return;}
  if(m.stamina>=m.staminaMax){m.staTs=Date.now();return;}
  const g=Math.floor((Date.now()-m.staTs)/REGEN_MS);
  if(g>0){m.stamina=Math.min(m.staminaMax,m.stamina+g); m.staTs=(m.stamina>=m.staminaMax)?Date.now():m.staTs+g*REGEN_MS;}}
function getMeta(){return mutSave(s=>syncStamina(s.meta)).meta;}
function spendStamina(n){let ok=false;mutSave(s=>{syncStamina(s.meta);if(s.meta.stamina>=n){s.meta.stamina-=n;s.meta.staTs=Date.now();ok=true;}});return ok;}
function staFullSec(){const m=getMeta();if(m.stamina>=m.staminaMax)return 0;return Math.ceil(((m.staminaMax-m.stamina)*REGEN_MS-(Date.now()-m.staTs))/1000);}
function expForLevel(rank){return 80+rank*40;}
function addRewards(exp,coins,stones){return mutSave(s=>{const m=s.meta;m.coins=(m.coins||0)+(coins||0);m.stones=(m.stones||0)+(stones||0);m.exp=(m.exp||0)+(exp||0);
  let need=expForLevel(m.rank),ups=0;while(m.exp>=need){m.exp-=need;m.rank++;m.staminaMax+=2;m.stamina=m.staminaMax;ups++;need=expForLevel(m.rank);}m._ups=ups;}).meta;}
function spendStones(n){let ok=false;mutSave(s=>{if((s.meta.stones||0)>=n){s.meta.stones-=n;ok=true;}});return ok;}
function refillStamina(){mutSave(s=>{s.meta.stamina=s.meta.staminaMax;s.meta.staTs=Date.now();});}
const RANK_POOL={genin:ROSTER.filter(c=>c.rank==='genin'),chunin:ROSTER.filter(c=>c.rank==='chunin'),jonin:ROSTER.filter(c=>c.rank==='jonin'),kage:ROSTER.filter(c=>c.rank==='kage')};
function pickDrop(spec){let pool=ROSTER;if(spec.el)pool=pool.filter(c=>c.el===spec.el);
  if(spec.rank)pool=pool.filter(c=>c.rank===spec.rank); else pool=pool.filter(c=>c.rank!=='kage');   // 影忍只能抽卡取得,不從刷關掉落
  return pool.length?pool[rnd(pool.length)]:null;}
function rollDrops(table){const out=[];(table||[]).forEach(d=>{if(Math.random()<d.rate){const c=pickDrop(d);if(c)out.push(c);}});return out;}

/* ===== 轉蛋(簡單版:雙池 + 機率公示) ===== */
const GACHA={
  premium:{name:'結印轉蛋',cur:'stones',icon:'💎',cost1:5,   cost10:50,  rates:[['genin',0.50],['chunin',0.35],['jonin',0.12],['kage',0.03]]},
  normal: {name:'一般轉蛋',cur:'coins', icon:'💰',cost1:1000,cost10:9000,rates:[['genin',0.70],['chunin',0.28],['jonin',0.02]]},
};
function rollRarity(rates){const r=Math.random();let acc=0;for(let k=0;k<rates.length;k++){acc+=rates[k][1];if(r<acc)return rates[k][0];}return rates[rates.length-1][0];}
function gachaPull(bankey){const pool=RANK_POOL[rollRarity(GACHA[bankey].rates)];return pool[rnd(pool.length)];}
function spendCoins(n){let ok=false;mutSave(s=>{if((s.meta.coins||0)>=n){s.meta.coins-=n;ok=true;}});return ok;}
const PITY_MAX=50;   // 結印轉蛋保底:第 50 抽必得影忍(kage)
function getPity(){return loadSave().meta.pity||0;}
function setPity(n){mutSave(s=>{s.meta.pity=n;});}
function doGacha(bankey,count){const b=GACHA[bankey],cost=count===10?b.cost10:b.cost1;
  const ok=b.cur==='stones'?spendStones(cost):spendCoins(cost); if(!ok)return null;
  const out=[];
  for(let i=0;i<count;i++){let c,pityHit=false;
    if(bankey==='premium'){let p=getPity();
      if(p>=PITY_MAX-1){c=RANK_POOL.kage[rnd(RANK_POOL.kage.length)];setPity(0);pityHit=true;}   // 第50抽保底:必影忍
      else{c=gachaPull(bankey);if(c.rank==='kage')setPity(0);else setPity(p+1);}                  // 抽到影忍歸零、否則+1
    }else{c=gachaPull(bankey);}
    out.push({cd:c,isNew:!isOwned(c.id),pity:pityHit});addCard(c.id);
  }
  track('gacha');
  return out;}

  pointerToCell(px,py){const c=Math.floor((px-BX0)/CS),r=Math.floor((py-BY0)/CS);

  newGame(){
    track('battle_start');
    this.locked=false;   // 鎖輸入旗標:敵方出手展演期間禁止下一手動作(避免插隊/重覆觸發)
    this.boxElement={}; this.boxCard={};
    if(this.presetTeam) ELEMENT_BOXES.forEach((b,i)=>{const card=this.presetTeam[i];this.boxCard[b]=card;this.boxElement[b]=card.el;});
    else ELEMENT_BOXES.forEach(b=>{const card=ROSTER[rnd(ROSTER.length)];this.boxCard[b]=card;this.boxElement[b]=card.el;});
    this.lead=(this.presetTeam&&this.presetTeam[0]&&LEADER_SKILLS[this.presetTeam[0].id])||null;   // 隊長技=隊首卡
    this.maxHP=Math.round(CONFIG.PLAYER_HP_BASE*((this.lead&&this.lead.type==='hp')?this.lead.v:1));
    this.playerHP=this.maxHP; this.stage=1; this.resultOpen=false; this.chests=0; this.gold=0; this.runDrops=[]; this.runExp=0; this.runCoins=0; this.runGems=0;
    this.charge=[0,0,0,0,0];   // 主動技蓄力(整場累積、跨關保留)
    this.stored=[null,null,null,null,null];   // 每卡存放的屬塊 {el,lv}(跨關保留,新局/重挑才清)
    this.firstClear=true;   // 新手鉤子:本場第一次消除=隆重慶祝
    this.renderTeam(); this.startStage();
  }
  resetWave(){this.combo=0;this.immune=0;this.armor=0;this.amp=1;}
  startStage(keepBoard){
    this.stopStuckFX&&this.stopStuckFX();   // 新關/新局清掉殘留的卡死提示
    if(!keepBoard){this.board=Array.from({length:N},()=>Array(N).fill(null));this.stored=[null,null,null,null,null];}   // 跨關保留盤面+屬塊:只有新局/重挑才清,過關時累積到下一關的怪
    this.resetWave(); if(!keepBoard)this.morale=(this.lead&&this.lead.type==='moraleStart')?this.lead.v:CONFIG.MORALE_START; this.handCleared=false; this.handBurst=false; this.whiffStreak=0; if(!keepBoard)this.refill();   // 鬥志+托盤:跨關保留(只新局/重挑才重置/換新托盤)
    if(this.stage===1&&this.lead&&!this.hitLab)this.time.delayedCall(450,()=>{   // 隊長技:進關時在盤面中央彈出清楚橫幅(技名+效果),停留可讀(原本上緣快閃小字看不清)
      const ld=this.lead, mk=(dy,str,sz,col,sw)=>{const t=this.add.text(CX,BOARD_CY+dy,str,{fontFamily:EMOJIFONT,fontSize:sz,color:col,fontStyle:'bold',stroke:'#3a2400',strokeThickness:sw,align:'center'}).setOrigin(0.5).setDepth(DEPTH.fx).setScale(0.5);
        this.tweens.add({targets:t,scale:1,duration:260,ease:'Back.out'});
        this.tweens.add({targets:t,alpha:0,delay:1400,duration:420,onComplete:()=>t.destroy()});};
      mk(-13,'🎖 隊長技 · '+ld.name,'21px','#ffe08a',5);
      mk(15,ld.desc,'14px','#ffeec4',4);
    });
    this.spawnEnemies(); this.refreshBoard(); this.renderTray(); this.updateAll(); this.renderCharges(); this.renderStored(); this.syncMoraleState();   // 進關依目前鬥志同步「極」脈動(跨關帶來的極要持續演)
    if(this.stage===1 && !tutSeen() && !this.hitLab)this.showTutorial();   // 首次遊玩→3 步教學
  }
  spawnEnemies(){
    if(this.enemyG)this.enemyG.destroy();
    this.enemyG=this.add.container(0,0).setDepth(DEPTH.enemy);   // 敵方整層在「我方卡」之下、背景之上
    const defs=this.dungeon.stages[this.stage-1].es;
    this.enemies=defs.map(d=>({el:d.el,max:d.hp,hp:d.hp,atk:d.atk,interval:d.turns,timer:d.turns,burn:0,dead:false,boss:!!d.boss}));
    const n=this.enemies.length, slot=380/n;
    this.enemies.forEach((e,i)=>{
      const x=20+slot*(i+0.5), cy=BATTLE_CY;
      const szc=Math.max(50,Math.min(slot-8,126,Math.round((CARDS_Y-81)*0.92)));   // 敵欄正方形邊長:取寬度/高度空檔較小者(矮螢幕自動縮小)
      e.cardW=szc; e.cardH=szc;
      e.card=this.add.rectangle(x,cy,szc,szc,0x000000,0).setInteractive();   // 無底色:透明矩形只當點擊區
      e.card.on('pointerdown',()=>this.selectTarget(i));
      if(MONSTER_IMG[e.el]&&this.textures.exists('mon_'+e.el)){   // 有怪物圖→滿版置中;否則用 emoji 臉
        e.sprite=this.add.image(x,cy,'mon_'+e.el).setOrigin(0.5).setInteractive(); e.sprite.setDisplaySize(szc,szc); e.img=true;
      }else{
        e.sprite=this.add.text(x,cy-Math.round(szc*0.14),EL[e.el].face,{fontFamily:EMOJIFONT,fontSize:Math.round(szc*0.5)+'px'}).setOrigin(0.5).setInteractive();
      }
      e.baseScale=e.sprite.scaleX;   // 受擊縮放動畫的基準(圖=szc/320、emoji=1),回彈要回到這個值,不能歸 1
      e.sprite.on('pointerdown',()=>this.selectTarget(i));
      e.turnG=this.add.container(x-szc/2+12,cy-szc/2+11,[]);   // 出手倒數:沙漏+數字,移到敵卡左上
      e.glass=this.add.text(0,0,'⏳',{fontFamily:EMOJIFONT,fontSize:'16px'}).setOrigin(0.5);
      e.turnTx=this.add.text(11,0,String(e.timer),{fontFamily:EMOJIFONT,fontSize:'18px',color:'#eaf3ff',fontStyle:'bold',stroke:'#1a0d05',strokeThickness:4}).setOrigin(0,0.5);
      e.turnG.add([e.glass,e.turnTx]);
      e.hpW=szc-10; e.hpx=x-e.hpW/2;
      e.hpBg=this.add.rectangle(x,cy+szc/2-3,e.hpW,8,0x000000,0.6).setOrigin(0.5);   // HP:壓在敵圖下緣(再往下 6px)
      e.hpFill=this.add.rectangle(e.hpx,cy+szc/2-3,e.hpW,8,e.boss?0xff7a3a:0xc23c2c).setOrigin(0,0.5);
      e.mark=this.add.text(x,cy-szc/2-9,'▼',{fontFamily:EMOJIFONT,fontSize:'14px',color:'#ffd56a',fontStyle:'bold'}).setOrigin(0.5).setVisible(false);   // 目標指標(取代黃框)
      e.restY=e.sprite.y;   // 受擊擊退/回位的基準 y
      e.bob=this.tweens.add({targets:e.sprite,y:e.sprite.y-4,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});
    });
    // 敵方同層 z 序:敵中 > 敵左 > 敵右(越靠中央畫越上;同距時左>右)。依此由後往前加入容器
    const zorder=this.enemies.map((e,i)=>i).sort((a,b)=>{
      const da=Math.abs(this.enemies[a].card.x-CX), db=Math.abs(this.enemies[b].card.x-CX);
      return da!==db ? db-da : this.enemies[b].card.x-this.enemies[a].card.x;
    });
    zorder.forEach(i=>{const e=this.enemies[i];[e.card,e.sprite,e.turnG,e.hpBg,e.hpFill,e.mark].forEach(o=>this.enemyG.add(o));});
    this.enemies.forEach((e,i)=>this.enemyEnter(e, i*120));   // 自遠方逼近入場(交錯)
    this.target=0;
  }
  refill(){this.tray=[pickShape(),pickShape(),pickShape()].map(c=>({c,used:false}));}
  aliveCount(){return this.enemies.filter(e=>!e.dead).length;}
  targetEnemy(){let e=this.enemies[this.target];if(e&&!e.dead)return e;
    const i=this.enemies.findIndex(x=>!x.dead);this.target=i;return i<0?null:this.enemies[i];}
  selectTarget(i){if(this.enemies[i]&&!this.enemies[i].dead){this.target=i;this.updateEnemies();}}

  refreshBoard(){
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){const rc=this.cellRect(r,c), be=this.boxElement[boxOf(r,c)];
      if(this.board[r][c]){const el=this.board[r][c].el;rc.setFillStyle(EL[el]?EL[el].color:NEUTRAL_FILL);}
      else rc.setFillStyle(be?EL[be].dark:NEUTRAL_DARK);
      rc.setStrokeStyle(2,0x000000,0);}
    for(let b=0;b<9;b++){const be=this.boxElement[b];
      this.boxLabels[b].setText(be?EL[be].name:'·').setColor(be?'#'+EL[be].color.toString(16).padStart(6,'0'):'#ffffff66');}
  }
  renderTeam(){ELEMENT_BOXES.forEach((b,i)=>{const k=this.boxElement[b],card=this.teamCards[i];
    card.el=k;card.rect.setFillStyle(EL[k].color);card.txt.setText(EL[k].name);});
    this.renderCharges();}
  // 主動技蓄力條/發光/icon 同步
  renderCharges(){if(!this.charge)return;this.teamCards.forEach((card,i)=>{const a=activeSkill(card.el);
    if(!card.abtn)return;
    if(!a){card.abtn.setVisible(false);return;}
    card.abtn.setVisible(true);
    const ready=(this.charge[i]||0)>=a.cd;
    card.abg.setFillStyle(ready?0x6a5020:0x2b2014).setStrokeStyle(2,ready?0xffe066:0x5a4128);
    card.aic.setText(ready?a.icon:String(Math.max(0,a.cd-(this.charge[i]||0)))).setFontSize(ready?'14px':'11px');   // 滿→icon可點;否則顯示剩餘手數
    if(ready&&!card.pulse)card.pulse=this.tweens.add({targets:card.abtn,scaleX:1.15,scaleY:1.15,duration:480,yoyo:true,repeat:-1,ease:'Sine.inOut'});
    if(!ready&&card.pulse){card.pulse.stop();card.pulse=null;card.abtn.setScale(1);}});}
  // 屬塊存放顯示:無框無底,元素色塊+「明暗漸層流動」(查克拉在屬性裡流的感覺);新生時彈出一下
  renderStored(){if(!this.stored)return;this.teamCards.forEach((card,i)=>{const so=card.storeObj;if(!so)return;
    so.removeAll(true);
    const s=this.stored[i], key=s?s.el+'_'+s.lv:null;
    if(card.txt)card.txt.setVisible(!s);   // 有屬塊→元素字讓位給屬塊(免字塊相疊變花;元素仍由卡底色辨識)
    if(!s){so.setVisible(false); card.storeCells=null; card.storeKey=null; return;}
    so.setVisible(true);
    const cells=s.cells||chakraShape(s.el,s.lv), col=EL[s.el].color;
    card.storeDark=shadeColor(col,-0.42); card.storeLight=shadeColor(col,0.55);   // 流動兩端:暗↔亮的同屬性色
    let mr=0,mc=0;cells.forEach(([r,c])=>{mr=Math.max(mr,r);mc=Math.max(mc,c);});
    const ms=12,pw=(mc+1)*ms,ph=(mr+1)*ms, span=(mr+mc)||1;   // 格大小反映真實 LV(格數)
    const inner=this.add.container(0,0); so.add(inner);   // 內層=塊本體(彈出動畫專用,與流動上色分開)
    const objs=[];
    cells.forEach(([dr,dc])=>{const rc=this.add.rectangle(dc*ms-pw/2,dr*ms-ph/2,ms-1,ms-1,col).setOrigin(0).setStrokeStyle(1,0x140d05,0.6); inner.add(rc); objs.push({obj:rc,phase:(dr+dc)/span});});   // 細深邊→撞色卡上也看得清塊形;phase=沿塊身的流動相位
    card.storeCells=objs;
    if(card.storeKey!==key){card.storeKey=key;inner.setScale(0.2);this.tweens.add({targets:inner,scaleX:1,scaleY:1,duration:320,ease:'Back.out'});}else inner.setScale(1);   // 新生/升級才彈出一次(醒目);平時靠漸層流動,不亂閃
  });}
  // 每幀驅動:屬塊的明暗漸層流動(沿塊身相位差→像能量在流)+ 「極」鬥志徽章底色漸層流動(絕好調)
  update(time){
    if(!this.teamCards)return;
    try{   // ★ 單幀繪製例外絕不可外拋,否則會中斷整個遊戲主迴圈→畫面凍住
      for(const card of this.teamCards){const cs=card.storeCells; if(!cs)continue;
        for(const c of cs){if(!c.obj||!c.obj.active)continue; const frac=0.5+0.5*Math.sin(time*0.005 - c.phase*3.4); c.obj.setFillStyle(lerpColor(card.storeDark,card.storeLight,frac));}}   // 判 active:屬塊被消耗/重建時舊矩形已銷毀,不可再上色
      if(this.moralePeak&&this.moraleBg&&this.moraleBg.active){const t=time*0.006;   // 極=絕好調:徽章底色與外環在暗紅↔亮橙間流動(相位差→像能量在圈裡轉)
        this.moraleBg.setFillStyle(lerpColor(0x6e1808,0xff8a1e,0.5+0.5*Math.sin(t)),1);
        this.moraleBg.setStrokeStyle(2,lerpColor(0xff5a2a,0xffd24a,0.5+0.5*Math.sin(t+1.7)));}
    }catch(e){}
  }
  // 發動主動技
  fireActive(i){if(this.resultOpen||this.locked||this.drag||this.earthSel||this.earthDrag)return;
    this.stopStuckFX();
    const card=this.teamCards[i], a=activeSkill(card.el); if(!a)return;
    if((this.charge[i]||0)<a.cd){this.tonFloat('蓄力中 '+(this.charge[i]||0)+'/'+a.cd,'#9fb0c0');return;}
    this.charge[i]=0;
    const colHex='#'+EL[card.el].color.toString(16).padStart(6,'0');
    this.tonFloat('★ '+a.name,colHex);
    const cardObj=this.boxCard[ELEMENT_BOXES[i]], atk=cardObj?cardObj.atk:200;
    switch(card.el){
      case 'fire':{const dmg=Math.round(atk*3), vs=this.enemies.filter(e=>!e.dead);   // 全體爆裂
        vs.forEach(v=>{v.hp=Math.max(0,v.hp-dmg);this.floatText(v.sprite.x,v.sprite.y-24,'-'+dmg,'#ff8f8f');});
        this.cameras.main.shake(320,0.014);{const fl=this.add.rectangle(CX,H/2,W,H,0xffc89a,0).setDepth(DEPTH.flash);this.tweens.add({targets:fl,alpha:0.4,duration:90,yoyo:true,onComplete:()=>fl.destroy()});}this.updateEnemies();
        vs.forEach(v=>{if(v.hp<=0)this.killEnemy(v);});break;}
      case 'water':{const h=Math.round(this.maxHP*0.3);this.playerHP=Math.min(this.maxHP,this.playerHP+h);   // 純補血(不再洗托盤)
        this.floatText(CX,PHP_Y-14,'癒+'+h,'#74e09a');break;}
      case 'thunder':this.enemies.forEach(e=>{if(!e.dead){e.timer+=3;if(e.sprite)this.floatText(e.sprite.x,e.sprite.y-24,'封+3','#f4da52');}});break;   // 凍結
      case 'earth':this.refill();this.renderTray();this.tonFloat('洗換一手查克拉塊','#d49a4a');break;   // 換新一手托盤塊(原水的洗托盤移來這)
      case 'wind':{const m0=this.morale;this.morale=5;if(this.morale!==m0)this.moraleFX(5,true);break;}   // 鬥志衝極
    }
    if(this.hitLab)this.charge=this.teamCards.map(c=>{const a=activeSkill(c.el);return a?a.cd:0;});   // 實驗室:主動技恆滿
    this.updateAll();this.renderCharges();}
  renderTray(){
    if(this.trayTweens)this.trayTweens.forEach(t=>t.remove()); this.trayTweens=[];   // 先收掉舊脈動 tween 再銷毀(避免懸空)
    this.trayIcons.forEach(g=>g.destroy()); this.trayIcons=[];
    if(this.hitLab){this.renderHitLab();return;}   // HIT 實驗室:塊區改放各 HIT 按鈕(上方敵人+盤面照舊)
    // 特殊工具塊:亮色脈動光暈邊框 + 功能漢字(填/消/搬)→ 一眼看出是特殊塊
    const SP={water:{c:0x62b8f0,glow:0x8fd6ff,label:'填'},wind:{c:0x6ad06a,glow:0xb6ffae,label:'消'},earth:{c:0xd49a4a,glow:0xffc24a,label:'搬'}};
    this.tray.forEach((p,i)=>{if(p.used)return;
      let maxr=0,maxc=0;p.c.forEach(([r,c])=>{maxr=Math.max(maxr,r);maxc=Math.max(maxc,c);});
      const span=Math.max(maxr,maxc)+1, s=Math.min(24,Math.floor(78/span)), pw=(maxc+1)*s, ph=(maxr+1)*s;   // 依最長邊連續縮放,塞進約 78px 高托盤格:小塊維持 24px,4/5 格長塊自動縮到一致高度、不頂出畫面
      const sp=SP[p.kind], cont=this.add.container(this.traySlots[i],TRAY_Y,[]).setDepth(DEPTH.tray);
      if(sp){const glow=this.add.rectangle(0,0,pw+13,ph+13,0,0).setStrokeStyle(3,sp.glow,1); cont.add(glow);   // 脈動光暈
        this.trayTweens.push(this.tweens.add({targets:glow,alpha:{from:0.3,to:1},scaleX:{from:0.9,to:1.06},scaleY:{from:0.9,to:1.06},duration:600,yoyo:true,repeat:-1,ease:'Sine.inOut'}));}
      p.c.forEach(([dr,dc])=>cont.add(this.add.rectangle(dc*s-pw/2, dr*s-ph/2, s-3, s-3, sp?sp.c:NEUTRAL_FILL).setOrigin(0).setStrokeStyle(sp?1:0, 0xffffff, sp?0.5:0)));
      if(sp)cont.add(this.add.text(0,0,sp.label,{fontFamily:EMOJIFONT,fontSize:(s>=24?'17px':'10px'),color:'#ffffff',fontStyle:'bold'}).setOrigin(0.5).setStroke('#1a1208',4));   // 功能漢字
      this.trayIcons.push(cont);});
  }
  // HIT 實驗室:塊區放各「可能解塊數」按鈕(由小到大兩排),點按完整重現該手實際遊玩畫面(招式名+型/印+全螢幕閃+n HIT+集氣攻擊),純特效不扣血/不推進
  renderHitLab(){
    this.charge=this.teamCards.map(c=>{const a=activeSkill(c.el);return a?a.cd:0;});   // 主動技恆滿,可隨時測
    this.trayHits.forEach(h=>h.disableInteractive());   // 實驗室不放塊,關掉托盤拖放點
    const ys=TRAY_Y, cols=[36,106,176,246,316,386];   // 兩排各 6 欄:數字 8 顆 +「2招」+「敵」+「完」
    const mk=(x,y,label,fill,hover,stroke,col,cb)=>{const bg=this.add.rectangle(x,y,62,32,fill).setStrokeStyle(2,stroke).setDepth(DEPTH.tray).setInteractive();
      const tx=this.add.text(x,y,label,{fontFamily:EMOJIFONT,fontSize:'15px',color:col,fontStyle:'bold'}).setOrigin(0.5).setDepth(DEPTH.tray);
      bg.on('pointerover',()=>bg.setFillStyle(hover)); bg.on('pointerout',()=>bg.setFillStyle(fill));
      bg.on('pointerup',()=>{bg.setFillStyle(fill);cb();}); this.trayIcons.push(bg,tx);};
    const top=[9,15,18,21,27,33];   top.forEach((n,k)=>mk(cols[k],ys-18,String(n),0x2b2014,0x3d2c18,0x6a4f28,'#ffeec4',()=>this.demoHit(n)));
    const bot=[39,45];   bot.forEach((n,k)=>mk(cols[k],ys+18,String(n),0x2b2014,0x3d2c18,0x6a4f28,'#ffeec4',()=>this.demoHit(n)));
    mk(cols[2],ys+18,'2招',0x2a1c40,0x3c2a5a,0x8a6ad0,'#d8c8ff',()=>this.demoMulti());   // 一次清除含 2 元素 → 同時出 2 招
    mk(cols[3],ys+18,'敵',0x4a1818,0x5e2020,0xc24a4a,'#ffc8c8',()=>this.demoEnemyAttack());
    mk(cols[4],ys+18,'完',0x3a2e10,0x4e3e16,0xd0a83a,'#ffe9a8',()=>this.demoFinal());   // 最後一擊特寫演出
  }
  demoFinal(){   // 實驗室演「最後一擊」特寫鏡頭:推近 → 蓄勢 → 飛出 → 拉回 → 重生(不進結果)
    const tgt=this.enemies&&this.enemies.find(e=>!e.dead); if(!tgt||tgt._labDying)return; tgt._labDying=true;
    tgt.dead=true; if(tgt.bob){tgt.bob.stop();tgt.bob=null;} if(tgt.knockTw){tgt.knockTw.stop();tgt.knockTw=null;}
    const cam=this.cameras.main, sp=tgt.sprite, EOut=Phaser.Math.Easing.Quadratic.Out, EIO=Phaser.Math.Easing.Quadratic.InOut;
    if(sp){ cam.pan(sp.x,sp.y,460,EOut); cam.zoomTo(1.9,460,EOut); }
    this.time.delayedCall(560,()=>{ if(sp&&sp.active){const fl=this.add.circle(sp.x,sp.y,32,0xffffff,1).setBlendMode(Phaser.BlendModes.ADD).setDepth(DEPTH.fx); this.tweens.add({targets:fl,scale:4,alpha:0,duration:320,onComplete:()=>fl.destroy()});} this.playDeath(tgt); });
    this.time.delayedCall(1750,()=>{ cam.zoomTo(1,440,EIO); cam.pan(CX,Math.round(H/2),440,EIO); });
    this.time.delayedCall(2400,()=>{ tgt.dead=false; tgt._labDying=false; tgt.hp=tgt.max; if(tgt.hpTw){tgt.hpTw.stop();tgt.hpTw=null;}
      sp.setVisible(true); sp.clearTint&&sp.clearTint(); [tgt.turnG,tgt.hpBg,tgt.hpFill].forEach(o=>{if(o)o.setVisible(true);}); if(tgt.card)tgt.card.setInteractive();
      this.enemyEnter(tgt,0); this.updateEnemies(); });
  }
  _labCells(n,off){const cells=[];off=off||0;for(let r=Math.floor(off/N);r<N&&cells.length<n;r++)for(let c=(r===Math.floor(off/N)?off%N:0);c<N&&cells.length<n;c++)cells.push([r,c]);return cells;}
  demoHit(n){
    const tgt=this.enemies&&this.enemies.find(e=>!e.dead); if(!tgt)return;
    const els=['fire','water','thunder','earth','wind']; this._labEl=((this._labEl==null?-1:this._labEl)+1)%5; const el=els[this._labEl];
    const lv=Math.max(1,Math.min(7,Math.round(n/9)+1));   // 型/印 階(隨 HIT 升;lv≥4 全螢幕閃,lv≥6 大閃)
    const cells=this._labCells(n), burst=1+Math.max(0,n-9)/9*0.3, dmg=Math.round(n*10*burst);
    const atkAt=this.playClearFX(n, [{el, lv, fire:()=>this.chakraStrike([tgt], dmg, el, {cells, parts:[{el}], fx:{}})}]);   // 先 n HIT → 招式名 → 才攻擊
    this.time.delayedCall(atkAt+540+this.chargeMs(n)+340,()=>{tgt.hp=Math.max(0,tgt.hp-dmg);this.updateEnemies();if(tgt.hp<=0)this.killEnemy(tgt);});
  }
  demoMulti(){   // 演示「一次清除含 2 元素 → 同時出 2 招」(18 格 = 兩條線各一元素)
    const tgt=this.enemies&&this.enemies.find(e=>!e.dead); if(!tgt)return;
    const pairs=[['fire','water'],['thunder','earth'],['wind','fire'],['water','thunder'],['earth','wind']];
    this._labPair=((this._labPair==null?-1:this._labPair)+1)%pairs.length; const pr=pairs[this._labPair];
    const n=18, dmg=Math.round(n*10*(1+9/9*0.3)), half=Math.round(dmg/2);
    const cA=this._labCells(9,0), cB=this._labCells(9,9), lvA=4, lvB=4;
    const jutsu=[
      {el:pr[0], lv:lvA, fire:()=>this.chakraStrike([tgt], half, pr[0], {cells:cA, parts:[{el:pr[0]}], fx:{}})},
      {el:pr[1], lv:lvB, fire:()=>this.chakraStrike([tgt], dmg-half, pr[1], {cells:cB, parts:[{el:pr[1]}], fx:{}})}
    ];
    const atkAt=this.playClearFX(n, jutsu);
    this.time.delayedCall(atkAt+540+340,()=>{tgt.hp=Math.max(0,tgt.hp-dmg);this.updateEnemies();if(tgt.hp<=0)this.killEnemy(tgt);});   // 每招各 9 格、無蓄力
  }
  demoEnemyAttack(){const alive=this.enemies&&this.enemies.filter(e=>!e.dead); if(!alive||!alive.length)return;
    this._labAtkI=((this._labAtkI==null?-1:this._labAtkI)+1)%alive.length; this.enemyAttack(alive[this._labAtkI]);}

  /* 拖曳放塊 */
  startDrag(i,p){if(this.resultOpen||this.locked||this.earthSel||this.earthDrag)return;
    const cells=this.tray[i].c, kind=this.tray[i].kind;
    const kc=kind==='water'?0x62b8f0:kind==='wind'?0x6ad06a:kind==='earth'?0xd49a4a:0xffffff;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,kc).setOrigin(0));
    this.drag={i,cells,kind,prev:this.add.container(0,0,kids).setAlpha(0.85).setDepth(DEPTH.drag),kids};this.updateDrag(p);}
  // 從卡拖「存放的屬塊」(萬用塊填空格;不佔托盤格→不推進敵,是連擊引擎)
  startStoredDrag(i,p){if(this.resultOpen||this.locked||this.drag||this.earthSel||this.earthDrag)return;
    const s=this.stored[i]; if(!s)return;
    const cells=s.cells||chakraShape(s.el,s.lv), col=EL[s.el].color;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,col).setOrigin(0));
    this.drag={store:i,cells,kind:'water',col,prev:this.add.container(0,0,kids).setAlpha(0.85).setDepth(DEPTH.drag),kids};this.updateDrag(p);}
  doPlaceStored(d,r,c){if(this.resultOpen)return;
    d.cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;
      if(rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc])this.board[rr][cc]={el:this.boxElement[boxOf(rr,cc)]||'neutral'};});
    this.stored[d.store]=null; this.renderStored();
    this.afterAction(false);}   // 連擊引擎:屬塊消除「也生塊」(滾雪球爽度);仍不佔托盤格→不推進敵(由 tray.every(used) 決定)
  updateDrag(p){if(!this.drag)return;this.clearGhost();
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT);
    if(!cell){this.drag.prev.setVisible(false);return;}
    this.drag.prev.setVisible(true).setPosition(BX0+cell.c*CS, BY0+cell.r*CS);
    const k=this.drag.kind, ok=canPlace(this.board,this.drag.cells,cell.r,cell.c,k);
    const kc=this.drag.col||(k==='water'?0x62b8f0:k==='wind'?0x6ad06a:k==='earth'?0xd49a4a:0x8fffa6);
    this.drag.kids.forEach(x=>x.setFillStyle(ok?kc:0xff8f8f));
    this.drag.cells.forEach(([dr,dc])=>{const rr=cell.r+dr,cc=cell.c+dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      let col;
      if(!ok)col=0xff8f8f;
      else if(k==='water')col=this.board[rr][cc]?0x6aa0ff:0x8fffa6;     // 重疊藍 / 填綠
      else if(k==='wind') col=this.board[rr][cc]?0x6ad06a:0x444444;     // 會消綠 / 空格灰
      else if(k==='earth')col=this.board[rr][cc]?0xd49a4a:0x444444;     // 抓取棕 / 空格灰
      else col=0x8fffa6;
      this.cellRect(rr,cc).setStrokeStyle(3,col,1);});}
  endDrag(p){if(!this.drag)return;const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.drag;
    d.prev.destroy(); this.clearGhost(); this.drag=null;
    if(cell && canPlace(this.board,d.cells,cell.r,cell.c,d.kind)){
      if(d.store!=null) this.doPlaceStored(d,cell.r,cell.c);
      else if(d.kind==='earth') this.earthSelect(d.i,cell.r,cell.c);
      else this.doPlace(d.i,cell.r,cell.c);
    }}
  clearGhost(){this.cells.forEach(rc=>rc.setStrokeStyle(2,0x000000,0));}

  /* 放塊 = 一回合(敵人推進);放純查克拉 = bonus(不推進回合) */
  doPlace(i,r,c){if(this.resultOpen)return;
    const cells=this.tray[i].c, kind=this.tray[i].kind;
    cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;
      if(kind==='wind'){if(this.board[rr][cc])this.board[rr][cc]=null;}        // 風刃:消除
      else if(!this.board[rr][cc])this.board[rr][cc]={el:this.boxElement[boxOf(rr,cc)]||'neutral'};}); // 一般/水:填(只填空格)
    this.tray[i].used=true;
    this.afterAction(kind==='water'||kind==='wind');
  }
  // 共用:放塊後處理(消除→燒傷→敵推進→補塊→卡死檢查)
  afterAction(fromBlock){
    this.stopStuckFX();   // 玩家一行動就收掉卡死循環提示(若仍卡死,handleStuck 會再開)
    this.refreshBoard(); this.renderTray();
    this.fromBlock=!!fromBlock; try{this.resolve();}catch(err){console.error('resolve error',err);} this.fromBlock=false;   // 防遞迴:塊清出的消除不再生塊;try 防展演例外卡死整手
    if(this.tray.every(t=>t.used)){this.endHand();return;}  // 一手(3塊)放完→endHand 負責「等展演完才敵攻+補手+解鎖+卡死檢查」
    if(!this.anyPlaceable()){this.time.delayedCall(420,()=>this.handleStuck());}
    this.updateAll();
  }
  // 一手結束:鬥志/燒傷立即結算(屬我方展演),敵方出手+補新手延後到展演完才發動(以「手」為節奏)
  endHand(){
    const showed=this.handCleared;   // 本手有清除展演→敵攻多等一下;空手→快一點
    const m0=this.morale;   // 鬥志(上重下輕):暴擊手=直接衝到「極」;一般清除手=+1升到「超」封頂;連MORALE_GRACE手空手才−1階
    if(!this.handCleared){ this.whiffStreak=(this.whiffStreak||0)+1; if(this.whiffStreak>=(CONFIG.MORALE_GRACE+((this.lead&&this.lead.type==='moraleGrace')?this.lead.v:0))){this.morale=Math.max(0,this.morale-1);this.whiffStreak=0;} }
    else { this.whiffStreak=0; if(this.handBurst)this.morale=5; else if(this.morale<5)this.morale=Math.min(4,this.morale+1); }   // 已在「極」時一般清除手不掉階
    this.handCleared=false; this.handBurst=false;
    if(this.morale!==m0)this.moraleFX(this.morale,this.morale>m0);
    this.enemies.forEach(e=>{if(!e.dead&&e.burn>0){e.hp=Math.max(0,e.hp-e.burn);   // 燒傷=我方 DoT,屬展演,立即
      this.floatText(e.sprite.x,e.sprite.y-24,'🔥'+e.burn,'#ff7a63'); if(e.hp<=0)this.killEnemy(e);}});
    this.updateAll();   // 立即反映鬥志字/燒傷後血量(別等延遲回呼)
    this.locked=true;   // 鎖輸入:等我方這手展演完,敵方才出手(玩家才看得到上面的表現),再補新手解鎖
    this.time.delayedCall(showed?1200:200,()=>{   // 等我方華麗展演(HIT 數到底)演完,敵方才出手
      if(this.resultOpen){this.locked=false;return;}   // 期間已開結算/勝敗畫面→不再推進
      try{
        this.enemies.forEach(e=>{if(e.dead)return; e.timer--; if(e.timer<=0){this.enemyAttack(e); e.timer=e.interval;} this.animTurnGlass(e);});   // 敵出手 + 沙漏翻半圈
        this.charge=this.charge.map((c,i)=>{const a=activeSkill(this.teamCards[i].el);return a?Math.min(a.cd,(c||0)+1):c;});   // 主動技蓄力+1
        this.renderCharges();
        this.refill(); this.renderTray(); this.updateAll();
      }catch(err){console.error('endHand error',err);}
      finally{ this.locked=false; }   // ★ 無論如何都解鎖,杜絕卡死
      if(!this.anyPlaceable())this.time.delayedCall(420,()=>this.handleStuck());
    });
  }
  // 卡死處理:空盤+只剩工具塊(土/風無從施力)→自動補一般查克拉塊;否則才花血重洗
  handleStuck(){
    if(this.resultOpen||this.anyPlaceable())return;
    const empty=this.board.every(row=>row.every(c=>!c));
    const unused=this.tray.filter(t=>!t.used);
    const onlyTools=unused.length>0 && unused.every(t=>t.kind==='earth'||t.kind==='wind');
    if(empty&&onlyTools){const s=this.tray.findIndex(t=>!t.used);
      if(s>=0){this.tray[s]={c:pickShape(),used:false};this.renderTray();this.tonFloat('盤面已空,自動補查克拉塊','#cfe3ff');return;}}
    if(this.anyStoredPlaceable()){this.flashStored();this.tonFloat('托盤卡住 → 拖卡上的屬塊解圍!','#ffe066');return;}   // 有存塊能解=不扣血,提示用屬塊(真沒塊可解才花血)
    this.showReshuffleModal();
  }
  // 有任何「存的屬塊」放得下嗎(萬用塊只要有空格可填)
  anyStoredPlaceable(){if(!this.stored)return false;
    return this.stored.some(s=>{if(!s)return false;const cells=s.cells||chakraShape(s.el,s.lv);
      for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(canPlace(this.board,cells,r,c,'water'))return true;return false;});}
  // 卡死提示:能解圍的屬塊「跳+脹」一下,叫你拖它(不扣血的救命塊)
  flashStored(){this.stopStuckFX(); this.stuckTw=[]; this.stuckObj=[]; this.stuckBlk=[];
    this.teamCards.forEach((card,i)=>{const s=this.stored&&this.stored[i],so=card.storeObj;if(!s||!so)return;
      const cells=s.cells||chakraShape(s.el,s.lv);let ok=false;
      for(let r=0;r<N&&!ok;r++)for(let c=0;c<N&&!ok;c++)if(canPlace(this.board,cells,r,c,'water'))ok=true;
      if(!ok)return;
      const y0=so.y; so._baseY=y0; this.tweens.killTweensOf(so); so.setScale(1).setY(y0);
      this.stuckBlk.push(so);
      this.stuckTw.push(this.tweens.add({targets:so,y:y0-16,duration:240,yoyo:true,repeat:-1,ease:'Quad.inOut'}));            // 持續跳
      this.stuckTw.push(this.tweens.add({targets:so,scaleX:1.42,scaleY:1.42,duration:240,yoyo:true,repeat:-1,ease:'Sine.inOut'}));  // 持續脹
      const cx=card.rect.x, cy=card.rect.y;   // 卡身亮黃光環持續脈動
      const ring=this.add.rectangle(cx,cy,68,68,0,0).setStrokeStyle(4,0xffe066,1).setDepth(DEPTH.fx); this.stuckObj.push(ring);
      this.stuckTw.push(this.tweens.add({targets:ring,scaleX:1.3,scaleY:1.3,alpha:0,duration:620,repeat:-1,ease:'Quad.out'}));});}
  // 收掉卡死提示(玩家一行動就停):停 tween、銷毀光環/箭頭、屬塊歸位
  stopStuckFX(){
    if(this.stuckTw){this.stuckTw.forEach(t=>{if(t)t.stop();});this.stuckTw=null;}
    if(this.stuckObj){this.stuckObj.forEach(o=>{if(o&&o.destroy)o.destroy();});this.stuckObj=null;}
    if(this.stuckBlk){this.stuckBlk.forEach(so=>{if(so&&so.active)so.setScale(1).setY(so._baseY!=null?so._baseY:so.y);});this.stuckBlk=null;}
  }
  /* 土屬塊:兩段式搬移查克拉 — ①拖塊蓋住要抓的查克拉 ②再拖把它們整組搬到空位 */
  earthSelect(i,r,c){
    const cells=this.tray[i].c, sel=[];
    cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      if(this.board[rr][cc])sel.push({r:rr,c:cc,el:this.board[rr][cc].el});});
    if(!sel.length)return;
    this.earthSel={i,cells:sel};
    this.clearGhost(); sel.forEach(s=>this.cellRect(s.r,s.c).setStrokeStyle(3,0xd49a4a,1));
    this.tonFloat('抓 '+sel.length+' 格 — 再拖曳搬去空位','#d49a4a');
  }
  startEarthMove(p){
    const sel=this.earthSel.cells;
    const minR=Math.min.apply(null,sel.map(s=>s.r)), minC=Math.min.apply(null,sel.map(s=>s.c));
    const rel=sel.map(s=>({dr:s.r-minR,dc:s.c-minC,el:s.el}));
    sel.forEach(s=>{this.board[s.r][s.c]=null;}); this.refreshBoard();
    const kids=rel.map(o=>this.add.rectangle(o.dc*CS,o.dr*CS,RECT,RECT,EL[o.el]?EL[o.el].color:NEUTRAL_FILL).setOrigin(0).setAlpha(0.9));
    this.earthDrag={i:this.earthSel.i, rel, orig:sel.slice(), prev:this.add.container(0,0,kids).setDepth(DEPTH.drag), kids};
    this.earthSel=null; this.updateEarthMove(p);
  }
  updateEarthMove(p){
    if(!this.earthDrag)return; this.clearGhost();
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.earthDrag;
    if(!cell){d.prev.setVisible(false);return;}
    d.prev.setVisible(true).setPosition(BX0+cell.c*CS,BY0+cell.r*CS);
    const ok=d.rel.every(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;return rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc];});
    d.kids.forEach((k,idx)=>k.setFillStyle(ok?(EL[d.rel[idx].el]?EL[d.rel[idx].el].color:NEUTRAL_FILL):0xff8f8f));
    d.rel.forEach(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      this.cellRect(rr,cc).setStrokeStyle(3,ok?0x8fffa6:0xff8f8f,1);});
  }
  endEarthMove(p){
    if(!this.earthDrag)return;
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.earthDrag;
    d.prev.destroy(); this.clearGhost(); this.earthDrag=null;
    const ok=cell && d.rel.every(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;return rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc];});
    if(ok){ d.rel.forEach(o=>{this.board[cell.r+o.dr][cell.c+o.dc]={el:o.el};});
      this.tray[d.i].used=true; this.afterAction(true);
    } else { d.orig.forEach(s=>{this.board[s.r][s.c]={el:s.el};}); this.refreshBoard(); this.updateAll(); }
  }
  anyPlaceable(){return this.tray.some(p=>{if(p.used)return false;
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(canPlace(this.board,p.c,r,c,p.kind))return true;return false;});}

  resolve(){
    const tgt=this.targetEnemy(); if(!tgt)return;
    const data=computeClears(this.board,this.boxElement,this.boxCard,tgt.el,this.amp);
    if(!data)return;
    this.combo+=data.groups; this.handCleared=true; if(data.groups>=2)this.handBurst=true;   // 連擊餵鬥志;暴擊手=直接衝到極(九尾形態)
    const mmult=CONFIG.MORALE_MULT[this.morale];       // 鬥志倍率(取代會硬歸零的連印倍率)
    const burst=1+Math.max(0,data.cells.length-9)/9*0.3;   // 倍數以 HIT(清除格數)計:9→×1.0、18→×1.3、27→×1.6、36→×1.9…
    let leadMult=1; if(this.lead){const L=this.lead;   // 隊長技:傷害類加成
      if(L.type==='allAtk')leadMult=L.v;
      else if(L.type==='elemAtk'&&data.fx[L.el])leadMult=L.v;
      else if(L.type==='burstAtk'&&data.groups>=2)leadMult=L.v;}
    const dealt=Math.round(data.total*mmult*burst*leadMult);
    let topEl=null;Object.keys(data.fx).forEach(e=>{if(!topEl||data.fx[e].level>data.fx[topEl].level)topEl=e;});
    const topLv=topEl?data.fx[topEl].level:0;
    const aoe=(topLv>=4)||(this.morale>=5), victims=aoe?this.enemies.filter(e=>!e.dead):[tgt];   // LV4+大消除 或 鬥志「極」=全體
    Object.keys(data.fx).forEach(e=>{const f=data.fx[e];f.attrs.forEach(a=>this.fireAttr(a,f.atk,f.level,tgt));});
    if(!this.fromBlock)Object.keys(data.fx).forEach(e=>this.storeBlock(e,data.fx[e].level));   // 清宮→生成該屬形狀塊存到卡(萬用塊清出的消除不再生塊)
    data.cells.forEach(([r,c])=>{const rc=this.cellRect(r,c);
      this.tweens.add({targets:rc,scaleX:1.14,scaleY:1.14,duration:90,yoyo:true});});
    if(data.hitWeak)tgt.timer+=1;
    if(this.combo>=2)this.comboPopup(this.combo);
    if(this.firstClear){this.firstClear=false;track('first_clear');}   // 第一次消除:只記埋點,不演出(移除「結印成功」動畫)
    data.cells.forEach(([r,c])=>{this.board[r][c]=null;});  // 立即從模型移除,避免重複觸發
    const n=data.cells.length;
    const sorted=Object.keys(data.fx).sort((a,b)=>data.fx[b].level-data.fx[a].level);   // 多招:取等級最高的元素;次高若 ≥lv2(≥6格)再出第二招(3 招以上機率低,不做)
    const jEls=sorted.length?[sorted[0]]:[null];   // 純普通塊清除→無元素(null):不出招式名、用預設色查克拉彈(仍要有 n HIT + 攻擊)
    if(sorted[1]&&data.fx[sorted[1]].level>=2)jEls.push(sorted[1]);
    const kk=jEls.length, cellsAll=data.cells.slice(), part=Math.ceil(cellsAll.length/kk), dEach=Math.round(dealt/kk);
    const jutsu=jEls.map((el,i)=>({el, lv:el?data.fx[el].level:1, fire:()=>{   // 每招:該元素的色/名,集氣取一段格子,傷害分攤(總和=dealt)
      this.chakraStrike(victims, (i===kk-1?dealt-dEach*(kk-1):dEach), el, {cells:cellsAll.slice(i*part,(i+1)*part), parts:el?[{el}]:[], fx:{}});
      if(aoe&&i===0)this.cameras.main.shake(260,0.01);
    }}));
    const atkAt=this.playClearFX(n, jutsu);   // 先 n HIT → 招式名(1~2 招並列)→ 才各招集結射出
    this.updateEnemies();
    this.time.delayedCall(Math.max(120,atkAt-100),()=>{this.refreshBoard();});                                        // 攻擊發動前夕,清掉的格子消失(集氣同時)
    const impactAt=atkAt+540+this.chargeMs(n)+340;   // 查克拉彈真正命中的時點
    this.time.delayedCall(impactAt,()=>{victims.forEach(v=>{v.hp=Math.max(0,v.hp-dealt);}); this.updateEnemies();});   // ★ 彈著瞬間才扣血(血條動畫,不提早)
    this.time.delayedCall(impactAt+440,()=>{this.updateAll(); victims.forEach(v=>{if(v.hp<=0)this.killEnemy(v);});});   // 命中後再收掉死亡敵
  }
  // 形狀系統:火/水/風/土/雷 的主技=生成形狀塊存到卡(在 resolve 統一處理 storeBlock);fireAttr 只剩子屬性 陰/陽
  fireAttr(a,atk,lv,tgt){const A=CONFIG.ATTR;switch(a){
    case 'yang':{const v=Math.round(atk*A.yang_heal_rate*lv);this.playerHP=Math.min(this.maxHP,this.playerHP+v);this.tonFloat('☯陽·癒+'+v,'#74e09a');break;}   // 陽=回血(已砍)
    case 'yin':this.amp=Math.max(this.amp,2);this.tonFloat('☯陰·傷害×2','#b18cff');break;   // 陰=本手傷害×2(快殺)
  }}
  // 存放屬塊到「該屬性的卡」:優先填空卡,否則升級最低階那張;每卡最多1塊、留最高LV(上限LV5)
  storeBlock(el,lv){if(!this.stored)this.stored=[null,null,null,null,null];
    lv=Math.max(1,Math.min(5,lv));
    const slots=[]; this.teamCards.forEach((c,i)=>{if(c.el===el)slots.push(i);});
    if(!slots.length)return;
    let target=slots.find(i=>!this.stored[i]);
    if(target==null){target=slots.reduce((a,b)=>this.stored[b].lv<this.stored[a].lv?b:a,slots[0]); if(this.stored[target].lv>=lv)return;}
    this.stored[target]={el,lv,cells:randOrient(chakraShape(el,lv),el)}; this.renderStored();   // 火塊生成時就定隨機方向
    this.tonFloat(EL[el].name+'塊Lv'+lv+'→存卡','#'+EL[el].color.toString(16).padStart(6,'0'));}

  enemyAttack(e){
    this.tweens.add({targets:e.sprite,y:e.sprite.y+30,duration:150,yoyo:true});
    this.cameras.main.shake(300,0.009);
    const f=this.add.rectangle(CX,H/2,W,H,EL[e.el].color,0.4).setDepth(DEPTH.flash);
    this.tweens.add({targets:f,alpha:0,duration:400,onComplete:()=>f.destroy()});
    let dmg=e.atk, dodged=false;
    if(this.immune>0){dodged=true;dmg=0;}
    else if(this.armor>0)dmg=Math.round(dmg*(1-this.armor));
    this.playerHP=Math.max(0,this.playerHP-dmg);
    this.floatText(CX,PHP_Y-14,dodged?'迴避!':'-'+dmg,dodged?'#74e09a':'#ff8f8f');
    this.resetWave(); e.burn=0;
    this.updateAll(); if(this.playerHP<=0){if(this.hitLab){this.playerHP=this.maxHP;this.updateBars();}else this.gameOver('HP 歸零');}
  }
  killEnemy(e){if(e.dead)return;
    if(this.hitLab){   // 實驗室:也演敗陣化光,演完原地重生(順便看入場動畫)→ 可一直測
      if(e._labDying)return; e._labDying=true;
      e.dead=true; if(e.bob){e.bob.stop();e.bob=null;} if(e.knockTw){e.knockTw.stop();e.knockTw=null;}
      this.playDeath(e);
      this.time.delayedCall(950,()=>{ e.dead=false; e._labDying=false; e.hp=e.max; if(e.hpTw){e.hpTw.stop();e.hpTw=null;}
        const sp=e.sprite; sp.setVisible(true); sp.clearTint&&sp.clearTint();
        [e.turnG,e.hpBg,e.hpFill].forEach(o=>{if(o)o.setVisible(true);}); if(e.card)e.card.setInteractive();
        this.enemyEnter(e,0); this.updateEnemies(); });
      return;
    }
    e.dead=true; if(e.bob){e.bob.stop();e.bob=null;} if(e.knockTw){e.knockTw.stop();e.knockTw=null;}   // ★ bob 在受擊擊退時會被設 null,務必判空(否則每次擊殺都丟例外→鎖死)
    const last=this.aliveCount()===0, isFinal=last&&this.stage>=this.dungeon.stages.length;
    if(isFinal){ this._finalEnemy=e; this.stageClear(); return; }   // 最後一關最後一擊:由 finalBlow 演特寫鏡頭+飛出(不在此 playDeath)
    this.playDeath(e);   // 敗陣演出:被打飛(後上)+縮小+旋轉+淡出 → 化成光芒
    if(last)this.stageClear(); else {this.targetEnemy();this.updateEnemies();}
  }
  // 最後一擊:鏡頭推近最後一隻怪特寫 → 蓄勢一下 → 白閃+飛出 → 拉回 → 久一點才進結果
  finalBlow(e){
    const cam=this.cameras.main, sp=e&&e.sprite, EOut=Phaser.Math.Easing.Quadratic.Out, EIO=Phaser.Math.Easing.Quadratic.InOut;
    if(sp){ cam.pan(sp.x, sp.y, 460, EOut); cam.zoomTo(1.9, 460, EOut); }   // 特寫推近
    this.time.delayedCall(560,()=>{   // 蓄勢後 → 白閃 + 飛出(特寫下更有張力)
      if(sp&&sp.active){const fl=this.add.circle(sp.x,sp.y,32,0xffffff,1).setBlendMode(Phaser.BlendModes.ADD).setDepth(DEPTH.fx);
        this.tweens.add({targets:fl,scale:4,alpha:0,duration:320,onComplete:()=>fl.destroy()});}
      this.playDeath(e);
    });
    this.time.delayedCall(1750,()=>{ cam.zoomTo(1,440,EIO); cam.pan(CX,Math.round(H/2),440,EIO); });   // 鏡頭拉回
    this.time.delayedCall(2250,()=>this.showResult(true));   // 飛出後停留久一點才進結果(不突兀)
  }
  // 敗陣演出:被打飛(後上)、縮小、旋轉、淡出,縮到很小再炸成光芒
  playDeath(e){const sp=e.sprite, bs=e.baseScale||1, x0=sp.x, y0=(e.restY!=null?e.restY:sp.y);
    if(e.card)e.card.disableInteractive();
    [e.turnG,e.hpBg,e.hpFill,e.mark].forEach(o=>{if(o)this.tweens.add({targets:o,alpha:0,duration:200,onComplete:()=>{o.setVisible(false);o.setAlpha(1);}});});
    this.tweens.killTweensOf(sp); sp.clearTint&&sp.clearTint();
    this.tweens.add({targets:sp, y:y0-72, x:x0+(x0<CX?-22:22), scaleX:bs*0.12, scaleY:bs*0.12, angle:220, alpha:0.15, duration:560, ease:'Quad.in',
      onComplete:()=>{this.deathLight(x0,y0-64,e.el); sp.setVisible(false);}});
  }
  deathLight(x,y,el){const ADD=Phaser.BlendModes.ADD;
    const fl=this.add.circle(x,y,12,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.fx);   // 中心光芒爆閃
    this.tweens.add({targets:fl,scale:5,alpha:0,duration:440,ease:'Quad.out',onComplete:()=>fl.destroy()});
    for(let i=0;i<18;i++){const a=i/18*Math.PI*2+(Math.random()-0.5)*0.4, d=this.add.circle(x,y,3,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.fx);   // 四散光點
      this.tweens.add({targets:d,x:x+Math.cos(a)*(42+Math.random()*44),y:y+Math.sin(a)*(42+Math.random()*44)-18,alpha:0,scale:0.2,duration:520+Math.random()*240,ease:'Quad.out',onComplete:()=>d.destroy()});}
  }
  // 敵入場:從「遠處(小、偏高、淡)」浮現到定位 —— 像往深處推進後,新敵自遠方逼近
  enemyEnter(e,delay){ if(!e||!e.sprite)return; const sp=e.sprite, bs=e.baseScale||1, ry=(e.restY!=null?e.restY:sp.y), rx=(e.card?e.card.x:sp.x); delay=delay||0;
    if(e.bob){e.bob.stop();e.bob=null;} this.tweens.killTweensOf(sp);
    sp.setScale(bs*0.22).setAlpha(0).setAngle(0).setPosition(rx, ry-48);   // ★ 用敵卡原始 x(非被打飛後的位移 x)→ 重生不再往左飄
    this.tweens.add({targets:sp,alpha:1,duration:220,delay:delay});
    this.tweens.add({targets:sp,scaleX:bs,scaleY:bs,y:ry,duration:460,delay:delay,ease:'Back.out',
      onComplete:()=>{sp.setScale(bs);sp.setY(ry);if(!e.dead)e.bob=this.tweens.add({targets:sp,y:ry-4,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});}});
    [e.turnG,e.hpBg,e.hpFill].forEach(o=>{if(o){o.setAlpha(0);this.tweens.add({targets:o,alpha:1,duration:300,delay:delay+150});}});
  }
  // 過關前進:鏡頭往前推一下 + 直向速度線往下刷過(像往深處前進到下一關)
  stageAdvanceFX(){ const cam=this.cameras.main;
    cam.zoomTo(1.06,200,Phaser.Math.Easing.Quadratic.Out); this.time.delayedCall(220,()=>cam.zoomTo(1,300,Phaser.Math.Easing.Quadratic.InOut));   // ★ 相機效果的 ease 必須是函式(EaseMap 不收 'Quad.out' 簡寫)否則每幀丟例外→凍住
    for(let i=0;i<16;i++){const x=16+Math.random()*(W-32), len=44+Math.random()*90;
      const s=this.add.rectangle(x,-len,2.5,len,0xffffff,0.45).setOrigin(0.5,0).setDepth(DEPTH.flash);
      this.tweens.add({targets:s,y:H+len,alpha:0,duration:320+Math.random()*180,delay:Math.random()*200,ease:'Quad.in',onComplete:()=>s.destroy()});}
  }
  stageClear(){
    rollDrops(this.dungeon.drops[this.stage-1]).forEach((cd,i)=>{const isNew=!isOwned(cd.id);addCard(cd.id);this.runDrops.push({cd,isNew});
      this.time.delayedCall(i*240,()=>this.tonFloat('🎁 '+cd.name+(isNew?' ✦NEW':''),isNew?'#ffe04a':'#ffe08a'));});
    recordStage(this.stage, false);   // 記最佳關
    if(this.dungeon.el && Math.random()<0.6){addGem(this.dungeon.el);this.runGems++;   // 元素關掉進化素材「寶玉」
      this.time.delayedCall(120,()=>this.tonFloat('🔮 '+EL[this.dungeon.el].name+'寶玉','#c5b0ff'));}
    const _rw=addRewards(40,300); this.runExp+=40; this.runCoins+=300;   // 戰鬥獎勵:EXP/金錢
    if(_rw._ups>0)this.tonFloat('🆙 等級提升! Lv.'+_rw.rank,'#ffe04a');
    if(this.stage>=this.dungeon.stages.length){markDungeonCleared(this.dungeonId);this.chests++;this.finalBlow(this._finalEnemy);return;}   // 最後一關全清→最後一擊特寫演出後才進結果
    this.stage++; this.chests++; this.playerHP=Math.min(this.maxHP,this.playerHP+150);
    this.time.delayedCall(700,()=>{try{this.stageAdvanceFX();}catch(e){} this.time.delayedCall(380,()=>{try{this.startStage(true);}catch(e){console.error('startStage error',e);}});});   // 過關:前進演出 → 下一關敵人自遠方逼近入場(不清盤,盤面累積)
  }
  reshuffle(){if(this.playerHP<=CONFIG.RESHUFFLE_COST){this.gameOver('生命不足、無法再提煉');return;}
    this.playerHP-=CONFIG.RESHUFFLE_COST; this.refill(); this.renderTray(); this.updateAll();}
  gameOver(reason){if(this.resultOpen)return;this.showResult(false);}
  restartStage(){this.playerHP=this.maxHP;this.startStage();}

  /* UI */
  updateAll(){this.updateEnemies();this.updateBars();}
  updateEnemies(){this.enemies.forEach((e,i)=>{if(e.dead)return;
    const tw=e.hpW*Math.max(0,e.hp/e.max);   // 血條動畫慢慢扣(不瞬間跳)
    if(Math.abs((e.hpFill.displayWidth||0)-tw)>0.5){if(e.hpTw)e.hpTw.stop();e.hpTw=this.tweens.add({targets:e.hpFill,displayWidth:tw,duration:480,ease:'Quart.out'});}   // 扣血先快後慢(Quart.out)
    else e.hpFill.displayWidth=tw;
    if(e.turnTx){const tm=Math.max(0,e.timer);   // 沙漏右邊的數字=剩餘出手手數;越少越紅(1手內紅、2手黃、≥3白藍)
      e.turnTx.setText(String(tm)).setColor(tm<=1?'#ff5a4a':tm===2?'#ffc24a':'#eaf3ff');}
    e.mark.setVisible(i===this.target);});}
  // 每回合:沙漏跳一下 + 翻轉到下一個 90°(累積),數字隨 updateEnemies 更新
  animTurnGlass(e){
    if(!e.glass||!e.turnG)return;
    const tgt=(Math.round(e.glass.angle/180)+1)*180;   // 對齊到下一個 180°(翻半圈)→ 只在直立↔翻面切換,不會側躺像扯鈴
    this.tweens.killTweensOf(e.glass); this.tweens.add({targets:e.glass,angle:tgt,duration:340,ease:'Cubic.out'});
    const restY=BATTLE_CY-e.cardH/2+11; this.tweens.killTweensOf(e.turnG); e.turnG.setY(restY);
    this.tweens.add({targets:e.turnG,y:restY-7,duration:170,yoyo:true,ease:'Quad.out'});   // 跳一下落回
  }
  updateBars(){
    this.pHp.displayWidth=(W-2*BX0)*Math.max(0,this.playerHP/this.maxHP);
    this.pHpTxt.setText(this.playerHP+'/'+this.maxHP);   // 去掉「我方」
    this.chestTxt.setText('📦 '+(this.chests||0)); this.goldTxt.setText('💰 '+(this.gold||0));
    const mcol=['#99aabb','#9ac4e0','#ffffff','#ffd24a','#ff9a3a','#ff5a3a'][this.morale]||'#ffd56a';
    if(this.moraleTx){this.moraleTx.setText(CONFIG.MORALE_NAMES[this.morale]).setColor(this.morale>=5?'#fff4e0':mcol);   // 極→字用亮白,在流動底上可讀
      if(this.morale<5)this.moraleBg.setFillStyle(0x1a140c,0.92).setStrokeStyle(2,parseInt(mcol.slice(1),16));}   // 非極=暗底+該階色環;極的底/環交給 update() 跑漸層流動,不在此覆寫
  }

  /* 特效 */
  // 投射物:亮白核 + 該屬色光暈 + 漸隱拖尾,加速飛向敵人(比小白點炫)
  projectile(ox,oy,tx,ty,glyph,color,delay,dmg,tgt){
    this.time.delayedCall(delay,()=>{
      const glow=this.add.circle(ox,oy,16,color,0.4).setDepth(DEPTH.proj);
      const core=this.add.circle(ox,oy,7,0xffffff,1).setDepth(DEPTH.proj);
      let fc=0;
      this.tweens.add({targets:[glow,core],x:tx,y:ty,duration:340,ease:'Quad.in',
        onUpdate:()=>{ if((fc++%3)===0&&core.active){const d=this.add.circle(core.x,core.y,5,color,0.55).setDepth(DEPTH.proj-1);
          this.tweens.add({targets:d,scale:0.2,alpha:0,duration:280,onComplete:()=>d.destroy()});} },   // 拖尾
        onComplete:()=>{glow.destroy();core.destroy();this.impact(tx,ty,color,dmg,tgt);}});
      this.tweens.add({targets:glow,scale:1.5,duration:340,ease:'Quad.in'});   // 逼近時光暈脹大
    });
  }
  impact(x,y,color,dmg,tgt){
    if(tgt&&!tgt.dead){tgt.sprite.setTint(0xffffff);
      const bs=tgt.baseScale||1;if(tgt.hitTw)tgt.hitTw.stop();tgt.sprite.setScale(bs);   // 縮放動畫相對基準縮放(史來姆圖 base≈0.39),先停掉前一個受擊tween避免連擊疊加變大
      tgt.hitTw=this.tweens.add({targets:tgt.sprite,scaleX:bs*1.18,scaleY:bs*1.18,duration:100,yoyo:true,onComplete:()=>{tgt.sprite.setScale(bs);tgt.sprite.clearTint();tgt.hitTw=null;}});}
    const flash=this.add.circle(x,y,12,0xffffff,0.9).setDepth(DEPTH.proj);   // 命中:亮白爆閃
    this.tweens.add({targets:flash,scale:0.2,alpha:0,duration:220,onComplete:()=>flash.destroy()});
    const ring=this.add.circle(x,y,10,color,0).setStrokeStyle(4,color,1).setDepth(DEPTH.proj);   // 彩色擴散環
    this.tweens.add({targets:ring,scale:4,alpha:0,duration:380,ease:'Quad.out',onComplete:()=>ring.destroy()});
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2, sp=this.add.circle(x,y,3,color,0.9).setDepth(DEPTH.proj);   // 碎片四射
      this.tweens.add({targets:sp,x:x+Math.cos(a)*26,y:y+Math.sin(a)*26,alpha:0,scale:0.3,duration:340,ease:'Quad.out',onComplete:()=>sp.destroy()});}
    this.cameras.main.shake(150,0.005);
  }
  floatText(x,y,str,color){const t=this.add.text(x,y,str,{fontFamily:EMOJIFONT,fontSize:'19px',color,fontStyle:'bold'}).setOrigin(0.5).setDepth(DEPTH.fx);
    this.tweens.add({targets:t,y:y-40,alpha:0,duration:900,ease:'Quad.out',onComplete:()=>t.destroy()});}
  // 敵人扣血數字:大紅「-N」彈出後上飄淡出
  dmgPop(x,y,n){const t=this.add.text(x,y-16,'-'+n,{fontFamily:EMOJIFONT,fontSize:'27px',color:'#ff5040',fontStyle:'bold',stroke:'#350200',strokeThickness:5}).setOrigin(0.5).setDepth(DEPTH.fx).setScale(0.4);
    this.tweens.add({targets:t,scale:1.15,duration:150,ease:'Back.out'});
    this.tweens.add({targets:t,y:y-58,alpha:0,duration:720,delay:220,ease:'Quad.out',onComplete:()=>t.destroy()});}
  // 打擊頓格:命中瞬間凍住整個場景 ~ms(tween+計時器 timeScale=0,真實時間後復原)→ 打到肉的份量
  hitStop(ms){ if(this._hitStop)return; this._hitStop=true; this.tweens.timeScale=0; this.time.timeScale=0;
    setTimeout(()=>{ this.tweens.timeScale=1; this.time.timeScale=1; this._hitStop=false; }, ms); }
  // 敵人受擊擊退:後退(上移+縮小)→ 停頓 → 慢慢回到原位
  knockEnemy(e){ if(!e||!e.sprite)return; const sp=e.sprite, ry=(e.restY!=null?e.restY:sp.y), bs=e.baseScale||1;
    if(e.bob){e.bob.stop();e.bob=null;}                       // 暫停上下浮動,避免和擊退 y 衝突
    if(e.knockTw)e.knockTw.stop();
    sp.setScale(bs);
    e.knockTw=this.tweens.add({targets:sp,y:ry-20,scaleX:bs*0.8,scaleY:bs*0.8,duration:120,ease:'Quad.out',   // ①後退:上移 + 縮小(快)
      onComplete:()=>{
        e.knockTw=this.tweens.add({targets:sp,y:ry,scaleX:bs,scaleY:bs,delay:150,duration:440,ease:'Quad.out',   // ②停頓後慢慢回位
          onComplete:()=>{sp.setScale(bs);sp.setY(ry);e.knockTw=null;
            if(!e.dead)e.bob=this.tweens.add({targets:sp,y:ry-4,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});}});   // 回復上下浮動
      }}); }
  // 查克拉集結成印 → 射向敵人(全程 additive 疊光=真發光)
  chakraBez(a,c,b,t){const it=1-t;return {x:it*it*a.x+2*it*t*c.x+t*t*b.x, y:it*it*a.y+2*it*t*c.y+t*t*b.y};}   // 二次貝茲
  chakraBez3(a,c1,c2,b,t){const it=1-t,it2=it*it,t2=t*t;return {x:it2*it*a.x+3*it2*t*c1.x+3*it*t2*c2.x+t2*t*b.x, y:it2*it*a.y+3*it2*t*c1.y+3*it*t2*c2.y+t2*t*b.y};}   // 三次貝茲
  chakraArc(a,b,mag){const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,dx=b.x-a.x,dy=b.y-a.y,L=Math.hypot(dx,dy)||1;return {x:mx-dy/L*mag, y:my+dx/L*mag};}   // 控制點:中點往垂直偏 mag → 弧線
  chargeMs(hit){ return hit>=15 ? Math.min(1100,Math.round(220+(hit-15)*28)) : 0; }   // 15 HIT 以上才蓄力;HIT 越高粒子炮持續收束越久(15→220ms…45→1060ms)
  chakraStrike(victims, dealt, topEl, data){
    const ADD=Phaser.BlendModes.ADD, LP={x:CX,y:BOARD_CY}, col=topEl?EL[topEl].color:0xbfe6ff;   // 集結到盤面中心
    const hit=(data.cells||[]).length, pw=Math.min(5,Math.max(1,hit/9)), gs=1+(pw-1)*0.4;   // HIT 越多→集氣/印/彈/爆越大(9→×1、18→×1.4、27→×1.8、36→×2.2、45→×2.6)
    const seen={}; (data.parts||[]).forEach(pt=>{if(pt.el&&pt.el!=='neutral'&&!seen[pt.el]){seen[pt.el]=1;this.glowTeam(pt.el);}});
    const core=this.add.circle(LP.x,LP.y,3,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);   // 集氣球:亮白核 + 屬色光暈,漸大
    const glow=this.add.circle(LP.x,LP.y,7,col,0.55).setBlendMode(ADD).setDepth(DEPTH.proj);
    this.tweens.add({targets:core,scale:4.5*gs,duration:480,ease:'Quad.in'});
    this.tweens.add({targets:glow,scale:5*gs,duration:480,ease:'Quad.in'});
    const cells=(data.cells||[]).slice();   // 兩段式:先往外散開→再奔向中心;HIT 越多粒子越多(上限28)
    cells.slice(0,28).forEach((rc,i)=>{const o=this.cellCenter(rc[0],rc[1]);
      this.time.delayedCall((i%10)*16,()=>{
        const dx=o.x-LP.x, dy=o.y-LP.y, sa=Math.atan2(dy,dx)+(Math.random()-0.5)*1.5;   // 大致離心方向 + 隨機
        const sp={x:o.x+Math.cos(sa)*(28+Math.random()*34), y:o.y+Math.sin(sa)*(28+Math.random()*34)-(8+Math.random()*16)};
        const d=this.add.circle(o.x,o.y,4,col,0.9).setBlendMode(ADD).setDepth(DEPTH.proj-1);
        this.tweens.add({targets:d,x:sp.x,y:sp.y,scale:1.25,duration:140,ease:'Quad.out',onComplete:()=>{   // ①散開(外甩)
          const a={x:sp.x,y:sp.y}, b={x:LP.x,y:LP.y}, ctrl=this.chakraArc(a,b,26+Math.random()*40), ob={t:0};
          this.tweens.add({targets:ob,t:1,duration:280+(i%5)*38,ease:'Quad.in',                            // ②沿弧線奔向中心
            onUpdate:()=>{const p=this.chakraBez(a,ctrl,b,ob.t);d.setPosition(p.x,p.y).setScale(1.25-ob.t*1.05);},
            onComplete:()=>d.destroy()});
        }});
      });
    });
    const fireBolts=()=>{victims.forEach((v,k)=>{if(!v.sprite)return;this.time.delayedCall(k*60,()=>this.chakraBolt(LP.x,LP.y,v.sprite.x,v.sprite.y,col,v,dealt,pw));});};
    this.time.delayedCall(540,()=>{   // 集結完成 → 印爆閃 → (大 HIT 再二次蓄力) → 射出(規模隨 HIT)
      core.destroy(); glow.destroy();
      const seal=this.add.circle(LP.x,LP.y,16*gs,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);
      this.tweens.add({targets:seal,scale:3.2,alpha:0,duration:220,ease:'Quad.out',onComplete:()=>seal.destroy()});
      const sg=this.add.circle(LP.x,LP.y,20*gs,col,0.6).setBlendMode(ADD).setDepth(DEPTH.proj);
      this.tweens.add({targets:sg,scale:2.4,alpha:0,duration:300,ease:'Quad.out',onComplete:()=>sg.destroy()});
      this.cameras.main.shake(110+pw*35,0.005+pw*0.002);
      const chDur=this.chargeMs(hit);
      if(chDur>0){   // 粒子炮蓄力:粒子持續從 360° 外圍「不斷」往中心收束,HIT 越高收束越久,蓄滿才射出
        const cc=this.add.circle(LP.x,LP.y,6*gs,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);   // 蓄力核:整段持續長大(能量累積)
        this.tweens.add({targets:cc,scaleX:4.2,scaleY:4.2,duration:chDur,ease:'Quad.in'});
        const cg=this.add.circle(LP.x,LP.y,9*gs,col,0.5).setBlendMode(ADD).setDepth(DEPTH.proj);
        this.tweens.add({targets:cg,scaleX:4.6,scaleY:4.6,duration:chDur,ease:'Quad.in'});
        const tick=28, cnt=4+Math.round(pw*0.9);   // 持續噴流(更濃更狂):每 ~28ms 灑一波朝中心的火花,整段不間斷
        this.time.addEvent({delay:tick, repeat:Math.max(1,Math.floor(chDur/tick))-1, callback:()=>{
          for(let j=0;j<cnt;j++){const a=Math.random()*Math.PI*2, r0=54+pw*12+Math.random()*52, sx=LP.x+Math.cos(a)*r0, sy=LP.y+Math.sin(a)*r0;
            const d=this.add.rectangle(sx,sy,12+Math.random()*11,3,(j%3===0?0xffffff:col)).setOrigin(0,0.5).setRotation(a+Math.PI).setBlendMode(ADD).setDepth(DEPTH.proj);
            this.tweens.add({targets:d,x:LP.x,y:LP.y,scaleX:0.16,alpha:0.18,duration:190+Math.random()*150,ease:'Quad.in',onComplete:()=>d.destroy()});}
        }});
        this.time.delayedCall(chDur,()=>{   // 蓄滿 → 印爆閃(更亮)→ 射出
          cc.destroy(); cg.destroy();
          const fl=this.add.circle(LP.x,LP.y,18*gs,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);
          this.tweens.add({targets:fl,scale:3.8,alpha:0,duration:240,ease:'Quad.out',onComplete:()=>fl.destroy()});
          this.cameras.main.shake(90+pw*30,0.006); fireBolts();
        });
      } else fireBolts();
    });
  }
  // 查克拉彈:沿弧線飛 + 逐段描出的弧線軌跡線(亮白核 + 屬色光暈,像子機/追蹤彈)
  chakraBolt(ox,oy,tx,ty,color,tgt,dmg,pw){
    pw=pw||1; const ADD=Phaser.BlendModes.ADD, a={x:ox,y:oy}, b={x:tx,y:ty}, bs=1+(pw-1)*0.4;   // bs:彈體/軌跡隨 HIT 變粗大
    const ctrl=this.chakraArc(a,b,(Math.random()<0.5?1:-1)*(55+Math.random()*45));
    const glow=this.add.circle(ox,oy,17*bs,color,0.5).setBlendMode(ADD).setDepth(DEPTH.proj);
    const core=this.add.circle(ox,oy,9*bs,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);
    const trail=this.add.graphics().setDepth(DEPTH.proj-1).setBlendMode(ADD), ob={t:0};
    this.tweens.add({targets:ob,t:1,duration:320,ease:'Quad.in',
      onUpdate:()=>{const p=this.chakraBez(a,ctrl,b,ob.t); glow.setPosition(p.x,p.y); core.setPosition(p.x,p.y);
        trail.clear(); const N=Math.max(2,Math.round(ob.t*26));
        trail.lineStyle(6*bs,color,0.4); trail.beginPath(); trail.moveTo(a.x,a.y); for(let i=1;i<=N;i++){const q=this.chakraBez(a,ctrl,b,ob.t*i/N);trail.lineTo(q.x,q.y);} trail.strokePath();
        trail.lineStyle(2.5*bs,0xffffff,0.9); trail.beginPath(); trail.moveTo(a.x,a.y); for(let i=1;i<=N;i++){const q=this.chakraBez(a,ctrl,b,ob.t*i/N);trail.lineTo(q.x,q.y);} trail.strokePath();},
      onComplete:()=>{glow.destroy();core.destroy(); this.tweens.add({targets:trail,alpha:0,duration:360,onComplete:()=>trail.destroy()}); this.chakraImpact(tx,ty,color,tgt,dmg,Math.atan2(ty-ctrl.y,tx-ctrl.x),pw);}});   // 傳入到達角度(貝茲末端切線)+ HIT 規模
    this.tweens.add({targets:glow,scale:1.5,duration:320,ease:'Quad.in'});
  }
  // ang=查克拉彈到達角度→火花/粒子依「擊中角度」散開(大半往來向反向潑回 back-splash、少數穿透)
  chakraImpact(x,y,color,tgt,dmg,ang,pw){
    const ADD=Phaser.BlendModes.ADD; pw=pw||1; const ps=1+(pw-1)*0.4;   // ps:命中規模隨 HIT(9→×1、18→×1.4、27→×1.8)
    if(tgt&&!tgt.dead){tgt.sprite.setTint(0xffffff);this.time.delayedCall(110,()=>{if(tgt.sprite&&!tgt.dead)tgt.sprite.clearTint();});   // 受擊白閃
      this.knockEnemy(tgt);}   // 擊退(後退縮小→停頓→回位)
    const flash=this.add.circle(x,y,15*ps,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);   // 白點爆閃(縮小快收→不蓋火花;HIT 越多越大)
    this.tweens.add({targets:flash,scale:0.2,alpha:0,duration:170,onComplete:()=>flash.destroy()});
    const halo=this.add.circle(x,y,26*ps,color,0.4).setBlendMode(ADD).setDepth(DEPTH.proj);   // 屬色光暈(淡一點)
    this.tweens.add({targets:halo,scale:1.6,alpha:0,duration:320,ease:'Quad.out',onComplete:()=>halo.destroy()});
    [[14,5,420,color],[10,7,560,0xffffff]].forEach(o=>{const ring=this.add.circle(x,y,o[0]*ps,0,0).setStrokeStyle(5,o[3],1).setBlendMode(ADD).setDepth(DEPTH.proj);   // 雙擴散環
      this.tweens.add({targets:ring,scale:o[1],alpha:0,duration:o[2],ease:'Quad.out',onComplete:()=>ring.destroy()});});
    // 線形火花:圓形 360° 四射(飛更遠;HIT 越多顆粒越多、火花越長)
    const nL=Math.round(14+pw*6), lf=1+(pw-1)*0.25;   // 9→20、18→26、27→32 道
    for(let i=0;i<nL;i++){const a=i/nL*Math.PI*2+(Math.random()-0.5)*0.5, len=(15+Math.random()*16)*lf;
      const sp=this.add.rectangle(x,y,len,4,0xffffff).setOrigin(0,0.5).setRotation(a).setBlendMode(ADD).setDepth(DEPTH.proj);
      this.tweens.add({targets:sp,x:x+Math.cos(a)*(48+Math.random()*64),y:y+Math.sin(a)*(48+Math.random()*64),alpha:0,scaleX:0.18,duration:560+Math.random()*340,ease:'Quad.out',onComplete:()=>sp.destroy()});}
    const nD=Math.round(11+pw*5);   // 白點粒子四射:9→16、18→21、27→26 顆
    for(let i=0;i<nD;i++){const a=i/nD*Math.PI*2+(Math.random()-0.5)*0.5, d=this.add.circle(x,y,3.5,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);
      this.tweens.add({targets:d,x:x+Math.cos(a)*(42+Math.random()*52),y:y+Math.sin(a)*(42+Math.random()*52),alpha:0,scale:0.2,duration:540+Math.random()*280,ease:'Quad.out',onComplete:()=>d.destroy()});}
    if(tgt&&tgt.sprite)this.dmgPop(tgt.sprite.x,tgt.sprite.y,dmg);
    this.cameras.main.shake(200+pw*40,0.009+pw*0.003);                  // 震幅隨 HIT 加重(不做 hitstop:凍格會被誤認成 lag)
  }
  tonFloat(str,color){const t=this.add.text(CX,BY0-54,str,{fontFamily:EMOJIFONT,fontSize:'17px',color,fontStyle:'bold'}).setOrigin(0.5).setDepth(DEPTH.fx);
    this.tweens.add({targets:t,y:BY0-82,alpha:0,duration:1000,ease:'Quad.out',onComplete:()=>t.destroy()});}
  comboPopup(n){
    if(this.comboTx){this.tweens.killTweensOf(this.comboTx);this.comboTx.destroy();}   // 同位置只留最新
    const t=this.comboTx=this.add.text(CX,BOARD_CY-60,n+' COMBO',{fontFamily:HITFONT,fontSize:'27px',color:'#ffd56a',fontStyle:'bold',stroke:'#7a4a00',strokeThickness:5}).setOrigin(0.5).setScale(0.4).setDepth(DEPTH.fx);
    this.tweens.add({targets:t,scale:1,duration:300,ease:'Back.out'});                                   // 彈入
    this.tweens.add({targets:t,scaleX:1.08,scaleY:1.08,duration:560,yoyo:true,delay:300,ease:'Sine.inOut'});   // 緩呼吸(華麗滯留)
    this.tweens.add({targets:t,alpha:0,delay:1100,duration:400,onComplete:()=>{t.destroy();if(this.comboTx===t)this.comboTx=null;}});
  }
  // 清除演出:一手清掉 n 格 → 盤面中央「n HIT」。數字從 1 慢慢 +1 飆到 n(看得清在 +)、邊數邊脹大、落定大彈;放慢求華麗爽感
  countFX(n){
    if(this.hitTx){this.tweens.killTweensOf(this.hitTx);this.hitTx.destroy();}   // 同位置只留最新(快速連放不疊成一團)
    const big=n>=18, huge=n>=27;
    this.cameras.main.shake(huge?340:big?260:160, huge?0.014:big?0.011:0.007);
    if(big){const flash=this.add.rectangle(CX,H/2,W,H,huge?0xffc89a:0xfff0c0,0).setDepth(DEPTH.flash);
      this.tweens.add({targets:flash,alpha:huge?0.5:0.4,duration:110,yoyo:true,onComplete:()=>flash.destroy()});}
    const fs=Math.min(80,34+n*1.8), colFor=v=>v>=27?'#ff6a3a':v>=18?'#ffb02a':'#ffd24a';
    const t=this.hitTx=this.add.text(CX,BOARD_CY,'1 HIT',{fontFamily:HITFONT,fontSize:fs+'px',color:colFor(1),fontStyle:'bold',stroke:'#5a1500',strokeThickness:8}).setOrigin(0.5).setDepth(DEPTH.fx).setScale(0.3).setAngle(-5);
    this.tweens.add({targets:t,scale:0.92,duration:200,ease:'Back.out'});   // 彈入(起點略小→數的時候慢慢脹大)
    const cnt={v:1}, dur=Math.max(280,Math.min(680,Math.round(n*42)));   // ~42ms/步(加快);總長 0.28~0.68s
    this.tweens.add({targets:cnt,v:n,duration:dur,ease:'Linear',
      onUpdate:()=>{const cv=Math.round(cnt.v);t.setText(cv+' HIT').setColor(colFor(cv)).setScale(0.92+0.20*((cv-1)/Math.max(1,n-1)));},   // 邊數邊脹大
      onComplete:()=>{t.setText(n+' HIT').setColor(colFor(n));
        this.tweens.add({targets:t,scaleX:1.38,scaleY:1.38,duration:170,yoyo:true,ease:'Back.out'});   // 落定大彈
        this.cameras.main.shake(huge?220:big?150:90,0.009);}});
    this.tweens.add({targets:t,alpha:0,delay:dur+620,duration:400,onComplete:()=>{t.destroy();if(this.hitTx===t)this.hitTx=null;}});   // 數完再滯留 ~0.6s 才淡出
  }
  // 統一攻擊展演:先「n HIT」(快)→ 同位置換成招式名(1~2 招上下並列同時出)→ 才發動各招攻擊(微錯開);回傳最後一招攻擊時點(ms)
  playClearFX(n, jutsu){
    this.countFX(n);
    const lead=Math.max(280,Math.min(680,Math.round(n*42))), k=jutsu.length;
    this.time.delayedCall(lead+100,()=>{   // HIT 數完 → 同位置淡出 → 招式名同時亮相
      if(this.hitTx){const h=this.hitTx;this.hitTx=null;this.tweens.killTweensOf(h);this.tweens.add({targets:h,alpha:0,scaleX:0.5,scaleY:0.5,duration:150,onComplete:()=>h.destroy()});}
      jutsu.forEach((j,i)=>{if(j.el)this.showJutsu(j.el,j.lv,k>1?(i===0?-28:28):0);});   // 多招:上下並列
    });
    jutsu.forEach((j,i)=>this.time.delayedCall(lead+470+i*200,j.fire));   // 各招攻擊微錯開(同時出招感)
    return lead+470+(k-1)*200;
  }
  // 新手鉤子:每場第一次消除 = 隆重慶祝(全螢幕閃光+震動+大字+提示拖屬塊)
  firstClearFX(){

  // 鬥志階變:全部演在「鬥志圈圈」裡(不在盤面出字)。非極階變=彈一下;極=不做大小變化(免被當成可按的CD鈕),改由 update() 跑徽章底色漸層流動。一律擴散一圈該階色光
  moraleFX(tier,up){
    if(!this.moraleBg)return;
    const bx=this.moraleBg.x, by=this.moraleBg.y, tg=[this.moraleBg,this.moraleTx];
    this.tweens.killTweensOf(tg);
    if(tier>=5){ tg.forEach(o=>o.setScale(1)); }   // 極:不做 scale
    else { tg.forEach(o=>o.setScale(up?1.5:0.72)); this.tweens.add({targets:tg,scaleX:1,scaleY:1,duration:300,ease:'Back.out'}); }   // 其他階:升放大/降縮一下回彈
    this.syncMoraleState();   // 設「極」旗標 / 還原非極底色
    const col=parseInt((['99aabb','9ac4e0','ffffff','ffd24a','ff9a3a','ff5a3a'][tier]||'ffd56a'),16);   // 擴散環:該階色,在徽章處 ping 一下
    const ring=this.add.circle(bx,by,15,0x000000,0).setStrokeStyle(3,col,1).setDepth(DEPTH.fx);
    this.tweens.add({targets:ring,scale:tier>=5?3.2:2.1,alpha:0,duration:tier>=5?560:420,ease:'Quad.out',onComplete:()=>ring.destroy()});
  }
  // 「極=絕好調」用旗標標記,讓 update() 每幀跑徽章底色漸層流動(不用 scale,免像可按鈕);非極→還原暗底
  syncMoraleState(){
    if(!this.moraleBg)return;

    if(!this.moralePeak)this.moraleBg.setFillStyle(0x1a140c,0.92);
  }
  showJutsu(el,lv,dy){dy=dy||0;const name=KATA[lv-1]+'・'+JUTSU[el][lv-1];const col='#'+EL[el].color.toString(16).padStart(6,'0');
    const t=this.add.text(CX,BOARD_CY+dy,name,{fontFamily:JUTSUFONT,fontSize:(17+lv*4)+'px',color:col,fontStyle:'bold',stroke:'#000',strokeThickness:4}).setOrigin(0.5).setAlpha(0).setScale(0.5).setDepth(DEPTH.fx);   // 毛筆字、置中(和 HIT 同位置,接 HIT 之後出現;dy 供多招上下並列)
    this.tweens.add({targets:t,alpha:1,scaleX:1,scaleY:1,duration:240,ease:'Back.out',
      onComplete:()=>this.tweens.add({targets:t,alpha:0,duration:420,delay:600+lv*110,onComplete:()=>t.destroy()})});   // 招式名滯留(華麗感)
    if(lv>=4){const big=lv>=6;const f=this.add.rectangle(CX,H/2,W,H,EL[el].color,big?0.6:0.4).setDepth(DEPTH.flash);
      this.tweens.add({targets:f,alpha:0,duration:big?540:420,onComplete:()=>f.destroy()});
      this.cameras.main.shake(big?440:280,big?0.014:0.008);}}
  glowTeam(el){this.teamCards.forEach(card=>{if(card.el===el)
    this.tweens.add({targets:card.rect,scaleX:1.12,scaleY:1.12,duration:130,yoyo:true});});}

  /* 彈窗 */
  overlay(){const g=this.add.container(0,0).setDepth(1000);
    g.add(this.add.rectangle(CX,H/2,W,H,0x000000,0.74).setInteractive());return g;}
  mkBtn(g,y,label,cb,col){const r=this.add.rectangle(CX,y,220,46,col||0x3a2c1d).setStrokeStyle(2,0x5a4128).setInteractive();

        if(d.isNew)g.add(this.add.text(dx,dy-sq/2-10,'✦NEW',{fontFamily:EMOJIFONT,fontSize:'11px',color:'#ffe04a',fontStyle:'bold'}).setOrigin(0.5));});
      g.add(this.add.text(CX,cy+30,'🎉 EXP +'+(this.runExp||0)+'   💰 +'+(this.runCoins||0),{fontFamily:EMOJIFONT,fontSize:'15px',color:'#ffe08a',fontStyle:'bold'}).setOrigin(0.5));
      this.mkBtn(g,cy+66,'📖 看卡冊',()=>{this.scene.manager.start('collection');this.scene.manager.stop('game');},0x3a4a5c);

    } else {

      this.mkBtn(g,cy+88,'🏠 回大廳',()=>{this.scene.manager.start('home');this.scene.manager.stop('game');});
    }}
  showReshuffleModal(){this.resultOpen=true;const g=this.overlay();const cy=H/2;
    g.add(this.add.text(CX,cy-90,'查克拉無法順利提煉',{fontFamily:EMOJIFONT,fontSize:'20px',color:'#ffd56a',fontStyle:'bold'}).setOrigin(0.5));
    g.add(this.add.text(CX,cy-52,'燃燒生命重新排列查克拉?(−'+CONFIG.RESHUFFLE_COST+' HP)',{fontFamily:EMOJIFONT,fontSize:'13px',color:'#f3e9d8'}).setOrigin(0.5));
    this.mkBtn(g,cy+10,'燃燒生命重排',()=>{g.destroy();this.resultOpen=false;this.reshuffle();},0x3a5a2c);
