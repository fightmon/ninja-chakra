  if(kind==='wind') return cells.some(([dr,dc])=> board[r+dr][c+dc]);   // йўЁеҲғ:з•Ңе…§ + иҮіе°‘дёҖж јжңүж–№еЎҠ(еҸҜж¶Ҳ)
  if(kind==='earth')return cells.some(([dr,dc])=> board[r+dr][c+dc]);   // еңҹеЎҠ:з•Ңе…§ + иҮіе°‘дёҖж јжңүж–№еЎҠ(еҸҜжҠ“еҸ–жҗ¬з§»)
  return cells.every(([dr,dc])=>!board[r+dr][c+dc]);                    // дёҖиҲ¬еЎҠ:е…Ёз©ә
}
function computeClears(board, boxElement, boxCard, enemyEl, ampMult){
  let rows=[],cols=[],boxes=[];
  for(let r=0;r<N;r++)if(board[r].every(x=>x))rows.push(r);
  for(let c=0;c<N;c++){let f=true;for(let r=0;r<N;r++)if(!board[r][c])f=false;if(f)cols.push(c);}
  for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3;let f=true;
    for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)if(!board[r][c])f=false;if(f)boxes.push(b);}
  const groups=rows.length+cols.length+boxes.length;
  if(groups===0)return null;
  const cellSet=new Set();
  rows.forEach(r=>{for(let c=0;c<N;c++)cellSet.add(r+'_'+c);});
  cols.forEach(c=>{for(let r=0;r<N;r++)cellSet.add(r+'_'+c);});
  boxes.forEach(b=>{const br=Math.floor(b/3)*3,bc=(b%3)*3;for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)cellSet.add(r+'_'+c);});
  const mult=(el)=> el==='neutral'?1 : (EL[el].beats===enemyEl?CONFIG.ADV_MULT : (EL[enemyEl].beats===el?CONFIG.WEAK_MULT:CONFIG.NORM_MULT));
  let total=0,hitWeak=false,parts=[];
  boxes.forEach(b=>{const el=boxElement[b]||'neutral';const card=boxCard[b];
    let d = card ? Math.round(card.atk*mult(el)*ampMult) : Math.round(CONFIG.NEUTRAL_BOX_BASE*mult(el));
    total+=d;
    if(el!=='neutral'&&EL[el].beats===enemyEl)hitWeak=true;
    const br=Math.floor(b/3)*3,bc=(b%3)*3;parts.push({el,d,r:br+1,c:bc+1});});
  const lineDmg=(bx)=>{let d=CONFIG.LINE_BASE,best=null,weak=false;const byEl={};
    bx.forEach(b=>{const e=boxElement[b];if(e&&boxCard[b])(byEl[e]=byEl[e]||[]).push(boxCard[b]);});
    for(const e in byEl)if(byEl[e].length>=2){byEl[e].forEach(card=>{d+=Math.round(card.atk*CONFIG.LINE_SAME_RATE*mult(e));});best=e;if(EL[e].beats===enemyEl)weak=true;}
    return {d,best,weak};};
  rows.forEach(r=>{const br=Math.floor(r/3);const L=lineDmg([br*3,br*3+1,br*3+2]);
    total+=L.d;if(L.weak)hitWeak=true;parts.push({el:L.best||'neutral',d:L.d,r,c:4});});
  cols.forEach(c=>{const bc=Math.floor(c/3);const L=lineDmg([bc,bc+3,bc+6]);
    total+=L.d;if(L.weak)hitWeak=true;parts.push({el:L.best||'neutral',d:L.d,r:4,c});});
  const elemCells={};
  cellSet.forEach(k=>{const p=k.split('_');const e=boxElement[boxOf(+p[0],+p[1])];if(e)elemCells[e]=(elemCells[e]||0)+1;});
  const fx={};
  ELEMENT_BOXES.forEach(b=>{const card=boxCard[b];if(!card)return;const br=Math.floor(b/3)*3,bc=(b%3)*3;
    let hit=false;for(let r=br;r<br+3&&!hit;r++)for(let c=bc;c<bc+3;c++)if(cellSet.has(r+'_'+c))hit=true;
    if(!hit)return;const e=card.el;const o=fx[e]||(fx[e]={atk:0,attrs:[]});
    o.atk=Math.max(o.atk,card.atk);card.attrs.forEach(a=>{if(o.attrs.indexOf(a)<0)o.attrs.push(a);});});
  Object.keys(fx).forEach(e=>{fx[e].level=Math.min(7,Math.floor((elemCells[e]||0)/3))||1;});
  return {groups,cells:[...cellSet].map(k=>k.split('_').map(Number)),parts,total,hitWeak,fx};
}

  // и®ҖгҖҢзңҹжӯЈзҡ„е®№еҷЁе°әеҜёгҖҚ(#game),жүҚиҲҮ Phaser FIT йҖІеҺ»зҡ„е®№еҷЁдёҖиҮҙвҶ’йӣ¶й»‘йӮҠ;еҸ–дёҚеҲ°еҶҚ fallback иҰ–зӘ—

function feedFodder(targetId,fodderId){let res={ok:false,msg:''};

  });
  return res;}
function dissolveCard(id){let res={ok:false,msg:''};   // еҲҶи§ЈйҮҚиӨҮеҚЎжҸӣйҮ‘е№Ј(дҝқиӯ·жңҖеҫҢдёҖејө)
  mutSave(s=>{if((s.owned[id]||0)<2){res.msg='еҸӘеү© 1 ејө,з„Ўжі•еҲҶи§Ј';return;}
    const c=ROSTER.find(x=>x.id===id), gain={genin:50,chunin:150,jonin:400,kage:800}[c.rank]||50;
    s.owned[id]-=1; s.meta.coins=(s.meta.coins||0)+gain; res={ok:true,gain:gain,left:s.owned[id]};});
  return res;}
function setLeader(id){mutSave(s=>{s.team=[id].concat(s.team.filter(x=>x!==id)).slice(0,5);});}   // иЁӯзӮәйҡҠй•·(ж”ҫйҡҠйҰ–)
/* йҖІеҢ–(PAD/зҘһйӯ”е…ұйҖҡ:ж»ҝзҙҡ+еҜ¶зҺүзҙ жқҗвҶ’еҚҮйҡҺ):gems еҜ¶зҺү + cardEvo йҖІеҢ–йҡҺ */
const EVO_MAX=2, EVO_MULT=[1,1.6,2.4];
function evoReq(tier){return {gems:3+tier*3, coins:1000+tier*2000};}
function getCardEvo(id){return loadSave().cardEvo[id]||0;}
function cardStars(id){const c=ROSTER.find(x=>x.id===id);return Math.min(6,({genin:1,chunin:2,jonin:3,kage:4}[c.rank]||1)+getCardEvo(id));}
function starStr(id){return 'вҳ…'.repeat(cardStars(id));}
function getGems(el){return loadSave().gems[el]||0;}
function addGem(el,n){mutSave(s=>{s.gems[el]=(s.gems[el]||0)+(n||1);});}
function canEvolve(id){const c=ROSTER.find(x=>x.id===id),t=getCardEvo(id);
  if(t>=EVO_MAX)return {ok:false,msg:'е·ІйҒ”йҖІеҢ–дёҠйҷҗ'};
  if(getCardLv(id)<MAXLV)return {ok:false,msg:'йңҖе…Ҳз·ҙж»ҝ Lv.'+MAXLV};
  const req=evoReq(t);
  if(getGems(c.el)<req.gems)return {ok:false,msg:'йңҖ '+req.gems+' йЎҶ'+EL[c.el].name+'еҜ¶зҺү(жңү'+getGems(c.el)+')'};
  if((getMeta().coins||0)<req.coins)return {ok:false,msg:'йңҖ '+req.coins+' йҮ‘'};
  return {ok:true,req:req};}
function evolveCard(id){const chk=canEvolve(id);if(!chk.ok)return chk;const c=ROSTER.find(x=>x.id===id);
  mutSave(s=>{const req=evoReq(s.cardEvo[id]||0);s.gems[c.el]-=req.gems;s.meta.coins-=req.coins;
    s.cardEvo[id]=(s.cardEvo[id]||0)+1;s.cardLv[id]={lv:1,exp:0};});
  return {ok:true,tier:getCardEvo(id)};}
/* з¶“жҝҹ:й«”еҠӣ(жҷӮй–“еӣһеҫ©)/ з¶“й©—В·зӯүзҙҡ / йҮ‘йҢў / йӯ”жі•зҹі */
const REGEN_MS=20000;   // й«”еҠӣжҜҸ 20 з§’ +1
function syncStamina(m){if(m.staTs==null){m.staTs=Date.now();return;}
  if(m.stamina>=m.staminaMax){m.staTs=Date.now();return;}
  const g=Math.floor((Date.now()-m.staTs)/REGEN_MS);
  if(g>0){m.stamina=Math.min(m.staminaMax,m.stamina+g); m.staTs=(m.stamina>=m.staminaMax)?Date.now():m.staTs+g*REGEN_MS;}}
function getMeta(){return mutSave(s=>syncStamina(s.meta)).meta;}
function spendStamina(n){let ok=false;mutSave(s=>{syncStamina(s.meta);if(s.meta.stamina>=n){s.meta.stamina-=n;s.meta.staTs=Date.now();ok=true;}});return ok;}
function staFullSec(){const m=getMeta();if(m.stamina>=m.staminaMax)return 0;return Math.ceil(((m.staminaMax-m.stamina)*REGEN_MS-(Date.now()-m.staTs))/1000);}
function expForLevel(rank){return 80+rank*40;}
function addRewards(exp,coins,stones){return mutSave(s=>{const m=s.meta;m.coins=(m.coins||0)+(coins||0);m.stones=(m.stones||0)+(stones||0);m.exp=(m.exp||0)+(exp||0);
  let need=expForLevel(m.rank),ups=0;while(m.exp>=need){m.exp-=need;m.rank++;m.staminaMax+=2;m.stamina=m.staminaMax;ups++;need=expForLevel(m.rank);}m._ups=ups;}).meta;}
function spendStones(n){let ok=false;mutSave(s=>{if((s.meta.stones||0)>=n){s.meta.stones-=n;ok=true;}});return ok;}
function refillStamina(){mutSave(s=>{s.meta.stamina=s.meta.staminaMax;s.meta.staTs=Date.now();});}
const RANK_POOL={genin:ROSTER.filter(c=>c.rank==='genin'),chunin:ROSTER.filter(c=>c.rank==='chunin'),jonin:ROSTER.filter(c=>c.rank==='jonin'),kage:ROSTER.filter(c=>c.rank==='kage')};
function pickDrop(spec){let pool=ROSTER;if(spec.el)pool=pool.filter(c=>c.el===spec.el);
  if(spec.rank)pool=pool.filter(c=>c.rank===spec.rank); else pool=pool.filter(c=>c.rank!=='kage');   // еҪұеҝҚеҸӘиғҪжҠҪеҚЎеҸ–еҫ—,дёҚеҫһеҲ·й—ңжҺүиҗҪ
  return pool.length?pool[rnd(pool.length)]:null;}
function rollDrops(table){const out=[];(table||[]).forEach(d=>{if(Math.random()<d.rate){const c=pickDrop(d);if(c)out.push(c);}});return out;}

/* ===== иҪүиӣӢ(з°Ўе–®зүҲ:йӣҷжұ  + ж©ҹзҺҮе…¬зӨә) ===== */
const GACHA={
  premium:{name:'зөҗеҚ°иҪүиӣӢ',cur:'stones',icon:'рҹ’Һ',cost1:5,   cost10:50,  rates:[['genin',0.50],['chunin',0.35],['jonin',0.12],['kage',0.03]]},
  normal: {name:'дёҖиҲ¬иҪүиӣӢ',cur:'coins', icon:'рҹ’°',cost1:1000,cost10:9000,rates:[['genin',0.70],['chunin',0.28],['jonin',0.02]]},
};
function rollRarity(rates){const r=Math.random();let acc=0;for(let k=0;k<rates.length;k++){acc+=rates[k][1];if(r<acc)return rates[k][0];}return rates[rates.length-1][0];}
function gachaPull(bankey){const pool=RANK_POOL[rollRarity(GACHA[bankey].rates)];return pool[rnd(pool.length)];}
function spendCoins(n){let ok=false;mutSave(s=>{if((s.meta.coins||0)>=n){s.meta.coins-=n;ok=true;}});return ok;}
function doGacha(bankey,count){const b=GACHA[bankey],cost=count===10?b.cost10:b.cost1;
  const ok=b.cur==='stones'?spendStones(cost):spendCoins(cost); if(!ok)return null;
  const out=[]; for(let i=0;i<count;i++){const c=gachaPull(bankey);out.push({cd:c,isNew:!isOwned(c.id)});addCard(c.id);} return out;}

    if(this.tray)this.renderTray();
    this.enemies.forEach(e=>{if(!e.sprite||e.dead)return;const x=e.sprite.x,cy=BATTLE_CY;
      e.sel.setPosition(x,cy);e.timerTxt.setPosition(x,cy-44);e.hpBg.setPosition(x,cy+42);e.hpFill.setPosition(e.hpx,cy+42);
      if(e.bob)e.bob.stop();e.sprite.setY(cy);e.bob=this.tweens.add({targets:e.sprite,y:cy-6,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});});
  }

  cellRect(r,c){return this.cells[r*N+c];}
  cellCenter(r,c){return {x:BX0+c*CS+RECT/2, y:BY0+r*CS+RECT/2};}
  pointerToCell(px,py){const c=Math.floor((px-BX0)/CS),r=Math.floor((py-BY0)/CS);
    if(r<0||r>=N||c<0||c>=N)return null;return {r,c};}

  newGame(){
    this.boxElement={}; this.boxCard={};
    if(this.presetTeam) ELEMENT_BOXES.forEach((b,i)=>{const card=this.presetTeam[i];this.boxCard[b]=card;this.boxElement[b]=card.el;});
    else ELEMENT_BOXES.forEach(b=>{const card=ROSTER[rnd(ROSTER.length)];this.boxCard[b]=card;this.boxElement[b]=card.el;});
    this.lead=(this.presetTeam&&this.presetTeam[0]&&LEADER_SKILLS[this.presetTeam[0].id])||null;   // йҡҠй•·жҠҖ=йҡҠйҰ–еҚЎ
    this.maxHP=Math.round(CONFIG.PLAYER_HP_BASE*((this.lead&&this.lead.type==='hp')?this.lead.v:1));
    this.playerHP=this.maxHP; this.stage=1; this.resultOpen=false; this.chests=0; this.gold=0; this.runDrops=[]; this.runExp=0; this.runCoins=0; this.runGems=0;
    this.charge=[0,0,0,0,0];   // дё»еӢ•жҠҖи“„еҠӣ(ж•ҙе ҙзҙҜз©ҚгҖҒи·Ёй—ңдҝқз•ҷ)
    this.stored=[null,null,null,null,null];   // жҜҸеҚЎеӯҳж”ҫзҡ„еұ¬еЎҠ {el,lv}(и·Ёй—ңдҝқз•ҷ,ж–°еұҖ/йҮҚжҢ‘жүҚжё…)
    this.renderTeam(); this.startStage();
  }
  resetWave(){this.combo=0;this.immune=0;this.armor=0;this.amp=1;}
  startStage(keepBoard){
    if(!keepBoard){this.board=Array.from({length:N},()=>Array(N).fill(null));this.stored=[null,null,null,null,null];}   // и·Ёй—ңдҝқз•ҷзӣӨйқў+еұ¬еЎҠ:еҸӘжңүж–°еұҖ/йҮҚжҢ‘жүҚжё…,йҒҺй—ңжҷӮзҙҜз©ҚеҲ°дёӢдёҖй—ңзҡ„жҖӘ
    this.resetWave(); if(!keepBoard)this.morale=(this.lead&&this.lead.type==='moraleStart')?this.lead.v:CONFIG.MORALE_START; this.handCleared=false; this.handBurst=false; this.whiffStreak=0; this.refill();   // й¬Ҙеҝ—:и·Ёй—ңдҝқз•ҷ(еҸӘж–°еұҖ/йҮҚжҢ‘жүҚйҮҚзҪ®еӣһиө·е§Ӣ)
    if(this.stage===1&&this.lead)this.time.delayedCall(450,()=>this.tonFloat('рҹҺ– йҡҠй•·жҠҖ:'+this.lead.name,'#ffe08a'));
    this.spawnEnemies(); this.refreshBoard(); this.renderTray(); this.updateAll(); this.renderCharges(); this.renderStored();
  }
  spawnEnemies(){
    if(this.enemyG)this.enemyG.destroy();
    this.enemyG=this.add.container(0,0);
    const defs=this.dungeon.stages[this.stage-1].es;
    this.enemies=defs.map(d=>({el:d.el,max:d.hp,hp:d.hp,atk:d.atk,interval:d.turns,timer:d.turns,burn:0,dead:false,boss:!!d.boss}));
    const n=this.enemies.length, slot=380/n, sz=(n<=1?52:n<=2?44:n<=3?38:30);
    this.enemies.forEach((e,i)=>{
      const x=20+slot*(i+0.5), w=Math.min(slot-14,84), cy=BATTLE_CY;
      e.sel=this.add.rectangle(x,cy,slot-6,132,0xffd56a,0).setStrokeStyle(2,0xffd56a,0);
      e.sprite=this.add.text(x,cy,EL[e.el].face,{fontFamily:EMOJIFONT,fontSize:sz+'px'}).setOrigin(0.5).setInteractive();
      e.sprite.on('pointerdown',()=>this.selectTarget(i));
      e.timerTxt=this.add.text(x,cy-44,'',{fontFamily:EMOJIFONT,fontSize:'12px',color:'#ffb0b0',fontStyle:'bold'}).setOrigin(0.5);
      e.hpW=w; e.hpx=x-w/2;
      e.hpBg=this.add.rectangle(x,cy+42,w,8,0x000000,0.5).setOrigin(0.5);
      e.hpFill=this.add.rectangle(e.hpx,cy+42,w,8,e.boss?0xff7a3a:0xc23c2c).setOrigin(0,0.5);
      e.bob=this.tweens.add({targets:e.sprite,y:cy-6,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});
      [e.sel,e.sprite,e.timerTxt,e.hpBg,e.hpFill].forEach(o=>this.enemyG.add(o));
    });
    this.target=0;
  }
  refill(){this.tray=[pickShape(),pickShape(),pickShape()].map(c=>({c,used:false}));}
  aliveCount(){return this.enemies.filter(e=>!e.dead).length;}
  targetEnemy(){let e=this.enemies[this.target];if(e&&!e.dead)return e;
    const i=this.enemies.findIndex(x=>!x.dead);this.target=i;return i<0?null:this.enemies[i];}
  selectTarget(i){if(this.enemies[i]&&!this.enemies[i].dead){this.target=i;this.updateEnemies();}}

  refreshBoard(){
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){const rc=this.cellRect(r,c), be=this.boxElement[boxOf(r,c)];
      if(this.board[r][c]){const el=this.board[r][c].el;rc.setFillStyle(EL[el]?EL[el].color:NEUTRAL_FILL);}
      else rc.setFillStyle(be?EL[be].dark:NEUTRAL_DARK);
      rc.setStrokeStyle(2,0x000000,0);}
    for(let b=0;b<9;b++){const be=this.boxElement[b];
      this.boxLabels[b].setText(be?EL[be].name:'В·').setColor(be?'#'+EL[be].color.toString(16).padStart(6,'0'):'#ffffff66');}
  }
  renderTeam(){ELEMENT_BOXES.forEach((b,i)=>{const k=this.boxElement[b],card=this.teamCards[i];
    card.el=k;card.rect.setFillStyle(EL[k].color);card.txt.setText(EL[k].name);});
    this.renderCharges();}
  // дё»еӢ•жҠҖи“„еҠӣжўқ/зҷје…ү/icon еҗҢжӯҘ
  renderCharges(){if(!this.charge)return;this.teamCards.forEach((card,i)=>{const a=activeSkill(card.el);
    if(!card.abtn)return;
    if(!a){card.abtn.setVisible(false);return;}
    card.abtn.setVisible(true);
    const ready=(this.charge[i]||0)>=a.cd;
    card.abg.setFillStyle(ready?0x6a5020:0x2b2014).setStrokeStyle(2,ready?0xffe066:0x5a4128);
    card.aic.setText(ready?a.icon:String(Math.max(0,a.cd-(this.charge[i]||0)))).setFontSize(ready?'14px':'11px');   // ж»ҝвҶ’iconеҸҜй»һ;еҗҰеүҮйЎҜзӨәеү©йӨҳжүӢж•ё
    if(ready&&!card.pulse)card.pulse=this.tweens.add({targets:card.abtn,scaleX:1.15,scaleY:1.15,duration:480,yoyo:true,repeat:-1,ease:'Sine.inOut'});
    if(!ready&&card.pulse){card.pulse.stop();card.pulse=null;card.abtn.setScale(1);}});}
  // еұ¬еЎҠеӯҳж”ҫйЎҜзӨә:жҜҸеҚЎз–ҠдёҖеҖӢиҝ·дҪ еҪўзӢҖ+гҖҢжӢ– LvгҖҚ(жңүеӯҳжүҚйЎҜзӨә,еҸҜжӢ–еҲ°зӣӨйқў)
  renderStored(){if(!this.stored)return;this.teamCards.forEach((card,i)=>{const so=card.storeObj;if(!so)return;
    so.removeAll(true);
    const s=this.stored[i];
    if(!s){so.setVisible(false);return;}
    so.setVisible(true);
    const cells=chakraShape(s.el,s.lv),col=EL[s.el].color;
    let mr=0,mc=0;cells.forEach(([r,c])=>{mr=Math.max(mr,r);mc=Math.max(mc,c);});
    const ms=10,pw=(mc+1)*ms,ph=(mr+1)*ms;   // еӣәе®ҡж јеӨ§е°Ҹ:LV1=1е°Ҹж јгҖҒLV3=3ж јвҖҰеӨ§е°ҸеҸҚжҳ зңҹеҜҰж јж•ё(дёҚж’җж»ҝжЎҶ,е…Қ LV1 иў«иӘӨиӘҚжҲҗеӨ§еЎҠ)
    so.add(this.add.rectangle(0,0,60,60,0x000000,0.5).setStrokeStyle(3,col,1));
    cells.forEach(([dr,dc])=>so.add(this.add.rectangle(dc*ms-pw/2,dr*ms-ph/2,ms-1,ms-1,col).setOrigin(0)));   // зңӢеЎҠеҪўе°ұзҹҘйҒ“ LV,дёҚеҜ«еӯ—
  });}
  // зҷјеӢ•дё»еӢ•жҠҖ
  fireActive(i){if(this.resultOpen||this.drag||this.earthSel||this.earthDrag)return;
    const card=this.teamCards[i], a=activeSkill(card.el); if(!a)return;
    if((this.charge[i]||0)<a.cd){this.tonFloat('и“„еҠӣдёӯ '+(this.charge[i]||0)+'/'+a.cd,'#9fb0c0');return;}
    this.charge[i]=0;
    const colHex='#'+EL[card.el].color.toString(16).padStart(6,'0');
    this.tonFloat('вҳ… '+a.name,colHex);
    const cardObj=this.boxCard[ELEMENT_BOXES[i]], atk=cardObj?cardObj.atk:200;
    switch(card.el){
      case 'fire':{const dmg=Math.round(atk*3), vs=this.enemies.filter(e=>!e.dead);   // е…Ёй«”зҲҶиЈӮ
        vs.forEach(v=>{v.hp=Math.max(0,v.hp-dmg);this.floatText(v.sprite.x,v.sprite.y-24,'-'+dmg,'#ff8f8f');});
        this.cameras.main.shake(320,0.014);this.burstFX(vs.length);this.updateEnemies();
        vs.forEach(v=>{if(v.hp<=0)this.killEnemy(v);});break;}
      case 'water':{const h=Math.round(this.maxHP*0.3);this.playerHP=Math.min(this.maxHP,this.playerHP+h);   // еӣһиЎҖ+жҙ—жүҳзӣӨ
        this.floatText(CX,PHP_Y-14,'зҷ’+'+h,'#74e09a');this.refill();this.renderTray();break;}
      case 'thunder':this.enemies.forEach(e=>{if(!e.dead){e.timer+=3;if(e.sprite)this.floatText(e.sprite.x,e.sprite.y-24,'е°Ғ+3','#f4da52');}});break;   // еҮҚзөҗ
      case 'earth':this.board=Array.from({length:N},()=>Array(N).fill(null));this.refreshBoard();this.tonFloat('ж•ҙең°е®ҢжҲҗ','#d49a4a');break;   // жё…зӣӨ
      case 'wind':{const m0=this.morale;this.morale=5;if(this.morale!==m0)this.moraleFX(5,true);break;}   // й¬Ҙеҝ—иЎқжҘө
    }
    this.updateAll();this.renderCharges();}
  renderTray(){
    if(this.trayTweens)this.trayTweens.forEach(t=>t.remove()); this.trayTweens=[];   // е…Ҳж”¶жҺүиҲҠи„ҲеӢ• tween еҶҚйҠ·жҜҖ(йҒҝе…ҚжҮёз©ә)
    this.trayIcons.forEach(g=>g.destroy()); this.trayIcons=[];
    // зү№ж®Ҡе·Ҙе…·еЎҠ:дә®иүІи„ҲеӢ•е…үжҡҲйӮҠжЎҶ + еҠҹиғҪжјўеӯ—(еЎ«/ж¶Ҳ/жҗ¬)вҶ’ дёҖзңјзңӢеҮәжҳҜзү№ж®ҠеЎҠ
    const SP={water:{c:0x62b8f0,glow:0x8fd6ff,label:'еЎ«'},wind:{c:0x6ad06a,glow:0xb6ffae,label:'ж¶Ҳ'},earth:{c:0xd49a4a,glow:0xffc24a,label:'жҗ¬'}};
    this.tray.forEach((p,i)=>{if(p.used)return;
      let maxr=0,maxc=0;p.c.forEach(([r,c])=>{maxr=Math.max(maxr,r);maxc=Math.max(maxc,c);});
      const s=(maxr>=4||maxc>=4)?11:24, pw=(maxc+1)*s, ph=(maxr+1)*s;   // еӨ§еЎҠ(еҰӮ9Г—9)зё®е°ҸйЎҜзӨә
      const sp=SP[p.kind], cont=this.add.container(this.traySlots[i],TRAY_Y,[]);
      if(sp){const glow=this.add.rectangle(0,0,pw+13,ph+13,0,0).setStrokeStyle(3,sp.glow,1); cont.add(glow);   // и„ҲеӢ•е…үжҡҲ
        this.trayTweens.push(this.tweens.add({targets:glow,alpha:{from:0.3,to:1},scaleX:{from:0.9,to:1.06},scaleY:{from:0.9,to:1.06},duration:600,yoyo:true,repeat:-1,ease:'Sine.inOut'}));}
      p.c.forEach(([dr,dc])=>cont.add(this.add.rectangle(dc*s-pw/2, dr*s-ph/2, s-3, s-3, sp?sp.c:NEUTRAL_FILL).setOrigin(0).setStrokeStyle(sp?1:0, 0xffffff, sp?0.5:0)));
      if(sp)cont.add(this.add.text(0,0,sp.label,{fontFamily:EMOJIFONT,fontSize:(s>=24?'17px':'10px'),color:'#ffffff',fontStyle:'bold'}).setOrigin(0.5).setStroke('#1a1208',4));   // еҠҹиғҪжјўеӯ—
      this.trayIcons.push(cont);});
  }

  /* жӢ–жӣіж”ҫеЎҠ */
  startDrag(i,p){if(this.resultOpen||this.earthSel||this.earthDrag)return;
    const cells=this.tray[i].c, kind=this.tray[i].kind;
    const kc=kind==='water'?0x62b8f0:kind==='wind'?0x6ad06a:kind==='earth'?0xd49a4a:0xffffff;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,kc).setOrigin(0));
    this.drag={i,cells,kind,prev:this.add.container(0,0,kids).setAlpha(0.85),kids};this.updateDrag(p);}
  // еҫһеҚЎжӢ–гҖҢеӯҳж”ҫзҡ„еұ¬еЎҠгҖҚ(иҗ¬з”ЁеЎҠеЎ«з©әж ј;дёҚдҪ”жүҳзӣӨж јвҶ’дёҚжҺЁйҖІж•ө,жҳҜйҖЈж“Ҡеј•ж“Һ)
  startStoredDrag(i,p){if(this.resultOpen||this.drag||this.earthSel||this.earthDrag)return;
    const s=this.stored[i]; if(!s)return;
    const cells=chakraShape(s.el,s.lv), col=EL[s.el].color;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,col).setOrigin(0));
    this.drag={store:i,cells,kind:'water',col,prev:this.add.container(0,0,kids).setAlpha(0.85),kids};this.updateDrag(p);}
  doPlaceStored(d,r,c){if(this.resultOpen)return;
    d.cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;
      if(rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc])this.board[rr][cc]={el:this.boxElement[boxOf(rr,cc)]||'neutral'};});
    this.stored[d.store]=null; this.renderStored();
    this.afterAction(true);}   // fromBlock=true:дёҚеҶҚз”ҹеЎҠ(йҳІйҒһиҝҙ)гҖҒдёҚдҪ”жүҳзӣӨвҶ’дёҚжҺЁйҖІж•ө
  updateDrag(p){if(!this.drag)return;this.clearGhost();
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT);
    if(!cell){this.drag.prev.setVisible(false);return;}
    this.drag.prev.setVisible(true).setPosition(BX0+cell.c*CS, BY0+cell.r*CS);
    const k=this.drag.kind, ok=canPlace(this.board,this.drag.cells,cell.r,cell.c,k);
    const kc=this.drag.col||(k==='water'?0x62b8f0:k==='wind'?0x6ad06a:k==='earth'?0xd49a4a:0x8fffa6);
    this.drag.kids.forEach(x=>x.setFillStyle(ok?kc:0xff8f8f));
    this.drag.cells.forEach(([dr,dc])=>{const rr=cell.r+dr,cc=cell.c+dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      let col;
      if(!ok)col=0xff8f8f;
      else if(k==='water')col=this.board[rr][cc]?0x6aa0ff:0x8fffa6;     // йҮҚз–Ҡи—Қ / еЎ«з¶ 
      else if(k==='wind') col=this.board[rr][cc]?0x6ad06a:0x444444;     // жңғж¶Ҳз¶  / з©әж јзҒ°
      else if(k==='earth')col=this.board[rr][cc]?0xd49a4a:0x444444;     // жҠ“еҸ–жЈ• / з©әж јзҒ°
      else col=0x8fffa6;
      this.cellRect(rr,cc).setStrokeStyle(3,col,1);});}
  endDrag(p){if(!this.drag)return;const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.drag;
    d.prev.destroy(); this.clearGhost(); this.drag=null;
    if(cell && canPlace(this.board,d.cells,cell.r,cell.c,d.kind)){
      if(d.store!=null) this.doPlaceStored(d,cell.r,cell.c);
      else if(d.kind==='earth') this.earthSelect(d.i,cell.r,cell.c);
      else this.doPlace(d.i,cell.r,cell.c);
    }}
  clearGhost(){this.cells.forEach(rc=>rc.setStrokeStyle(2,0x000000,0));}

  /* ж”ҫеЎҠ = дёҖеӣһеҗҲ(ж•өдәәжҺЁйҖІ);ж”ҫзҙ”жҹҘе…ӢжӢү = bonus(дёҚжҺЁйҖІеӣһеҗҲ) */
  doPlace(i,r,c){if(this.resultOpen)return;
    const cells=this.tray[i].c, kind=this.tray[i].kind;
    cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;
      if(kind==='wind'){if(this.board[rr][cc])this.board[rr][cc]=null;}        // йўЁеҲғ:ж¶ҲйҷӨ
      else if(!this.board[rr][cc])this.board[rr][cc]={el:this.boxElement[boxOf(rr,cc)]||'neutral'};}); // дёҖиҲ¬/ж°ҙ:еЎ«(еҸӘеЎ«з©әж ј)
    this.tray[i].used=true;
    this.afterAction(kind==='water'||kind==='wind');
  }
  // е…ұз”Ё:ж”ҫеЎҠеҫҢиҷ•зҗҶ(ж¶ҲйҷӨвҶ’зҮ’еӮ·вҶ’ж•өжҺЁйҖІвҶ’иЈңеЎҠвҶ’еҚЎжӯ»жӘўжҹҘ)
  afterAction(fromBlock){
    this.refreshBoard(); this.renderTray();
    this.fromBlock=!!fromBlock; this.resolve(); this.fromBlock=false;   // йҳІйҒһиҝҙ:еЎҠжё…еҮәзҡ„ж¶ҲйҷӨдёҚеҶҚз”ҹеЎҠ
    if(this.tray.every(t=>t.used)){this.endHand();this.refill();this.renderTray();}  // дёҖжүӢ(3еЎҠ)ж”ҫе®ҢвҶ’ж•өиҲҮзҮ’еӮ·жҺЁйҖІдёҖж¬Ў(еҝ«зҜҖеҘҸгҖҒйҖЈеҚ°ж»ҫеҫ—иө·дҫҶ)
    if(!this.anyPlaceable()){this.time.delayedCall(420,()=>this.handleStuck());}
    this.updateAll();
  }
  // дёҖжүӢзөҗжқҹ:зҮ’еӮ· tick + ж•өдәәжҺЁйҖІеҮәжүӢ(option3:д»ҘгҖҢжүӢгҖҚзӮәзҜҖеҘҸ,йқһжҜҸеЎҠ)
  endHand(){
    const m0=this.morale;   // й¬Ҙеҝ—(дёҠйҮҚдёӢиј•):жҡҙж“ҠжүӢ=зӣҙжҺҘиЎқеҲ°гҖҢжҘөгҖҚ(д№қе°ҫеҪўж…Ӣ);дёҖиҲ¬жё…йҷӨжүӢ=+1еҚҮеҲ°гҖҢи¶…гҖҚе°Ғй Ӯ;йҖЈMORALE_GRACEжүӢе®Ңе…Ёз©әжүӢжүҚвҲ’1йҡҺ
    if(!this.handCleared){ this.whiffStreak=(this.whiffStreak||0)+1; if(this.whiffStreak>=(CONFIG.MORALE_GRACE+((this.lead&&this.lead.type==='moraleGrace')?this.lead.v:0))){this.morale=Math.max(0,this.morale-1);this.whiffStreak=0;} }
    else { this.whiffStreak=0; if(this.handBurst)this.morale=5; else this.morale=Math.min(4,this.morale+1); }
    this.handCleared=false; this.handBurst=false;
    if(this.morale!==m0)this.moraleFX(this.morale,this.morale>m0);
    this.enemies.forEach(e=>{if(!e.dead&&e.burn>0){e.hp=Math.max(0,e.hp-e.burn);
      this.floatText(e.sprite.x,e.sprite.y-24,'рҹ”Ҙ'+e.burn,'#ff7a63'); if(e.hp<=0)this.killEnemy(e);}});
    this.enemies.forEach(e=>{if(e.dead)return; e.timer--; if(e.timer<=0){this.enemyAttack(e); e.timer=e.interval;}});
    this.charge=this.charge.map((c,i)=>{const a=activeSkill(this.teamCards[i].el);return a?Math.min(a.cd,(c||0)+1):c;});   // дё»еӢ•жҠҖи“„еҠӣ+1
    this.renderCharges();
  }
  // еҚЎжӯ»иҷ•зҗҶ:з©әзӣӨ+еҸӘеү©е·Ҙе…·еЎҠ(еңҹ/йўЁз„Ўеҫһж–ҪеҠӣ)вҶ’иҮӘеӢ•иЈңдёҖиҲ¬жҹҘе…ӢжӢүеЎҠ;еҗҰеүҮжүҚиҠұиЎҖйҮҚжҙ—
  handleStuck(){
    if(this.resultOpen||this.anyPlaceable())return;
    const empty=this.board.every(row=>row.every(c=>!c));
    const unused=this.tray.filter(t=>!t.used);
    const onlyTools=unused.length>0 && unused.every(t=>t.kind==='earth'||t.kind==='wind');
    if(empty&&onlyTools){const s=this.tray.findIndex(t=>!t.used);
      if(s>=0){this.tray[s]={c:pickShape(),used:false};this.renderTray();this.tonFloat('зӣӨйқўе·Із©ә,иҮӘеӢ•иЈңжҹҘе…ӢжӢүеЎҠ','#cfe3ff');return;}}
    this.showReshuffleModal();
  }
  /* еңҹеұ¬еЎҠ:е…©ж®өејҸжҗ¬з§»жҹҘе…ӢжӢү вҖ” в‘ жӢ–еЎҠи“ӢдҪҸиҰҒжҠ“зҡ„жҹҘе…ӢжӢү в‘ЎеҶҚжӢ–жҠҠе®ғеҖ‘ж•ҙзө„жҗ¬еҲ°з©әдҪҚ */
  earthSelect(i,r,c){
    const cells=this.tray[i].c, sel=[];
    cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      if(this.board[rr][cc])sel.push({r:rr,c:cc,el:this.board[rr][cc].el});});
    if(!sel.length)return;
    this.earthSel={i,cells:sel};
    this.clearGhost(); sel.forEach(s=>this.cellRect(s.r,s.c).setStrokeStyle(3,0xd49a4a,1));
    this.tonFloat('жҠ“ '+sel.length+' ж ј вҖ” еҶҚжӢ–жӣіжҗ¬еҺ»з©әдҪҚ','#d49a4a');
  }
  startEarthMove(p){
    const sel=this.earthSel.cells;
    const minR=Math.min.apply(null,sel.map(s=>s.r)), minC=Math.min.apply(null,sel.map(s=>s.c));
    const rel=sel.map(s=>({dr:s.r-minR,dc:s.c-minC,el:s.el}));
    sel.forEach(s=>{this.board[s.r][s.c]=null;}); this.refreshBoard();
    const kids=rel.map(o=>this.add.rectangle(o.dc*CS,o.dr*CS,RECT,RECT,EL[o.el]?EL[o.el].color:NEUTRAL_FILL).setOrigin(0).setAlpha(0.9));
    this.earthDrag={i:this.earthSel.i, rel, orig:sel.slice(), prev:this.add.container(0,0,kids), kids};
    this.earthSel=null; this.updateEarthMove(p);
  }
  updateEarthMove(p){
    if(!this.earthDrag)return; this.clearGhost();
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.earthDrag;
    if(!cell){d.prev.setVisible(false);return;}
    d.prev.setVisible(true).setPosition(BX0+cell.c*CS,BY0+cell.r*CS);
    const ok=d.rel.every(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;return rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc];});
    d.kids.forEach((k,idx)=>k.setFillStyle(ok?(EL[d.rel[idx].el]?EL[d.rel[idx].el].color:NEUTRAL_FILL):0xff8f8f));
    d.rel.forEach(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      this.cellRect(rr,cc).setStrokeStyle(3,ok?0x8fffa6:0xff8f8f,1);});
  }
  endEarthMove(p){
    if(!this.earthDrag)return;
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.earthDrag;
    d.prev.destroy(); this.clearGhost(); this.earthDrag=null;
    const ok=cell && d.rel.every(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;return rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc];});
    if(ok){ d.rel.forEach(o=>{this.board[cell.r+o.dr][cell.c+o.dc]={el:o.el};});
      this.tray[d.i].used=true; this.afterAction(true);
    } else { d.orig.forEach(s=>{this.board[s.r][s.c]={el:s.el};}); this.refreshBoard(); this.updateAll(); }
  }
  anyPlaceable(){return this.tray.some(p=>{if(p.used)return false;
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(canPlace(this.board,p.c,r,c,p.kind))return true;return false;});}

  resolve(){
    const tgt=this.targetEnemy(); if(!tgt)return;
    const data=computeClears(this.board,this.boxElement,this.boxCard,tgt.el,this.amp);
    if(!data)return;
    this.combo+=data.groups; this.handCleared=true; if(data.groups>=2)this.handBurst=true;   // йҖЈж“ҠйӨөй¬Ҙеҝ—;жҡҙж“ҠжүӢ=зӣҙжҺҘиЎқеҲ°жҘө(д№қе°ҫеҪўж…Ӣ)
    const mmult=CONFIG.MORALE_MULT[this.morale];       // й¬Ҙеҝ—еҖҚзҺҮ(еҸ–д»ЈжңғзЎ¬жӯёйӣ¶зҡ„йҖЈеҚ°еҖҚзҺҮ)
    const burst=data.groups>=2 ? 1+(data.groups-1)*0.25 : 1;   // жҡҙж“Ҡ:дёҖжүӢеӨҡжё…йЎҚеӨ–еҠ жҲҗ(2жё…Г—1.25гҖҒ3жё…Г—1.5вҖҰ)
    let leadMult=1; if(this.lead){const L=this.lead;   // йҡҠй•·жҠҖ:еӮ·е®ійЎһеҠ жҲҗ
      if(L.type==='allAtk')leadMult=L.v;
      else if(L.type==='elemAtk'&&data.fx[L.el])leadMult=L.v;
      else if(L.type==='burstAtk'&&data.groups>=2)leadMult=L.v;}
    const dealt=Math.round(data.total*mmult*burst*leadMult);
    let topEl=null;Object.keys(data.fx).forEach(e=>{if(!topEl||data.fx[e].level>data.fx[topEl].level)topEl=e;});
    const topLv=topEl?data.fx[topEl].level:0;
    const aoe=(topLv>=4)||(this.morale>=5), victims=aoe?this.enemies.filter(e=>!e.dead):[tgt];   // LV4+еӨ§ж¶ҲйҷӨ жҲ– й¬Ҙеҝ—гҖҢжҘөгҖҚ=е…Ёй«”
    Object.keys(data.fx).forEach(e=>{const f=data.fx[e];f.attrs.forEach(a=>this.fireAttr(a,f.atk,f.level,tgt));});
    if(!this.fromBlock)Object.keys(data.fx).forEach(e=>this.storeBlock(e,data.fx[e].level));   // жё…е®®вҶ’з”ҹжҲҗи©Іеұ¬еҪўзӢҖеЎҠеӯҳеҲ°еҚЎ(иҗ¬з”ЁеЎҠжё…еҮәзҡ„ж¶ҲйҷӨдёҚеҶҚз”ҹеЎҠ)
    if(topEl)this.showJutsu(topEl,data.fx[topEl].level);
    data.cells.forEach(([r,c])=>{const rc=this.cellRect(r,c);
      this.tweens.add({targets:rc,scaleX:1.14,scaleY:1.14,duration:90,yoyo:true});});
    victims.forEach(v=>{v.hp=Math.max(0,v.hp-dealt);});
    if(data.hitWeak)tgt.timer+=1;
    if(this.combo>=2)this.comboPopup(this.combo);
    if(data.groups>=2)this.burstFX(data.groups);
    let pi=0;
    data.parts.forEach(pt=>{if(pt.d<=0)return;const o=this.cellCenter(pt.r,pt.c), isN=pt.el==='neutral';
      this.projectile(o.x,o.y,tgt.sprite.x,tgt.sprite.y,isN?'вңҰ':EL[pt.el].fx,isN?0xe8d8b0:EL[pt.el].color,pi*70,pt.d,tgt);
      if(!isN)this.glowTeam(pt.el); pi++;});
    if(aoe){this.cameras.main.shake(260,0.01);
      victims.forEach(v=>{if(v!==tgt&&v.sprite)this.floatText(v.sprite.x,v.sprite.y-24,dealt,'#e0a45c');});}
    data.cells.forEach(([r,c])=>{this.board[r][c]=null;});  // з«ӢеҚіеҫһжЁЎеһӢз§»йҷӨ,йҒҝе…Қ 460ms е…§йҮҚиӨҮи§ёзҷј
    this.updateEnemies();
    this.time.delayedCall(460,()=>{this.refreshBoard(); this.updateAll(); victims.forEach(v=>{if(v.hp<=0)this.killEnemy(v);});});
  }
  // еҪўзӢҖзі»зөұ:зҒ«/ж°ҙ/йўЁ/еңҹ/йӣ· зҡ„дё»жҠҖ=з”ҹжҲҗеҪўзӢҖеЎҠеӯҳеҲ°еҚЎ(еңЁ resolve зөұдёҖиҷ•зҗҶ storeBlock);fireAttr еҸӘеү©еӯҗеұ¬жҖ§ йҷ°/йҷҪ
  fireAttr(a,atk,lv,tgt){const A=CONFIG.ATTR;switch(a){
    case 'yang':{const v=Math.round(atk*A.yang_heal_rate*lv);this.playerHP=Math.min(this.maxHP,this.playerHP+v);this.tonFloat('вҳҜйҷҪВ·зҷ’+'+v,'#74e09a');break;}   // йҷҪ=еӣһиЎҖ(е·Із Қ)
    case 'yin':this.amp=Math.max(this.amp,2);this.tonFloat('вҳҜйҷ°В·еӮ·е®іГ—2','#b18cff');break;   // йҷ°=жң¬жүӢеӮ·е®іГ—2(еҝ«ж®ә)
  }}
  // еӯҳж”ҫеұ¬еЎҠеҲ°гҖҢи©Іеұ¬жҖ§зҡ„еҚЎгҖҚ:е„Әе…ҲеЎ«з©әеҚЎ,еҗҰеүҮеҚҮзҙҡжңҖдҪҺйҡҺйӮЈејө;жҜҸеҚЎжңҖеӨҡ1еЎҠгҖҒз•ҷжңҖй«ҳLV(дёҠйҷҗLV5)
  storeBlock(el,lv){if(!this.stored)this.stored=[null,null,null,null,null];
    lv=Math.max(1,Math.min(5,lv));
    const slots=[]; this.teamCards.forEach((c,i)=>{if(c.el===el)slots.push(i);});
    if(!slots.length)return;
    let target=slots.find(i=>!this.stored[i]);
    if(target==null){target=slots.reduce((a,b)=>this.stored[b].lv<this.stored[a].lv?b:a,slots[0]); if(this.stored[target].lv>=lv)return;}
    this.stored[target]={el,lv}; this.renderStored();
    this.tonFloat(EL[el].name+'еЎҠLv'+lv+'вҶ’еӯҳеҚЎ','#'+EL[el].color.toString(16).padStart(6,'0'));}

  enemyAttack(e){
    this.tweens.add({targets:e.sprite,y:e.sprite.y+30,duration:150,yoyo:true});
    this.cameras.main.shake(300,0.009);
    const f=this.add.rectangle(CX,H/2,W,H,EL[e.el].color,0.4);
    this.tweens.add({targets:f,alpha:0,duration:400,onComplete:()=>f.destroy()});
    let dmg=e.atk, dodged=false;
    if(this.immune>0){dodged=true;dmg=0;}
    else if(this.armor>0)dmg=Math.round(dmg*(1-this.armor));
    this.playerHP=Math.max(0,this.playerHP-dmg);
    this.floatText(CX,PHP_Y-14,dodged?'иҝҙйҒҝ!':'-'+dmg,dodged?'#74e09a':'#ff8f8f');
    this.resetWave(); e.burn=0;
    this.updateAll(); if(this.playerHP<=0)this.gameOver('HP жӯёйӣ¶');
  }
  killEnemy(e){if(e.dead)return; e.dead=true; e.bob.stop();
    [e.sprite,e.timerTxt,e.hpBg,e.hpFill,e.sel].forEach(o=>o.setVisible(false));
    if(this.aliveCount()===0)this.stageClear(); else {this.targetEnemy();this.updateEnemies();}
  }
  stageClear(){
    rollDrops(this.dungeon.drops[this.stage-1]).forEach((cd,i)=>{const isNew=!isOwned(cd.id);addCard(cd.id);this.runDrops.push({cd,isNew});
      this.time.delayedCall(i*240,()=>this.tonFloat('рҹҺҒ '+cd.name+(isNew?' вңҰNEW':''),isNew?'#ffe04a':'#ffe08a'));});
    recordStage(this.stage, false);   // иЁҳжңҖдҪій—ң
    if(this.dungeon.el && Math.random()<0.6){addGem(this.dungeon.el);this.runGems++;   // е…ғзҙ й—ңжҺүйҖІеҢ–зҙ жқҗгҖҢеҜ¶зҺүгҖҚ
      this.time.delayedCall(120,()=>this.tonFloat('рҹ”® '+EL[this.dungeon.el].name+'еҜ¶зҺү','#c5b0ff'));}
    const _rw=addRewards(40,300); this.runExp+=40; this.runCoins+=300;   // жҲ°й¬ҘзҚҺеӢө:EXP/йҮ‘йҢў
    if(_rw._ups>0)this.tonFloat('рҹҶҷ зӯүзҙҡжҸҗеҚҮ! Lv.'+_rw.rank,'#ffe04a');
    if(this.stage>=this.dungeon.stages.length){markDungeonCleared(this.dungeonId);this.chests++;this.time.delayedCall(600,()=>this.showResult(true));return;}
    this.stage++; this.chests++; this.playerHP=Math.min(this.maxHP,this.playerHP+150);
    this.time.delayedCall(700,()=>this.startStage(true));   // её¶ true:дёҚжё…зӣӨ,зӣӨйқўзҙҜз©ҚеҲ°дёӢдёҖй—ңзҡ„жҖӘ
  }
  reshuffle(){if(this.playerHP<=CONFIG.RESHUFFLE_COST){this.gameOver('з”ҹе‘ҪдёҚи¶ігҖҒз„Ўжі•еҶҚжҸҗз…ү');return;}
    this.playerHP-=CONFIG.RESHUFFLE_COST; this.refill(); this.renderTray(); this.updateAll();}
  gameOver(reason){if(this.resultOpen)return;this.showResult(false);}
  restartStage(){this.playerHP=this.maxHP;this.startStage();}

  /* UI */
  updateAll(){this.updateEnemies();this.updateBars();}
  updateEnemies(){this.enemies.forEach((e,i)=>{if(e.dead)return;
    e.hpFill.displayWidth=e.hpW*Math.max(0,e.hp/e.max);
    e.timerTxt.setText('вҸі'+e.timer+'жүӢ');
    e.sel.setStrokeStyle(2,0xffd56a,(i===this.target)?1:0);});}
  updateBars(){
    this.pHp.displayWidth=(W-2*BX0)*Math.max(0,this.playerHP/this.maxHP);
    this.pHpTxt.setText('жҲ‘ж–№ '+this.playerHP+'/'+this.maxHP);
    this.chestTxt.setText('рҹ“Ұ '+(this.chests||0)); this.goldTxt.setText('рҹ’° '+(this.gold||0));
    const s=['й¬Ҙеҝ—В·'+CONFIG.MORALE_NAMES[this.morale]+'(Г—'+CONFIG.MORALE_MULT[this.morale]+')'];
    if(this.combo>0)s.push('йҖЈеҚ°'+this.combo);
    if(this.armor>0)s.push('рҹӣЎ'+Math.round(this.armor*100)+'%');
    if(this.immune>0)s.push('вңҰйҒҝ'+this.immune);if(this.amp>1)s.push('вҡЎГ—'+this.amp.toFixed(1));
    this.infoTxt.setText(s.join('   '));
    this.infoTxt.setColor(['#99aabb','#9ac4e0','#ffffff','#ffd24a','#ff9a3a','#ff5a3a'][this.morale]||'#ffd56a');
  }

  /* зү№ж•Ҳ */
  projectile(ox,oy,tx,ty,glyph,color,delay,dmg,tgt){
    this.time.delayedCall(delay,()=>{
      const t=this.add.text(ox,oy,glyph,{fontFamily:EMOJIFONT,fontSize:'24px'}).setOrigin(0.5);
      this.tweens.add({targets:t,x:tx,y:ty,scale:1.5,duration:360,ease:'Quad.in',
        onComplete:()=>{t.destroy();this.impact(tx,ty,color,dmg,tgt);}});});
  }
  impact(x,y,color,dmg,tgt){
    if(tgt&&!tgt.dead){tgt.sprite.setTint(0xffffff);
      this.tweens.add({targets:tgt.sprite,scaleX:1.16,scaleY:1.16,duration:100,yoyo:true,onComplete:()=>tgt.sprite.clearTint()});}
    const b=this.add.circle(x,y,8,color,0.8);
    this.tweens.add({targets:b,scale:5,alpha:0,duration:420,onComplete:()=>b.destroy()});
    this.cameras.main.shake(150,0.005);
    if(dmg)this.floatText(x,y-24,dmg,'#ffd56a');
  }
  floatText(x,y,str,color){const t=this.add.text(x,y,str,{fontFamily:EMOJIFONT,fontSize:'19px',color,fontStyle:'bold'}).setOrigin(0.5);
    this.tweens.add({targets:t,y:y-40,alpha:0,duration:900,ease:'Quad.out',onComplete:()=>t.destroy()});}
  tonFloat(str,color){const t=this.add.text(CX,BY0-54,str,{fontFamily:EMOJIFONT,fontSize:'17px',color,fontStyle:'bold'}).setOrigin(0.5);
    this.tweens.add({targets:t,y:BY0-82,alpha:0,duration:1000,ease:'Quad.out',onComplete:()=>t.destroy()});}
  comboPopup(n){const t=this.add.text(CX,BY0+46,'йҖЈеҚ° '+n,{fontFamily:EMOJIFONT,fontSize:'24px',color:'#ffd56a',fontStyle:'bold'}).setOrigin(0.5).setScale(0.5);
    this.tweens.add({targets:t,scale:1.05,duration:220,yoyo:true,hold:120,
      onComplete:()=>this.tweens.add({targets:t,alpha:0,duration:300,onComplete:()=>t.destroy()})});}
  // жҡҙж“Ҡжј”еҮә:дёҖжүӢеӨҡжё…(groupsвүҘ2)зҡ„йҡҶйҮҚж…¶зҘқ вҖ” е…Ёиһўе№•й–ғе…ү + йңҮеӢ• + еӨ§еӯ—
  burstFX(g){
    this.cameras.main.shake(200+g*50,0.011+g*0.002);
    const flash=this.add.rectangle(CX,H/2,W,H,0xfff0c0,0).setDepth(60);
    this.tweens.add({targets:flash,alpha:0.45,duration:70,yoyo:true,onComplete:()=>flash.destroy()});
    const label=g>=4?'и¶…В·жҡҙж“Ҡ':g===3?'еӨ§жҡҙж“Ҡ':'жҡҙж“Ҡ';
    const t=this.add.text(CX,BATTLE_CY+30,label+' Г—'+g+'!',{fontFamily:EMOJIFONT,fontSize:(38+g*4)+'px',color:'#ffd24a',fontStyle:'bold',stroke:'#7a3000',strokeThickness:6}).setOrigin(0.5).setDepth(61).setScale(0.3).setAngle(-6);
    this.tweens.add({targets:t,scale:1.1,duration:200,ease:'Back.out'});
    this.tweens.add({targets:t,alpha:0,delay:560,duration:260,onComplete:()=>t.destroy()});
  }
  // й¬Ҙеҝ—йҡҺи®Ҡжј”еҮә;еҚҮеҲ°гҖҢжҘөгҖҚ=е…Ёй«”и§Јж”ҫи¶…жЁЎејҸ
  moraleFX(tier,up){
    const names=CONFIG.MORALE_NAMES, cols=['#99aabb','#9ac4e0','#ffffff','#ffd24a','#ff9a3a','#ff5a3a'];
    const t=this.add.text(CX,BATTLE_CY+72,'й¬Ҙеҝ—'+(up?'вҶ‘ ':'вҶ“ ')+names[tier],{fontFamily:EMOJIFONT,fontSize:'21px',color:cols[tier],fontStyle:'bold',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setDepth(55).setScale(0.6);
    this.tweens.add({targets:t,scale:1,y:t.y-18,duration:240,ease:'Back.out'});
    this.tweens.add({targets:t,alpha:0,delay:480,duration:300,onComplete:()=>t.destroy()});
    if(tier>=5){ // жҘө:и¶…жЁЎејҸзҲҶзҷј(е…Ёж¶ҲйҷӨиҪүе…Ёй«”)
      this.cameras.main.shake(300,0.013);
      const fl=this.add.rectangle(CX,H/2,W,H,0xff5a3a,0).setDepth(54);
      this.tweens.add({targets:fl,alpha:0.4,duration:120,yoyo:true,onComplete:()=>fl.destroy()});
      const big=this.add.text(CX,BATTLE_CY+28,'жҘөгғ»е…Ёй«”и§Јж”ҫ!',{fontFamily:EMOJIFONT,fontSize:'32px',color:'#ffe04a',fontStyle:'bold',stroke:'#7a1500',strokeThickness:6}).setOrigin(0.5).setDepth(56).setScale(0.4).setAngle(-5);
      this.tweens.add({targets:big,scale:1.1,duration:240,ease:'Back.out'});
      this.tweens.add({targets:big,alpha:0,delay:760,duration:320,onComplete:()=>big.destroy()});
    }
  }
  showJutsu(el,lv){const name=KATA[lv-1]+'гғ»'+JUTSU[el][lv-1];const col='#'+EL[el].color.toString(16).padStart(6,'0');
    const t=this.add.text(CX-50,BY0-28,name,{fontFamily:EMOJIFONT,fontSize:(15+lv*4)+'px',color:col,fontStyle:'bold',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setAlpha(0);

  body(){const f={dungeon:this.bDungeon,monster:this.bMonster,shop:this.bShop,gacha:this.bGacha,friend:()=>this.bTodo('рҹ‘Ҙ жңӢеҸӢ'),other:this.bOther}[this.tab];if(f)f.call(this);}
  mapNode(x,y,r,emoji,label,sub,cb,locked){
    const c=this.L(this.add.circle(x,y,r,locked?0x2a2a3a:0x2e4a2e).setStrokeStyle(3,locked?0x55556a:0xffd56a));

  bDungeon(){   // дё–з•Ңең°ең–ејҸдё»з•«йқў(зҘһйӯ”д№ӢеЎ”йўЁ);з·ҡжҖ§и§ЈйҺ–

    const tx=CX, ty=top+150;
    // дёӯеӨ®еЎ”(дә”е…ғзҙ е…Ёжё…жүҚй–Ӣ)
    const tOpen=isDungeonUnlocked('tower'), tCl=isDungeonCleared('tower');
    this.mapNode(tx,ty,30,'рҹ—ј',tCl?'зөҗеҚ°д№ӢеЎ” вң“':'зөҗеҚ°д№ӢеЎ”',tOpen?('жңҖзөӮ вҡЎ'+DUNGEONS.tower.cost):'жңҖзөӮ(жңӘй–Ӣж”ҫ)',
      ()=>{if(tOpen)this.enterDungeon('tower');else this.toast('йңҖе…Ҳжё…дә”е…ғзҙ й—ң');},!tOpen);

        ()=>{if(open)this.enterDungeon(id);else this.toast('йңҖе…ҲйҖҡй—ңеәҸз« ');},!open);});
    // еәҸз« (ж°ёйҒ еҸҜйҖІ;жңӘйҖҡй—ңжҷӮи„ҲеӢ•)
    const sx=CX, sy=bot-94, pc=isDungeonCleared('prologue');
    if(!pc){const ring=this.L(this.add.circle(sx,sy,32,0x000000,0).setStrokeStyle(3,0xffe04a));
      this.tweens.add({targets:ring,scale:{from:1,to:1.3},alpha:{from:0.9,to:0},duration:1000,repeat:-1});}
    this.mapNode(sx,sy,30,'рҹҸҜ',pc?'еәҸз«  вң“':'еәҸз«  В· зөҗеҚ°д№Ӣз« ','вҡЎ'+DUNGEONS.prologue.cost+(pc?'':' В· й»һжӯӨеҮәж“Ҡ'),()=>this.enterDungeon('prologue'),false);
    this.btn(64,bot-24,108,38,'рҹӣЎпёҸ з·ЁйҡҠ',()=>this.go('team'),{col:0x2e2a3a,stroke:0x5a6a8a,color:'#cfe0ff',fs:'13px'});
  }
  enterDungeon(id){id=id||'prologue';const d=DUNGEONS[id]||DUNGEONS.prologue;

    const tm=leveledTeam(loadTeam().filter(x=>isOwned(x)));   // её¶еҚҮзҙҡеҫҢ atk
    if(tm.length!==5){this.toast('йҡҠдјҚдёҚйҪҠ,е…ҲеҺ»з·ЁйҡҠ');this.go('team');return;}

    if(!spendStamina(cost)){this.toast('й«”еҠӣдёҚи¶і!еҺ»е•Ҷеә—еӣһеҫ©');this.rebuild();return;}
    this.scene.manager.start('game',{team:tm,dungeonId:id});this.scene.manager.stop('home');}
  bMonster(){

    this.btn(CX,330,360,48,'вңЁ йҖІеҢ–еҗҲжҲҗ(еҚЎзүҮи©ізҙ°й Ғ)',()=>this.go('collection'),{col:0x2e2a3a,stroke:0x5a6a8a,color:'#cfe0ff',fs:'13px'});
    this.btn(CX,386,360,48,'рҹ’° еҚЎзүҮе”®еҮә вҖ” еҫ…еҒҡ',()=>this.toast('еҚЎзүҮе”®еҮә вҖ” еҫ…еҒҡ'),{col:0x241a10,stroke:0x3a2e1c,color:'#7a6a4a',fs:'13px'});

  bShop(){const m=getMeta();

    this.btn(CX,228,360,48,'рҹ’Һ йӯ”жі•зҹіе•Ҷеә— вҖ” еҫ…еҒҡ',()=>this.toast('йӯ”жі•зҹіе•Ҷеә— вҖ” еҫ…еҒҡ'),{col:0x241a10,stroke:0x3a2e1c,color:'#7a6a4a',fs:'13px'});
    this.btn(CX,286,360,48,'рҹ“Ұ BOX ж“ҙејө вҖ” еҫ…еҒҡ',()=>this.toast('BOX ж“ҙејө вҖ” еҫ…еҒҡ'),{col:0x241a10,stroke:0x3a2e1c,color:'#7a6a4a',fs:'13px'});
    this.btn(CX,344,360,48,'рҹ‘Ҙ еҘҪеҸӢдёҠйҷҗ вҖ” еҫ…еҒҡ',()=>this.toast('еҘҪеҸӢдёҠйҷҗ вҖ” еҫ…еҒҡ'),{col:0x241a10,stroke:0x3a2e1c,color:'#7a6a4a',fs:'13px'});
  }
  bTodo(t){this.txt(CX,Math.round(H*0.42),t+' вҖ” еҫ…еҒҡ','20px','#9a8a6a',0.5);}
  bGacha(){

    this.gachaBanner(168,'premium','вңЁ еҪұеҝҚ SSR йҷҗе®ҡ В· ж©ҹзҺҮ 3%',0x2e2440,0xb18cff);
    this.gachaBanner(326,'normal','йҮ‘йҢўиҪүиӣӢ(з„ЎеҪұеҝҚ)',0x2e3320,0x6aaa4c);
    this.txt(CX,H-78,'вҖ» ж©ҹзҺҮе·Іе…¬зӨә;еҪұеҝҚеғ…гҖҢзөҗеҚ°иҪүиӣӢгҖҚеҸҜеҫ—','9px','#9a8a6a',0.5);
    if(this.gachaResult)this.drawGachaResult();
  }
  gachaBanner(y,bankey,tagline,col,stroke){const b=GACHA[bankey];
    this.rect(CX,y,372,138,col).setStrokeStyle(2,stroke);
    this.txt(CX,y-50,b.icon+' '+b.name,'16px','#f3e9d8',0.5,true);

    this.txt(CX,y-10,b.rates.map(r=>RANKNAME[r[0]]+' '+Math.round(r[1]*100)+'%').join(' / '),'9px','#bfb0d0',0.5);

    this.btn(CX-94,y+38,166,42,'е–®жҠҪ '+unit+b.cost1,()=>this.pull(bankey,1),{col:0x3a2c1d,stroke:stroke,color:'#ffe08a',bold:true,fs:'14px'});

  pull(bankey,count){const out=doGacha(bankey,count);
    if(!out){this.toast((GACHA[bankey].cur==='stones'?'йӯ”жі•зҹі':'йҮ‘йҢў')+'дёҚи¶і');this.rebuild();return;}

  drawGachaResult(){const res=this.gachaResult, n=res.length, cols=n>1?5:1, gx=72, gy=86;

    res.forEach((it,i)=>{const cx=x0+(i%cols)*gx, cy=y0+Math.floor(i/cols)*gy, cd=it.cd, hi=cd.rank==='kage'||cd.rank==='jonin';

  bOther(){const pr=getProgress();

    this.btn(CX,224,360,48,'рҹ“– еҚЎзүҮең–й‘‘',()=>this.go('collection'),{col:0x2e2a3a,stroke:0x5a6a8a,color:'#cfe0ff'});
    this.btn(CX,290,360,48,'рҹ”„ йҮҚзҪ®еӯҳжӘ”(жё¬и©Ұз”Ё)',()=>{localStorage.removeItem('ninja_save');localStorage.removeItem('ninja_owned');this.toast('е·ІйҮҚзҪ®');this.switchTab('dungeon');},{col:0x3a201a,stroke:0x8a4a3a,color:'#ffb0a0'});
  }

/* ===== еј·еҢ–еҗҲжҲҗ(йӨҠжҲҗ) ===== */
class FuseScene extends Phaser.Scene{
  constructor(){super('fuse');}
  init(d){this.target=(d&&d.target)||this.target||loadTeam()[0];this.mode='feed';}
  create(){this.add.rectangle(CX,H/2,W,H,0x160f18);this.rebuild();
    this.scale.on('resize',()=>{const o=H;recomputeLayout();if(Math.abs(H-o)>3){this.scale.setGameSize(W,H);this.rebuild();}});}
  rebuild(){if(this.layer)this.layer.destroy();this.layer=this.add.container(0,0);this.draw();}
  L(o){this.layer.add(o);return o;}
  txt(x,y,s,size,col,ox,bold){return this.L(this.add.text(x,y,s,{fontFamily:EMOJIFONT,fontSize:(size||'13px'),color:col||'#f3e9d8',fontStyle:bold?'bold':'normal'}).setOrigin(ox==null?0.5:ox,0.5));}
  rect(x,y,w,h,col,a){return this.L(this.add.rectangle(x,y,w,h,col,a==null?1:a));}
  btn(x,y,w,h,label,cb,o){o=o||{};const r=this.L(this.add.rectangle(x,y,w,h,o.col==null?0x2b2014:o.col).setStrokeStyle(2,o.stroke==null?0x5a4128:o.stroke).setInteractive());
    if(label)this.txt(x,y,label,o.fs||'14px',o.color||'#f3e9d8',0.5,o.bold);r.on('pointerup',cb);return r;}
  toast(msg){const t=this.add.text(CX,Math.round(H*0.4),msg,{fontFamily:EMOJIFONT,fontSize:'15px',color:'#ffd56a',fontStyle:'bold',backgroundColor:'#000000cc',padding:{x:12,y:8}}).setOrigin(0.5).setDepth(2000);
    this.tweens.add({targets:t,alpha:0,delay:900,duration:400,onComplete:()=>t.destroy()});}
  back(){this.btn(CX,H-42,200,44,'рҹҸ  иҝ”еӣһеӨ§е»і',()=>{this.scene.manager.start('home');this.scene.manager.stop('fuse');},{stroke:0x5a8a3c,color:'#cfe8b0'});}
  draw(){
    this.txt(CX,36,'в¬ҶпёҸ еј·еҢ–еҗҲжҲҗ','20px','#f3e9d8',0.5,true);
    this.txt(CX,62,'рҹ’° '+getMeta().coins+' В· еҗғйҮҚиӨҮеҚЎеҚҮзҙҡ(еҗҢеұ¬ Г—1.5)В· жҜҸејө '+FEED_COST+'йҮ‘','10px','#ffe08a',0.5);
    if(this.mode==='pick')return this.drawPick();
    const t=ROSTER.find(c=>c.id===this.target);
    if(!t){this.btn(CX,200,200,44,'йҒёж“Үеј·еҢ–е°ҚиұЎ',()=>{this.mode='pick';this.rebuild();},{stroke:0x5a6a8a,color:'#cfe0ff'});this.back();return;}
    const lv=getCardLv(this.target),atk=cardAtk(this.target),exp=getCardExp(this.target),need=expToNext(lv),mx=lv>=MAXLV;
    this.rect(CX,124,360,86,EL[t.el].color).setStrokeStyle(2,0xffd56a);
    this.txt(44,104,t.name+'  Lv.'+lv+(mx?' MAX':''),'15px','#1a1208',0,true);
    this.txt(44,128,EL[t.el].name+'В·'+RANKNAME[t.rank]+'  вҡ”пёҸatk '+atk+'(еҹә'+t.atk+')','11px','#3a2c12',0);
    this.rect(44,150,300,10,0x000000,0.4).setOrigin(0,0.5);
    this.rect(44,150,300*(mx?1:Math.min(1,exp/need)),10,0x6ac0ff).setOrigin(0,0.5);
    this.txt(344,150,mx?'MAX':(exp+'/'+need),'9px','#10303f',1,true);
    this.btn(CX,192,150,32,'рҹ”„ жҸӣеј·еҢ–е°ҚиұЎ',()=>{this.mode='pick';this.rebuild();},{col:0x2e2a3a,stroke:0x5a6a8a,color:'#cfe0ff',fs:'12px'});
    this.txt(CX,232,'й»һйҮҚиӨҮеҚЎз•¶зҙ жқҗйӨөе…Ҙ вҶ“','11px','#9a8a6a',0.5);
    const owned=loadOwned(), feed=ROSTER.filter(c=>(owned[c.id]||0)>=2);
    if(!feed.length){this.txt(CX,300,'зӣ®еүҚжІ’жңүеӨҡйӨҳзҡ„еҚЎеҸҜз•¶зҙ жқҗ','12px','#9a8a6a',0.5);this.txt(CX,322,'(еҺ»е…ғзҙ й—ңеӨҡж”¶е№ҫејөеҗҢеҚЎ)','10px','#7a6a4a',0.5);}
    feed.forEach((c,i)=>{const x=78+(i%3)*132,y=272+Math.floor(i/3)*56,same=c.el===t.el;
      this.btn(x,y,124,48,'',()=>this.feed(c.id),{col:EL[c.el].color,stroke:same?0xffd56a:0x000000});
      this.txt(x,y-8,c.name+' Г—'+owned[c.id],'11px','#1a1208',0.5,true);
      this.txt(x,y+9,same?'еҗҢеұ¬ Г—1.5':'зҙ жқҗ','9px',same?'#7a3000':'#3a2c12',0.5);});
    this.back();
  }
  drawPick(){
    this.txt(CX,98,'йҒёж“Үеј·еҢ–е°ҚиұЎ','13px','#ffd56a',0.5,true);
    const owned=loadOwned(), list=ROSTER.filter(c=>owned[c.id]);
    list.forEach((c,i)=>{const x=78+(i%3)*132,y=144+Math.floor(i/3)*56;
      this.btn(x,y,124,48,'',()=>{this.target=c.id;this.mode='feed';this.rebuild();},{col:EL[c.el].color,stroke:c.id===this.target?0xffd56a:0x000000});
      this.txt(x,y-8,c.name,'11px','#1a1208',0.5,true);
      this.txt(x,y+9,'Lv.'+getCardLv(c.id)+' В·Г—'+owned[c.id],'10px','#3a2c12',0.5);});
    this.btn(CX,H-42,200,44,'иҝ”еӣһ',()=>{this.mode='feed';this.rebuild();},{stroke:0x5a6a8a,color:'#cfe0ff'});
  }
  feed(fid){const r=feedFodder(this.target,fid);if(!r.ok){this.toast(r.msg);return;}
    this.toast(r.ups>0?('рҹҶҷ еҚҮзҙҡ! Lv.'+r.lv+(r.same?'(еҗҢеұ¬)':'')):('+'+r.reward+' exp'+(r.same?'(еҗҢеұ¬Г—1.5)':'')));this.rebuild();}
}
