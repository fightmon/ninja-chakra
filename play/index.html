  if(kind==='wind') return cells.some(([dr,dc])=> board[r+dr][c+dc]);   // йўЁеҲғ:з•Ңе…§ + иҮіе°‘дёҖж јжңүж–№еЎҠ(еҸҜж¶Ҳ)
  if(kind==='earth')return cells.some(([dr,dc])=> board[r+dr][c+dc]);   // еңҹеЎҠ:з•Ңе…§ + иҮіе°‘дёҖж јжңүж–№еЎҠ(еҸҜжҠ“еҸ–жҗ¬з§»)
  return cells.every(([dr,dc])=>!board[r+dr][c+dc]);                    // дёҖиҲ¬еЎҠ:е…Ёз©ә
}
function computeClears(board, boxElement, boxCard, enemyEl, ampMult){
  let rows=[],cols=[],boxes=[];
  for(let r=0;r<N;r++)if(board[r].every(x=>x))rows.push(r);
  for(let c=0;c<N;c++){let f=true;for(let r=0;r<N;r++)if(!board[r][c])f=false;if(f)cols.push(c);}
  for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3;let f=true;
    for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)if(!board[r][c])f=false;if(f)boxes.push(b);}
  const groups=rows.length+cols.length+boxes.length;
  if(groups===0)return null;
  const cellSet=new Set();
  rows.forEach(r=>{for(let c=0;c<N;c++)cellSet.add(r+'_'+c);});
  cols.forEach(c=>{for(let r=0;r<N;r++)cellSet.add(r+'_'+c);});
  boxes.forEach(b=>{const br=Math.floor(b/3)*3,bc=(b%3)*3;for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)cellSet.add(r+'_'+c);});
  const mult=(el)=> el==='neutral'?1 : (EL[el].beats===enemyEl?CONFIG.ADV_MULT : (EL[enemyEl].beats===el?CONFIG.WEAK_MULT:CONFIG.NORM_MULT));
  // йҖҗж јеұ¬жҖ§еӮ·е®і:дёҚи«–е®®жё…/з·ҡжё…,гҖҢжҜҸеҖӢиў«жё…зҡ„еұ¬еҚҖж јгҖҚйғҪз®—и©Іеұ¬ж”»ж“Ҡ(card.atk Г— зӣёеүӢ Г— CELL_RATE);дёӯжҖ§ж јжҜҸж јеӣәе®ҡеә•гҖӮcellSet е·ІеҺ»йҮҚвҶ’дёҚжңғйҮҚиӨҮиЁҲ
  const elemCells={};
  cellSet.forEach(k=>{const p=k.split('_');const e=boxElement[boxOf(+p[0],+p[1])];if(e)elemCells[e]=(elemCells[e]||0)+1;});   // еҗ„еұ¬еҚҖиў«жё…ж јж•ё
  let total=0,hitWeak=false,parts=[], elemUsed=0;
  ELEMENT_BOXES.forEach(b=>{const card=boxCard[b], e=boxElement[b]; if(!card||e==null)return; const n=elemCells[e]||0; if(!n)return;
    const d=Math.round(card.atk*mult(e)*ampMult*CONFIG.CELL_RATE*n); total+=d; elemUsed+=n;   // и©Іеұ¬жё…дәҶ n ж ј вҶ’ n Г— еҚЎж”»ж“Ҡ Г— зӣёеүӢ Г— дҝӮж•ё
    if(EL[e].beats===enemyEl)hitWeak=true;
    const br=Math.floor(b/3)*3,bc=(b%3)*3; parts.push({el:e,d,r:br+1,c:bc+1});});
  total+=Math.round((cellSet.size-elemUsed)*CONFIG.NEUTRAL_CELL);   // дёӯжҖ§ж ј(з„Ўеұ¬еҚҖ):жҜҸж јеӣәе®ҡеә•
  const fx={};
  ELEMENT_BOXES.forEach(b=>{const card=boxCard[b];if(!card)return;const br=Math.floor(b/3)*3,bc=(b%3)*3;
    let hit=false;for(let r=br;r<br+3&&!hit;r++)for(let c=bc;c<bc+3;c++)if(cellSet.has(r+'_'+c))hit=true;
    if(!hit)return;const e=card.el;const o=fx[e]||(fx[e]={atk:0,attrs:[]});
    o.atk=Math.max(o.atk,card.atk);card.attrs.forEach(a=>{if(o.attrs.indexOf(a)<0)o.attrs.push(a);});});
  Object.keys(fx).forEach(e=>{fx[e].level=Math.min(7,Math.floor((elemCells[e]||0)/3))||1;});
  return {groups,cells:[...cellSet].map(k=>k.split('_').map(Number)),parts,total,hitWeak,fx};
}

function feedFodder(targetId,fodderId){let res={ok:false,msg:''};
  mutSave(s=>{
    if(s.cards.filter(c=>c.id===fodderId).length<2){res.msg='йңҖиҰҒеӨҡйӨҳзҡ„зҙ жқҗеҚЎ(еҗҢдёҖејөиҮіе°‘2ејө)';return;}
    if((s.meta.coins||0)<FEED_COST){res.msg='йҮ‘йҢўдёҚи¶і(йңҖ'+FEED_COST+')';return;}

    const cl=s.cardLv[targetId]; if(cl.lv>=MAXLV){res.msg='е·ІйҒ”ж»ҝзҙҡ Lv.'+MAXLV;return;}
    const f=ROSTER.find(c=>c.id===fodderId), t=ROSTER.find(c=>c.id===targetId);

    const fi=s.cards.findIndex(c=>c.id===fodderId); if(fi>=0)s.cards.splice(fi,1);   // еҗғжҺүдёҖеҖӢзҙ жқҗеҖӢй«”(з©әеҮәдёҖж ј)
    s.meta.coins-=FEED_COST; cl.exp+=reward;
    let ups=0; while(cl.lv<MAXLV && cl.exp>=expToNext(cl.lv)){cl.exp-=expToNext(cl.lv);cl.lv++;ups++;}
    if(cl.lv>=MAXLV)cl.exp=0;
    res={ok:true,reward:reward,lv:cl.lv,ups:ups,same:f.el===t.el};
  });

const EVO_MAX=2, EVO_MULT=[1,1.6,2.4];
function evoReq(tier){return {gems:3+tier*3, coins:1000+tier*2000};}

/* з¶“жҝҹ:й«”еҠӣ(жҷӮй–“еӣһеҫ©)/ з¶“й©—В·зӯүзҙҡ / йҮ‘йҢў / йӯ”жі•зҹі */
const REGEN_MS=20000;   // й«”еҠӣжҜҸ 20 з§’ +1
function syncStamina(m){if(m.staTs==null){m.staTs=Date.now();return;}
  if(m.stamina>=m.staminaMax){m.staTs=Date.now();return;}
  const g=Math.floor((Date.now()-m.staTs)/REGEN_MS);
  if(g>0){m.stamina=Math.min(m.staminaMax,m.stamina+g); m.staTs=(m.stamina>=m.staminaMax)?Date.now():m.staTs+g*REGEN_MS;}}
function getMeta(){return mutSave(s=>syncStamina(s.meta)).meta;}
function spendStamina(n){let ok=false;mutSave(s=>{syncStamina(s.meta);if(s.meta.stamina>=n){s.meta.stamina-=n;s.meta.staTs=Date.now();ok=true;}});return ok;}
function staFullSec(){const m=getMeta();if(m.stamina>=m.staminaMax)return 0;return Math.ceil(((m.staminaMax-m.stamina)*REGEN_MS-(Date.now()-m.staTs))/1000);}
function expForLevel(rank){return 80+rank*40;}
function addRewards(exp,coins,stones){return mutSave(s=>{const m=s.meta;m.coins=(m.coins||0)+(coins||0);m.stones=(m.stones||0)+(stones||0);m.exp=(m.exp||0)+(exp||0);
  let need=expForLevel(m.rank),ups=0;while(m.exp>=need){m.exp-=need;m.rank++;m.staminaMax+=2;m.stamina=m.staminaMax;ups++;need=expForLevel(m.rank);}m._ups=ups;}).meta;}
function spendStones(n){let ok=false;mutSave(s=>{if((s.meta.stones||0)>=n){s.meta.stones-=n;ok=true;}});return ok;}

const RANK_POOL={genin:ROSTER.filter(c=>c.rank==='genin'),chunin:ROSTER.filter(c=>c.rank==='chunin'),jonin:ROSTER.filter(c=>c.rank==='jonin'),kage:ROSTER.filter(c=>c.rank==='kage')};
function pickDrop(spec){let pool=ROSTER;if(spec.el)pool=pool.filter(c=>c.el===spec.el);
  if(spec.rank)pool=pool.filter(c=>c.rank===spec.rank); else pool=pool.filter(c=>c.rank!=='kage');   // еҪұеҝҚеҸӘиғҪжҠҪеҚЎеҸ–еҫ—,дёҚеҫһеҲ·й—ңжҺүиҗҪ
  return pool.length?pool[rnd(pool.length)]:null;}
function rollDrops(table){const out=[];(table||[]).forEach(d=>{if(Math.random()<d.rate){const c=pickDrop(d);if(c)out.push(c);}});return out;}

/* ===== иҪүиӣӢ(з°Ўе–®зүҲ:йӣҷжұ  + ж©ҹзҺҮе…¬зӨә) ===== */
const GACHA={
  premium:{name:'зөҗеҚ°иҪүиӣӢ',cur:'stones',icon:'рҹ’Һ',cost1:5,   cost10:50,  rates:[['genin',0.50],['chunin',0.35],['jonin',0.12],['kage',0.03]]},
  normal: {name:'дёҖиҲ¬иҪүиӣӢ',cur:'coins', icon:'рҹ’°',cost1:1000,cost10:9000,rates:[['genin',0.70],['chunin',0.28],['jonin',0.02]]},
};
function rollRarity(rates){const r=Math.random();let acc=0;for(let k=0;k<rates.length;k++){acc+=rates[k][1];if(r<acc)return rates[k][0];}return rates[rates.length-1][0];}
function gachaPull(bankey){const pool=RANK_POOL[rollRarity(GACHA[bankey].rates)];return pool[rnd(pool.length)];}
function spendCoins(n){let ok=false;mutSave(s=>{if((s.meta.coins||0)>=n){s.meta.coins-=n;ok=true;}});return ok;}
const PITY_MAX=50;   // зөҗеҚ°иҪүиӣӢдҝқеә•:з¬¬ 50 жҠҪеҝ…еҫ—еҪұеҝҚ(kage)
function getPity(){return loadSave().meta.pity||0;}
function setPity(n){mutSave(s=>{s.meta.pity=n;});}
function doGacha(bankey,count){const b=GACHA[bankey],cost=count===10?b.cost10:b.cost1;
  const ok=b.cur==='stones'?spendStones(cost):spendCoins(cost); if(!ok)return null;
  const out=[];
  for(let i=0;i<count;i++){let c,pityHit=false;
    if(bankey==='premium'){let p=getPity();
      if(p>=PITY_MAX-1){c=RANK_POOL.kage[rnd(RANK_POOL.kage.length)];setPity(0);pityHit=true;}   // з¬¬50жҠҪдҝқеә•:еҝ…еҪұеҝҚ
      else{c=gachaPull(bankey);if(c.rank==='kage')setPity(0);else setPity(p+1);}                  // жҠҪеҲ°еҪұеҝҚжӯёйӣ¶гҖҒеҗҰеүҮ+1
    }else{c=gachaPull(bankey);}
    out.push({cd:c,isNew:!isOwned(c.id),pity:pityHit});addCard(c.id);
  }
  track('gacha');
  return out;}

      const slot={el:null,cardId:null,rect,txt,x:d.x,y:d.y};

    });
    this.cardUsed={}; this.cards=[];

    const ch=Math.max(24,Math.min(48,rowH-6));

    myCards.forEach((cd,i)=>{

      this.input.setDraggable(cont);
      cont.setData('card',cd); cont.setData('home',{x:cx,y:cy});
      this.cards.push(cont);
    });
    this.input.on('dragstart',(p,o)=>this.children.bringToTop(o));
    this.input.on('drag',(p,o,dx,dy)=>o.setPosition(dx,dy));
    this.input.on('dragend',(p,o)=>this.dropCard(p,o));
    // еә•йғЁйҢЁе®ҡ(ж°ёйҒ иІјз•«йқўжңҖдёӢз·Ј,дёҚиў«еҲҮжҺүгҖҒдёҚжө®еңЁдёӯй–“)
    this.startBtn=this.add.rectangle(CX,H-96,238,56,0x2b2014).setStrokeStyle(2,0x5a8a3c).setInteractive();

    this.startBtn.on('pointerup',()=>this.launch());
    this.hint=this.add.text(CX,H-62,'',{fontFamily:EMOJIFONT,fontSize:'12px',color:'#ffd56a'}).setOrigin(0.5);
    const navY=H-28;
    const rnd2=this.add.rectangle(76,navY,130,46,0x2b2014).setStrokeStyle(2,0x4a3824).setInteractive();
    this.add.text(76,navY,'рҹҺІ йҡЁж©ҹ',{fontFamily:EMOJIFONT,fontSize:'15px',color:'#f3e9d8'}).setOrigin(0.5);
    rnd2.on('pointerup',()=>this.randomFill());
    const colBtn=this.add.rectangle(210,navY,130,46,0x2b2014).setStrokeStyle(2,0x5a6a8a).setInteractive();
    this.add.text(210,navY,'рҹ“– еҚЎеҶҠ '+ownedCount()+'/'+ROSTER.length,{fontFamily:EMOJIFONT,fontSize:'14px',color:'#cfe0ff'}).setOrigin(0.5);
    colBtn.on('pointerup',()=>{this.scene.manager.start('collection');this.scene.manager.stop('team');});
    const homeBtn=this.add.rectangle(344,navY,130,46,0x2b2014).setStrokeStyle(2,0x8a6a5a).setInteractive();
    this.add.text(344,navY,'рҹҸ  еӨ§е»і',{fontFamily:EMOJIFONT,fontSize:'15px',color:'#ffd9b0'}).setOrigin(0.5);
    homeBtn.on('pointerup',()=>{const t=this.slots.map(s=>s.cardId).filter(Boolean);if(t.length===5)saveTeam(t);this.scene.manager.start('home');this.scene.manager.stop('team');});
    loadTeam().forEach((id,i)=>{const cd=ROSTER.find(c=>c.id===id);if(cd&&isOwned(id)&&this.slots[i]&&!this.cardUsed[id])this.assign(this.slots[i],cd);});  // F6:иҮӘеӢ•еӣһеЎ«дёҠж¬Ўз·ЁйҡҠ
    this.refreshStart();
    this.scale.on('resize',()=>{const o=H;recomputeLayout();if(Math.abs(H-o)>3){this.scale.setGameSize(W,H);this.scene.restart();}});   // е°әеҜёи®ҠвҶ’йҮҚе»ә(иҮӘйҒ©жҮү)
  }
  slotUnder(px,py){return this.slots.find(s=>Math.abs(px-s.x)<56&&Math.abs(py-s.y)<31);}
  assign(slot,cd){slot.el=cd.el;slot.cardId=cd.id;
    slot.rect.setFillStyle(EL[cd.el].color);slot.txt.setText(cd.name).setColor('#1a1208');
    this.cardUsed[cd.id]=true;const card=this.cards.find(c=>c.getData('card').id===cd.id);
    if(card){card.setAlpha(0.22);this.input.setDraggable(card,false);}}
  dropCard(p,o){const cd=o.getData('card'),home=o.getData('home'),slot=this.slotUnder(p.x,p.y);
    if(slot&&!slot.el&&!this.cardUsed[cd.id])this.assign(slot,cd);
    o.setPosition(home.x,home.y);this.refreshStart();}
  clearSlot(slot){if(!slot.el)return;const id=slot.cardId;this.cardUsed[id]=false;
    const card=this.cards.find(c=>c.getData('card').id===id);
    if(card){card.setAlpha(1);this.input.setDraggable(card,true);}
    slot.el=null;slot.cardId=null;slot.rect.setFillStyle(0x2b2014);slot.txt.setText('пјӢ').setColor('#6a5a40');
    this.refreshStart();}
  randomFill(){this.slots.forEach(s=>this.clearSlot(s));
    const avail=ROSTER.filter(c=>isOwned(c.id)&&!this.cardUsed[c.id]);
    this.slots.forEach(slot=>{if(avail.length)this.assign(slot,avail.splice(rnd(avail.length),1)[0]);});
    this.refreshStart();}
  refreshStart(){const n=this.slots.filter(s=>s.el).length,ok=n===5;
    this.startBtn.setFillStyle(ok?0x3a5a2c:0x2b2014);this.startTxt.setAlpha(ok?1:0.4);
    this.hint.setText(ok?'':'йӮ„йңҖж”ҫж»ҝ 5 е®®дҪҚ('+n+'/5)');}
  launch(){if(this.slots.filter(s=>s.el).length!==5)return;
    saveTeam(this.slots.map(s=>s.cardId));   // еӯҳйҡҠ вҶ’ еӣһеӨ§е»і(жҲ°й¬Ҙеҫһдё–з•Ңең°ең–йҖІе ҙ)
    this.scene.manager.start('home');this.scene.manager.stop('team');}
}

    for(let r=0;r<N;r++)for(let c=0;c<N;c++)

  onResize(){const o=H;recomputeLayout();if(Math.abs(H-o)>3){this.scale.setGameSize(W,H);this.relayout();}}
  drawBG(){const g=this.bgGfx;g.clear();const g1=Math.round(H*0.34), M=Math.round(H);   // M=еҫҖеӣӣе‘ЁеӨҡз•«дёҖеңҲиғҢжҷҜвҶ’зү№еҜ«йҸЎй ӯжҺЁиҝ‘/е№із§»дёҚжңғйңІеҮәдё–з•ҢеӨ–зҡ„й»‘йӮҠ
    g.fillStyle(0x4a6788,1);g.fillRect(-W,-M,W*3,g1+M);                              // дёҠеҚҠ(еҗ«дёҠз·ЈеӨ–гҖҒе…©еҒҙеӨ–)з”ЁжјёеұӨй ӮиүІйӢӘж»ҝ
    g.fillGradientStyle(0x4a6788,0x4a6788,0x223524,0x223524,1);g.fillRect(0,0,W,g1);  // зңҹжӯЈзҡ„жјёеұӨеё¶(зӣӨдёҠ)
    g.fillStyle(0x223524,1);g.fillRect(-W,g1,W*3,Math.max(0,BG_H-g1));               // дёӯж®өж·ұеә•(е»¶дјёе…©еҒҙеӨ–)
    g.fillStyle(0x160f18,1);g.fillRect(-W,BG_H,W*3,H-BG_H+M);                        // зӣӨйқўеҚҖеә•иүІ(е»¶дјёдёӢз·ЈеӨ–гҖҒе…©еҒҙеӨ–)
    g.fillStyle(0x000000,0.22);g.fillEllipse(CX,BATTLE_CY+54,W*0.82,42);}            // ж•өдәәи…ідёӢйҷ°еҪұ
  relayout(){
    this.cameras.main.setBounds(0,0,W,H);   // H йҡЁиҰ–зӘ—и®Ҡ,йҸЎй ӯзҜ„еңҚеҗҢжӯҘ

      const fy=e.img?cy:cy-Math.round(sz*0.14);if(e.img)e.sprite.setDisplaySize(sz,sz);e.baseScale=e.sprite.scaleX;if(e.bob)e.bob.stop();e.sprite.setPosition(x,fy);e.restY=fy;e.bob=this.tweens.add({targets:e.sprite,y:fy-4,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});});

    this.charge=[0,0,0,0,0];   // дё»еӢ•жҠҖи“„еҠӣ(ж•ҙе ҙзҙҜз©ҚгҖҒи·Ёй—ңдҝқз•ҷ)
    this.stored=[null,null,null,null,null];   // жҜҸеҚЎеӯҳж”ҫзҡ„еұ¬еЎҠ {el,lv}(и·Ёй—ңдҝқз•ҷ,ж–°еұҖ/йҮҚжҢ‘жүҚжё…)
    this.firstClear=true;   // ж–°жүӢйүӨеӯҗ:жң¬е ҙз¬¬дёҖж¬Ўж¶ҲйҷӨ=йҡҶйҮҚж…¶зҘқ
    this.renderTeam(); this.startStage();
  }
  resetWave(){this.combo=0;this.immune=0;this.armor=0;this.amp=1;}
  startStage(keepBoard){
    this.stopStuckFX&&this.stopStuckFX();   // ж–°й—ң/ж–°еұҖжё…жҺүж®ҳз•ҷзҡ„еҚЎжӯ»жҸҗзӨә
    if(!keepBoard){this.board=Array.from({length:N},()=>Array(N).fill(null));this.stored=[null,null,null,null,null];}   // и·Ёй—ңдҝқз•ҷзӣӨйқў+еұ¬еЎҠ:еҸӘжңүж–°еұҖ/йҮҚжҢ‘жүҚжё…,йҒҺй—ңжҷӮзҙҜз©ҚеҲ°дёӢдёҖй—ңзҡ„жҖӘ
    this.resetWave(); if(!keepBoard)this.morale=(this.lead&&this.lead.type==='moraleStart')?this.lead.v:CONFIG.MORALE_START; this.handCleared=false; this.handBurst=false; this.whiffStreak=0; if(!keepBoard)this.refill();   // й¬Ҙеҝ—+жүҳзӣӨ:и·Ёй—ңдҝқз•ҷ(еҸӘж–°еұҖ/йҮҚжҢ‘жүҚйҮҚзҪ®/жҸӣж–°жүҳзӣӨ)
    if(this.stage===1&&this.lead&&!this.hitLab)this.time.delayedCall(450,()=>{   // йҡҠй•·жҠҖ:йҖІй—ңжҷӮеңЁзӣӨйқўдёӯеӨ®еҪҲеҮәжё…жҘҡж©«е№…(жҠҖеҗҚ+ж•Ҳжһң),еҒңз•ҷеҸҜи®Җ(еҺҹжң¬дёҠз·Јеҝ«й–ғе°Ҹеӯ—зңӢдёҚжё…)
      const ld=this.lead, mk=(dy,str,sz,col,sw)=>{const t=this.add.text(CX,BOARD_CY+dy,str,{fontFamily:EMOJIFONT,fontSize:sz,color:col,fontStyle:'bold',stroke:'#3a2400',strokeThickness:sw,align:'center'}).setOrigin(0.5).setDepth(DEPTH.fx).setScale(0.5);
        this.tweens.add({targets:t,scale:1,duration:260,ease:'Back.out'});
        this.tweens.add({targets:t,alpha:0,delay:1400,duration:420,onComplete:()=>t.destroy()});};
      mk(-13,'рҹҺ– йҡҠй•·жҠҖ В· '+ld.name,'21px','#ffe08a',5);
      mk(15,ld.desc,'14px','#ffeec4',4);
    });
    this.spawnEnemies(); this.refreshBoard(); this.renderTray(); this.updateAll(); this.renderCharges(); this.renderStored(); this.syncMoraleState();   // йҖІй—ңдҫқзӣ®еүҚй¬Ҙеҝ—еҗҢжӯҘгҖҢжҘөгҖҚи„ҲеӢ•(и·Ёй—ңеё¶дҫҶзҡ„жҘөиҰҒжҢҒзәҢжј”)
    if(this.stage===1 && !tutSeen() && !this.hitLab)this.showTutorial();   // йҰ–ж¬ЎйҒҠзҺ©вҶ’3 жӯҘж•ҷеӯё
  }
  spawnEnemies(){
    if(this.enemyG)this.enemyG.destroy();
    this.enemyG=this.add.container(0,0).setDepth(DEPTH.enemy);   // ж•өж–№ж•ҙеұӨеңЁгҖҢжҲ‘ж–№еҚЎгҖҚд№ӢдёӢгҖҒиғҢжҷҜд№ӢдёҠ
    const defs=this.dungeon.stages[this.stage-1].es;
    this.enemies=defs.map(d=>({el:d.el,max:d.hp,hp:d.hp,atk:d.atk,interval:d.turns,timer:d.turns,burn:0,dead:false,boss:!!d.boss}));
    const n=this.enemies.length, slot=380/n;
    this.enemies.forEach((e,i)=>{
      const x=20+slot*(i+0.5), cy=BATTLE_CY;
      const szc=Math.max(50,Math.min(slot-8,126,Math.round((CARDS_Y-81)*0.92)));   // ж•өж¬„жӯЈж–№еҪўйӮҠй•·:еҸ–еҜ¬еәҰ/й«ҳеәҰз©әжӘ”ијғе°ҸиҖ…(зҹ®иһўе№•иҮӘеӢ•зё®е°Ҹ)
      e.cardW=szc; e.cardH=szc;
      e.card=this.add.rectangle(x,cy,szc,szc,0x000000,0).setInteractive();   // з„Ўеә•иүІ:йҖҸжҳҺзҹ©еҪўеҸӘз•¶й»һж“ҠеҚҖ
      e.card.on('pointerdown',()=>this.selectTarget(i));
      if(MONSTER_IMG[e.el]&&this.textures.exists('mon_'+e.el)){   // жңүжҖӘзү©ең–вҶ’ж»ҝзүҲзҪ®дёӯ;еҗҰеүҮз”Ё emoji иҮү
        e.sprite=this.add.image(x,cy,'mon_'+e.el).setOrigin(0.5).setInteractive(); e.sprite.setDisplaySize(szc,szc); e.img=true;
      }else{
        e.sprite=this.add.text(x,cy-Math.round(szc*0.14),EL[e.el].face,{fontFamily:EMOJIFONT,fontSize:Math.round(szc*0.5)+'px'}).setOrigin(0.5).setInteractive();
      }
      e.baseScale=e.sprite.scaleX;   // еҸ—ж“Ҡзё®ж”ҫеӢ•з•«зҡ„еҹәжә–(ең–=szc/320гҖҒemoji=1),еӣһеҪҲиҰҒеӣһеҲ°йҖҷеҖӢеҖј,дёҚиғҪжӯё 1
      e.sprite.on('pointerdown',()=>this.selectTarget(i));
      e.turnG=this.add.container(x-szc/2+12,cy-szc/2+11,[]);   // еҮәжүӢеҖ’ж•ё:жІҷжјҸ+ж•ёеӯ—,з§»еҲ°ж•өеҚЎе·ҰдёҠ
      e.glass=this.add.text(0,0,'вҸі',{fontFamily:EMOJIFONT,fontSize:'16px'}).setOrigin(0.5);
      e.turnTx=this.add.text(11,0,String(e.timer),{fontFamily:EMOJIFONT,fontSize:'18px',color:'#eaf3ff',fontStyle:'bold',stroke:'#1a0d05',strokeThickness:4}).setOrigin(0,0.5);
      e.turnG.add([e.glass,e.turnTx]);
      e.hpW=szc-10; e.hpx=x-e.hpW/2;
      e.hpBg=this.add.rectangle(x,cy+szc/2-3,e.hpW,8,0x000000,0.6).setOrigin(0.5);   // HP:еЈ“еңЁж•өең–дёӢз·Ј(еҶҚеҫҖдёӢ 6px)
      e.hpFill=this.add.rectangle(e.hpx,cy+szc/2-3,e.hpW,8,e.boss?0xff7a3a:0xc23c2c).setOrigin(0,0.5);
      e.mark=this.add.text(x,cy-szc/2-9,'в–ј',{fontFamily:EMOJIFONT,fontSize:'14px',color:'#ffd56a',fontStyle:'bold'}).setOrigin(0.5).setVisible(false);   // зӣ®жЁҷжҢҮжЁҷ(еҸ–д»Јй»ғжЎҶ)
      e.restY=e.sprite.y;   // еҸ—ж“Ҡж“ҠйҖҖ/еӣһдҪҚзҡ„еҹәжә– y
      e.bob=this.tweens.add({targets:e.sprite,y:e.sprite.y-4,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});
    });
    // ж•өж–№еҗҢеұӨ z еәҸ:ж•өдёӯ > ж•өе·Ұ > ж•өеҸі(и¶Ҡйқ дёӯеӨ®з•«и¶ҠдёҠ;еҗҢи·қжҷӮе·Ұ>еҸі)гҖӮдҫқжӯӨз”ұеҫҢеҫҖеүҚеҠ е…Ҙе®№еҷЁ
    const zorder=this.enemies.map((e,i)=>i).sort((a,b)=>{
      const da=Math.abs(this.enemies[a].card.x-CX), db=Math.abs(this.enemies[b].card.x-CX);
      return da!==db ? db-da : this.enemies[b].card.x-this.enemies[a].card.x;
    });
    zorder.forEach(i=>{const e=this.enemies[i];[e.card,e.sprite,e.turnG,e.hpBg,e.hpFill,e.mark].forEach(o=>this.enemyG.add(o));});
    this.enemies.forEach((e,i)=>this.enemyEnter(e, i*120));   // иҮӘйҒ ж–№йҖјиҝ‘е…Ҙе ҙ(дәӨйҢҜ)
    this.target=0;
  }
  refill(){this.tray=[pickShape(),pickShape(),pickShape()].map(c=>({c,used:false}));}
  aliveCount(){return this.enemies.filter(e=>!e.dead).length;}
  targetEnemy(){let e=this.enemies[this.target];if(e&&!e.dead)return e;
    const i=this.enemies.findIndex(x=>!x.dead);this.target=i;return i<0?null:this.enemies[i];}
  selectTarget(i){if(this.enemies[i]&&!this.enemies[i].dead){this.target=i;this.updateEnemies();}}

  refreshBoard(){
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){const rc=this.cellRect(r,c), be=this.boxElement[boxOf(r,c)];
      rc.setAlpha(1).setScale(1);   // йӮ„еҺҹжә¶и§ЈеӢ•з•«ж®ҳз•ҷзҡ„ alpha/scale
      if(this.board[r][c]){const el=this.board[r][c].el;rc.setFillStyle(EL[el]?EL[el].color:NEUTRAL_FILL);}
      else rc.setFillStyle(be?EL[be].dark:NEUTRAL_DARK);
      rc.setStrokeStyle(2,0x000000,0);}
    for(let b=0;b<9;b++){const be=this.boxElement[b];
      this.boxLabels[b].setText(be?EL[be].name:'В·').setColor(be?'#'+EL[be].color.toString(16).padStart(6,'0'):'#ffffff66');}
  }
  // ж”ҫеЎҠ:жҹҘе…ӢжӢүеҮқиҒҡжҲҗеҪў вҖ”вҖ” еұ¬иүІеҮқиҒҡй«”з”ұз•ҘеӨ§еҚҠйҖҸжҳҺж”¶еҜҰ + зІ’еӯҗеҗ‘дёӯеҝғж”¶жқҹ + ж јеӯҗж·Ўе…Ҙ(еҸӘжј”гҖҢж”ҫдёӢеҫҢд»ҚеңЁзӣӨдёҠгҖҚзҡ„ж ј)
  coalesceCells(list){ if(!list)return; const ADD=Phaser.BlendModes.ADD;   // list=[{r,c,el}](ж”ҫдёӢз•¶дёӢе°ұиЁҳдҪҸеұ¬жҖ§вҶ’е°ұз®—йҰ¬дёҠзөҗеҚ°иў«жё…жҺүд№ҹз…§жј”еҮқиҒҡ)
    list.forEach((pc,idx)=>{const r=pc.r,c=pc.c; if(r<0||r>=N||c<0||c>=N||!this.board[r][c])return;   // е·Іиў«зөҗеҚ°жё…жҺүзҡ„ж јвҶ’дёҚи·‘гҖҢиҒҡж”ҸжҲҗеҜҰеҝғеЎҠгҖҚ(дәӨзөҰзөҗеҚ°зҡ„жә¶и§ЈвҶ’йӣҶзөҗжј”еҮә)
      const cell=this.cellRect(r,c); if(!cell)return;
      const el=pc.el, col=EL[el]?EL[el].color:NEUTRAL_FILL, cx=BX0+c*CS+RECT/2, cy=BY0+r*CS+RECT/2, dl=idx*55;   // dl:еӨҡж јйҖҗж јйҢҜй–ӢвҶ’еғҸдёҖйҒ“жіўжөҒйҒҺж•ҙеЎҠ(зөІж»‘)
      this.tweens.killTweensOf(cell); cell.setAlpha(0.12); this.tweens.add({targets:cell,alpha:1,duration:430,delay:dl,ease:'Sine.out',onComplete:()=>cell.setAlpha(1)});   // ж јеӯҗжҹ”е’Ңж·Ўе…Ҙ
      const o=this.add.rectangle(cx,cy,RECT,RECT,col).setOrigin(0.5).setBlendMode(ADD).setDepth(DEPTH.board+1).setAlpha(0.5).setScale(1.7);   // еҮқиҒҡй«”:з•ҘеӨ§еҚҠйҖҸвҶ’з·©з·©ж”¶еҜҰ(Cubic.out з·©еҮә=и»ҹи‘—йҷё)
      this.tweens.add({targets:o,scaleX:1,scaleY:1,alpha:0,duration:440,delay:dl,ease:'Cubic.out',onComplete:()=>o.destroy()});
      for(let k=0;k<6;k++){const a=Math.random()*Math.PI*2, r0=18+Math.random()*14, sx=cx+Math.cos(a)*r0, sy=cy+Math.sin(a)*r0;   // жҹҘе…ӢжӢүзІ’еӯҗж»‘й Ҷж”¶жқҹ(Sine.inOut+йҢҜй–Ӣ)
        const d=this.add.circle(sx,sy,1.8+Math.random()*1.4,col,0.85).setBlendMode(ADD).setDepth(DEPTH.board+1);
        this.tweens.add({targets:d,x:cx,y:cy,alpha:0,scale:0.25,duration:360+Math.random()*180,delay:dl+Math.random()*70,ease:'Sine.inOut',onComplete:()=>d.destroy()});}
    });
  }
  renderTeam(){ELEMENT_BOXES.forEach((b,i)=>{const k=this.boxElement[b],card=this.teamCards[i];
    card.el=k;card.rect.setFillStyle(EL[k].color);card.txt.setText(EL[k].name);});
    this.renderCharges();}
  // дё»еӢ•жҠҖи“„еҠӣжўқ/зҷје…ү/icon еҗҢжӯҘ
  renderCharges(){if(!this.charge)return;this.teamCards.forEach((card,i)=>{const a=activeSkill(card.el);
    if(!card.abtn)return;
    if(!a){card.abtn.setVisible(false);return;}
    card.abtn.setVisible(true);
    const ready=(this.charge[i]||0)>=a.cd;
    card.abg.setFillStyle(ready?0x6a5020:0x2b2014).setStrokeStyle(2,ready?0xffe066:0x5a4128);
    card.aic.setText(ready?a.icon:String(Math.max(0,a.cd-(this.charge[i]||0)))).setFontSize(ready?'14px':'11px');   // ж»ҝвҶ’iconеҸҜй»һ;еҗҰеүҮйЎҜзӨәеү©йӨҳжүӢж•ё
    if(ready&&!card.pulse)card.pulse=this.tweens.add({targets:card.abtn,scaleX:1.15,scaleY:1.15,duration:480,yoyo:true,repeat:-1,ease:'Sine.inOut'});
    if(!ready&&card.pulse){card.pulse.stop();card.pulse=null;card.abtn.setScale(1);}});}
  // еұ¬еЎҠеӯҳж”ҫйЎҜзӨә:з„ЎжЎҶз„Ўеә•,е…ғзҙ иүІеЎҠ+гҖҢжҳҺжҡ—жјёеұӨжөҒеӢ•гҖҚ(жҹҘе…ӢжӢүеңЁеұ¬жҖ§иЈЎжөҒзҡ„ж„ҹиҰә);ж–°з”ҹжҷӮеҪҲеҮәдёҖдёӢ
  renderStored(){if(!this.stored)return;this.teamCards.forEach((card,i)=>{const so=card.storeObj;if(!so)return;
    so.removeAll(true);
    const s=this.stored[i], key=s?s.el+'_'+s.lv:null;
    if(card.txt)card.txt.setVisible(!s);   // жңүеұ¬еЎҠвҶ’е…ғзҙ еӯ—и®“дҪҚзөҰеұ¬еЎҠ(е…Қеӯ—еЎҠзӣёз–Ҡи®ҠиҠұ;е…ғзҙ д»Қз”ұеҚЎеә•иүІиҫЁиӯҳ)
    if(!s){so.setVisible(false); card.storeCells=null; card.storeKey=null; return;}
    so.setVisible(true);
    const cells=s.cells||chakraShape(s.el,s.lv), col=EL[s.el].color;
    card.storeDark=shadeColor(col,-0.42); card.storeLight=shadeColor(col,0.55);   // жөҒеӢ•е…©з«Ҝ:жҡ—вҶ”дә®зҡ„еҗҢеұ¬жҖ§иүІ
    let mr=0,mc=0;cells.forEach(([r,c])=>{mr=Math.max(mr,r);mc=Math.max(mc,c);});
    const ms=12,pw=(mc+1)*ms,ph=(mr+1)*ms, span=(mr+mc)||1;   // ж јеӨ§е°ҸеҸҚжҳ зңҹеҜҰ LV(ж јж•ё)
    const inner=this.add.container(0,0); so.add(inner);   // е…§еұӨ=еЎҠжң¬й«”(еҪҲеҮәеӢ•з•«е°Ҳз”Ё,иҲҮжөҒеӢ•дёҠиүІеҲҶй–Ӣ)
    const objs=[];
    cells.forEach(([dr,dc])=>{const rc=this.add.rectangle(dc*ms-pw/2,dr*ms-ph/2,ms-1,ms-1,col).setOrigin(0).setStrokeStyle(1,0x140d05,0.6); inner.add(rc); objs.push({obj:rc,phase:(dr+dc)/span});});   // зҙ°ж·ұйӮҠвҶ’ж’һиүІеҚЎдёҠд№ҹзңӢеҫ—жё…еЎҠеҪў;phase=жІҝеЎҠиә«зҡ„жөҒеӢ•зӣёдҪҚ
    card.storeCells=objs;
    if(card.storeKey!==key){card.storeKey=key;inner.setScale(0.2);this.tweens.add({targets:inner,scaleX:1,scaleY:1,duration:320,ease:'Back.out'});}else inner.setScale(1);   // ж–°з”ҹ/еҚҮзҙҡжүҚеҪҲеҮәдёҖж¬Ў(йҶ’зӣ®);е№іжҷӮйқ жјёеұӨжөҒеӢ•,дёҚдәӮй–ғ
  });}
  // жҜҸе№Җй©…еӢ•:еұ¬еЎҠзҡ„жҳҺжҡ—жјёеұӨжөҒеӢ•(жІҝеЎҠиә«зӣёдҪҚе·®вҶ’еғҸиғҪйҮҸеңЁжөҒ)+ гҖҢжҘөгҖҚй¬Ҙеҝ—еҫҪз« еә•иүІжјёеұӨжөҒеӢ•(зө•еҘҪиӘҝ)
  update(time){
    if(!this.teamCards)return;
    try{   // вҳ… е–®е№Җз№ӘиЈҪдҫӢеӨ–зө•дёҚеҸҜеӨ–жӢӢ,еҗҰеүҮжңғдёӯж–·ж•ҙеҖӢйҒҠжҲІдё»иҝҙеңҲвҶ’з•«йқўеҮҚдҪҸ
      for(const card of this.teamCards){const cs=card.storeCells; if(!cs)continue;
        for(const c of cs){if(!c.obj||!c.obj.active)continue; const frac=0.5+0.5*Math.sin(time*0.005 - c.phase*3.4); c.obj.setFillStyle(lerpColor(card.storeDark,card.storeLight,frac));}}   // еҲӨ active:еұ¬еЎҠиў«ж¶ҲиҖ—/йҮҚе»әжҷӮиҲҠзҹ©еҪўе·ІйҠ·жҜҖ,дёҚеҸҜеҶҚдёҠиүІ
      if(this.moralePeak&&this.moraleBg&&this.moraleBg.active){const t=time*0.006;   // жҘө=зө•еҘҪиӘҝ:еҫҪз« еә•иүІиҲҮеӨ–з’°еңЁжҡ—зҙ…вҶ”дә®ж©ҷй–“жөҒеӢ•(зӣёдҪҚе·®вҶ’еғҸиғҪйҮҸеңЁеңҲиЈЎиҪү)
        this.moraleBg.setFillStyle(lerpColor(0x6e1808,0xff8a1e,0.5+0.5*Math.sin(t)),1);
        this.moraleBg.setStrokeStyle(2,lerpColor(0xff5a2a,0xffd24a,0.5+0.5*Math.sin(t+1.7)));}
    }catch(e){}
  }
  // === дё»еӢ•жҠҖ / ж•өж”» е…ұз”Ёзү№ж•Ҳ ===
  chargeAt(x,y,color,dur,hot){const ADD=Phaser.BlendModes.ADD; hot=hot||0xffffff;   // иҠұзҒ«зІ’еӯҗжҢҒзәҢеҫҖ (x,y) ж”¶жқҹ + дә®ж ёжјёеӨ§ вҶ’ dur еҫҢеҚ°зҲҶй–ғ;hot=дә®ж ё/зҒ«иҠұзҡ„й«ҳе…үиүІ(й җиЁӯзҷҪ,зҒ«еұ¬еӮіжҡ–иүІвҶ’е…ЁзҒ«иүІ)
    const core=this.add.circle(x,y,4,hot,1).setBlendMode(ADD).setDepth(DEPTH.proj);
    const glow=this.add.circle(x,y,7,color,0.5).setBlendMode(ADD).setDepth(DEPTH.proj);
    this.tweens.add({targets:core,scaleX:3.4,scaleY:3.4,duration:dur,ease:'Quad.in'});

    this.time.delayedCall(1750,()=>{ cam.zoomTo(1,440,EIO); cam.pan(CX,Math.round(H/2),440,EIO); });
    this.time.delayedCall(2400,()=>{ tgt.dead=false; tgt._labDying=false; tgt.hp=tgt.max; if(tgt.hpTw){tgt.hpTw.stop();tgt.hpTw=null;}
      sp.setVisible(true); sp.clearTint&&sp.clearTint(); [tgt.turnG,tgt.hpBg,tgt.hpFill].forEach(o=>{if(o)o.setVisible(true);}); if(tgt.card)tgt.card.setInteractive();
      this.enemyEnter(tgt,0); this.updateEnemies(); });
  }
  _labCells(n,off){const cells=[];off=off||0;for(let r=Math.floor(off/N);r<N&&cells.length<n;r++)for(let c=(r===Math.floor(off/N)?off%N:0);c<N&&cells.length<n;c++)cells.push([r,c]);return cells;}
  demoHit(n){
    const tgt=this.enemies&&this.enemies.find(e=>!e.dead); if(!tgt)return;
    const els=['fire','water','thunder','earth','wind']; this._labEl=((this._labEl==null?-1:this._labEl)+1)%5; const el=els[this._labEl];
    const lv=Math.max(1,Math.min(7,Math.round(n/9)+1));   // еһӢ/еҚ° йҡҺ(йҡЁ HIT еҚҮ;lvвүҘ4 е…Ёиһўе№•й–ғ,lvвүҘ6 еӨ§й–ғ)
    const cells=this._labCells(n), burst=1+Math.max(0,n-9)/9*0.3, dmg=Math.round(n*10*burst);
    const atkAt=this.playClearFX(n, [{el, lv, fire:()=>this.chakraStrike([tgt], dmg, el, {cells, parts:[{el}], fx:{}})}]);   // е…Ҳ n HIT вҶ’ жӢӣејҸеҗҚ вҶ’ жүҚж”»ж“Ҡ
    this.time.delayedCall(atkAt+540+this.chargeMs(n)+340,()=>{tgt.hp=Math.max(0,tgt.hp-dmg);this.updateEnemies();if(tgt.hp<=0)this.killEnemy(tgt);});
  }
  demoMulti(){   // жј”зӨәгҖҢдёҖж¬Ўжё…йҷӨеҗ« 2 е…ғзҙ  вҶ’ еҗҢжҷӮеҮә 2 жӢӣгҖҚ(18 ж ј = е…©жўқз·ҡеҗ„дёҖе…ғзҙ )
    const tgt=this.enemies&&this.enemies.find(e=>!e.dead); if(!tgt)return;
    const pairs=[['fire','water'],['thunder','earth'],['wind','fire'],['water','thunder'],['earth','wind']];
    this._labPair=((this._labPair==null?-1:this._labPair)+1)%pairs.length; const pr=pairs[this._labPair];
    const n=18, dmg=Math.round(n*10*(1+9/9*0.3)), half=Math.round(dmg/2);
    const cA=this._labCells(9,0), cB=this._labCells(9,9), lvA=4, lvB=4;
    const jutsu=[
      {el:pr[0], lv:lvA, fire:()=>this.chakraStrike([tgt], half, pr[0], {cells:cA, parts:[{el:pr[0]}], fx:{}})},
      {el:pr[1], lv:lvB, fire:()=>this.chakraStrike([tgt], dmg-half, pr[1], {cells:cB, parts:[{el:pr[1]}], fx:{}})}
    ];
    const atkAt=this.playClearFX(n, jutsu);
    this.time.delayedCall(atkAt+540+340,()=>{tgt.hp=Math.max(0,tgt.hp-dmg);this.updateEnemies();if(tgt.hp<=0)this.killEnemy(tgt);});   // жҜҸжӢӣеҗ„ 9 ж јгҖҒз„Ўи“„еҠӣ
  }
  demoEnemyAttack(){const alive=this.enemies&&this.enemies.filter(e=>!e.dead); if(!alive||!alive.length)return;
    this._labAtkI=((this._labAtkI==null?-1:this._labAtkI)+1)%alive.length; this.enemyAttack(alive[this._labAtkI]);}

  /* жӢ–жӣіж”ҫеЎҠ */
  startDrag(i,p){if(this.resultOpen||this.locked||this.earthSel||this.earthDrag)return;
    const cells=this.tray[i].c, kind=this.tray[i].kind;
    const kc=kind==='water'?0x62b8f0:kind==='wind'?0x6ad06a:kind==='earth'?0xd49a4a:0xffffff;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,kc).setOrigin(0));
    this.drag={i,cells,kind,prev:this.add.container(0,0,kids).setAlpha(0.85).setDepth(DEPTH.drag),kids};this.updateDrag(p);}
  // еҫһеҚЎжӢ–гҖҢеӯҳж”ҫзҡ„еұ¬еЎҠгҖҚ(иҗ¬з”ЁеЎҠеЎ«з©әж ј;дёҚдҪ”жүҳзӣӨж јвҶ’дёҚжҺЁйҖІж•ө,жҳҜйҖЈж“Ҡеј•ж“Һ)
  startStoredDrag(i,p){if(this.resultOpen||this.locked||this.drag||this.earthSel||this.earthDrag)return;
    const s=this.stored[i]; if(!s)return;
    const cells=s.cells||chakraShape(s.el,s.lv), col=EL[s.el].color;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,col).setOrigin(0));
    this.drag={store:i,cells,kind:'water',col,prev:this.add.container(0,0,kids).setAlpha(0.85).setDepth(DEPTH.drag),kids};this.updateDrag(p);}
  doPlaceStored(d,r,c){if(this.resultOpen)return;
    d.cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;
      if(rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc])this.board[rr][cc]={el:this.boxElement[boxOf(rr,cc)]||'neutral'};});
    const placed=d.cells.map(([dr,dc])=>{const rr=r+dr,cc=c+dc;return (rr>=0&&rr<N&&cc>=0&&cc<N&&this.board[rr][cc])?{r:rr,c:cc,el:this.board[rr][cc].el}:null;}).filter(Boolean);
    this.stored[d.store]=null; this.renderStored();
    this.afterAction(false); this.coalesceCells(placed);   // жҹҘе…ӢжӢүеҮқиҒҡжҲҗеҪў(зөҗеҚ°жҷӮд№ҹжј”)
  }   // йҖЈж“Ҡеј•ж“Һ:еұ¬еЎҠж¶ҲйҷӨгҖҢд№ҹз”ҹеЎҠгҖҚ(ж»ҫйӣӘзҗғзҲҪеәҰ);д»ҚдёҚдҪ”жүҳзӣӨж јвҶ’дёҚжҺЁйҖІж•ө(з”ұ tray.every(used) жұәе®ҡ)
  updateDrag(p){if(!this.drag)return;this.clearGhost();
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT);
    if(!cell){this.drag.prev.setVisible(false);return;}
    this.drag.prev.setVisible(true).setPosition(BX0+cell.c*CS, BY0+cell.r*CS);
    const k=this.drag.kind, ok=canPlace(this.board,this.drag.cells,cell.r,cell.c,k);
    const kc=this.drag.col||(k==='water'?0x62b8f0:k==='wind'?0x6ad06a:k==='earth'?0xd49a4a:0x8fffa6);
    this.drag.kids.forEach(x=>x.setFillStyle(ok?kc:0xff8f8f));
    this.drag.cells.forEach(([dr,dc])=>{const rr=cell.r+dr,cc=cell.c+dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      let col;
      if(!ok)col=0xff8f8f;
      else if(k==='water')col=this.board[rr][cc]?0x6aa0ff:0x8fffa6;     // йҮҚз–Ҡи—Қ / еЎ«з¶ 
      else if(k==='wind') col=this.board[rr][cc]?0x6ad06a:0x444444;     // жңғж¶Ҳз¶  / з©әж јзҒ°
      else if(k==='earth')col=this.board[rr][cc]?0xd49a4a:0x444444;     // жҠ“еҸ–жЈ• / з©әж јзҒ°
      else col=0x8fffa6;
      this.cellRect(rr,cc).setStrokeStyle(3,col,1);});}
  endDrag(p){if(!this.drag)return;const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.drag;
    d.prev.destroy(); this.clearGhost(); this.drag=null;
    if(cell && canPlace(this.board,d.cells,cell.r,cell.c,d.kind)){
      if(d.store!=null) this.doPlaceStored(d,cell.r,cell.c);
      else if(d.kind==='earth') this.earthSelect(d.i,cell.r,cell.c);
      else this.doPlace(d.i,cell.r,cell.c);
    }}
  clearGhost(){this.cells.forEach(rc=>rc.setStrokeStyle(2,0x000000,0));}

  /* ж”ҫеЎҠ = дёҖеӣһеҗҲ(ж•өдәәжҺЁйҖІ);ж”ҫзҙ”жҹҘе…ӢжӢү = bonus(дёҚжҺЁйҖІеӣһеҗҲ) */
  doPlace(i,r,c){if(this.resultOpen)return;
    const cells=this.tray[i].c, kind=this.tray[i].kind;
    cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;
      if(kind==='wind'){if(this.board[rr][cc])this.board[rr][cc]=null;}        // йўЁеҲғ:ж¶ҲйҷӨ
      else if(!this.board[rr][cc])this.board[rr][cc]={el:this.boxElement[boxOf(rr,cc)]||'neutral'};}); // дёҖиҲ¬/ж°ҙ:еЎ«(еҸӘеЎ«з©әж ј)
    const placed=(kind!=='wind')?cells.map(([dr,dc])=>{const rr=r+dr,cc=c+dc;return (rr>=0&&rr<N&&cc>=0&&cc<N&&this.board[rr][cc])?{r:rr,c:cc,el:this.board[rr][cc].el}:null;}).filter(Boolean):null;   // ж”ҫдёӢз•¶дёӢиЁҳдҪҸеұ¬жҖ§(д№ӢеҫҢе°ұз®—иў«жё…д№ҹз…§жј”)
    this.tray[i].used=true;
    this.afterAction(kind==='water'||kind==='wind');
    if(placed)this.coalesceCells(placed);   // жҹҘе…ӢжӢүеҮқиҒҡжҲҗеҪў(зөҗеҚ°жҷӮд№ҹжңғжј” вҶ’ еҮқиҒҡвҶ’жүҚжё…)
  }
  // е…ұз”Ё:ж”ҫеЎҠеҫҢиҷ•зҗҶ(ж¶ҲйҷӨвҶ’зҮ’еӮ·вҶ’ж•өжҺЁйҖІвҶ’иЈңеЎҠвҶ’еҚЎжӯ»жӘўжҹҘ)
  afterAction(fromBlock){
    this.stopStuckFX();   // зҺ©е®¶дёҖиЎҢеӢ•е°ұж”¶жҺүеҚЎжӯ»еҫӘз’°жҸҗзӨә(иӢҘд»ҚеҚЎжӯ»,handleStuck жңғеҶҚй–Ӣ)
    this.refreshBoard(); this.renderTray();
    this.fromBlock=!!fromBlock; try{this.resolve();}catch(err){console.error('resolve error',err);} this.fromBlock=false;   // йҳІйҒһиҝҙ:еЎҠжё…еҮәзҡ„ж¶ҲйҷӨдёҚеҶҚз”ҹеЎҠ;try йҳІеұ•жј”дҫӢеӨ–еҚЎжӯ»ж•ҙжүӢ
    if(this.tray.every(t=>t.used)){this.endHand();return;}  // дёҖжүӢ(3еЎҠ)ж”ҫе®ҢвҶ’endHand иІ иІ¬гҖҢзӯүеұ•жј”е®ҢжүҚж•өж”»+иЈңжүӢ+и§ЈйҺ–+еҚЎжӯ»жӘўжҹҘгҖҚ
    if(!this.anyPlaceable()){this.time.delayedCall(420,()=>this.handleStuck());}
    this.updateAll();
  }
  // дёҖжүӢзөҗжқҹ:й¬Ҙеҝ—/зҮ’еӮ·з«ӢеҚізөҗз®—(еұ¬жҲ‘ж–№еұ•жј”),ж•өж–№еҮәжүӢ+иЈңж–°жүӢе»¶еҫҢеҲ°еұ•жј”е®ҢжүҚзҷјеӢ•(д»ҘгҖҢжүӢгҖҚзӮәзҜҖеҘҸ)
  endHand(){
    const showed=this.handCleared;   // жң¬жүӢжңүжё…йҷӨеұ•жј”вҶ’ж•өж”»еӨҡзӯүдёҖдёӢ;з©әжүӢвҶ’еҝ«дёҖй»һ
    const m0=this.morale;   // й¬Ҙеҝ—(дёҠйҮҚдёӢиј•):жҡҙж“ҠжүӢ=зӣҙжҺҘиЎқеҲ°гҖҢжҘөгҖҚ;дёҖиҲ¬жё…йҷӨжүӢ=+1еҚҮеҲ°гҖҢи¶…гҖҚе°Ғй Ӯ;йҖЈMORALE_GRACEжүӢз©әжүӢжүҚвҲ’1йҡҺ
    if(!this.handCleared){ this.whiffStreak=(this.whiffStreak||0)+1; if(this.whiffStreak>=(CONFIG.MORALE_GRACE+((this.lead&&this.lead.type==='moraleGrace')?this.lead.v:0))){this.morale=Math.max(0,this.morale-1);this.whiffStreak=0;} }
    else { this.whiffStreak=0; if(this.handBurst)this.morale=5; else if(this.morale<5)this.morale=Math.min(4,this.morale+1); }   // е·ІеңЁгҖҢжҘөгҖҚжҷӮдёҖиҲ¬жё…йҷӨжүӢдёҚжҺүйҡҺ
    this.handCleared=false; this.handBurst=false;
    if(this.morale!==m0)this.moraleFX(this.morale,this.morale>m0);
    this.enemies.forEach(e=>{if(!e.dead&&e.burn>0){e.hp=Math.max(0,e.hp-e.burn);   // зҮ’еӮ·=жҲ‘ж–№ DoT,еұ¬еұ•жј”,з«ӢеҚі
      this.floatText(e.sprite.x,e.sprite.y-24,'рҹ”Ҙ'+e.burn,'#ff7a63'); if(e.hp<=0)this.killEnemy(e);}});
    this.updateAll();   // з«ӢеҚіеҸҚжҳ й¬Ҙеҝ—еӯ—/зҮ’еӮ·еҫҢиЎҖйҮҸ(еҲҘзӯүе»¶йҒІеӣһе‘ј)
    this.locked=true;   // йҺ–ијёе…Ҙ:зӯүжҲ‘ж–№йҖҷжүӢеұ•жј”е®Ң,ж•өж–№жүҚеҮәжүӢ(зҺ©е®¶жүҚзңӢеҫ—еҲ°дёҠйқўзҡ„иЎЁзҸҫ),еҶҚиЈңж–°жүӢи§ЈйҺ–
    this.time.delayedCall(showed?1200:200,()=>{   // зӯүжҲ‘ж–№иҸҜйә—еұ•жј”(HIT ж•ёеҲ°еә•)жј”е®Ң,ж•өж–№жүҚеҮәжүӢ
      if(this.resultOpen){this.locked=false;return;}   // жңҹй–“е·Ій–Ӣзөҗз®—/еӢқж•—з•«йқўвҶ’дёҚеҶҚжҺЁйҖІ
      try{
        this.enemies.forEach(e=>{if(e.dead)return; if((e.sealed||0)>0)e.sealed--; e.timer--; if(e.timer<=0){this.enemyAttack(e); e.timer=e.interval;} this.animTurnGlass(e);});   // ж•өеҮәжүӢ + жІҷжјҸзҝ»еҚҠеңҲ;е°ҒеҚ°жҜҸжүӢ -1(жӯё 0 еҒңжҠ–)
        this.charge=this.charge.map((c,i)=>{const a=activeSkill(this.teamCards[i].el);return a?Math.min(a.cd,(c||0)+1):c;});   // дё»еӢ•жҠҖи“„еҠӣ+1
        this.renderCharges();
        this.refill(); this.renderTray(); this.updateAll();
      }catch(err){console.error('endHand error',err);}
      finally{ this.locked=false; }   // вҳ… з„Ўи«–еҰӮдҪ•йғҪи§ЈйҺ–,жқңзө•еҚЎжӯ»
      if(!this.anyPlaceable())this.time.delayedCall(420,()=>this.handleStuck());
    });
  }
  // еҚЎжӯ»иҷ•зҗҶ:з©әзӣӨ+еҸӘеү©е·Ҙе…·еЎҠ(еңҹ/йўЁз„Ўеҫһж–ҪеҠӣ)вҶ’иҮӘеӢ•иЈңдёҖиҲ¬жҹҘе…ӢжӢүеЎҠ;еҗҰеүҮжүҚиҠұиЎҖйҮҚжҙ—
  handleStuck(){
    if(this.resultOpen||this.anyPlaceable())return;
    const empty=this.board.every(row=>row.every(c=>!c));
    const unused=this.tray.filter(t=>!t.used);
    const onlyTools=unused.length>0 && unused.every(t=>t.kind==='earth'||t.kind==='wind');
    if(empty&&onlyTools){const s=this.tray.findIndex(t=>!t.used);
      if(s>=0){this.tray[s]={c:pickShape(),used:false};this.renderTray();this.tonFloat('зӣӨйқўе·Із©ә,иҮӘеӢ•иЈңжҹҘе…ӢжӢүеЎҠ','#cfe3ff');return;}}
    if(this.anyStoredPlaceable()){this.flashStored();this.tonFloat('жүҳзӣӨеҚЎдҪҸ вҶ’ жӢ–еҚЎдёҠзҡ„еұ¬еЎҠи§ЈеңҚ!','#ffe066');return;}   // жңүеӯҳеЎҠиғҪи§Ј=дёҚжүЈиЎҖ,жҸҗзӨәз”Ёеұ¬еЎҠ(зңҹжІ’еЎҠеҸҜи§ЈжүҚиҠұиЎҖ)
    this.showReshuffleModal();
  }
  // жңүд»»дҪ•гҖҢеӯҳзҡ„еұ¬еЎҠгҖҚж”ҫеҫ—дёӢе—Һ(иҗ¬з”ЁеЎҠеҸӘиҰҒжңүз©әж јеҸҜеЎ«)
  anyStoredPlaceable(){if(!this.stored)return false;
    return this.stored.some(s=>{if(!s)return false;const cells=s.cells||chakraShape(s.el,s.lv);
      for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(canPlace(this.board,cells,r,c,'water'))return true;return false;});}
  // еҚЎжӯ»жҸҗзӨә:иғҪи§ЈеңҚзҡ„еұ¬еЎҠгҖҢи·і+и„№гҖҚдёҖдёӢ,еҸ«дҪ жӢ–е®ғ(дёҚжүЈиЎҖзҡ„ж•‘е‘ҪеЎҠ)
  flashStored(){this.stopStuckFX(); this.stuckTw=[]; this.stuckObj=[]; this.stuckBlk=[];
    this.teamCards.forEach((card,i)=>{const s=this.stored&&this.stored[i],so=card.storeObj;if(!s||!so)return;
      const cells=s.cells||chakraShape(s.el,s.lv);let ok=false;
      for(let r=0;r<N&&!ok;r++)for(let c=0;c<N&&!ok;c++)if(canPlace(this.board,cells,r,c,'water'))ok=true;
      if(!ok)return;
      const y0=so.y; so._baseY=y0; this.tweens.killTweensOf(so); so.setScale(1).setY(y0);
      this.stuckBlk.push(so);
      this.stuckTw.push(this.tweens.add({targets:so,y:y0-16,duration:240,yoyo:true,repeat:-1,ease:'Quad.inOut'}));            // жҢҒзәҢи·і
      this.stuckTw.push(this.tweens.add({targets:so,scaleX:1.42,scaleY:1.42,duration:240,yoyo:true,repeat:-1,ease:'Sine.inOut'}));  // жҢҒзәҢи„№
      const cx=card.rect.x, cy=card.rect.y;   // еҚЎиә«дә®й»ғе…үз’°жҢҒзәҢи„ҲеӢ•
      const ring=this.add.rectangle(cx,cy,68,68,0,0).setStrokeStyle(4,0xffe066,1).setDepth(DEPTH.fx); this.stuckObj.push(ring);
      this.stuckTw.push(this.tweens.add({targets:ring,scaleX:1.3,scaleY:1.3,alpha:0,duration:620,repeat:-1,ease:'Quad.out'}));});}
  // ж”¶жҺүеҚЎжӯ»жҸҗзӨә(зҺ©е®¶дёҖиЎҢеӢ•е°ұеҒң):еҒң tweenгҖҒйҠ·жҜҖе…үз’°/з®ӯй ӯгҖҒеұ¬еЎҠжӯёдҪҚ
  stopStuckFX(){
    if(this.stuckTw){this.stuckTw.forEach(t=>{if(t)t.stop();});this.stuckTw=null;}
    if(this.stuckObj){this.stuckObj.forEach(o=>{if(o&&o.destroy)o.destroy();});this.stuckObj=null;}
    if(this.stuckBlk){this.stuckBlk.forEach(so=>{if(so&&so.active)so.setScale(1).setY(so._baseY!=null?so._baseY:so.y);});this.stuckBlk=null;}
  }
  /* еңҹеұ¬еЎҠ:е…©ж®өејҸжҗ¬з§»жҹҘе…ӢжӢү вҖ” в‘ жӢ–еЎҠи“ӢдҪҸиҰҒжҠ“зҡ„жҹҘе…ӢжӢү в‘ЎеҶҚжӢ–жҠҠе®ғеҖ‘ж•ҙзө„жҗ¬еҲ°з©әдҪҚ */
  earthSelect(i,r,c){
    const cells=this.tray[i].c, sel=[];
    cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      if(this.board[rr][cc])sel.push({r:rr,c:cc,el:this.board[rr][cc].el});});
    if(!sel.length)return;
    this.earthSel={i,cells:sel};
    this.clearGhost(); sel.forEach(s=>this.cellRect(s.r,s.c).setStrokeStyle(3,0xd49a4a,1));
    this.tonFloat('жҠ“ '+sel.length+' ж ј вҖ” еҶҚжӢ–жӣіжҗ¬еҺ»з©әдҪҚ','#d49a4a');
  }
  startEarthMove(p){
    const sel=this.earthSel.cells;
    const minR=Math.min.apply(null,sel.map(s=>s.r)), minC=Math.min.apply(null,sel.map(s=>s.c));
    const rel=sel.map(s=>({dr:s.r-minR,dc:s.c-minC,el:s.el}));
    sel.forEach(s=>{this.board[s.r][s.c]=null;}); this.refreshBoard();
    const kids=rel.map(o=>this.add.rectangle(o.dc*CS,o.dr*CS,RECT,RECT,EL[o.el]?EL[o.el].color:NEUTRAL_FILL).setOrigin(0).setAlpha(0.9));
    this.earthDrag={i:this.earthSel.i, rel, orig:sel.slice(), prev:this.add.container(0,0,kids).setDepth(DEPTH.drag), kids};
    this.earthSel=null; this.updateEarthMove(p);
  }
  updateEarthMove(p){
    if(!this.earthDrag)return; this.clearGhost();
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.earthDrag;
    if(!cell){d.prev.setVisible(false);return;}
    d.prev.setVisible(true).setPosition(BX0+cell.c*CS,BY0+cell.r*CS);
    const ok=d.rel.every(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;return rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc];});
    d.kids.forEach((k,idx)=>k.setFillStyle(ok?(EL[d.rel[idx].el]?EL[d.rel[idx].el].color:NEUTRAL_FILL):0xff8f8f));
    d.rel.forEach(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      this.cellRect(rr,cc).setStrokeStyle(3,ok?0x8fffa6:0xff8f8f,1);});
  }
  endEarthMove(p){
    if(!this.earthDrag)return;
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.earthDrag;
    d.prev.destroy(); this.clearGhost(); this.earthDrag=null;
    const ok=cell && d.rel.every(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;return rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc];});
    if(ok){ d.rel.forEach(o=>{this.board[cell.r+o.dr][cell.c+o.dc]={el:o.el};});
      this.tray[d.i].used=true; this.afterAction(true);
    } else { d.orig.forEach(s=>{this.board[s.r][s.c]={el:s.el};}); this.refreshBoard(); this.updateAll(); }
  }
  anyPlaceable(){return this.tray.some(p=>{if(p.used)return false;
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(canPlace(this.board,p.c,r,c,p.kind))return true;return false;});}

  resolve(){
    const tgt=this.targetEnemy(); if(!tgt)return;
    const data=computeClears(this.board,this.boxElement,this.boxCard,tgt.el,this.amp);
    if(!data)return;
    this.combo+=data.groups; this.handCleared=true; if(data.groups>=2)this.handBurst=true;   // йҖЈж“ҠйӨөй¬Ҙеҝ—;жҡҙж“ҠжүӢ=зӣҙжҺҘиЎқеҲ°жҘө(д№қе°ҫеҪўж…Ӣ)
    const mmult=CONFIG.MORALE_MULT[this.morale];       // й¬Ҙеҝ—еҖҚзҺҮ(еҸ–д»ЈжңғзЎ¬жӯёйӣ¶зҡ„йҖЈеҚ°еҖҚзҺҮ)
    const burst=1+Math.max(0,data.cells.length-9)/9*0.3;   // еҖҚж•ёд»Ҙ HIT(жё…йҷӨж јж•ё)иЁҲ:9вҶ’Г—1.0гҖҒ18вҶ’Г—1.3гҖҒ27вҶ’Г—1.6гҖҒ36вҶ’Г—1.9вҖҰ
    let leadMult=1; if(this.lead){const L=this.lead;   // йҡҠй•·жҠҖ:еӮ·е®ійЎһеҠ жҲҗ
      if(L.type==='allAtk')leadMult=L.v;
      else if(L.type==='elemAtk'&&data.fx[L.el])leadMult=L.v;
      else if(L.type==='burstAtk'&&data.groups>=2)leadMult=L.v;}
    const dealt=Math.round(data.total*mmult*burst*leadMult);
    let topEl=null;Object.keys(data.fx).forEach(e=>{if(!topEl||data.fx[e].level>data.fx[topEl].level)topEl=e;});
    const topLv=topEl?data.fx[topEl].level:0;
    const aoe=(topLv>=4)||(this.morale>=5), victims=aoe?this.enemies.filter(e=>!e.dead):[tgt];   // LV4+еӨ§ж¶ҲйҷӨ жҲ– й¬Ҙеҝ—гҖҢжҘөгҖҚ=е…Ёй«”
    Object.keys(data.fx).forEach(e=>{const f=data.fx[e];f.attrs.forEach(a=>this.fireAttr(a,f.atk,f.level,tgt));});
    if(!this.fromBlock)Object.keys(data.fx).forEach(e=>this.storeBlock(e,data.fx[e].level));   // жё…е®®вҶ’з”ҹжҲҗи©Іеұ¬еҪўзӢҖеЎҠеӯҳеҲ°еҚЎ(иҗ¬з”ЁеЎҠжё…еҮәзҡ„ж¶ҲйҷӨдёҚеҶҚз”ҹеЎҠ)
    data.cells.forEach(([r,c])=>{const rc=this.cellRect(r,c);
      this.tweens.add({targets:rc,scaleX:1.14,scaleY:1.14,duration:90,yoyo:true});});
    if(data.hitWeak)tgt.timer+=1;
    if(this.combo>=2)this.comboPopup(this.combo);
    if(this.firstClear){this.firstClear=false;track('first_clear');}   // з¬¬дёҖж¬Ўж¶ҲйҷӨ:еҸӘиЁҳеҹӢй»һ,дёҚжј”еҮә(з§»йҷӨгҖҢзөҗеҚ°жҲҗеҠҹгҖҚеӢ•з•«)
    data.cells.forEach(([r,c])=>{this.board[r][c]=null;});  // з«ӢеҚіеҫһжЁЎеһӢз§»йҷӨ,йҒҝе…ҚйҮҚиӨҮи§ёзҷј
    const n=data.cells.length;
    const sorted=Object.keys(data.fx).sort((a,b)=>data.fx[b].level-data.fx[a].level);   // еӨҡжӢӣ:еҸ–зӯүзҙҡжңҖй«ҳзҡ„е…ғзҙ ;ж¬Ўй«ҳиӢҘ вүҘlv2(вүҘ6ж ј)еҶҚеҮәз¬¬дәҢжӢӣ(3 жӢӣд»ҘдёҠж©ҹзҺҮдҪҺ,дёҚеҒҡ)
    const jEls=sorted.length?[sorted[0]]:[null];   // зҙ”жҷ®йҖҡеЎҠжё…йҷӨвҶ’з„Ўе…ғзҙ (null):дёҚеҮәжӢӣејҸеҗҚгҖҒз”Ёй җиЁӯиүІжҹҘе…ӢжӢүеҪҲ(д»ҚиҰҒжңү n HIT + ж”»ж“Ҡ)
    if(sorted[1]&&data.fx[sorted[1]].level>=2)jEls.push(sorted[1]);
    const kk=jEls.length, cellsAll=data.cells.slice(), part=Math.ceil(cellsAll.length/kk), dEach=Math.round(dealt/kk);
    const jutsu=jEls.map((el,i)=>({el, lv:el?data.fx[el].level:1, fire:()=>{   // жҜҸжӢӣ:и©Іе…ғзҙ зҡ„иүІ/еҗҚ,йӣҶж°ЈеҸ–дёҖж®өж јеӯҗ,еӮ·е®іеҲҶж”Ө(зёҪе’Ң=dealt)
      this.chakraStrike(victims, (i===kk-1?dealt-dEach*(kk-1):dEach), el, {cells:cellsAll.slice(i*part,(i+1)*part), parts:el?[{el}]:[], fx:{}});
      if(aoe&&i===0)this.cameras.main.shake(260,0.01);
    }}));
    const atkAt=this.playClearFX(n, jutsu);   // е…Ҳ n HIT вҶ’ жӢӣејҸеҗҚ(1~2 жӢӣдёҰеҲ—)вҶ’ жүҚеҗ„жӢӣйӣҶзөҗе°„еҮә
    this.updateEnemies();
    this.time.delayedCall(Math.max(120,atkAt-100),()=>{   // жё…йҷӨзҡ„ж је№іж»‘гҖҢжә¶и§ЈгҖҚ(йҖҗж јж·ЎеҢ–зҡ„жіў,дёҚжҳҜе…Ҳжқөи‘—еҶҚдёҖиө·ж¶Ҳ)вҶ’ еҢ–йҖІйӣҶж°Ј
      const cc=data.cells||[]; cc.forEach((rc,idx)=>{const cell=this.cellRect(rc[0],rc[1]); if(cell)this.tweens.add({targets:cell,alpha:0,duration:260,delay:Math.min(idx,18)*16,ease:'Sine.in'});});
      this.time.delayedCall(300+Math.min(cc.length,18)*16,()=>this.refreshBoard());   // жә¶и§Је®ҢжүҚжӯЈејҸжё…(refreshBoard йӮ„еҺҹ alpha)
    });
    const impactAt=atkAt+540+this.chargeMs(n)+340;   // жҹҘе…ӢжӢүеҪҲзңҹжӯЈе‘Ҫдёӯзҡ„жҷӮй»һ
    this.time.delayedCall(impactAt,()=>{victims.forEach(v=>{v.hp=Math.max(0,v.hp-dealt);}); this.updateEnemies();});   // вҳ… еҪҲи‘—зһ¬й–“жүҚжүЈиЎҖ(иЎҖжўқеӢ•з•«,дёҚжҸҗж—©)
    this.time.delayedCall(impactAt+440,()=>{this.updateAll(); victims.forEach(v=>{if(v.hp<=0)this.killEnemy(v);});});   // е‘ҪдёӯеҫҢеҶҚж”¶жҺүжӯ»дәЎж•ө
  }
  // еҪўзӢҖзі»зөұ:зҒ«/ж°ҙ/йўЁ/еңҹ/йӣ· зҡ„дё»жҠҖ=з”ҹжҲҗеҪўзӢҖеЎҠеӯҳеҲ°еҚЎ(еңЁ resolve зөұдёҖиҷ•зҗҶ storeBlock);fireAttr еҸӘеү©еӯҗеұ¬жҖ§ йҷ°/йҷҪ
  fireAttr(a,atk,lv,tgt){const A=CONFIG.ATTR;switch(a){
    case 'yang':{const v=Math.round(atk*A.yang_heal_rate*lv);this.playerHP=Math.min(this.maxHP,this.playerHP+v);this.tonFloat('вҳҜйҷҪВ·зҷ’+'+v,'#74e09a');break;}   // йҷҪ=еӣһиЎҖ(е·Із Қ)
    case 'yin':this.amp=Math.max(this.amp,2);this.tonFloat('вҳҜйҷ°В·еӮ·е®іГ—2','#b18cff');break;   // йҷ°=жң¬жүӢеӮ·е®іГ—2(еҝ«ж®ә)
  }}
  // еӯҳж”ҫеұ¬еЎҠеҲ°гҖҢи©Іеұ¬жҖ§зҡ„еҚЎгҖҚ:е„Әе…ҲеЎ«з©әеҚЎ,еҗҰеүҮеҚҮзҙҡжңҖдҪҺйҡҺйӮЈејө;жҜҸеҚЎжңҖеӨҡ1еЎҠгҖҒз•ҷжңҖй«ҳLV(дёҠйҷҗLV5)
  storeBlock(el,lv){if(!this.stored)this.stored=[null,null,null,null,null];
    lv=Math.max(1,Math.min(5,lv));
    const slots=[]; this.teamCards.forEach((c,i)=>{if(c.el===el)slots.push(i);});
    if(!slots.length)return;
    let target=slots.find(i=>!this.stored[i]);
    if(target==null){target=slots.reduce((a,b)=>this.stored[b].lv<this.stored[a].lv?b:a,slots[0]); if(this.stored[target].lv>=lv)return;}
    this.stored[target]={el,lv,cells:randOrient(chakraShape(el,lv),el)}; this.renderStored();   // зҒ«еЎҠз”ҹжҲҗжҷӮе°ұе®ҡйҡЁж©ҹж–№еҗ‘
    this.tonFloat(EL[el].name+'еЎҠLv'+lv+'вҶ’еӯҳеҚЎ','#'+EL[el].color.toString(16).padStart(6,'0'));}

  enemyAttack(e){
    let dmg=e.atk, dodged=false;
    if(this.immune>0){dodged=true;dmg=0;}
    else if(this.armor>0)dmg=Math.round(dmg*(1-this.armor));
    this.resetWave(); e.burn=0;
    const ox=e.sprite?e.sprite.x:CX, oy=e.sprite?e.sprite.y:60, col=EL[e.el].color, ADD=Phaser.BlendModes.ADD;
    if(e.sprite)this.tweens.add({targets:e.sprite,scaleY:(e.baseScale||1)*0.9,duration:120,yoyo:true});   // и“„еҠӣе°Ҹзё®
    this.chargeAt(ox,oy,col,360);   // ж•өеҚЎдёӯеӨ®иҠұзҒ«йӣҶж°Ј
    this.time.delayedCall(360,()=>{
      const tx=BX0+(W-2*BX0)*Math.max(0.05,this.playerHP/this.maxHP), ty=PHP_Y, ctrl={x:ox+(tx-ox)*0.35,y:Math.min(oy,ty)-140};   // иҝҪи№ӨеҪҲ:е…ҲеӨ§е№…еҫҖдёҠгҖҒеҶҚеј§з·ҡиҗҪеҲ°гҖҢзӣ®еүҚиЎҖйҮҸзҡ„жң«з«ҜгҖҚ(йқһиЎҖжўқжңҖеҸі)
      this.flyBall(ox,oy,tx,ty,col,ctrl,440,()=>{
        const fl=this.add.circle(tx,ty,18,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.fx);this.tweens.add({targets:fl,scale:2.6,alpha:0,duration:260,onComplete:()=>fl.destroy()});
        this.cameras.main.shake(220,0.01);
        this.playerHP=Math.max(0,this.playerHP-dmg);
        this.floatText(tx-12,PHP_Y-16,dodged?'иҝҙйҒҝ!':'-'+dmg,dodged?'#74e09a':'#ff8f8f');
        this.animPlayerHP(false);   // HP еӢ•з•«ж…ўж…ўи®Ҡе°‘
        if(this.playerHP<=0){if(this.hitLab){this.playerHP=this.maxHP;this.animPlayerHP(false);}else this.gameOver('HP жӯёйӣ¶');}
      });
    });
  }
  killEnemy(e){if(e.dead)return;
    if(this.hitLab){   // еҜҰй©—е®Ө:д№ҹжј”ж•—йҷЈеҢ–е…ү,жј”е®ҢеҺҹең°йҮҚз”ҹ(й ҶдҫҝзңӢе…Ҙе ҙеӢ•з•«)вҶ’ еҸҜдёҖзӣҙжё¬
      if(e._labDying)return; e._labDying=true;
      e.dead=true; if(e.bob){e.bob.stop();e.bob=null;} if(e.knockTw){e.knockTw.stop();e.knockTw=null;}
      this.playDeath(e);
      this.time.delayedCall(950,()=>{ e.dead=false; e._labDying=false; e.hp=e.max; if(e.hpTw){e.hpTw.stop();e.hpTw=null;}
        const sp=e.sprite; sp.setVisible(true); sp.clearTint&&sp.clearTint();
        [e.turnG,e.hpBg,e.hpFill].forEach(o=>{if(o)o.setVisible(true);}); if(e.card)e.card.setInteractive();
        this.enemyEnter(e,0); this.updateEnemies(); });
      return;
    }
    e.dead=true; if(e.bob){e.bob.stop();e.bob=null;} if(e.knockTw){e.knockTw.stop();e.knockTw=null;}   // вҳ… bob еңЁеҸ—ж“Ҡж“ҠйҖҖжҷӮжңғиў«иЁӯ null,еӢҷеҝ…еҲӨз©ә(еҗҰеүҮжҜҸж¬Ўж“Ҡж®әйғҪдёҹдҫӢеӨ–вҶ’йҺ–жӯ»)
    const last=this.aliveCount()===0, isFinal=last&&this.stage>=this.dungeon.stages.length;
    if(isFinal){ this._finalEnemy=e; this.stageClear(); return; }   // жңҖеҫҢдёҖй—ңжңҖеҫҢдёҖж“Ҡ:з”ұ finalBlow жј”зү№еҜ«йҸЎй ӯ+йЈӣеҮә(дёҚеңЁжӯӨ playDeath)
    this.playDeath(e);   // ж•—йҷЈжј”еҮә:иў«жү“йЈӣ(еҫҢдёҠ)+зё®е°Ҹ+ж—ӢиҪү+ж·ЎеҮә вҶ’ еҢ–жҲҗе…үиҠ’
    if(last)this.stageClear(); else {this.targetEnemy();this.updateEnemies();}
  }
  // жңҖеҫҢдёҖж“Ҡ:йҸЎй ӯжҺЁиҝ‘жңҖеҫҢдёҖйҡ»жҖӘзү№еҜ« вҶ’ и“„еӢўдёҖдёӢ вҶ’ зҷҪй–ғ+йЈӣеҮә вҶ’ жӢүеӣһ вҶ’ д№…дёҖй»һжүҚйҖІзөҗжһң
  finalBlow(e){
    const cam=this.cameras.main, sp=e&&e.sprite, EOut=Phaser.Math.Easing.Quadratic.Out, EIO=Phaser.Math.Easing.Quadratic.InOut;
    if(sp){ cam.pan(sp.x, sp.y, 460, EOut); cam.zoomTo(1.9, 460, EOut); }   // зү№еҜ«жҺЁиҝ‘
    this.time.delayedCall(560,()=>{   // и“„еӢўеҫҢ вҶ’ зҷҪй–ғ + йЈӣеҮә(зү№еҜ«дёӢжӣҙжңүејөеҠӣ)
      if(sp&&sp.active){const fl=this.add.circle(sp.x,sp.y,32,0xffffff,1).setBlendMode(Phaser.BlendModes.ADD).setDepth(DEPTH.fx);
        this.tweens.add({targets:fl,scale:4,alpha:0,duration:320,onComplete:()=>fl.destroy()});}
      this.playDeath(e);
    });
    this.time.delayedCall(1750,()=>{ cam.zoomTo(1,440,EIO); cam.pan(CX,Math.round(H/2),440,EIO); });   // йҸЎй ӯжӢүеӣһ
    this.time.delayedCall(2250,()=>this.showResult(true));   // йЈӣеҮәеҫҢеҒңз•ҷд№…дёҖй»һжүҚйҖІзөҗжһң(дёҚзӘҒе…Җ)
  }
  // ж•—йҷЈжј”еҮә:иў«жү“йЈӣ(еҫҢдёҠ)гҖҒзё®е°ҸгҖҒж—ӢиҪүгҖҒж·ЎеҮә,зё®еҲ°еҫҲе°ҸеҶҚзӮёжҲҗе…үиҠ’
  playDeath(e){const sp=e.sprite, bs=e.baseScale||1, x0=sp.x, y0=(e.restY!=null?e.restY:sp.y);
    if(e.card)e.card.disableInteractive();
    [e.turnG,e.hpBg,e.hpFill,e.mark].forEach(o=>{if(o)this.tweens.add({targets:o,alpha:0,duration:200,onComplete:()=>{o.setVisible(false);o.setAlpha(1);}});});
    this.tweens.killTweensOf(sp); sp.clearTint&&sp.clearTint();
    this.tweens.add({targets:sp, y:y0-72, x:x0+(x0<CX?-22:22), scaleX:bs*0.12, scaleY:bs*0.12, angle:220, alpha:0.15, duration:560, ease:'Quad.in',
      onComplete:()=>{this.deathLight(x0,y0-64,e.el); sp.setVisible(false);}});
  }
  deathLight(x,y,el){const ADD=Phaser.BlendModes.ADD;
    const fl=this.add.circle(x,y,12,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.fx);   // дёӯеҝғе…үиҠ’зҲҶй–ғ
    this.tweens.add({targets:fl,scale:5,alpha:0,duration:440,ease:'Quad.out',onComplete:()=>fl.destroy()});
    for(let i=0;i<18;i++){const a=i/18*Math.PI*2+(Math.random()-0.5)*0.4, d=this.add.circle(x,y,3,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.fx);   // еӣӣж•Је…үй»һ
      this.tweens.add({targets:d,x:x+Math.cos(a)*(42+Math.random()*44),y:y+Math.sin(a)*(42+Math.random()*44)-18,alpha:0,scale:0.2,duration:520+Math.random()*240,ease:'Quad.out',onComplete:()=>d.destroy()});}
  }
  // ж•өе…Ҙе ҙ:еҫһгҖҢйҒ иҷ•(е°ҸгҖҒеҒҸй«ҳгҖҒж·Ў)гҖҚжө®зҸҫеҲ°е®ҡдҪҚ вҖ”вҖ” еғҸеҫҖж·ұиҷ•жҺЁйҖІеҫҢ,ж–°ж•өиҮӘйҒ ж–№йҖјиҝ‘
  enemyEnter(e,delay){ if(!e||!e.sprite)return; const sp=e.sprite, bs=e.baseScale||1, ry=(e.restY!=null?e.restY:sp.y), rx=(e.card?e.card.x:sp.x); delay=delay||0;
    if(e.bob){e.bob.stop();e.bob=null;} this.tweens.killTweensOf(sp);
    sp.setScale(bs*0.22).setAlpha(0).setAngle(0).setPosition(rx, ry-48);   // вҳ… з”Ёж•өеҚЎеҺҹе§Ӣ x(йқһиў«жү“йЈӣеҫҢзҡ„дҪҚз§» x)вҶ’ йҮҚз”ҹдёҚеҶҚеҫҖе·ҰйЈ„
    this.tweens.add({targets:sp,alpha:1,duration:220,delay:delay});
    this.tweens.add({targets:sp,scaleX:bs,scaleY:bs,y:ry,duration:460,delay:delay,ease:'Back.out',
      onComplete:()=>{sp.setScale(bs);sp.setY(ry);if(!e.dead)e.bob=this.tweens.add({targets:sp,y:ry-4,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});}});
    [e.turnG,e.hpBg,e.hpFill].forEach(o=>{if(o){o.setAlpha(0);this.tweens.add({targets:o,alpha:1,duration:300,delay:delay+150});}});
  }
  // йҒҺй—ңеүҚйҖІ:йҸЎй ӯеҫҖеүҚжҺЁдёҖдёӢ + зӣҙеҗ‘йҖҹеәҰз·ҡеҫҖдёӢеҲ·йҒҺ(еғҸеҫҖж·ұиҷ•еүҚйҖІеҲ°дёӢдёҖй—ң)
  stageAdvanceFX(){ const cam=this.cameras.main;
    cam.zoomTo(1.06,200,Phaser.Math.Easing.Quadratic.Out); this.time.delayedCall(220,()=>cam.zoomTo(1,300,Phaser.Math.Easing.Quadratic.InOut));   // вҳ… зӣёж©ҹж•Ҳжһңзҡ„ ease еҝ…й ҲжҳҜеҮҪејҸ(EaseMap дёҚж”¶ 'Quad.out' з°ЎеҜ«)еҗҰеүҮжҜҸе№ҖдёҹдҫӢеӨ–вҶ’еҮҚдҪҸ
    for(let i=0;i<16;i++){const x=16+Math.random()*(W-32), len=44+Math.random()*90;
      const s=this.add.rectangle(x,-len,2.5,len,0xffffff,0.45).setOrigin(0.5,0).setDepth(DEPTH.flash);
      this.tweens.add({targets:s,y:H+len,alpha:0,duration:320+Math.random()*180,delay:Math.random()*200,ease:'Quad.in',onComplete:()=>s.destroy()});}
  }
  stageClear(){
    rollDrops(this.dungeon.drops[this.stage-1]).forEach((cd,i)=>{const isNew=!isOwned(cd.id);addCard(cd.id);this.runDrops.push({cd,isNew});
      this.time.delayedCall(i*240,()=>this.tonFloat('рҹҺҒ '+cd.name+(isNew?' вңҰNEW':''),isNew?'#ffe04a':'#ffe08a'));});
    recordStage(this.stage, false);   // иЁҳжңҖдҪій—ң
    if(this.dungeon.el && Math.random()<0.6){addGem(this.dungeon.el);this.runGems++;   // е…ғзҙ й—ңжҺүйҖІеҢ–зҙ жқҗгҖҢеҜ¶зҺүгҖҚ
      this.time.delayedCall(120,()=>this.tonFloat('рҹ”® '+EL[this.dungeon.el].name+'еҜ¶зҺү','#c5b0ff'));}
    const _rw=addRewards(40,300); this.runExp+=40; this.runCoins+=300;   // жҲ°й¬ҘзҚҺеӢө:EXP/йҮ‘йҢў
    if(_rw._ups>0)this.tonFloat('рҹҶҷ зӯүзҙҡжҸҗеҚҮ! Lv.'+_rw.rank,'#ffe04a');
    if(this.stage>=this.dungeon.stages.length){markDungeonCleared(this.dungeonId);this.chests++;this.finalBlow(this._finalEnemy);return;}   // жңҖеҫҢдёҖй—ңе…Ёжё…вҶ’жңҖеҫҢдёҖж“Ҡзү№еҜ«жј”еҮәеҫҢжүҚйҖІзөҗжһң
    this.stage++; this.chests++; this.playerHP=Math.min(this.maxHP,this.playerHP+150);
    this.time.delayedCall(700,()=>{try{this.stageAdvanceFX();}catch(e){} this.time.delayedCall(380,()=>{try{this.startStage(true);}catch(e){console.error('startStage error',e);}});});   // йҒҺй—ң:еүҚйҖІжј”еҮә вҶ’ дёӢдёҖй—ңж•өдәәиҮӘйҒ ж–№йҖјиҝ‘е…Ҙе ҙ(дёҚжё…зӣӨ,зӣӨйқўзҙҜз©Қ)
  }
  reshuffle(){if(this.playerHP<=CONFIG.RESHUFFLE_COST){this.gameOver('з”ҹе‘ҪдёҚи¶ігҖҒз„Ўжі•еҶҚжҸҗз…ү');return;}
    this.playerHP-=CONFIG.RESHUFFLE_COST; this.refill(); this.renderTray(); this.updateAll();}
  gameOver(reason){if(this.resultOpen)return;this.showResult(false);}
  restartStage(){this.playerHP=this.maxHP;this.startStage();}

  /* UI */
  updateAll(){this.updateEnemies();this.updateBars();}
  updateEnemies(){this.enemies.forEach((e,i)=>{if(e.dead)return;
    const tw=e.hpW*Math.max(0,e.hp/e.max);   // иЎҖжўқеӢ•з•«ж…ўж…ўжүЈ(дёҚзһ¬й–“и·і)
    if(Math.abs((e.hpFill.displayWidth||0)-tw)>0.5){if(e.hpTw)e.hpTw.stop();e.hpTw=this.tweens.add({targets:e.hpFill,displayWidth:tw,duration:480,ease:'Quart.out'});}   // жүЈиЎҖе…Ҳеҝ«еҫҢж…ў(Quart.out)
    else e.hpFill.displayWidth=tw;
    if(e.turnTx){const tm=Math.max(0,e.timer);   // жІҷжјҸеҸійӮҠзҡ„ж•ёеӯ—=еү©йӨҳеҮәжүӢжүӢж•ё;и¶Ҡе°‘и¶Ҡзҙ…(1жүӢе…§зҙ…гҖҒ2жүӢй»ғгҖҒвүҘ3зҷҪи—Қ)
      e.turnTx.setText(String(tm)).setColor(tm<=1?'#ff5a4a':tm===2?'#ffc24a':'#eaf3ff');}
    e.mark.setVisible(i===this.target);});}
  // жҜҸеӣһеҗҲ:жІҷжјҸи·ідёҖдёӢ + зҝ»иҪүеҲ°дёӢдёҖеҖӢ 90В°(зҙҜз©Қ),ж•ёеӯ—йҡЁ updateEnemies жӣҙж–°
  animTurnGlass(e){
    if(!e.glass||!e.turnG)return;
    const tgt=(Math.round(e.glass.angle/180)+1)*180;   // е°ҚйҪҠеҲ°дёӢдёҖеҖӢ 180В°(зҝ»еҚҠеңҲ)вҶ’ еҸӘеңЁзӣҙз«ӢвҶ”зҝ»йқўеҲҮжҸӣ,дёҚжңғеҒҙиәәеғҸжүҜйҲҙ
    this.tweens.killTweensOf(e.glass); this.tweens.add({targets:e.glass,angle:tgt,duration:340,ease:'Cubic.out'});
    const restY=BATTLE_CY-e.cardH/2+11; this.tweens.killTweensOf(e.turnG); e.turnG.setY(restY);
    this.tweens.add({targets:e.turnG,y:restY-7,duration:170,yoyo:true,ease:'Quad.out'});   // и·ідёҖдёӢиҗҪеӣһ
  }
  updateBars(){
    if(!this.pHpTw||!this.pHpTw.isPlaying()){this.pHp.displayWidth=(W-2*BX0)*Math.max(0,this.playerHP/this.maxHP); if(this.pHpCap)this.pHpCap.x=BX0+this.pHp.displayWidth;}   // еӢ•з•«жүЈ/иЈңиЎҖдёӯвҶ’дёҚзһ¬й–“и“ӢжҺү;ең“й ӯи·ҹи‘—жң«з«Ҝ
    this.pHpTxt.setText(this.playerHP+'/'+this.maxHP);   // еҺ»жҺүгҖҢжҲ‘ж–№гҖҚ
    this.chestTxt.setText('рҹ“Ұ '+(this.chests||0)); this.goldTxt.setText('рҹ’° '+(this.gold||0));
    const mcol=['#99aabb','#9ac4e0','#ffffff','#ffd24a','#ff9a3a','#ff5a3a'][this.morale]||'#ffd56a';
    if(this.moraleTx){this.moraleTx.setText(CONFIG.MORALE_NAMES[this.morale]).setColor(this.morale>=5?'#fff4e0':mcol);   // жҘөвҶ’еӯ—з”Ёдә®зҷҪ,еңЁжөҒеӢ•еә•дёҠеҸҜи®Җ
      if(this.morale<5)this.moraleBg.setFillStyle(0x1a140c,0.92).setStrokeStyle(2,parseInt(mcol.slice(1),16));}   // йқһжҘө=жҡ—еә•+и©ІйҡҺиүІз’°;жҘөзҡ„еә•/з’°дәӨзөҰ update() и·‘жјёеұӨжөҒеӢ•,дёҚеңЁжӯӨиҰҶеҜ«
  }

  /* зү№ж•Ҳ */
  // жҠ•е°„зү©:дә®зҷҪж ё + и©Іеұ¬иүІе…үжҡҲ + жјёйҡұжӢ–е°ҫ,еҠ йҖҹйЈӣеҗ‘ж•өдәә(жҜ”е°ҸзҷҪй»һзӮ«)
  projectile(ox,oy,tx,ty,glyph,color,delay,dmg,tgt){
    this.time.delayedCall(delay,()=>{
      const glow=this.add.circle(ox,oy,16,color,0.4).setDepth(DEPTH.proj);
      const core=this.add.circle(ox,oy,7,0xffffff,1).setDepth(DEPTH.proj);
      let fc=0;
      this.tweens.add({targets:[glow,core],x:tx,y:ty,duration:340,ease:'Quad.in',
        onUpdate:()=>{ if((fc++%3)===0&&core.active){const d=this.add.circle(core.x,core.y,5,color,0.55).setDepth(DEPTH.proj-1);
          this.tweens.add({targets:d,scale:0.2,alpha:0,duration:280,onComplete:()=>d.destroy()});} },   // жӢ–е°ҫ
        onComplete:()=>{glow.destroy();core.destroy();this.impact(tx,ty,color,dmg,tgt);}});
      this.tweens.add({targets:glow,scale:1.5,duration:340,ease:'Quad.in'});   // йҖјиҝ‘жҷӮе…үжҡҲи„№еӨ§
    });
  }
  impact(x,y,color,dmg,tgt){
    if(tgt&&!tgt.dead){tgt.sprite.setTint(0xffffff);
      const bs=tgt.baseScale||1;if(tgt.hitTw)tgt.hitTw.stop();tgt.sprite.setScale(bs);   // зё®ж”ҫеӢ•з•«зӣёе°Қеҹәжә–зё®ж”ҫ(еҸІдҫҶе§Ҷең– baseвүҲ0.39),е…ҲеҒңжҺүеүҚдёҖеҖӢеҸ—ж“ҠtweenйҒҝе…ҚйҖЈж“Ҡз–ҠеҠ и®ҠеӨ§
      tgt.hitTw=this.tweens.add({targets:tgt.sprite,scaleX:bs*1.18,scaleY:bs*1.18,duration:100,yoyo:true,onComplete:()=>{tgt.sprite.setScale(bs);tgt.sprite.clearTint();tgt.hitTw=null;}});}
    const flash=this.add.circle(x,y,12,0xffffff,0.9).setDepth(DEPTH.proj);   // е‘Ҫдёӯ:дә®зҷҪзҲҶй–ғ
    this.tweens.add({targets:flash,scale:0.2,alpha:0,duration:220,onComplete:()=>flash.destroy()});
    const ring=this.add.circle(x,y,10,color,0).setStrokeStyle(4,color,1).setDepth(DEPTH.proj);   // еҪ©иүІж“ҙж•Јз’°
    this.tweens.add({targets:ring,scale:4,alpha:0,duration:380,ease:'Quad.out',onComplete:()=>ring.destroy()});
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2, sp=this.add.circle(x,y,3,color,0.9).setDepth(DEPTH.proj);   // зўҺзүҮеӣӣе°„
      this.tweens.add({targets:sp,x:x+Math.cos(a)*26,y:y+Math.sin(a)*26,alpha:0,scale:0.3,duration:340,ease:'Quad.out',onComplete:()=>sp.destroy()});}
    this.cameras.main.shake(150,0.005);
  }
  floatText(x,y,str,color){const t=this.add.text(x,y,str,{fontFamily:EMOJIFONT,fontSize:'19px',color,fontStyle:'bold'}).setOrigin(0.5).setDepth(DEPTH.fx);
    this.tweens.add({targets:t,y:y-40,alpha:0,duration:900,ease:'Quad.out',onComplete:()=>t.destroy()});}
  // ж•өдәәжүЈиЎҖж•ёеӯ—:еӨ§зҙ…гҖҢ-NгҖҚеҪҲеҮәеҫҢдёҠйЈ„ж·ЎеҮә
  dmgPop(x,y,n){const t=this.add.text(x,y-16,'-'+n,{fontFamily:EMOJIFONT,fontSize:'27px',color:'#ff5040',fontStyle:'bold',stroke:'#350200',strokeThickness:5}).setOrigin(0.5).setDepth(DEPTH.fx).setScale(0.4);
    this.tweens.add({targets:t,scale:1.15,duration:150,ease:'Back.out'});
    this.tweens.add({targets:t,y:y-58,alpha:0,duration:720,delay:220,ease:'Quad.out',onComplete:()=>t.destroy()});}
  // жү“ж“Ҡй “ж ј:е‘Ҫдёӯзһ¬й–“еҮҚдҪҸж•ҙеҖӢе ҙжҷҜ ~ms(tween+иЁҲжҷӮеҷЁ timeScale=0,зңҹеҜҰжҷӮй–“еҫҢеҫ©еҺҹ)вҶ’ жү“еҲ°иӮүзҡ„д»ҪйҮҸ
  hitStop(ms){ if(this._hitStop)return; this._hitStop=true; this.tweens.timeScale=0; this.time.timeScale=0;
    setTimeout(()=>{ this.tweens.timeScale=1; this.time.timeScale=1; this._hitStop=false; }, ms); }
  // ж•өдәәеҸ—ж“Ҡж“ҠйҖҖ:еҫҢйҖҖ(дёҠз§»+зё®е°Ҹ)вҶ’ еҒңй “ вҶ’ ж…ўж…ўеӣһеҲ°еҺҹдҪҚ
  knockEnemy(e){ if(!e||!e.sprite)return; const sp=e.sprite, ry=(e.restY!=null?e.restY:sp.y), bs=e.baseScale||1;
    if(e.bob){e.bob.stop();e.bob=null;}                       // жҡ«еҒңдёҠдёӢжө®еӢ•,йҒҝе…Қе’Ңж“ҠйҖҖ y иЎқзӘҒ
    if(e.knockTw)e.knockTw.stop();
    sp.setScale(bs);
    e.knockTw=this.tweens.add({targets:sp,y:ry-20,scaleX:bs*0.8,scaleY:bs*0.8,duration:120,ease:'Quad.out',   // в‘ еҫҢйҖҖ:дёҠз§» + зё®е°Ҹ(еҝ«)
      onComplete:()=>{
        e.knockTw=this.tweens.add({targets:sp,y:ry,scaleX:bs,scaleY:bs,delay:150,duration:440,ease:'Quad.out',   // в‘ЎеҒңй “еҫҢж…ўж…ўеӣһдҪҚ
          onComplete:()=>{sp.setScale(bs);sp.setY(ry);e.knockTw=null;
            if(!e.dead)e.bob=this.tweens.add({targets:sp,y:ry-4,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});}});   // еӣһеҫ©дёҠдёӢжө®еӢ•
      }}); }
  // жҹҘе…ӢжӢүйӣҶзөҗжҲҗеҚ° вҶ’ е°„еҗ‘ж•өдәә(е…ЁзЁӢ additive з–Ҡе…ү=зңҹзҷје…ү)
  chakraBez(a,c,b,t){const it=1-t;return {x:it*it*a.x+2*it*t*c.x+t*t*b.x, y:it*it*a.y+2*it*t*c.y+t*t*b.y};}   // дәҢж¬ЎиІқиҢІ
  chakraBez3(a,c1,c2,b,t){const it=1-t,it2=it*it,t2=t*t;return {x:it2*it*a.x+3*it2*t*c1.x+3*it*t2*c2.x+t2*t*b.x, y:it2*it*a.y+3*it2*t*c1.y+3*it*t2*c2.y+t2*t*b.y};}   // дёүж¬ЎиІқиҢІ
  chakraArc(a,b,mag){const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,dx=b.x-a.x,dy=b.y-a.y,L=Math.hypot(dx,dy)||1;return {x:mx-dy/L*mag, y:my+dx/L*mag};}   // жҺ§еҲ¶й»һ:дёӯй»һеҫҖеһӮзӣҙеҒҸ mag вҶ’ еј§з·ҡ
  chargeMs(hit){ return hit>=15 ? Math.min(1100,Math.round(220+(hit-15)*28)) : 0; }   // 15 HIT д»ҘдёҠжүҚи“„еҠӣ;HIT и¶Ҡй«ҳзІ’еӯҗзӮ®жҢҒзәҢж”¶жқҹи¶Ҡд№…(15вҶ’220msвҖҰ45вҶ’1060ms)
  chakraStrike(victims, dealt, topEl, data){
    const ADD=Phaser.BlendModes.ADD, LP={x:CX,y:BOARD_CY}, col=topEl?EL[topEl].color:0xbfe6ff;   // йӣҶзөҗеҲ°зӣӨйқўдёӯеҝғ
    const hit=(data.cells||[]).length, pw=Math.min(5,Math.max(1,hit/9)), gs=1+(pw-1)*0.4;   // HIT и¶ҠеӨҡвҶ’йӣҶж°Ј/еҚ°/еҪҲ/зҲҶи¶ҠеӨ§(9вҶ’Г—1гҖҒ18вҶ’Г—1.4гҖҒ27вҶ’Г—1.8гҖҒ36вҶ’Г—2.2гҖҒ45вҶ’Г—2.6)
    const seen={}; (data.parts||[]).forEach(pt=>{if(pt.el&&pt.el!=='neutral'&&!seen[pt.el]){seen[pt.el]=1;this.glowTeam(pt.el);}});
    const core=this.add.circle(LP.x,LP.y,3,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);   // йӣҶж°Јзҗғ:дә®зҷҪж ё + еұ¬иүІе…үжҡҲ,жјёеӨ§
    const glow=this.add.circle(LP.x,LP.y,7,col,0.55).setBlendMode(ADD).setDepth(DEPTH.proj);
    this.tweens.add({targets:core,scale:4.5*gs,duration:480,ease:'Quad.in'});
    this.tweens.add({targets:glow,scale:5*gs,duration:480,ease:'Quad.in'});
    const cells=(data.cells||[]).slice();   // е…©ж®өејҸ:е…ҲеҫҖеӨ–ж•Јй–ӢвҶ’еҶҚеҘ”еҗ‘дёӯеҝғ;HIT и¶ҠеӨҡзІ’еӯҗи¶ҠеӨҡ(дёҠйҷҗ28)
    cells.slice(0,28).forEach((rc,i)=>{const o=this.cellCenter(rc[0],rc[1]);
      this.time.delayedCall((i%10)*16,()=>{
        const dx=o.x-LP.x, dy=o.y-LP.y, sa=Math.atan2(dy,dx)+(Math.random()-0.5)*1.5;   // еӨ§иҮҙйӣўеҝғж–№еҗ‘ + йҡЁж©ҹ
        const sp={x:o.x+Math.cos(sa)*(28+Math.random()*34), y:o.y+Math.sin(sa)*(28+Math.random()*34)-(8+Math.random()*16)};
        const d=this.add.circle(o.x,o.y,4,col,0.9).setBlendMode(ADD).setDepth(DEPTH.proj-1);
        this.tweens.add({targets:d,x:sp.x,y:sp.y,scale:1.25,duration:140,ease:'Quad.out',onComplete:()=>{   // в‘ ж•Јй–Ӣ(еӨ–з”©)
          const a={x:sp.x,y:sp.y}, b={x:LP.x,y:LP.y}, ctrl=this.chakraArc(a,b,26+Math.random()*40), ob={t:0};
          this.tweens.add({targets:ob,t:1,duration:280+(i%5)*38,ease:'Quad.in',                            // в‘ЎжІҝеј§з·ҡеҘ”еҗ‘дёӯеҝғ
            onUpdate:()=>{const p=this.chakraBez(a,ctrl,b,ob.t);d.setPosition(p.x,p.y).setScale(1.25-ob.t*1.05);},
            onComplete:()=>d.destroy()});
        }});
      });
    });
    const fireBolts=()=>{victims.forEach((v,k)=>{if(!v.sprite)return;this.time.delayedCall(k*60,()=>this.chakraBolt(LP.x,LP.y,v.sprite.x,v.sprite.y,col,v,dealt,pw));});};
    this.time.delayedCall(540,()=>{   // йӣҶзөҗе®ҢжҲҗ вҶ’ еҚ°зҲҶй–ғ вҶ’ (еӨ§ HIT еҶҚдәҢж¬Ўи“„еҠӣ) вҶ’ е°„еҮә(иҰҸжЁЎйҡЁ HIT)
      core.destroy(); glow.destroy();
      const seal=this.add.circle(LP.x,LP.y,16*gs,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);
      this.tweens.add({targets:seal,scale:3.2,alpha:0,duration:220,ease:'Quad.out',onComplete:()=>seal.destroy()});
      const sg=this.add.circle(LP.x,LP.y,20*gs,col,0.6).setBlendMode(ADD).setDepth(DEPTH.proj);
      this.tweens.add({targets:sg,scale:2.4,alpha:0,duration:300,ease:'Quad.out',onComplete:()=>sg.destroy()});
      this.cameras.main.shake(110+pw*35,0.005+pw*0.002);
      const chDur=this.chargeMs(hit);

        const cc=this.add.circle(LP.x,LP.y,6*gs,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);   // и“„еҠӣж ё:ж•ҙж®өжҢҒзәҢй•·еӨ§(иғҪйҮҸзҙҜз©Қ)

        }});
        this.time.delayedCall(chDur,()=>{   // и“„ж»ҝ вҶ’ еҚ°зҲҶй–ғ(жӣҙдә®)вҶ’ е°„еҮә

  // жҹҘе…ӢжӢүеҪҲ:жІҝеј§з·ҡйЈӣ + йҖҗж®өжҸҸеҮәзҡ„еј§з·ҡи»Ңи·Ўз·ҡ(дә®зҷҪж ё + еұ¬иүІе…үжҡҲ,еғҸеӯҗж©ҹ/иҝҪи№ӨеҪҲ)
  chakraBolt(ox,oy,tx,ty,color,tgt,dmg,pw,hot){
    pw=pw||1; hot=hot||0xffffff; const ADD=Phaser.BlendModes.ADD, a={x:ox,y:oy}, b={x:tx,y:ty}, bs=1+(pw-1)*0.4;   // bs:еҪҲй«”/и»Ңи·ЎйҡЁ HIT и®ҠзІ—еӨ§;hot=й«ҳе…үиүІ(й җиЁӯзҷҪ)
    const ctrl=this.chakraArc(a,b,(Math.random()<0.5?1:-1)*(55+Math.random()*45));
    const glow=this.add.circle(ox,oy,17*bs,color,0.5).setBlendMode(ADD).setDepth(DEPTH.proj);
    const core=this.add.circle(ox,oy,9*bs,hot,1).setBlendMode(ADD).setDepth(DEPTH.proj);
    const trail=this.add.graphics().setDepth(DEPTH.proj-1).setBlendMode(ADD), ob={t:0};
    this.tweens.add({targets:ob,t:1,duration:320,ease:'Quad.in',
      onUpdate:()=>{const p=this.chakraBez(a,ctrl,b,ob.t); glow.setPosition(p.x,p.y); core.setPosition(p.x,p.y);
        trail.clear(); const N=Math.max(2,Math.round(ob.t*26));
        trail.lineStyle(6*bs,color,0.4); trail.beginPath(); trail.moveTo(a.x,a.y); for(let i=1;i<=N;i++){const q=this.chakraBez(a,ctrl,b,ob.t*i/N);trail.lineTo(q.x,q.y);} trail.strokePath();
        trail.lineStyle(2.5*bs,hot,0.9); trail.beginPath(); trail.moveTo(a.x,a.y); for(let i=1;i<=N;i++){const q=this.chakraBez(a,ctrl,b,ob.t*i/N);trail.lineTo(q.x,q.y);} trail.strokePath();},
      onComplete:()=>{glow.destroy();core.destroy(); this.tweens.add({targets:trail,alpha:0,duration:360,onComplete:()=>trail.destroy()}); this.chakraImpact(tx,ty,color,tgt,dmg,Math.atan2(ty-ctrl.y,tx-ctrl.x),pw,hot);}});   // еӮіе…ҘеҲ°йҒ”и§’еәҰ(иІқиҢІжң«з«ҜеҲҮз·ҡ)+ HIT иҰҸжЁЎ + й«ҳе…үиүІ
    this.tweens.add({targets:glow,scale:1.5,duration:320,ease:'Quad.in'});
  }
  // ang=жҹҘе…ӢжӢүеҪҲеҲ°йҒ”и§’еәҰвҶ’зҒ«иҠұ/зІ’еӯҗдҫқгҖҢж“Ҡдёӯи§’еәҰгҖҚж•Јй–Ӣ(еӨ§еҚҠеҫҖдҫҶеҗ‘еҸҚеҗ‘жҪ‘еӣһ back-splashгҖҒе°‘ж•ёз©ҝйҖҸ)
  chakraImpact(x,y,color,tgt,dmg,ang,pw,hot){
    const ADD=Phaser.BlendModes.ADD; pw=pw||1; hot=hot||0xffffff; const ps=1+(pw-1)*0.4;   // ps:е‘ҪдёӯиҰҸжЁЎйҡЁ HIT(9вҶ’Г—1гҖҒ18вҶ’Г—1.4гҖҒ27вҶ’Г—1.8);hot=й«ҳе…үиүІ
    if(tgt&&!tgt.dead){tgt.sprite.setTint(hot);this.time.delayedCall(110,()=>{if(tgt.sprite&&!tgt.dead)tgt.sprite.clearTint();});   // еҸ—ж“Ҡй«ҳе…үй–ғ
      this.knockEnemy(tgt);}   // ж“ҠйҖҖ(еҫҢйҖҖзё®е°ҸвҶ’еҒңй “вҶ’еӣһдҪҚ)
    const flash=this.add.circle(x,y,15*ps,hot,1).setBlendMode(ADD).setDepth(DEPTH.proj);   // й«ҳе…үзҲҶй–ғ(зё®е°Ҹеҝ«ж”¶вҶ’дёҚи“ӢзҒ«иҠұ;HIT и¶ҠеӨҡи¶ҠеӨ§)
    this.tweens.add({targets:flash,scale:0.2,alpha:0,duration:170,onComplete:()=>flash.destroy()});
    const halo=this.add.circle(x,y,26*ps,color,0.4).setBlendMode(ADD).setDepth(DEPTH.proj);   // еұ¬иүІе…үжҡҲ(ж·ЎдёҖй»һ)
    this.tweens.add({targets:halo,scale:1.6,alpha:0,duration:320,ease:'Quad.out',onComplete:()=>halo.destroy()});
    [[14,5,420,color],[10,7,560,hot]].forEach(o=>{const ring=this.add.circle(x,y,o[0]*ps,0,0).setStrokeStyle(5,o[3],1).setBlendMode(ADD).setDepth(DEPTH.proj);   // йӣҷж“ҙж•Јз’°
      this.tweens.add({targets:ring,scale:o[1],alpha:0,duration:o[2],ease:'Quad.out',onComplete:()=>ring.destroy()});});
    // з·ҡеҪўзҒ«иҠұ:ең“еҪў 360В° еӣӣе°„(йЈӣжӣҙйҒ ;HIT и¶ҠеӨҡйЎҶзІ’и¶ҠеӨҡгҖҒзҒ«иҠұи¶Ҡй•·)
    const nL=Math.round(14+pw*6), lf=1+(pw-1)*0.25;   // 9вҶ’20гҖҒ18вҶ’26гҖҒ27вҶ’32 йҒ“
    for(let i=0;i<nL;i++){const a=i/nL*Math.PI*2+(Math.random()-0.5)*0.5, len=(15+Math.random()*16)*lf;
      const sp=this.add.rectangle(x,y,len,4,hot).setOrigin(0,0.5).setRotation(a).setBlendMode(ADD).setDepth(DEPTH.proj);
      this.tweens.add({targets:sp,x:x+Math.cos(a)*(48+Math.random()*64),y:y+Math.sin(a)*(48+Math.random()*64),alpha:0,scaleX:0.18,duration:560+Math.random()*340,ease:'Quad.out',onComplete:()=>sp.destroy()});}
    const nD=Math.round(11+pw*5);   // зҷҪй»һзІ’еӯҗеӣӣе°„:9вҶ’16гҖҒ18вҶ’21гҖҒ27вҶ’26 йЎҶ
    for(let i=0;i<nD;i++){const a=i/nD*Math.PI*2+(Math.random()-0.5)*0.5, d=this.add.circle(x,y,3.5,hot,1).setBlendMode(ADD).setDepth(DEPTH.proj);
      this.tweens.add({targets:d,x:x+Math.cos(a)*(42+Math.random()*52),y:y+Math.sin(a)*(42+Math.random()*52),alpha:0,scale:0.2,duration:540+Math.random()*280,ease:'Quad.out',onComplete:()=>d.destroy()});}
    if(tgt&&tgt.sprite)this.dmgPop(tgt.sprite.x,tgt.sprite.y,dmg);
    this.cameras.main.shake(200+pw*40,0.009+pw*0.003);                  // йңҮе№…йҡЁ HIT еҠ йҮҚ(дёҚеҒҡ hitstop:еҮҚж јжңғиў«иӘӨиӘҚжҲҗ lag)
  }
  tonFloat(str,color){const t=this.add.text(CX,BY0-54,str,{fontFamily:EMOJIFONT,fontSize:'17px',color,fontStyle:'bold'}).setOrigin(0.5).setDepth(DEPTH.fx);

    const t=this.comboTx=this.add.text(CX,BOARD_CY-60,n+' COMBO',{fontFamily:HITFONT,fontSize:'27px',color:'#ffd56a',fontStyle:'bold',stroke:'#7a4a00',strokeThickness:5}).setOrigin(0.5).setScale(0.4).setDepth(DEPTH.fx);

  // жё…йҷӨжј”еҮә:дёҖжүӢжё…жҺү n ж ј вҶ’ зӣӨйқўдёӯеӨ®гҖҢn HITгҖҚгҖӮж•ёеӯ—еҫһ 1 ж…ўж…ў +1 йЈҶеҲ° n(зңӢеҫ—жё…еңЁ +)гҖҒйӮҠж•ёйӮҠи„№еӨ§гҖҒиҗҪе®ҡеӨ§еҪҲ;ж”ҫж…ўжұӮиҸҜйә—зҲҪж„ҹ
  countFX(n){
    if(this.hitTx){this.tweens.killTweensOf(this.hitTx);this.hitTx.destroy();}   // еҗҢдҪҚзҪ®еҸӘз•ҷжңҖж–°(еҝ«йҖҹйҖЈж”ҫдёҚз–ҠжҲҗдёҖеңҳ)

    const cnt={v:1}, dur=Math.max(280,Math.min(680,Math.round(n*42)));   // ~42ms/жӯҘ(еҠ еҝ«);зёҪй•· 0.28~0.68s

/* ===== еҚЎеҶҠ вҶ’ иғҢеҢ…(жҖӘзү©з®ұ):з¶Іж ј вҶ’ й»һеҚЎйҖІи©ізҙ°й Ғ + ж“ҚдҪң ===== */
class CollectionScene extends Phaser.Scene{
  constructor(){super('collection');}
  init(d){this.sel=(d&&d.sel)||null;

  create(){this.add.rectangle(CX,H/2,W,H,0x160f18);this.rebuild();

  rebuild(){if(this.layer)this.layer.destroy();this.layer=this.add.container(0,0);this.draw();}

  txt(x,y,s,size,col,ox,bold){return this.L(this.add.text(x,y,s,{fontFamily:EMOJIFONT,fontSize:Math.max(15,parseInt(size||'16',10)||16)+'px',color:col||'#f3e9d8',fontStyle:bold?'bold':'normal'}).setOrigin(ox==null?0.5:ox,0.5));}   // е…ЁйҒёе–®еӯ—зҙҡжңҖе°Ҹ 15px(жүӢж©ҹеҸҜи®Җ)
  rect(x,y,w,h,col,a){return this.L(this.add.rectangle(x,y,w,h,col,a==null?1:a));}

    this.tweens.add({targets:t,alpha:0,delay:900,duration:400,onComplete:()=>t.destroy()});}
  // ж“ҙиғҢеҢ…ж…¶зҘқеӢ•з•«(зӣҙжҺҘжҺӣе ҙжҷҜгҖҒдёҚйҖІ layerвҶ’rebuild дёҚжё…жҺү):й–ғе…ү+йңҮ+ж“ҙж•Јз’°+еӣӣе°„жҳҹзҒ«+гҖҢиғҢеҢ…+5гҖҚеӨ§еӯ—+ж–°дёҠйҷҗ
  playExpandFX(newCap){
    const cyc=Math.round(H*0.42);

    for(let i=0;i<12;i++){const a=i/12*Math.PI*2, sp=this.add.text(CX,cyc,'вңҰ',{fontFamily:EMOJIFONT,fontSize:'18px',color:i%2?'#ffe08a':'#d8c8ff'}).setOrigin(0.5).setDepth(2998);

    this.tweens.add({targets:t,scale:1.1,duration:300,ease:'Back.out'});
    this.tweens.add({targets:t,scaleX:1.18,scaleY:1.18,duration:420,yoyo:true,delay:300,ease:'Sine.inOut'});
    this.tweens.add({targets:t,y:cyc-46,alpha:0,delay:820,duration:520,onComplete:()=>t.destroy()});
    const c2=this.add.text(CX,cyc+44,'вҶ’ '+newCap+' ж ј',{fontFamily:EMOJIFONT,fontSize:'18px',color:'#cfe0ff',fontStyle:'bold',stroke:'#1a2030',strokeThickness:4}).setOrigin(0.5).setDepth(3000).setAlpha(0);
    this.tweens.add({targets:c2,alpha:1,duration:260,delay:180});

    // 5 еҖӢж–°ж¬„дҪҚдёҖж јж јдҫқеәҸеҶ’еҮәдҫҶ(еғҸж јеӯҗиў«еҠ йҖІиғҢеҢ…)

      this.tweens.add({targets:b,scale:1,duration:260,delay:280+i*150,ease:'Back.out'});   // дҫқеәҸеҪҲеҮә
      this.tweens.add({targets:b,alpha:0,delay:280+i*150+820,duration:420,onComplete:()=>b.destroy()});}
  }
  draw(){
    const cards=loadSave().cards, cap=boxCap(), cnt=cards.length, full=cnt>=cap;
    this.txt(CX,30,'рҹҺ’ иғҢеҢ…(еҚЎеҶҠ)','19px','#f3e9d8',0.5,true);
    this.txt(CX,52,'BOX '+cnt+' / '+cap+'гҖҖВ·гҖҖж”¶йӣҶ '+ownedCount()+'/'+ROSTER.length+' зЁ®','11px',full?'#ff8f6a':'#b9a584',0.5);
    const g=loadSave().gems; this.txt(CX,70,'рҹ”® '+ELEM_DUNGEONS.map(e=>EL[e].name+(g[e]||0)).join(' '),'10px','#b9a0ff',0.5);
    // жҺ’еәҸ / ж“ҙиғҢеҢ…
    this.btn(108,96,150,26,'вҶ• жҺ’еәҸ:'+SORT_MODES[this.sortMode].name,()=>{this.sortMode=(this.sortMode+1)%SORT_MODES.length;this.boxPage=0;this.rebuild();},{col:0x2b2014,stroke:0x5a6a8a,color:'#cfe0ff',fs:'11px'});
    this.btn(300,96,150,26,'вһ• ж“ҙиғҢеҢ… 1рҹ’Һ+5ж ј',()=>{const r=buyBoxSlots();if(r.ok){this.rebuild();this.playExpandFX(r.cap);}else this.toast(r.msg);},{col:0x2e2a3a,stroke:0x7a6aaa,color:'#d8c8ff',fs:'11px'});
    const chips=[['е…Ё',null]].concat(ELEM_DUNGEONS.map(e=>[EL[e].name,e]));
    chips.forEach((ch,i)=>{const x=38+i*64, on=this.filterEl===ch[1];
      this.btn(x,128,58,26,ch[0],()=>{this.filterEl=ch[1];this.boxPage=0;this.rebuild();},{col:on?(ch[1]?EL[ch[1]].color:0x3a5a2c):0x2b2014,stroke:on?0xffd56a:0x4a3824,color:(on&&ch[1])?'#1a1208':(on?'#cfe8b0':'#b9a584'),fs:'12px',bold:on});});
    // еҖӢй«”жё…е–®:жҜҸејөеҚЎеҗ„дҪ”дёҖж ј(дёҚз–ҠГ—N),еҘ—е…ғзҙ зҜ©йҒё + жҺ’еәҸ
    let list=cards.map((c,i)=>{const r=ROSTER.find(x=>x.id===c.id)||{};return Object.assign({_i:i,u:c.u},r);});
    if(this.filterEl)list=list.filter(c=>c.el===this.filterEl);
    list=list.sort(SORT_MODES[this.sortMode].fn);
    if(!this.filterEl){const empties=Math.max(0,cap-list.length);for(let e=0;e<empties;e++)list.push(null);}   // е…Ёеұ¬иҰ–ең–:еҚЎзүҮеҫҢиЈңгҖҢз©әж¬„гҖҚеҲ°дёҠйҷҗвҶ’зңӢеҫ—еҲ°йӮ„еү©е№ҫж ј
    // жӯЈж–№еҪўгҖҒдёҖжҺ’ 5 ж¬„гҖҒеҲҶй Ғ(5Г—6=30/й Ғ)
    const cols=5, perPage=30, cw=64, gx=76, gy=74, x0=CX-2*gx, y0=192;

      if(!cd){this.rect(cx,cy,cw,cw,0x140f0a,0.5).setStrokeStyle(1.5,0x4a3a28,0.6);return;}   // з©әж¬„:жҡ—иүІжЎҶ(дёҖзңјзңӢеҮәйӮ„еү©е№ҫж ј)
      const r=this.rect(cx,cy,cw,cw,EL[cd.el].color).setStrokeStyle(2,cd.rank==='kage'?0xffd54a:0x000000,cd.rank==='kage'?1:0.3).setInteractive();

  drawDetail(){
    const cd=ROSTER.find(c=>c.id===this.sel); if(!cd)return;
