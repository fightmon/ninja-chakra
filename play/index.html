      this.rect(cx,cy,66,60,EL[cd.el].color).setStrokeStyle(3,cd.rank==='kage'?0xffd54a:(cd.rank==='jonin'?0xffffff:0x000000),hi?1:0.3);
      this.txt(cx,cy-11,cd.name,'10px','#1a1208',0.5,true);
      this.txt(cx,cy+9,starStr(cd.id),'9px','#3a2c12',0.5);
      if(it.isNew)this.txt(cx,cy-27,'вңҰNEW','9px','#ffe04a',0.5,true);});
    this.btn(CX,Math.min(H-86,y0+Math.ceil(n/cols)*gy+24),200,44,'зўәе®ҡ',()=>{this.gachaResult=null;this.rebuild();},{col:0x2e3a22,stroke:0x6aaa4c,color:'#eafce0',bold:true});}
  bOther(){const pr=getProgress();
    this.txt(CX,92,'вҡҷпёҸ е…¶д»–','18px','#f3e9d8',0.5,true);
    this.txt(CX,150,'рҹҸҶ еәҸз« йҖҡй—ң Г—'+pr.clears+'    рҹ“– ж”¶йӣҶ '+ownedCount()+'/'+ROSTER.length,'13px','#ffd56a',0.5);
    this.btn(CX,224,360,48,'рҹ“– еҚЎзүҮең–й‘‘',()=>this.go('collection'),{col:0x2e2a3a,stroke:0x5a6a8a,color:'#cfe0ff'});
    this.btn(CX,290,360,48,'рҹ”„ йҮҚзҪ®еӯҳжӘ”(жё¬и©Ұз”Ё)',()=>{localStorage.removeItem('ninja_save');localStorage.removeItem('ninja_owned');this.toast('е·ІйҮҚзҪ®');this.switchTab('dungeon');},{col:0x3a201a,stroke:0x8a4a3a,color:'#ffb0a0'});
  }
}

/* ===== еј·еҢ–еҗҲжҲҗ(йӨҠжҲҗ) ===== */
class FuseScene extends Phaser.Scene{
  constructor(){super('fuse');}
  init(d){this.target=(d&&d.target)||this.target||loadTeam()[0];this.mode='feed';if(this.feedPage==null)this.feedPage=0;}
  create(){this.add.rectangle(CX,H/2,W,H,0x160f18);this.rebuild();
    this.scale.on('resize',()=>{const o=H;recomputeLayout();if(Math.abs(H-o)>3){this.scale.setGameSize(W,H);this.rebuild();}});}
  rebuild(){if(this.layer)this.layer.destroy();this.layer=this.add.container(0,0);this.draw();}
  L(o){this.layer.add(o);return o;}
  txt(x,y,s,size,col,ox,bold){return this.L(this.add.text(x,y,s,{fontFamily:EMOJIFONT,fontSize:Math.max(15,parseInt(size||'16',10)||16)+'px',color:col||'#f3e9d8',fontStyle:bold?'bold':'normal'}).setOrigin(ox==null?0.5:ox,0.5));}   // е…ЁйҒёе–®еӯ—зҙҡжңҖе°Ҹ 15px(жүӢж©ҹеҸҜи®Җ)
  rect(x,y,w,h,col,a){return this.L(this.add.rectangle(x,y,w,h,col,a==null?1:a));}
  btn(x,y,w,h,label,cb,o){o=o||{};const r=this.L(this.add.rectangle(x,y,w,h,o.col==null?0x2b2014:o.col).setStrokeStyle(2,o.stroke==null?0x5a4128:o.stroke).setInteractive());
    if(label)this.txt(x,y,label,o.fs||'14px',o.color||'#f3e9d8',0.5,o.bold);r.on('pointerup',cb);return r;}
  toast(msg){const t=this.add.text(CX,Math.round(H*0.4),msg,{fontFamily:EMOJIFONT,fontSize:'15px',color:'#ffd56a',fontStyle:'bold',backgroundColor:'#000000cc',padding:{x:12,y:8}}).setOrigin(0.5).setDepth(2000);
    this.tweens.add({targets:t,alpha:0,delay:900,duration:400,onComplete:()=>t.destroy()});}
  back(){this.btn(CX,H-42,200,44,'рҹҸ  иҝ”еӣһеӨ§е»і',()=>{this.scene.manager.start('home');this.scene.manager.stop('fuse');},{stroke:0x5a8a3c,color:'#cfe8b0'});}
  draw(){
    this.txt(CX,36,'в¬ҶпёҸ еј·еҢ–еҗҲжҲҗ','20px','#f3e9d8',0.5,true);
    this.txt(CX,62,'рҹ’° '+getMeta().coins+' В· еҗғйҮҚиӨҮеҚЎеҚҮзҙҡ(еҗҢеұ¬ Г—1.5)В· жҜҸејө '+FEED_COST+'йҮ‘','10px','#ffe08a',0.5);
    if(this.mode==='pick')return this.drawPick();
    const t=ROSTER.find(c=>c.id===this.target);
    if(!t){this.btn(CX,200,200,44,'йҒёж“Үеј·еҢ–е°ҚиұЎ',()=>{this.mode='pick';this.rebuild();},{stroke:0x5a6a8a,color:'#cfe0ff'});this.back();return;}
    const lv=getCardLv(this.target),atk=cardAtk(this.target),exp=getCardExp(this.target),need=expToNext(lv),mx=lv>=MAXLV;
    this.rect(CX,124,360,86,EL[t.el].color).setStrokeStyle(2,0xffd56a);
    this.txt(44,104,t.name+'  Lv.'+lv+(mx?' MAX':''),'15px','#1a1208',0,true);
    this.txt(44,128,EL[t.el].name+'В·'+RANKNAME[t.rank]+'  вҡ”пёҸatk '+atk+'(еҹә'+t.atk+')','11px','#3a2c12',0);
    this.rect(44,150,300,10,0x000000,0.4).setOrigin(0,0.5);
    this.rect(44,150,300*(mx?1:Math.min(1,exp/need)),10,0x6ac0ff).setOrigin(0,0.5);
    this.txt(344,150,mx?'MAX':(exp+'/'+need),'9px','#10303f',1,true);
    this.btn(CX,192,150,32,'рҹ”„ жҸӣеј·еҢ–е°ҚиұЎ',()=>{this.mode='pick';this.rebuild();},{col:0x2e2a3a,stroke:0x5a6a8a,color:'#cfe0ff',fs:'12px'});
    this.txt(CX,232,'й»һзҙ жқҗйӨөе…Ҙ(з•ҷжңҖеҫҢдёҖејөдҝқиӯ·)вҶ“','11px','#9a8a6a',0.5);
    // зҙ жқҗ=еҸҜйӨөзҡ„гҖҢеҖӢй«”гҖҚеҗ„дёҖж ј(дёҚз–ҠГ—N,жҜ”з…§иғҢеҢ…):жҜҸзЁ®з•ҷ 1 ејөдҝқиӯ·гҖҒе…¶йӨҳеҸҜйӨө;жӯЈж–№еҪў 5 ж¬„
    const cards=loadSave().cards, byType={}; cards.forEach(c=>{(byType[c.id]=byType[c.id]||[]).push(c);});
    let feedList=[];
    Object.keys(byType).forEach(id=>{const arr=byType[id]; if(arr.length>=2){const cd=ROSTER.find(x=>x.id===id); for(let k=1;k<arr.length;k++)feedList.push(cd);}});
    feedList.sort((a,b)=>((b.el===t.el?1:0)-(a.el===t.el?1:0))||a.id.localeCompare(b.id));   // еҗҢеұ¬е„Әе…Ҳ
    const cols=5, perPage=30, cw=64, gx=76, gy=74, x0=CX-2*gx, y0=270;
    const pages=Math.max(1,Math.ceil(feedList.length/perPage));
    if(this.feedPage>=pages)this.feedPage=pages-1; if(this.feedPage<0)this.feedPage=0;
    const pageList=feedList.slice(this.feedPage*perPage,(this.feedPage+1)*perPage);
    if(!feedList.length){this.txt(CX,318,'зӣ®еүҚжІ’жңүеӨҡйӨҳзҡ„еҚЎеҸҜз•¶зҙ жқҗ','12px','#9a8a6a',0.5);this.txt(CX,340,'(еҺ»е…ғзҙ й—ңеӨҡж”¶е№ҫејөеҗҢеҚЎ)','10px','#7a6a4a',0.5);}
    pageList.forEach((c,k)=>{const cx=x0+(k%cols)*gx, cy=y0+Math.floor(k/cols)*gy, same=c.el===t.el;
      this.rect(cx,cy,cw,cw,EL[c.el].color).setStrokeStyle(2,same?0xffd56a:0x000000,same?1:0.3).setInteractive().on('pointerup',()=>this.feed(c.id));
      this.txt(cx,cy-15,c.name,'10px','#1a1208',0.5,true);
      this.txt(cx,cy+3,starStr(c.id),'9px','#3a2c12',0.5);
      this.txt(cx,cy+19,same?'еҗҢеұ¬Г—1.5':'зҙ жқҗ','9px',same?'#7a3000':'#3a2c12',0.5);});
    if(pages>1){const py=y0+6*gy-8;
      this.btn(CX-74,py,52,28,'в—Җ',()=>{this.feedPage--;this.rebuild();},{fs:'15px'});
      this.txt(CX,py,(this.feedPage+1)+' / '+pages,'13px','#cfe0e8',0.5);
      this.btn(CX+74,py,52,28,'в–¶',()=>{this.feedPage++;this.rebuild();},{fs:'15px'});}
    this.back();
  }
  drawPick(){
    this.txt(CX,98,'йҒёж“Үеј·еҢ–е°ҚиұЎ','13px','#ffd56a',0.5,true);
    // еј·еҢ–е°ҚиұЎ=гҖҢзЁ®йЎһгҖҚ(еҗҢзЁ®е…ұз”Ёзӯүзҙҡ)вҶ’ жҜҸзЁ®дёҖж ј,жӯЈж–№еҪў 5 ж¬„
    const owned=loadOwned(), list=ROSTER.filter(c=>owned[c.id]);
    const cols=5, cw=64, gx=76, gy=74, x0=CX-2*gx, y0=150;
    list.forEach((c,k)=>{const cx=x0+(k%cols)*gx, cy=y0+Math.floor(k/cols)*gy, on=c.id===this.target;
      this.rect(cx,cy,cw,cw,EL[c.el].color).setStrokeStyle(2,on?0xffd56a:0x000000,on?1:0.3).setInteractive().on('pointerup',()=>{this.target=c.id;this.mode='feed';this.feedPage=0;this.rebuild();});
      this.txt(cx,cy-15,c.name,'10px','#1a1208',0.5,true);
      this.txt(cx,cy+3,'Lv'+getCardLv(c.id),'10px','#3a2c12',0.5);
      this.txt(cx,cy+19,'жҢҒжңү'+owned[c.id],'9px','#3a2c12',0.5);});
    this.btn(CX,H-42,200,44,'иҝ”еӣһ',()=>{this.mode='feed';this.rebuild();},{stroke:0x5a6a8a,color:'#cfe0ff'});
  }
  feed(fid){const r=feedFodder(this.target,fid);if(!r.ok){this.toast(r.msg);return;}
    this.toast(r.ups>0?('рҹҶҷ еҚҮзҙҡ! Lv.'+r.lv+(r.same?'(еҗҢеұ¬)':'')):('+'+r.reward+' exp'+(r.same?'(еҗҢеұ¬Г—1.5)':'')));this.rebuild();}
}
