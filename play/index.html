// 色彩工具:shadeColor(往白/往黑)、lerpColor(兩色內插)→ 給屬塊「明暗漸層流動」用
function shadeColor(col,f){let r=(col>>16)&255,g=(col>>8)&255,b=col&255;if(f>=0){r+=(255-r)*f;g+=(255-g)*f;b+=(255-b)*f;}else{const k=1+f;r*=k;g*=k;b*=k;}return (Math.round(r)<<16)|(Math.round(g)<<8)|Math.round(b);}
function lerpColor(a,b,t){const A=[(a>>16)&255,(a>>8)&255,a&255],B=[(b>>16)&255,(b>>8)&255,b&255];return (Math.round(A[0]+(B[0]-A[0])*t)<<16)|(Math.round(A[1]+(B[1]-A[1])*t)<<8)|Math.round(A[2]+(B[2]-A[2])*t);}

  const el=(typeof document!=='undefined')?document.getElementById('game'):null;
  const vw=(el&&el.clientWidth)?el.clientWidth:((typeof window!=='undefined'&&window.innerWidth)?window.innerWidth:390);
  const vh=(el&&el.clientHeight)?el.clientHeight:((typeof window!=='undefined'&&window.innerHeight)?window.innerHeight:844);
  H=Math.max(640,Math.min(1400,Math.round(W*vh/vw)));   // 涵蓋約 1.52~3.33 的長寬比
  TRAY_Y=H-46; BY0=TRAY_Y-52-9*CS; CARDS_Y=BY0-50; PHP_Y=BY0-16; INFO_Y=BY0-2;   // 板面/托盤盡量往下、卡列貼緊板面 → 上方戰鬥區留多一點
  BG_H=BY0+22; BATTLE_CY=Math.round((CARDS_Y-29)/2);   // 背景延伸到盤面上緣+22;敵人置中於 nav(26) 與主動技鈕(CARDS_Y-55) 之間
  BOARD_CY=BY0+Math.round(9*CS/2);   // 盤面正中央(9×9 格的中心)→ 暴擊/連印/鬥志等操控盤面的特效字都以此置中
}

function feedFodder(targetId,fodderId){let res={ok:false,msg:''};
  mutSave(s=>{
    if(s.cards.filter(c=>c.id===fodderId).length<2){res.msg='需要多餘的素材卡(同一張至少2張)';return;}
    if((s.meta.coins||0)<FEED_COST){res.msg='金錢不足(需'+FEED_COST+')';return;}
    if(!s.cardLv[targetId])s.cardLv[targetId]={lv:1,exp:0};
    const cl=s.cardLv[targetId]; if(cl.lv>=MAXLV){res.msg='已達滿級 Lv.'+MAXLV;return;}
    const f=ROSTER.find(c=>c.id===fodderId), t=ROSTER.find(c=>c.id===targetId);
    const reward=Math.round(({genin:60,chunin:150,jonin:400,kage:900}[f.rank]||60)*(f.el===t.el?1.5:1));
    const fi=s.cards.findIndex(c=>c.id===fodderId); if(fi>=0)s.cards.splice(fi,1);   // 吃掉一個素材個體(空出一格)
    s.meta.coins-=FEED_COST; cl.exp+=reward;
    let ups=0; while(cl.lv<MAXLV && cl.exp>=expToNext(cl.lv)){cl.exp-=expToNext(cl.lv);cl.lv++;ups++;}
    if(cl.lv>=MAXLV)cl.exp=0;
    res={ok:true,reward:reward,lv:cl.lv,ups:ups,same:f.el===t.el};
  });
  return res;}
const FEED_EXP={genin:60,chunin:150,jonin:400,kage:900};   // 各稀有度素材給的經驗
// 多素材一次餵入(神魔/龍族式):us=要吃掉的個體 u 陣列;每張扣 FEED_COST、同屬×1.5;升級後回結果
function feedFodderMany(targetId,us){let res={ok:false,msg:''};
  mutSave(s=>{
    if(!us||!us.length){res.msg='未選素材';return;}
    if(!s.cardLv[targetId])s.cardLv[targetId]={lv:1,exp:0};
    const cl=s.cardLv[targetId]; if(cl.lv>=MAXLV){res.msg='已達滿級 Lv.'+MAXLV;return;}
    const t=ROSTER.find(c=>c.id===targetId);
    // 先全部驗證(找出存在的個體、算經驗/花費)——確認金錢足夠後才真正吃卡,避免半途扣卡
    const valid=[]; let total=0;
    us.forEach(u=>{const i=s.cards.findIndex(c=>c.u===u); if(i<0)return; const f=ROSTER.find(c=>c.id===s.cards[i].id);
      total+=Math.round((FEED_EXP[f.rank]||60)*(f.el===t.el?1.5:1)); valid.push(u);});
    if(!valid.length){res.msg='素材已不存在';return;}
    const cost=FEED_COST*valid.length;
    if((s.meta.coins||0)<cost){res.msg='金錢不足(需'+cost+')';return;}
    valid.forEach(u=>{const i=s.cards.findIndex(c=>c.u===u); if(i>=0)s.cards.splice(i,1);});   // 通過檢查→才吃卡
    s.meta.coins-=cost; cl.exp+=total;
    let ups=0; while(cl.lv<MAXLV && cl.exp>=expToNext(cl.lv)){cl.exp-=expToNext(cl.lv);cl.lv++;ups++;}
    if(cl.lv>=MAXLV)cl.exp=0;
    res={ok:true,total:total,lv:cl.lv,ups:ups,eaten:valid.length};
  });
  return res;}
// 合成預覽(不變更存檔):回傳餵入後的 Lv/經驗/花費
function previewFeed(targetId,us){const s=loadSave(), t=ROSTER.find(c=>c.id===targetId);
  let lv=getCardLv(targetId), e=getCardExp(targetId)+0, gained=0, eaten=0;
  (us||[]).forEach(u=>{const c=s.cards.find(x=>x.u===u); if(!c)return; const f=ROSTER.find(r=>r.id===c.id);
    gained+=Math.round((FEED_EXP[f.rank]||60)*(f.el===t.el?1.5:1)); eaten++;});
  let l=lv; e+=gained;
  while(l<MAXLV && e>=expToNext(l)){e-=expToNext(l);l++;}
  if(l>=MAXLV)e=0;
  return {fromLv:lv,toLv:l,exp:e,need:expToNext(l),gained:gained,cost:FEED_COST*eaten,willMax:l>=MAXLV,ups:l-lv,eaten:eaten};}

function evolveCard(id){const chk=canEvolve(id);if(!chk.ok)return chk;const c=ROSTER.find(x=>x.id===id);
  mutSave(s=>{const req=evoReq(s.cardEvo[id]||0);s.gems[c.el]-=req.gems;s.meta.coins-=req.coins;
    s.cardEvo[id]=(s.cardEvo[id]||0)+1;s.cardLv[id]={lv:1,exp:0};});

/* 經濟:體力(時間回復)/ 經驗·等級 / 金錢 / 魔法石 */
const REGEN_MS=20000;   // 體力每 20 秒 +1
function syncStamina(m){if(m.staTs==null){m.staTs=Date.now();return;}
  if(m.stamina>=m.staminaMax){m.staTs=Date.now();return;}
  const g=Math.floor((Date.now()-m.staTs)/REGEN_MS);
  if(g>0){m.stamina=Math.min(m.staminaMax,m.stamina+g); m.staTs=(m.stamina>=m.staminaMax)?Date.now():m.staTs+g*REGEN_MS;}}
function getMeta(){return mutSave(s=>syncStamina(s.meta)).meta;}
function spendStamina(n){let ok=false;mutSave(s=>{syncStamina(s.meta);if(s.meta.stamina>=n){s.meta.stamina-=n;s.meta.staTs=Date.now();ok=true;}});return ok;}
function staFullSec(){const m=getMeta();if(m.stamina>=m.staminaMax)return 0;return Math.ceil(((m.staminaMax-m.stamina)*REGEN_MS-(Date.now()-m.staTs))/1000);}
function expForLevel(rank){return 80+rank*40;}
function addRewards(exp,coins,stones){return mutSave(s=>{const m=s.meta;m.coins=(m.coins||0)+(coins||0);m.stones=(m.stones||0)+(stones||0);m.exp=(m.exp||0)+(exp||0);
  let need=expForLevel(m.rank),ups=0;while(m.exp>=need){m.exp-=need;m.rank++;m.staminaMax+=2;m.stamina=m.staminaMax;ups++;need=expForLevel(m.rank);}m._ups=ups;}).meta;}
function spendStones(n){let ok=false;mutSave(s=>{if((s.meta.stones||0)>=n){s.meta.stones-=n;ok=true;}});return ok;}
function refillStamina(){mutSave(s=>{s.meta.stamina=s.meta.staminaMax;s.meta.staTs=Date.now();});}
function devSetAllLv(lv){lv=Math.max(1,Math.min(MAXLV,lv));mutSave(s=>{const ids={};s.cards.forEach(c=>ids[c.id]=1);Object.keys(ids).forEach(id=>{s.cardLv[id]={lv:lv,exp:0};});});}   // 測試:全持有卡設成指定等級
function devUnlockAll(){mutSave(s=>{['prologue','fire','water','thunder','earth','wind','tower'].forEach(id=>{s.progress.dungeonsCleared[id]=true;});s.progress.cleared=true;});}   // 測試:解鎖全關(含塔)
// 每日登入獎勵:7 天循環,寬鬆(每個歷天可領一次、漏天不歸零、循環)
const DAILY=[
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:6,ic:'🎁',label:'魔法石 ×6(全勤+5)'},
];
function todayKey(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function dailyAvailable(){return loadSave().meta.dayKey!==todayKey();}
function dailyIndex(){return (loadSave().meta.dailyN||0)%7;}
function claimDaily(){let res=null;mutSave(s=>{const m=s.meta;if(m.dayKey===todayKey())return;
  const n=(m.dailyN||0)%7, rw=DAILY[n]; let gemEl=null;
  if(rw.t==='coins')m.coins=(m.coins||0)+rw.v;
  else if(rw.t==='stones')m.stones=(m.stones||0)+rw.v;
  else if(rw.t==='stamina'){m.stamina=m.staminaMax;m.staTs=Date.now();}
  else if(rw.t==='gem'){const e=['fire','water','thunder','earth','wind'][rnd(5)];s.gems[e]=(s.gems[e]||0)+rw.v;gemEl=e;}
  m.dailyN=n+1; m.dayKey=todayKey();
  res={day:n+1,ic:rw.ic,label:rw.label,gemEl};});
  return res;}
const RANK_POOL={genin:ROSTER.filter(c=>c.rank==='genin'),chunin:ROSTER.filter(c=>c.rank==='chunin'),jonin:ROSTER.filter(c=>c.rank==='jonin'),kage:ROSTER.filter(c=>c.rank==='kage')};
function pickDrop(spec){let pool=ROSTER;if(spec.el)pool=pool.filter(c=>c.el===spec.el);
  if(spec.rank)pool=pool.filter(c=>c.rank===spec.rank); else pool=pool.filter(c=>c.rank!=='kage');   // 影忍只能抽卡取得,不從刷關掉落
  return pool.length?pool[rnd(pool.length)]:null;}
function rollDrops(table){const out=[];(table||[]).forEach(d=>{if(Math.random()<d.rate){const c=pickDrop(d);if(c)out.push(c);}});return out;}

/* ===== 轉蛋(簡單版:雙池 + 機率公示) ===== */
const GACHA={
  premium:{name:'結印轉蛋',cur:'stones',icon:'💎',cost1:5,   cost10:50,  rates:[['genin',0.50],['chunin',0.35],['jonin',0.12],['kage',0.03]]},
  normal: {name:'一般轉蛋',cur:'coins', icon:'💰',cost1:1000,cost10:9000,rates:[['genin',0.70],['chunin',0.28],['jonin',0.02]]},
};
function rollRarity(rates){const r=Math.random();let acc=0;for(let k=0;k<rates.length;k++){acc+=rates[k][1];if(r<acc)return rates[k][0];}return rates[rates.length-1][0];}
function gachaPull(bankey){const pool=RANK_POOL[rollRarity(GACHA[bankey].rates)];return pool[rnd(pool.length)];}
function spendCoins(n){let ok=false;mutSave(s=>{if((s.meta.coins||0)>=n){s.meta.coins-=n;ok=true;}});return ok;}
const PITY_MAX=50;   // 結印轉蛋保底:第 50 抽必得影忍(kage)
function getPity(){return loadSave().meta.pity||0;}
function setPity(n){mutSave(s=>{s.meta.pity=n;});}
function doGacha(bankey,count){const b=GACHA[bankey],cost=count===10?b.cost10:b.cost1;
  const ok=b.cur==='stones'?spendStones(cost):spendCoins(cost); if(!ok)return null;
  const out=[];
  for(let i=0;i<count;i++){let c,pityHit=false;
    if(bankey==='premium'){let p=getPity();
      if(p>=PITY_MAX-1){c=RANK_POOL.kage[rnd(RANK_POOL.kage.length)];setPity(0);pityHit=true;}   // 第50抽保底:必影忍
      else{c=gachaPull(bankey);if(c.rank==='kage')setPity(0);else setPity(p+1);}                  // 抽到影忍歸零、否則+1
    }else{c=gachaPull(bankey);}
    out.push({cd:c,isNew:!isOwned(c.id),pity:pityHit});addCard(c.id);
  }
  track('gacha');
  return out;}

/* ===== 戰鬥(多敵 + 自由查克拉) ===== */
class GameScene extends Phaser.Scene{
  constructor(){super('game');}
  init(data){ this.presetTeam=(data&&data.team)?data.team:null; this.dungeonId=(data&&data.dungeonId)||'prologue'; this.dungeon=DUNGEONS[this.dungeonId]||DUNGEONS.prologue; this.hitLab=!!(data&&data.lab); this.diff=DIFFS_BY[(data&&data.diff)]||DIFFS_BY.normal;
    this.stagesEff=resolveStages(this.dungeon, this.diff.key);   // (b) 依難度解析「有效關卡結構」(規則+覆寫);slice1 規則=0 → 與 base 全等
    this.battleSeed=startBattleSeed((data&&data.seed)!=null?data.seed:null); }   // 種子亂數:開戰播種(可由外部給種子=回放用),存 battleSeed
  preload(){ this.load.maxParallelDownloads=6;   // 限制同時下載數→對弱伺服器/弱網路更穩(避免一次塞太多卡住)
    for(const el in MONSTER_IMG){ if(!this.textures.exists('mon_'+el))this.load.image('mon_'+el, MONSTER_IMG[el]); }
    for(const k in ENEMY_IMG){ if(!this.textures.exists(k))this.load.image(k, ENEMY_IMG[k]); }
    for(const d in DUNGEON_BG){ const b=DUNGEON_BG[d];
      if(!this.textures.exists('bg_'+d+'_back'))this.load.image('bg_'+d+'_back', b.back);
      if(!this.textures.exists('bg_'+d+'_front'))this.load.image('bg_'+d+'_front', b.front); }
    TOWER_MID.forEach(c=>{ if(!this.textures.exists(c.key))this.load.image(c.key, c.src); }); }   // 載入怪物圖 + 方塊敵正式美術 + 關卡背景(前/後)+ 塔中景元素方塊
  // 依「是否魔王×難度×元素」挑敵圖:魔王 baby→m002、beginner→m003、normal及以上→m004(最兇);雜兵 嬰兒/初級→grunt(m001)、中級以上→grunt2(m002 強化版);都沒有再退回舊史萊姆/emoji
  enemyTexKey(e){ const el=e.el; let dk=(this.diff&&this.diff.key)||'normal';
    if(this.dungeonId==='prologue')dk='baby';   // 序章=新手村:挑圖固定當嬰兒級(只換外觀,不動數值)→ 魔王 boss_baby(m002)+雜兵 grunt(m001),不出 m003 以上兇怪
    if(e.boss){ const tier=dk==='baby'?'baby':(dk==='beginner'?'beg':'nrm'); const k='boss_'+tier+'_'+el; if(this.textures.exists(k))return k; }
    else{ const adv=(dk!=='baby'&&dk!=='beginner');
      if(adv&&this.textures.exists('guard_'+el))return 'guard_'+el; }   // 中級(normal)以上雜兵(含魔王關護衛)→m003
    if(this.textures.exists('grunt_'+el))return 'grunt_'+el;
    if(this.textures.exists('mon_'+el))return 'mon_'+el;
    return null; }
  // 敵圖體型/站位參數(純計算):魔王=登場就 1.4× 且略往後(Y-2、站護衛後面);護衛/雜兵=實體高度正規化(護衛Y+5站前面)
  enemyFitParams(e){ const szc=e.cardW, cy=e.cy, key=e.sprite.texture.key;
    const pre = key.indexOf('boss_baby')===0?'boss_baby' : key.indexOf('boss_beg')===0?'boss_beg' : key.indexOf('boss_nrm')===0?'boss_nrm' : key.indexOf('guard')===0?'guard' : 'grunt';
    const fit=ENEMY_FIT[pre]||ENEMY_FIT.grunt;
    let D, yNudge;
    if(e.boss){ D=szc*1.4; yNudge=-2; }   // 魔王:登場即 1.4×、略往後
    else { D=Math.min(szc*1.12,(szc*0.65)/fit.h); yNudge=e.guard?5:0; }
    return {D, y:(cy+szc*0.367)-D*(fit.bottom-0.5)+yNudge}; }
  fitEnemySprite(e){ if(!e.img||!e.sprite)return; const p=this.enemyFitParams(e);
    e.sprite.setDisplaySize(p.D,p.D); e.sprite.y=p.y; e.baseScale=e.sprite.scaleX; }
  // 待命動畫:m004 大魔王(boss_nrm)=緩慢浮動;m001~m003(雜兵/護衛/小王)=落地待命、偶爾小跳
  idleAnim(e,y){ if(!e||!e.sprite)return null;
    const fierce = e.img && e.sprite.texture && e.sprite.texture.key && e.sprite.texture.key.indexOf('boss_nrm')===0;
    if(fierce) return this.tweens.add({targets:e.sprite,y:y-4,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});           // m004 大魔王:浮動
    // 雜兵:遞迴小跳,每次間隔 1.5~3 秒「各自隨機」→ 不會所有雜兵一起跳;回傳含 stop() 控制器(相容既有 e.bob.stop())
    const sc=this; let timer=null, tw=null, off=false;
    const hop=()=>{ if(off||!e.sprite||e.dead)return;
      tw=sc.tweens.add({targets:e.sprite,y:y-15,duration:230,yoyo:true,ease:'Quad.out'});
      timer=sc.time.delayedCall(1500+Math.random()*1500, hop); };                    // 下一跳:1.5~3s 隨機
    timer=sc.time.delayedCall(Math.random()*1800, hop);                              // 首跳也隨機相位
    return { stop:()=>{ off=true; if(timer)timer.remove(false); if(tw&&tw.stop)tw.stop(); } }; }
  // 重設待機浮動(idempotent):先停舊的;已死/無 sprite/封印中→不啟動(封印=定身,不跳不浮)
  refreshBob(e){ if(e.bob){e.bob.stop();e.bob=null;}
    if(e.dead||!e.sprite||!e.sprite.active||(e.sealed>0))return;
    if(e.restY!=null)e.sprite.setY(e.restY);
    e.bob=this.idleAnim(e, e.restY!=null?e.restY:e.sprite.y); }
  // 敵 HP 條:圓角底 + 圓角血量 + 白色圓角外框(用 Graphics 重畫,hpRatio 動畫時 onUpdate 呼叫)
  drawHpBar(e){ if(!e.hpGfx)return; const g=e.hpGfx; g.clear();
    const w=e.hpW, h=e.hpH||9, rad=h/2, ratio=Math.max(0,Math.min(1,e.hpRatio==null?1:e.hpRatio));
    const lag=Math.max(ratio,Math.min(1,e.hpLag==null?ratio:e.hpLag));
    g.fillStyle(0x180b08,0.95); g.fillRoundedRect(0,-h/2,w,h,rad);                                   // 空血暗槽
    if(lag>ratio+0.003){ const lw=Math.max(0.001,w*lag), rl=Math.min(rad,lw/2); g.fillStyle(0xffe6b0,0.92); g.fillRoundedRect(0,-h/2,lw,h,rl); }   // 受傷白拖尾(剛扣掉的血先變白,再慢慢收→一眼看到扣血)
    if(ratio>0){ const fw=Math.max(0.001,w*ratio), rf=Math.min(rad,fw/2);
      g.fillStyle(e._hpColor||0xc23c2c,1); g.fillRoundedRect(0,-h/2,fw,h,rf);                        // 血量(圓角)
      g.fillStyle(0xffffff,0.22); g.fillRoundedRect(0,-h/2,fw,Math.max(1,h*0.4),rf); }              // 血量上緣高光
    g.lineStyle(1.6,0xffffff,0.95); g.strokeRoundedRect(0,-h/2,w,h,rad); }                           // 白色圓角外框
  // 我方 HP 條:同敵風格(圓角+白框+暗槽+白拖尾),綠色
  drawPlayerHp(){ if(!this.pHpGfx)return; const g=this.pHpGfx; g.clear();
    const w=W-2*BX0, h=16, rad=h/2, ratio=Math.max(0,Math.min(1,this.pHpRatio==null?1:this.pHpRatio));
    const lag=Math.max(ratio,Math.min(1,this.pHpLag==null?ratio:this.pHpLag));
    g.fillStyle(0x16160c,0.92); g.fillRoundedRect(0,-h/2,w,h,rad);                                   // 空血暗槽
    if(lag>ratio+0.003){ const lw=Math.max(0.001,w*lag), rl=Math.min(rad,lw/2); g.fillStyle(0xfff0b0,0.9); g.fillRoundedRect(0,-h/2,lw,h,rl); }   // 受傷白拖尾
    if(ratio>0){ const fw=Math.max(0.001,w*ratio), rf=Math.min(rad,fw/2);
      g.fillStyle(0x4f9e42,1); g.fillRoundedRect(0,-h/2,fw,h,rf);                                    // 綠血
      g.fillStyle(0xffffff,0.20); g.fillRoundedRect(0,-h/2,fw,Math.max(1,h*0.42),rf); }              // 上緣高光
    g.lineStyle(2,0xffffff,0.95); g.strokeRoundedRect(0,-h/2,w,h,rad); }                             // 白色圓角外框

  create(){
    this.cells=[]; this.boxLabels=[]; this.trayIcons=[]; this.trayTweens=[]; this.teamCards=[]; this.drag=null; this.enemies=[];

    // 戰鬥場景背景(由後到前):後景圖(-3)→中景火光餘燼(-2)→前景圖(-1)→盤面深底(0)。無關卡圖→漸層帶
    const hasBG=this.textures.exists('bg_'+this.dungeonId+'_back');
    this.embers=null;
    this.bgBack = hasBG?this.add.image(CX,0,'bg_'+this.dungeonId+'_back').setOrigin(0.5,0).setDepth(DEPTH.bg-3):null;
    this.bgFront= hasBG&&this.textures.exists('bg_'+this.dungeonId+'_front')?this.add.image(CX,0,'bg_'+this.dungeonId+'_front').setOrigin(0.5,0).setDepth(DEPTH.bg-1):null;
    this.towerCubes=null;
    if(hasBG){ if(this.dungeonId==='tower')this.makeTowerCubes(); else this.makeEmbers(); }   // 中景:塔=元素方塊飄浮、其餘=粒子
    this.bgGfx=this.add.graphics().setDepth(DEPTH.bg);
    this.bgLine=this.add.rectangle(CX,BG_H,W,2,0x000000,0.3).setDepth(DEPTH.bg);   // 先建好,drawBG 才能依關卡顯示/隱藏它

    // nav(最高層;無背景條,文字加深色描邊保可讀)

    this.chestTxt=this.add.text(298,13,'📦 0',{fontFamily:EMOJIFONT,fontSize:'14px',color:'#cfe8ff'}).setOrigin(0,0.5).setStroke('#1a1208',4).setDepth(DEPTH.nav);
    const gear=this.add.text(404,13,'⚙',{fontFamily:EMOJIFONT,fontSize:'21px',color:'#f3e9d8'}).setOrigin(0.5).setStroke('#1a1208',4).setDepth(DEPTH.nav);

    // 我方卡(正方形,背景之上)
    for(let i=0;i<5;i++){const x=54+i*78;

      const txt=this.add.text(x,CARDS_Y,'',{fontFamily:EMOJIFONT,fontSize:'24px',color:'#1a1208'}).setOrigin(0.5).setDepth(DEPTH.card);

      const abg=this.add.circle(0,0,13,0x2b2014).setStrokeStyle(2,0x5a4128);

      abtn.add([abg,aic]); abtn.setSize(30,30).setInteractive(new Phaser.Geom.Rectangle(-15,-15,30,30),Phaser.Geom.Rectangle.Contains);
      abtn.on('pointerup',()=>this.fireActive(i));
      this.teamCards.push({rect,txt,storeObj,abtn,abg,aic,el:null,pulse:null});}

    // 我方血條 + 資訊列
    this.pHpRatio=1; this.pHpLag=1;
    this.pHpGfx=this.add.graphics().setPosition(BX0,PHP_Y).setDepth(DEPTH.hp); this.drawPlayerHp();   // 我方血條:圓角+白框+暗槽+白拖尾(同敵)
    this.pHpTxt=this.add.text(CX,PHP_Y,'',{fontFamily:EMOJIFONT,fontSize:'12px',color:'#fff',fontStyle:'bold',stroke:'#0a2008',strokeThickness:3}).setOrigin(0.5).setDepth(DEPTH.hp);
    // combo 指示器:疊在 HP 條左端(原鬥志胸章位置);combo≥2 才亮、隨連擊變熱、斷了熄掉
    this.comboBg=this.add.circle(BX0+16,PHP_Y,16,0x1a140c,0.92).setStrokeStyle(2.5,0x6a5a3a).setDepth(DEPTH.morale).setVisible(false);
    this.comboTxt=this.add.text(BX0+16,PHP_Y,'',{fontFamily:EMOJIFONT,fontSize:'15px',color:'#fff',fontStyle:'bold'}).setOrigin(0.5).setDepth(DEPTH.morale).setVisible(false);

    // 結印區
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)
      this.cells.push(this.add.rectangle(BX0+c*CS, BY0+r*CS, RECT, RECT, NEUTRAL_DARK).setOrigin(0,0).setDepth(DEPTH.board));
    for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3;const cen=this.cellCenter(br+1,bc+1);
      this.boxLabels[b]=this.add.text(cen.x,cen.y,'',{fontFamily:EMOJIFONT,fontSize:'17px',color:'#fff'}).setOrigin(0.5).setAlpha(0.55).setDepth(DEPTH.board);}
    this.gloss=this.add.graphics().setDepth(DEPTH.board+0.5);   // 玻璃光澤+立體斜角(疊在塊上、依 board 狀態重畫)
    this.hintG=this.add.graphics().setDepth(DEPTH.board+0.6);   // 嬰兒級:多HIT塊的建議落點高亮(脈動)

    // 托盤
    this.traySlots=[80,210,340]; this.trayHits=[];
    this.traySlots.forEach((sx,i)=>{const hit=this.add.rectangle(sx,TRAY_Y,128,100,0,0).setOrigin(0.5).setInteractive().setDepth(DEPTH.tray);hit.setData('slot',i);this.trayHits.push(hit);});

    this.input.on('gameobjectdown',(p,obj)=>{
      const si=obj.getData('store'); if(si!=null && this.stored && this.stored[si]){this.startStoredDrag(si,p);return;}   // 卡上有屬塊→拖
      const i=obj.getData('slot');
      if(i!=null && this.tray[i] && !this.tray[i].used && !this.tray[i].locked) this.startDrag(i,p);});
    this.input.on('pointermove',p=>{this.updateDrag(p);this.updateEarthMove(p);});
    this.input.on('pointerup',p=>{this.endDrag(p);this.endEarthMove(p);});
    this.input.on('pointerdown',p=>{if(this.earthSel&&!this.earthDrag)this.startEarthMove(p);});
    this.scale.on('resize',this.onResize,this);
    this.cameras.main.setBounds(0,0,W,H);   // 鏡頭鎖在世界範圍內→特寫推近/平移不會露出世界外的黑邊

    this.newGame();
  }
  onResize(){const o=H;recomputeLayout();if(Math.abs(H-o)>3){this.scale.setGameSize(W,H);this.relayout();}}
  // 中景火光:從熔岩台上緣升起的餘燼粒子(柔邊圓點貼圖,ADD 發光,暖色,往上飄+淡出)
  makeEmbers(){
    if(!this.textures.exists('ember')){ const gg=this.make.graphics({x:0,y:0,add:false});
      gg.fillStyle(0xffffff,0.5);gg.fillCircle(8,8,8); gg.fillStyle(0xffffff,1);gg.fillCircle(8,8,4.5);
      gg.generateTexture('ember',16,16); gg.destroy(); }
    if(!this.textures.exists('smoke')){ const gg=this.make.graphics({x:0,y:0,add:false}); const R=32;   // 柔邊放射煙球(疊圈做漸層,中心濃邊緣透)→ 沙塵/噴煙用
      for(let r=R;r>0;r--)gg.fillStyle(0xffffff,0.05).fillCircle(R,R,r);
      gg.generateTexture('smoke',R*2,R*2); gg.destroy(); }
    if(!this.textures.exists('petal')){ const gg=this.make.graphics({x:0,y:0,add:false});   // 櫻花瓣(橢圓,旋轉飄落時像花瓣)
      gg.fillStyle(0xffffff,1).fillEllipse(11,8,18,10);
      gg.generateTexture('petal',22,16); gg.destroy(); }
    const dg=this.dungeonId; let cfg;
    if(dg==='water') cfg={   // 水關=水泡(慢慢上升、淡藍白)
      x:{min:-135,max:135}, y:{min:-6,max:6},
      speedY:{min:-42,max:-14}, speedX:{min:-10,max:10}, accelerationY:-4,
      scale:{min:0.25,max:0.62}, alpha:{start:0.6,end:0},
      lifespan:{min:2200,max:4000}, frequency:120, quantity:1,
      tint:[0xbfefff,0x9fe0ff,0xffffff,0xa8e8ff], blendMode:'ADD' };
    else if(dg==='thunder') cfg={   // 雷關=電光火花(快、亂竄、閃爍黃白)
      x:{min:-140,max:140}, y:{min:-10,max:10},
      speedY:{min:-80,max:-20}, speedX:{min:-26,max:26}, accelerationY:-6,
      scale:{min:0.14,max:0.42}, alpha:{start:0.95,end:0},
      lifespan:{min:600,max:1500}, frequency:55, quantity:1,
      tint:[0xffff88,0xfff4a0,0xffffff,0xeaff6a], blendMode:'ADD' };
    else if(dg==='wind') cfg={   // 風關=順風飄動的葉片/氣流微粒(自左掃向右、上下微擺、淡出)
      x:{min:-W/2-50,max:-W/2+30}, y:{min:-(BATTLE_CY+BG_GROUND_OFF-26),max:46},
      speedX:{min:70,max:175}, speedY:{min:-16,max:16}, accelerationX:8,
      scale:{min:0.16,max:0.52}, alpha:{start:0.75,end:0},
      lifespan:{min:2600,max:4600}, frequency:70, quantity:1,
      tint:[0xbfe89a,0xd8ecb0,0xeef3d6,0x9fd07a], blendMode:'ADD' };
    else if(dg==='earth') cfg={   // 土關=噴煙式沙塵(柔邊煙球、邊飄邊「膨脹」+淡出、隨風橫掃、NORMAL 不發光;參考招式實驗室炮煙)
      x:{min:-W/2-30,max:W/2+30}, y:{min:-60,max:30},
      speedX:{min:26,max:95}, speedY:{min:-22,max:6}, accelerationX:8,
      scale:{start:0.3,end:1.15}, alpha:{start:0.5,end:0},   // 像噴煙:邊飄邊膨脹再散掉
      lifespan:{min:1700,max:3300}, frequency:46, quantity:1,
      tint:[0xe2d4ad,0xefe6cd,0xcdb98c,0xd9c9a0] };
    else if(dg==='prologue') cfg={   // 初始之地=櫻花散落(自上方飄落、左右搖擺、旋轉、緩緩淡出;NORMAL 不發光)
      x:{min:-W/2-20,max:W/2+20}, y:{min:-(BATTLE_CY+BG_GROUND_OFF)-12,max:-(BATTLE_CY+BG_GROUND_OFF)+44},
      speedY:{min:28,max:70}, speedX:{min:-30,max:30},
      rotate:{min:0,max:360}, scale:{min:0.5,max:1.0}, alpha:{start:0.9,end:0},
      lifespan:{min:3600,max:6400}, frequency:120, quantity:1,
      tint:[0xffd2e2,0xffe2ee,0xffc2da,0xfff0f6] };
    else cfg={   // 火關=火光餘燼
      x:{min:-135,max:135}, y:{min:-6,max:6},
      speedY:{min:-58,max:-22}, speedX:{min:-14,max:14}, accelerationY:-8,
      scale:{min:0.2,max:0.55}, alpha:{start:0.85,end:0},
      lifespan:{min:1600,max:3200}, frequency:80, quantity:1,
      tint:[0xffd24a,0xffae3a,0xff8a2e,0xffc25a], blendMode:'ADD' };
    this.embers=this.add.particles(CX,0,(dg==='earth')?'smoke':(dg==='prologue')?'petal':'ember',cfg).setDepth(DEPTH.bg-2); }
  makeTowerCubes(){ this.towerCubes=TOWER_MID.map(c=>({ img:this.add.image(0,0,c.key).setDepth(DEPTH.bg-2).setVisible(false), rx:c.rx, ry:c.ry, amp:c.amp, ph:c.ph, baseY:0 })); }   // 塔中景:5 元素方塊(定位+飄浮在 update 驅動)
  positionTowerCubes(){ if(!this.towerCubes||!this.bgBack)return;   // X 跟後景滿寬;Y 用「會隨螢幕高拉長」的比例(短螢幕=滿寬高、長螢幕=隨台面拉高)→ 方塊在高螢幕跟著往下、不卡頂
    const pw=this.bgBack.width, ph=this.bgBack.height, sc=W/pw, groundY=BATTLE_CY+BG_GROUND_OFF;
    const dispH=Math.max(Math.round(W/(pw/ph)), Math.ceil(groundY/BG_PLATFORM_FRAC));   // 比例算高:max(滿寬高, 台面對齊所需高)
    this.towerCubes.forEach(c=>{ const bx=Math.round(CX+(c.rx-0.5)*W), by=Math.round(c.ry*dispH);
      c.img.setScale(sc).setPosition(bx,by).setVisible(true); c.baseY=by; }); }
  drawBG(){const g=this.bgGfx;g.clear();const M=Math.round(H);   // M=往四周多畫一圈背景→特寫鏡頭推近/平移不會露出世界外的黑邊
    if(this.bgBack){   // 有關卡背景:後景 cover 撐滿(遠景,可裁);前景 滿寬等比不裁、台面對齊敵腳底(可微調)
      const pw=this.bgBack.width, ph=this.bgBack.height, r=pw/ph;   // 1080/1920=0.5625
      const pf=BG_PLATFORM_FRAC, groundY=BATTLE_CY+BG_GROUND_OFF;   // 台面在圖高比例 / 敵人腳底線
      // 後景:塔=滿寬等比不裁(整張後景都看得到、頂端對齊);其餘關=cover 撐滿(遠景可裁)
      if(this.dungeonId==='tower'){ this.bgBack.setDisplaySize(W, Math.round(W/r)).setPosition(CX,0).setVisible(true); }
      else { const sc=Math.max(W/pw, (H+Math.round(H*0.1))/ph); this.bgBack.setDisplaySize(Math.round(pw*sc), Math.round(ph*sc)).setPosition(CX,0).setVisible(true); }
      // 前景:寬 100%(左右不裁)、高度等比 auto、Y 對齊敵腳底(+BG_FRONT_Y_OFF 微調)
      const dhF=Math.round(W/r), topF=Math.round(groundY-dhF*pf+BG_FRONT_Y_OFF);
      if(this.bgFront)this.bgFront.setDisplaySize(W,dhF).setPosition(CX,topF).setVisible(true);
      if(this.towerCubes)this.positionTowerCubes();                                  // 塔中景方塊:跟後景 cover 同變換定位(圍繞塔)
      if(this.embers)this.embers.setPosition(CX, groundY-4);                         // 中景火光從台面升起
      if(this.bgLine)this.bgLine.setVisible(false);                                  // 有背景圖→隱藏盤面上緣分隔線(否則背景透出時變一條橫槓)
      // 可見區 100%:不畫盤面區底色,背景透到全高(盤面格子維持原本不透明,在背景上)
      return;
    }
    const g1=Math.round(H*0.34);
    g.fillStyle(0x4a6788,1);g.fillRect(-W,-M,W*3,g1+M);                              // 上半(含上緣外、兩側外)用漸層頂色鋪滿
    g.fillGradientStyle(0x4a6788,0x4a6788,0x223524,0x223524,1);g.fillRect(0,0,W,g1);  // 真正的漸層帶(盤上)
    g.fillStyle(0x223524,1);g.fillRect(-W,g1,W*3,Math.max(0,BG_H-g1));               // 中段深底(延伸兩側外)
    g.fillStyle(0x160f18,1);g.fillRect(-W,BG_H,W*3,H-BG_H+M);                        // 盤面區底色(延伸下緣外、兩側外)
    if(this.bgLine)this.bgLine.setVisible(true);}                                    // 無背景圖(漸層底)→ 顯示盤面上緣分隔線
  relayout(){
    this.cameras.main.setBounds(0,0,W,H);   // H 隨視窗變,鏡頭範圍同步
    this.drawBG();
    this.bgLine.setPosition(CX,BG_H);
    this.teamCards.forEach((card,i)=>{const x=54+i*78;card.rect.setPosition(x,CARDS_Y);card.txt.setPosition(x,CARDS_Y);
      if(card.storeObj)card.storeObj.setPosition(x,CARDS_Y);if(card.abtn)card.abtn.setPosition(x,CARDS_Y-40);});
    this.renderStored();
    if(this.pHpGfx)this.pHpGfx.setPosition(BX0,PHP_Y);this.pHpTxt.setPosition(CX,PHP_Y);this.drawPlayerHp();
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)this.cellRect(r,c).setPosition(BX0+c*CS,BY0+r*CS);
    this.drawGloss();   // 視窗變動→重畫玻璃光澤
    for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3,cen=this.cellCenter(br+1,bc+1);this.boxLabels[b].setPosition(cen.x,cen.y);}
    this.trayHits.forEach(h=>h.setPosition(h.x,TRAY_Y));
    if(this.tray)this.renderTray();
    this.enemies.forEach(e=>{if(!e.card||e.dead)return;const x=e.card.x,cy=BATTLE_CY,sz=e.cardH;
      e.card.setPosition(x,cy);
      e.turnG.setPosition(x-sz/2+12,cy-sz/2+11);if(e.hpGfx)e.hpGfx.setPosition(e.hpx,cy+sz/2-3);e.mark.setPosition(x,cy-sz/2-9);if(e.shadow)e.shadow.setPosition(x,cy+BG_GROUND_OFF);
      const fy=e.img?cy:cy-Math.round(sz*0.14);if(e.img)e.sprite.setDisplaySize(sz,sz);e.baseScale=e.sprite.scaleX;if(e.bob)e.bob.stop();e.sprite.setPosition(x,fy);e.restY=fy;e.bob=this.idleAnim(e,fy);});
  }

  cellRect(r,c){return this.cells[r*N+c];}
  cellCenter(r,c){return {x:BX0+c*CS+RECT/2, y:BY0+r*CS+RECT/2};}

      e.turnG=this.add.container(x-szc/2+12,cy-szc/2+11,[]);   // 出手倒數:沙漏+數字,移到敵卡左上

      e.hpW=Math.round(szc*HP_BAR_W); e.hpx=x-e.hpW/2;   // 血條較窄、置中於敵下緣
      e.hpH=9; e.hpRatio=Math.max(0,Math.min(1,e.hp/e.max)); e.hpLag=e.hpRatio; e._hpColor=e.boss?0xff7a3a:0xc23c2c;
      e.hpGfx=this.add.graphics().setPosition(e.hpx,cy+szc/2-3); this.drawHpBar(e);   // HP:圓角血條 + 白色圓角外框 + 受傷白拖尾
      e.mark=this.add.text(x,cy-szc/2-9,'▼',{fontFamily:EMOJIFONT,fontSize:'14px',color:'#ffd56a',fontStyle:'bold'}).setOrigin(0.5).setVisible(false);   // 目標指標(取代黃框)
      e.restY=e.sprite.y;   // 受擊擊退/回位的基準 y
      e.bob=this.idleAnim(e,e.sprite.y);
      let gt=null,gc='#cfe0ff';   // 招牌行為徽章(教學)
      if(e.hitGate){gt='🛡'+e.hitGate+' HIT';} else if(e.comboGate){gt='🛡'+e.comboGate+' COMBO';}
      else if(e.dot){gt='🔥 灼燒';gc='#ffb09a';} else if(e.regen){gt='💚 回血';gc='#9ae0a8';} else if(e.paralyze){gt='⚡ 麻痺';gc='#ffe98a';} else if(e.healAlly){gt='💚 補師';gc='#9ae0a8';} else if(e.junk){gt='🔒 封鎖';gc='#c4a8e0';}
      if(gt){e.gateTx=this.add.text(x,cy+szc/2+9,gt,{fontFamily:EMOJIFONT,fontSize:'10px',color:gc,fontStyle:'bold',stroke:'#0a1420',strokeThickness:3}).setOrigin(0.5);}
    });
    this.enemies.forEach(e=>{if(e.shadow)this.enemyG.add(e.shadow);});   // 影は全 sprite の背面(先に add)
    // 敵方同層 z 序:敵中 > 敵左 > 敵右(越靠中央畫越上;同距時左>右)。依此由後往前加入容器
    const zorder=this.enemies.map((e,i)=>i).sort((a,b)=>{
      const ba=this.enemies[a].boss?0:1, bb=this.enemies[b].boss?0:1;

      const da=Math.abs(this.enemies[a].card.x-CX), db=Math.abs(this.enemies[b].card.x-CX);

    zorder.forEach(i=>{const e=this.enemies[i];[e.card,e.sprite,e.turnG,e.hpGfx,e.mark,e.gateTx].filter(Boolean).forEach(o=>this.enemyG.add(o));});
    this.enemies.forEach((e,i)=>this.enemyEnter(e, i*120));   // 自遠方逼近入場(交錯)
    this.target=0;
  }
  refill(){this.tray=[pickShape(),pickShape(),pickShape()].map(c=>({c,used:false}));   // 一般隨機塊
    if(this.diff&&this.diff.baby&&this.babyNeedsHelp())this.tray=this.babyTray();}      // 嬰兒:快卡住時才換成好解塊(+renderHint 標最佳建議);否則一般塊、不給提示
  // 嬰兒救援判定:完全放不下、或「盤面已擁擠且這手清不掉任何線/box」→ 快解不出來,該救
  babyNeedsHelp(){ if(!this.anyPlaceable())return true;
    let filled=0; for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(this.board[r][c])filled++;
    if(filled < N*N*0.5)return false;   // 盤面還不擁擠→不救
    const canClear=this.tray.some(p=>{if(p.used||p.locked)return false; const h=this.bestPlacement(p.c); return h&&h.score>=100000;});   // score≥10萬 = 有清除
    return !canClear; }
  // 嬰兒級「多HIT工廠」:盡量生出「放下去能同時清最多線/box」的塊(順便保證有解、永不卡死)
  babyTray(){const out=[], targeted=new Set();
    for(let n=0;n<2;n++){const best=this.bestHitSet(targeted); if(!best)break; out.push({c:best.shape,used:false,hint:best.origin}); best.clears.forEach(id=>targeted.add(id));}
    while(out.length<3)out.push({c:pickShape(),used:false});
    this.tray=out;
    if(!this.anyPlaceable()){const e=this.firstEmpty(); if(e)out[0]={c:[[0,0]],used:false,hint:e};}   // 終極保底:盤上任一空格塞 1 格塊
    return out;}
  firstEmpty(){for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!this.board[r][c])return{r,c};return null;}
  // 找「填完後清掉最多結構」的空格集(來自最接近完成的線/列/box),回傳相對形狀+落點+會清的結構
  bestHitSet(exclude){exclude=exclude||new Set(); const K=6, structs=[];
    for(let r=0;r<N;r++){const e=[];for(let c=0;c<N;c++)if(!this.board[r][c])e.push([r,c]); structs.push({id:'r'+r,empties:e});}
    for(let c=0;c<N;c++){const e=[];for(let r=0;r<N;r++)if(!this.board[r][c])e.push([r,c]); structs.push({id:'c'+c,empties:e});}
    for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3,e=[];for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)if(!this.board[r][c])e.push([r,c]); structs.push({id:'b'+b,empties:e});}
    let best=null;
    structs.forEach(s=>{if(!s.empties.length||s.empties.length>K||exclude.has(s.id))return;
      const key=new Set(s.empties.map(p=>p[0]+'_'+p[1]));
      const clears=structs.filter(t=>t.empties.length&&t.empties.every(p=>key.has(p[0]+'_'+p[1]))).map(t=>t.id);
      const score=clears.length*100-s.empties.length;   // 多清優先、塊小優先
      if(!best||score>best.score){const mr=Math.min(...s.empties.map(p=>p[0])), mc=Math.min(...s.empties.map(p=>p[1]));
        best={score,clears,origin:{r:mr,c:mc},shape:s.empties.map(p=>[p[0]-mr,p[1]-mc])};}});
    return best;}
  // 固定形狀的最佳落點:在所有可放位置裡,挑「清最多線/box;否則最接近完成」者。回傳 {r,c,score}
  bestPlacement(shape){ if(!shape)return null; let best=null;
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){
      if(!canPlace(this.board,shape,r,c))continue;
      const set={}; shape.forEach(([dr,dc])=>set[(r+dr)+'_'+(c+dc)]=1);
      const fl=(rr,cc)=> !!this.board[rr][cc] || set[rr+'_'+cc];
      let clears=0, prog=0;
      for(let rr=0;rr<N;rr++){let f=true,n=0;for(let cc=0;cc<N;cc++){if(fl(rr,cc))n++;else f=false;} if(f)clears++; else prog+=n*n;}
      for(let cc=0;cc<N;cc++){let f=true,n=0;for(let rr=0;rr<N;rr++){if(fl(rr,cc))n++;else f=false;} if(f)clears++; else prog+=n*n;}
      for(let b=0;b<9;b++){const br=((b/3)|0)*3,bc=(b%3)*3; let f=true,n=0;for(let rr=br;rr<br+3;rr++)for(let cc=bc;cc<bc+3;cc++){if(fl(rr,cc))n++;else f=false;} if(f)clears++; else prog+=n*n;}
      const score=clears*100000+prog;   // 清除優先;否則填得越接近完成(n²)越好
      if(!best||score>best.score)best={r,c,score};
    }
    return best; }
  aliveCount(){return this.enemies.filter(e=>!e.dead).length;}
  targetEnemy(){let e=this.enemies[this.target];if(e&&!e.dead)return e;
    const i=this.enemies.findIndex(x=>!x.dead);this.target=i;return i<0?null:this.enemies[i];}
  selectTarget(i){if(this.enemies[i]&&!this.enemies[i].dead){this.target=i;this.updateEnemies();}}

  refreshBoard(){
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){const rc=this.cellRect(r,c), be=this.boxElement[boxOf(r,c)];
      rc.setAlpha(1).setScale(1);   // 還原溶解動畫殘留的 alpha/scale
      if(this.board[r][c]){const el=this.board[r][c].el, fc=EL[el]?EL[el].color:NEUTRAL_FILL;rc.setFillStyle(fc).setStrokeStyle(2,shadeColor(fc,0.55),0.5);}   // 填滿:屬色 + 細亮邊(精緻、像能量結晶)
      else rc.setFillStyle(be?EL[be].dark:NEUTRAL_DARK).setStrokeStyle(2,0x000000,0);}
    for(let b=0;b<9;b++){const be=this.boxElement[b];
      this.boxLabels[b].setText(be?EL[be].name:'·').setColor(be?'#'+EL[be].color.toString(16).padStart(6,'0'):'#ffffff66');}
    this.drawGloss();
  }
  drawGloss(){const g=this.gloss; if(g)g.clear();}   // 玻璃光澤/斜角都已拿掉,只留屬色亮邊(描邊);保留空函式避免呼叫端報錯
  // 放塊:查克拉凝聚成形 —— 屬色凝聚體由略大半透明收實 + 粒子向中心收束 + 格子淡入(只演「放下後仍在盤上」的格)
  coalesceCells(list){ if(!list)return; const ADD=Phaser.BlendModes.ADD;   // list=[{r,c,el}](放下當下就記住屬性→就算馬上結印被清掉也照演凝聚)
    list.forEach((pc,idx)=>{const r=pc.r,c=pc.c; if(r<0||r>=N||c<0||c>=N||!this.board[r][c])return;   // 已被結印清掉的格→不跑「聚攏成實心塊」(交給結印的溶解→集結演出)
      const cell=this.cellRect(r,c); if(!cell)return;
      const el=pc.el, col=EL[el]?EL[el].color:NEUTRAL_FILL, cx=BX0+c*CS+RECT/2, cy=BY0+r*CS+RECT/2, dl=idx*55;   // dl:多格逐格錯開→像一道波流過整塊(絲滑)
      this.tweens.killTweensOf(cell); cell.setAlpha(0.12); this.tweens.add({targets:cell,alpha:1,duration:430,delay:dl,ease:'Sine.out',onComplete:()=>cell.setAlpha(1)});   // 格子柔和淡入
      const o=this.add.rectangle(cx,cy,RECT,RECT,col).setOrigin(0.5).setBlendMode(ADD).setDepth(DEPTH.board+1).setAlpha(0.5).setScale(1.35);   // 凝聚體:起始倍數 1.35(略大半透→緩緩收實)
      this.tweens.add({targets:o,scaleX:1,scaleY:1,alpha:0,duration:440,delay:dl,ease:'Cubic.out',onComplete:()=>o.destroy()});
      for(let k=0;k<6;k++){const a=Math.random()*Math.PI*2, r0=18+Math.random()*14, sx=cx+Math.cos(a)*r0, sy=cy+Math.sin(a)*r0;   // 查克拉粒子滑順收束(Sine.inOut+錯開)
        const d=this.add.circle(sx,sy,1.8+Math.random()*1.4,col,0.85).setBlendMode(ADD).setDepth(DEPTH.board+1);
        this.tweens.add({targets:d,x:cx,y:cy,alpha:0,scale:0.25,duration:360+Math.random()*180,delay:dl+Math.random()*70,ease:'Sine.inOut',onComplete:()=>d.destroy()});}
    });
  }
  renderTeam(){ELEMENT_BOXES.forEach((b,i)=>{const k=this.boxElement[b],card=this.teamCards[i];

  // 主動技蓄力條/發光/icon 同步

    card.aic.setText(ready?a.icon:String(Math.max(0,a.cd-(this.charge[i]||0)))).setFontSize(ready?'14px':'11px');   // 滿→icon可點;否則顯示剩餘手數
    if(ready&&!card.pulse)card.pulse=this.tweens.add({targets:card.abtn,scaleX:1.15,scaleY:1.15,duration:480,yoyo:true,repeat:-1,ease:'Sine.inOut'});

  // 屬塊存放顯示:無框無底,元素色塊+「明暗漸層流動」(查克拉在屬性裡流的感覺);新生時彈出一下
  renderStored(){if(!this.stored)return;this.teamCards.forEach((card,i)=>{const so=card.storeObj;if(!so)return;
    so.removeAll(true);
    const s=this.stored[i], key=s?s.el+'_'+s.lv:null;
    if(card.txt)card.txt.setVisible(!s);   // 有屬塊→元素字讓位給屬塊(免字塊相疊變花;元素仍由卡底色辨識)
    if(!s){so.setVisible(false); card.storeCells=null; card.storeKey=null; return;}
    so.setVisible(true);
    const cells=s.cells||chakraShape(s.el,s.lv), col=EL[s.el].color;
    card.storeDark=shadeColor(col,-0.42); card.storeLight=shadeColor(col,0.55);   // 流動兩端:暗↔亮的同屬性色
    let mr=0,mc=0;cells.forEach(([r,c])=>{mr=Math.max(mr,r);mc=Math.max(mc,c);});
    const ms=12,pw=(mc+1)*ms,ph=(mr+1)*ms, span=(mr+mc)||1;   // 格大小反映真實 LV(格數)

  // HIT 實驗室:塊區放各「可能解塊數」按鈕(由小到大兩排),點按完整重現該手實際遊玩畫面(招式名+型/印+全螢幕閃+n HIT+集氣攻擊),純特效不扣血/不推進
  renderHitLab(){

  demoFinal(){   // 實驗室演「最後一擊」特寫鏡頭:推近 → 蓄勢 → 飛出 → 拉回 → 重生(不進結果)
    const tgt=this.enemies&&this.enemies.find(e=>!e.dead); if(!tgt||tgt._labDying)return; tgt._labDying=true;

      sp.setVisible(true); sp.clearTint&&sp.clearTint(); [tgt.turnG,tgt.hpGfx].forEach(o=>{if(o)o.setVisible(true);}); if(tgt.card)tgt.card.setInteractive();

  _labCells(n,off){const cells=[];off=off||0;for(let r=Math.floor(off/N);r<N&&cells.length<n;r++)for(let c=(r===Math.floor(off/N)?off%N:0);c<N&&cells.length<n;c++)cells.push([r,c]);return cells;}
  demoHit(n){
    const tgt=this.enemies&&this.enemies.find(e=>!e.dead); if(!tgt)return;
    const els=['fire','water','thunder','earth','wind']; this._labEl=((this._labEl==null?-1:this._labEl)+1)%5; const el=els[this._labEl];
    const lv=Math.max(1,Math.min(7,Math.round(n/9)+1));   // 型/印 階(隨 HIT 升;lv≥4 全螢幕閃,lv≥6 大閃)
    const cells=this._labCells(n), burst=1+Math.max(0,n-9)/9*0.3, dmg=Math.round(n*10*burst);
    const atkAt=this.playClearFX(n, [{el, lv, fire:()=>this.chakraStrike([tgt], dmg, el, {cells, parts:[{el}], fx:{}})}]);   // 先 n HIT → 招式名 → 才攻擊
    this.time.delayedCall(atkAt+540+this.chargeMs(n)+340,()=>{tgt.hp=Math.max(0,tgt.hp-dmg);this.updateEnemies();if(tgt.hp<=0)this.killEnemy(tgt);});
  }
  demoMulti(){   // 演示「一次清除含 2 元素 → 同時出 2 招」(18 格 = 兩條線各一元素)
    const tgt=this.enemies&&this.enemies.find(e=>!e.dead); if(!tgt)return;
    const pairs=[['fire','water'],['thunder','earth'],['wind','fire'],['water','thunder'],['earth','wind']];
    this._labPair=((this._labPair==null?-1:this._labPair)+1)%pairs.length; const pr=pairs[this._labPair];
    const n=18, dmg=Math.round(n*10*(1+9/9*0.3)), half=Math.round(dmg/2);
    const cA=this._labCells(9,0), cB=this._labCells(9,9), lvA=4, lvB=4;
    const jutsu=[
      {el:pr[0], lv:lvA, fire:()=>this.chakraStrike([tgt], half, pr[0], {cells:cA, parts:[{el:pr[0]}], fx:{}})},
      {el:pr[1], lv:lvB, fire:()=>this.chakraStrike([tgt], dmg-half, pr[1], {cells:cB, parts:[{el:pr[1]}], fx:{}})}
    ];
    const atkAt=this.playClearFX(n, jutsu);
    this.time.delayedCall(atkAt+540+340,()=>{tgt.hp=Math.max(0,tgt.hp-dmg);this.updateEnemies();if(tgt.hp<=0)this.killEnemy(tgt);});   // 每招各 9 格、無蓄力
  }
  demoEnemyAttack(){const alive=this.enemies&&this.enemies.filter(e=>!e.dead); if(!alive||!alive.length)return;
    this._labAtkI=((this._labAtkI==null?-1:this._labAtkI)+1)%alive.length; this.enemyAttack(alive[this._labAtkI]);}

  /* 拖曳放塊 */
  startDrag(i,p){if(this.resultOpen||this.locked||this.camCine||this.earthSel||this.earthDrag||this.windPick)return;
    const cells=this.tray[i].c, kind=this.tray[i].kind;
    const kc=kind==='water'?0x62b8f0:kind==='wind'?0x6ad06a:kind==='earth'?0xd49a4a:0xffffff;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,kc).setOrigin(0));
    this.drag={i,cells,kind,prev:this.add.container(0,0,kids).setAlpha(0.85).setDepth(DEPTH.drag),kids};this.updateDrag(p);}
  // 從卡拖「存放的屬塊」(萬用塊填空格;不佔托盤格→不推進敵,是連擊引擎)
  startStoredDrag(i,p){if(this.resultOpen||this.locked||this.camCine||this.drag||this.earthSel||this.earthDrag||this.windPick)return;
    const s=this.stored[i]; if(!s)return;
    const cells=s.cells||chakraShape(s.el,s.lv), col=EL[s.el].color;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,col).setOrigin(0));
    this.drag={store:i,cells,kind:'water',col,prev:this.add.container(0,0,kids).setAlpha(0.85).setDepth(DEPTH.drag),kids};this.updateDrag(p);}
  doPlaceStored(d,r,c){if(this.resultOpen)return;
    d.cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;
      if(rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc])this.board[rr][cc]={el:this.boxElement[boxOf(rr,cc)]||'neutral'};});
    const placed=d.cells.map(([dr,dc])=>{const rr=r+dr,cc=c+dc;return (rr>=0&&rr<N&&cc>=0&&cc<N&&this.board[rr][cc])?{r:rr,c:cc,el:this.board[rr][cc].el}:null;}).filter(Boolean);
    this.stored[d.store]=null; this.renderStored();
    this.afterAction(false); this.coalesceCells(placed);   // 查克拉凝聚成形(結印時也演)
  }   // 連擊引擎:屬塊消除「也生塊」(滾雪球爽度);仍不佔托盤格→不推進敵(由 tray.every(used) 決定)
  updateDrag(p){if(!this.drag)return;this.clearGhost();
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT);
    if(!cell){this.drag.prev.setVisible(false);return;}
    this.drag.prev.setVisible(true).setPosition(BX0+cell.c*CS, BY0+cell.r*CS);
    const k=this.drag.kind, ok=canPlace(this.board,this.drag.cells,cell.r,cell.c,k);
    const kc=this.drag.col||(k==='water'?0x62b8f0:k==='wind'?0x6ad06a:k==='earth'?0xd49a4a:0x8fffa6);
    this.drag.kids.forEach(x=>x.setFillStyle(ok?kc:0xff8f8f));
    this.drag.cells.forEach(([dr,dc])=>{const rr=cell.r+dr,cc=cell.c+dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      let col;
      if(!ok)col=0xff8f8f;
      else if(k==='water')col=this.board[rr][cc]?0x6aa0ff:0x8fffa6;     // 重疊藍 / 填綠
      else if(k==='wind') col=this.board[rr][cc]?0x6ad06a:0x444444;     // 會消綠 / 空格灰
      else if(k==='earth')col=this.board[rr][cc]?0xd49a4a:0x444444;     // 抓取棕 / 空格灰
      else col=0x8fffa6;
      this.cellRect(rr,cc).setStrokeStyle(3,col,1);});}
  endDrag(p){if(!this.drag)return;const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.drag;
    d.prev.destroy(); this.clearGhost(); this.drag=null;
    if(cell && canPlace(this.board,d.cells,cell.r,cell.c,d.kind)){
      if(d.store!=null) this.doPlaceStored(d,cell.r,cell.c);
      else if(d.kind==='earth') this.earthSelect(d.i,cell.r,cell.c);
      else this.doPlace(d.i,cell.r,cell.c);
    }}
  clearGhost(){this.cells.forEach((rc,i)=>{const r=Math.floor(i/N),c=i%N;   // 清預覽邊框時:填滿格還原屬色亮邊(不然拖曳時亮邊會消失)
    if(this.board[r]&&this.board[r][c])rc.setStrokeStyle(2,shadeColor(rc.fillColor,0.55),0.5); else rc.setStrokeStyle(2,0x000000,0);});}

  /* 放塊 = 一回合(敵人推進);放純查克拉 = bonus(不推進回合) */
  doPlace(i,r,c){if(this.resultOpen)return;
    const cells=this.tray[i].c, kind=this.tray[i].kind;
    cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;
      if(kind==='wind'){if(this.board[rr][cc])this.board[rr][cc]=null;}        // 風刃:消除
      else if(!this.board[rr][cc])this.board[rr][cc]={el:this.boxElement[boxOf(rr,cc)]||'neutral'};}); // 一般/水:填(只填空格)
    const placed=(kind!=='wind')?cells.map(([dr,dc])=>{const rr=r+dr,cc=c+dc;return (rr>=0&&rr<N&&cc>=0&&cc<N&&this.board[rr][cc])?{r:rr,c:cc,el:this.board[rr][cc].el}:null;}).filter(Boolean):null;   // 放下當下記住屬性(之後就算被清也照演)
    this.tray[i].used=true;
    this.afterAction(kind==='water'||kind==='wind');
    if(placed)this.coalesceCells(placed);   // 查克拉凝聚成形(結印時也會演 → 凝聚→才清)
  }
  // 共用:放塊後處理(消除→燒傷→敵推進→補塊→卡死檢查)
  afterAction(fromBlock){
    this.stopStuckFX();   // 玩家一行動就收掉卡死循環提示(若仍卡死,handleStuck 會再開)
    this.refreshBoard(); this.renderTray();
    this.fromBlock=!!fromBlock; this._placeCleared=false; try{this.resolve();}catch(err){console.error('resolve error',err);} this.fromBlock=false;   // 防遞迴:塊清出的消除不再生塊;try 防展演例外卡死整手
    if(!this._placeCleared){this.combo=0;this.renderCombo();}   // 逐塊:這塊沒清→連段斷、combo 歸零、指示器熄掉
    if(this.tray.every(t=>t.used||t.locked)){this.endHand();return;}  // 一手放完(鎖住塊算跳過)→endHand 負責「等展演完才敵攻+補手+解鎖+卡死檢查」
    if(!this.anyPlaceable()){this.time.delayedCall(420,()=>this.handleStuck());}
    this.updateAll();
  }
  // 一手結束:鬥志/燒傷立即結算(屬我方展演),敵方出手+補新手延後到展演完才發動(以「手」為節奏)
  endHand(){
    const showed=this.handCleared;   // 本手有清除展演→敵攻多等一下;空手→快一點
    this.handCleared=false;   // combo 已改逐塊處理(放塊有清+1/沒清歸零),這裡不再動 combo/鬥志
    this.enemies.forEach(e=>{if(!e.dead&&e.burn>0){e.hp=Math.max(0,e.hp-e.burn);   // 燒傷=我方 DoT,屬展演,立即
      this.floatText(e.sprite.x,e.sprite.y-24,'🔥'+e.burn,'#ff7a63'); if(e.hp<=0)this.killEnemy(e);}});
    this.updateAll();   // 立即反映鬥志字/燒傷後血量(別等延遲回呼)
    this.locked=true;   // 鎖輸入:等我方這手展演完,敵方才出手(玩家才看得到上面的表現),再補新手解鎖
    this.time.delayedCall(showed?1200:200,()=>{   // 等我方華麗展演(HIT 數到底)演完,敵方才出手
      if(this.resultOpen){this.locked=false;return;}   // 期間已開結算/勝敗畫面→不再推進
      try{
        this.enemies.forEach(e=>{if(e.dead||e.hp<=0)return; if((e.sealed||0)>0)e.sealed--; e.timer--; if(e.timer<=0){this.enemyAttack(e); e.timer=e.interval;} this.animTurnGlass(e);});   // 敵出手 + 沙漏翻半圈;封印每手 -1(歸 0 停抖)。已被致死(hp≤0,死亡演出尚未播完)→不出手
        const dotRate=Math.max(0,...this.enemies.filter(e=>!e.dead&&e.hp>0).map(e=>e.dot||0));   // 🔥火關灼燒光環:有灼燒敵活著→每手扣玩家血(取最大率、不疊加)
        if(dotRate>0){const dd=Math.max(1,Math.round(this.maxHP*dotRate));this.playerHP=Math.max(0,this.playerHP-dd);this.floatText(CX,PHP_Y-16,'🔥灼燒 -'+dd,'#ff7a4a');this.animPlayerHP(false);if(this.playerHP<=0)this.gameOver('灼燒焚身');}
        this.enemies.forEach(e=>{if(!e.dead&&e.hp>0&&e.regen>0){const hh=Math.max(1,Math.round(e.max*e.regen));e.hp=Math.min(e.max,e.hp+hh);if(e.sprite)this.floatText(e.sprite.x,e.sprite.y-24,'💚+'+hh,'#74e09a');}});   // 💚水關自我回血:每隻回血敵每手回自身血(致死 hp≤0 不回→不會復活)
        const healR=Math.max(0,...this.enemies.filter(e=>!e.dead&&e.hp>0&&e.healAlly>0).map(e=>e.healAlly));   // 💚補師:有補師活著→每手治療全體友軍(逼先秒補師)
        if(healR>0)this.enemies.forEach(e=>{if(!e.dead&&e.hp>0){const hh=Math.max(1,Math.round(e.max*healR));e.hp=Math.min(e.max,e.hp+hh);if(e.sprite)this.floatText(e.sprite.x,e.sprite.y-24,'💚+'+hh,'#74e09a');}});
        if(showed)this.charge=this.charge.map((c,i)=>{const a=activeSkill(this.teamCards[i].el);return a?Math.min(a.cd,(c||0)+1):c;});   // 主動技蓄力:本手有消塊才+1(綁消塊→不能擺爛farm蓄力跳過拼圖)
        this.renderCharges();
        this.refill(); this.renderTray(); this.updateAll(); this.applyParalyze(); this.applyJunk();   // ⚡麻痺/🔒封鎖:補新手後可能觸發
      }catch(err){console.error('endHand error',err);}
      finally{ this.locked=false; }   // ★ 無論如何都解鎖,杜絕卡死
      if(!this.anyPlaceable())this.time.delayedCall(420,()=>this.handleStuck());
    });
  }
  // 卡死處理:空盤+只剩工具塊(土/風無從施力)→自動補一般查克拉塊;否則才花血重洗
  handleStuck(){
    if(this.resultOpen||this.anyPlaceable())return;
    const empty=this.board.every(row=>row.every(c=>!c));
    const unused=this.tray.filter(t=>!t.used);
    const onlyTools=unused.length>0 && unused.every(t=>t.kind==='earth'||t.kind==='wind');
    if(empty&&onlyTools){const s=this.tray.findIndex(t=>!t.used);
      if(s>=0){this.tray[s]={c:pickShape(),used:false};this.renderTray();this.tonFloat('盤面已空,自動補查克拉塊','#cfe3ff');return;}}
    if(this.anyStoredPlaceable()){this.flashStored();this.tonFloat('托盤卡住 → 拖卡上的屬塊解圍!','#ffe066');return;}   // 有存塊能解=不扣血,提示用屬塊(真沒塊可解才花血)
    this.showReshuffleModal();
  }
  // 有任何「存的屬塊」放得下嗎(萬用塊只要有空格可填)
  anyStoredPlaceable(){if(!this.stored)return false;
    return this.stored.some(s=>{if(!s)return false;const cells=s.cells||chakraShape(s.el,s.lv);
      for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(canPlace(this.board,cells,r,c,'water'))return true;return false;});}
  // 卡死提示:能解圍的屬塊「跳+脹」一下,叫你拖它(不扣血的救命塊)
  flashStored(){this.stopStuckFX(); this.stuckTw=[]; this.stuckObj=[]; this.stuckBlk=[];
    this.teamCards.forEach((card,i)=>{const s=this.stored&&this.stored[i],so=card.storeObj;if(!s||!so)return;
      const cells=s.cells||chakraShape(s.el,s.lv);let ok=false;
      for(let r=0;r<N&&!ok;r++)for(let c=0;c<N&&!ok;c++)if(canPlace(this.board,cells,r,c,'water'))ok=true;
      if(!ok)return;
      const y0=so.y; so._baseY=y0; this.tweens.killTweensOf(so); so.setScale(1).setY(y0);
      this.stuckBlk.push(so);
      this.stuckTw.push(this.tweens.add({targets:so,y:y0-16,duration:240,yoyo:true,repeat:-1,ease:'Quad.inOut'}));            // 持續跳
      this.stuckTw.push(this.tweens.add({targets:so,scaleX:1.42,scaleY:1.42,duration:240,yoyo:true,repeat:-1,ease:'Sine.inOut'}));  // 持續脹
      const cx=card.rect.x, cy=card.rect.y;   // 卡身亮黃光環持續脈動
      const ring=this.add.rectangle(cx,cy,68,68,0,0).setStrokeStyle(4,0xffe066,1).setDepth(DEPTH.fx); this.stuckObj.push(ring);
      this.stuckTw.push(this.tweens.add({targets:ring,scaleX:1.3,scaleY:1.3,alpha:0,duration:620,repeat:-1,ease:'Quad.out'}));});}
  // 收掉卡死提示(玩家一行動就停):停 tween、銷毀光環/箭頭、屬塊歸位
  stopStuckFX(){
    if(this.stuckTw){this.stuckTw.forEach(t=>{if(t)t.stop();});this.stuckTw=null;}
    if(this.stuckObj){this.stuckObj.forEach(o=>{if(o&&o.destroy)o.destroy();});this.stuckObj=null;}
    if(this.stuckBlk){this.stuckBlk.forEach(so=>{if(so&&so.active)so.setScale(1).setY(so._baseY!=null?so._baseY:so.y);});this.stuckBlk=null;}
  }
  /* 土屬塊:兩段式搬移查克拉 — ①拖塊蓋住要抓的查克拉 ②再拖把它們整組搬到空位 */
  earthSelect(i,r,c){
    const cells=this.tray[i].c, sel=[];
    cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      if(this.board[rr][cc])sel.push({r:rr,c:cc,el:this.board[rr][cc].el});});
    if(!sel.length)return;
    this.earthSel={i,cells:sel};
    this.clearGhost(); sel.forEach(s=>this.cellRect(s.r,s.c).setStrokeStyle(3,0xd49a4a,1));
    this.tonFloat('抓 '+sel.length+' 格 — 再拖曳搬去空位','#d49a4a');
  }
  startEarthMove(p){
    const sel=this.earthSel.cells;
    const minR=Math.min.apply(null,sel.map(s=>s.r)), minC=Math.min.apply(null,sel.map(s=>s.c));
    const rel=sel.map(s=>({dr:s.r-minR,dc:s.c-minC,el:s.el}));
    sel.forEach(s=>{this.board[s.r][s.c]=null;}); this.refreshBoard();
    const kids=rel.map(o=>this.add.rectangle(o.dc*CS,o.dr*CS,RECT,RECT,EL[o.el]?EL[o.el].color:NEUTRAL_FILL).setOrigin(0).setAlpha(0.9));
    this.earthDrag={i:this.earthSel.i, rel, orig:sel.slice(), prev:this.add.container(0,0,kids).setDepth(DEPTH.drag), kids};
    this.earthSel=null; this.updateEarthMove(p);
  }
  updateEarthMove(p){
    if(!this.earthDrag)return; this.clearGhost();
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.earthDrag;
    if(!cell){d.prev.setVisible(false);return;}
    d.prev.setVisible(true).setPosition(BX0+cell.c*CS,BY0+cell.r*CS);
    const ok=d.rel.every(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;return rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc];});
    d.kids.forEach((k,idx)=>k.setFillStyle(ok?(EL[d.rel[idx].el]?EL[d.rel[idx].el].color:NEUTRAL_FILL):0xff8f8f));
    d.rel.forEach(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      this.cellRect(rr,cc).setStrokeStyle(3,ok?0x8fffa6:0xff8f8f,1);});
  }
  endEarthMove(p){
    if(!this.earthDrag)return;
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.earthDrag;
    d.prev.destroy(); this.clearGhost(); this.earthDrag=null;
    const ok=cell && d.rel.every(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;return rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc];});
    if(ok){ d.rel.forEach(o=>{this.board[cell.r+o.dr][cell.c+o.dc]={el:o.el};});
      this.tray[d.i].used=true; this.afterAction(true);
    } else { d.orig.forEach(s=>{this.board[s.r][s.c]={el:s.el};}); this.refreshBoard(); this.updateAll(); }
  }
  anyPlaceable(){return this.tray.some(p=>{if(p.used||p.locked)return false;
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(canPlace(this.board,p.c,r,c,p.kind))return true;return false;});}
  // ⚡雷·麻痺:有麻痺敵活著→每 interval 手鎖 1 塊托盤(留 ≥2 塊可用,不全鎖)
  applyParalyze(){if(this.hitLab)return;
    const ivs=this.enemies.filter(e=>!e.dead&&e.paralyze>0).map(e=>e.paralyze); if(!ivs.length)return;
    this.paraTick=(this.paraTick||0)+1; if(this.paraTick<Math.min(...ivs))return; this.paraTick=0;
    const cand=this.tray.map((t,i)=>i).filter(i=>this.tray[i]&&!this.tray[i].used&&!this.tray[i].locked);
    if(cand.length<2)return;   // 至少留 1 塊,不會鎖到沒得玩
    const li=cand[brnd(cand.length)]; this.tray[li].locked=true; this.renderTray();
    this.tonFloat('⚡ 麻痺!1 塊被鎖','#ffe98a');}
  // 🔒 封鎖(大術士/魔王):每 N 手在盤面找一條 1×3/3×1 空格,塞詛咒塊(填滿不能放,清掉那條線才除)
  applyJunk(){if(this.hitLab)return;
    const ivs=this.enemies.filter(e=>!e.dead&&e.junk>0).map(e=>e.junk); if(!ivs.length)return;
    this.junkTick=(this.junkTick||0)+1; if(this.junkTick<Math.min(...ivs))return; this.junkTick=0;
    const horiz=brnd(2)===0, cands=[];
    if(horiz){for(let r=0;r<N;r++)for(let c=0;c<=N-3;c++)if(!this.board[r][c]&&!this.board[r][c+1]&&!this.board[r][c+2])cands.push([[r,c],[r,c+1],[r,c+2]]);}
    else{for(let c=0;c<N;c++)for(let r=0;r<=N-3;r++)if(!this.board[r][c]&&!this.board[r+1][c]&&!this.board[r+2][c])cands.push([[r,c],[r+1,c],[r+2,c]]);}
    if(!cands.length)return;   // 沒連續空格可塞就跳過
    cands[brnd(cands.length)].forEach(([r,c])=>{this.board[r][c]={el:'junk'};});
    this.refreshBoard(); this.tonFloat('🔒 封鎖!一條被詛咒(清掉那線才除)','#c4a8e0');
    if(!this.anyPlaceable())this.time.delayedCall(420,()=>this.handleStuck());}
  // 👑 魔王階段變身:隨血量切到下一屬,換屬+換招牌行為+演出
  bossTransform(e){const ph=e.phases[e.phaseIdx]; if(!ph)return; e.el=ph.el;
    const dk=(this.diff&&this.diff.key)||'normal', beh=ph.beh;
    e.hitGate=0;e.comboGate=0;e.dot=0;e.regen=0;e.paralyze=0;
    if(beh==='hit')e.hitGate=15; else if(beh==='combo')e.comboGate=(dk==='advanced')?2:3;
    else if(beh==='burn')e.dot=({advanced:0.02,super:0.03,hell:0.04}[dk])||0.03;
    else if(beh==='regen')e.regen=({advanced:0.04,super:0.06,hell:0.06}[dk])||0.06;
    else if(beh==='paralyze')e.paralyze=(dk==='advanced')?2:1;

    else if(e.sprite&&e.img){ const tk=this.enemyTexKey(e); if(tk&&this.textures.exists(tk)){ e.sprite.setTexture(tk); this.fitEnemySprite(e); e.restY=e.sprite.y; } }   // 圖：變身換敵圖(換屬→換該屬魔王圖)+ 重新統一體型/站位
    let gt='',gc='#cfe0ff';
    if(e.hitGate)gt='🛡'+e.hitGate+' HIT'; else if(e.comboGate)gt='🛡'+e.comboGate+' COMBO';
    else if(e.dot){gt='🔥 灼燒';gc='#ffb09a';} else if(e.regen){gt='💚 回血';gc='#9ae0a8';} else if(e.paralyze){gt='⚡ 麻痺';gc='#ffe98a';} else if(e.healAlly){gt='💚 補師';gc='#9ae0a8';} else if(e.junk){gt='🔒 封鎖';gc='#c4a8e0';}
    if(e.gateTx)e.gateTx.setText(gt).setColor(gc);

  bossPhaseFX(e){const col=EL[e.el].color, ADD=Phaser.BlendModes.ADD;

    if(e.sprite){const bs=e.baseScale||e.sprite.scaleX||1; this.tweens.add({targets:e.sprite,scaleX:bs*1.35,scaleY:bs*1.35,duration:210,yoyo:true,ease:'Back.out'});}   // 換新型態彈一下(回基準)

  // 各屬區攻擊:該宮格子收束到「宮中心」→ 結印 → 射向敵人;彈著→該段扣血 + combo++(被彈著一次)
  zoneStrike(cx,cy,cells,color,dmg,victims,shakeBig){const ADD=Phaser.BlendModes.ADD, hot=shadeColor(color,0.18);   // hot=略提亮的屬色(不洗白)→ 攻擊明顯帶屬性色
    cells.slice(0,9).forEach((rc,i)=>{const o=this.cellCenter(rc[0],rc[1]);   // 集氣:每個色塊像花火爆出 5 顆(先散開)→ 再一起往宮中心集中
      this.time.delayedCall((i%6)*14,()=>{
        for(let k=0;k<5;k++){const a=Math.random()*Math.PI*2, ex=o.x+Math.cos(a)*(13+Math.random()*15), ey=o.y+Math.sin(a)*(13+Math.random()*15);
          const d=this.add.circle(o.x,o.y,2.6,color,0.9).setBlendMode(ADD).setDepth(DEPTH.proj-1);
          this.tweens.add({targets:d,x:ex,y:ey,scale:1.15,duration:120,ease:'Quad.out',onComplete:()=>{   // ①花火爆出
            this.tweens.add({targets:d,x:cx,y:cy,scale:0.25,duration:200+Math.random()*100,ease:'Quad.in',onComplete:()=>d.destroy()});}});}   // ②再往宮中心集中
      });});
    const core=this.add.circle(cx,cy,3,hot,1).setBlendMode(ADD).setDepth(DEPTH.proj); this.tweens.add({targets:core,scale:4,duration:240,ease:'Quad.in'});
    const glow=this.add.circle(cx,cy,7,color,0.55).setBlendMode(ADD).setDepth(DEPTH.proj); this.tweens.add({targets:glow,scale:4.5,duration:240,ease:'Quad.in'});
    this.time.delayedCall(240,()=>{core.destroy();glow.destroy();
      const seal=this.add.circle(cx,cy,14,hot,1).setBlendMode(ADD).setDepth(DEPTH.proj); this.tweens.add({targets:seal,scale:2.8,alpha:0,duration:200,ease:'Quad.out',onComplete:()=>seal.destroy()});
      if(shakeBig)this.cameras.main.shake(180,0.007);
      victims.forEach((v,k)=>{if(!v.sprite)return; this.time.delayedCall(k*45,()=>this.chakraBolt(cx,cy,v.sprite.x,v.sprite.y,color,v,dmg,1,hot));});
      this.time.delayedCall(330,()=>{victims.forEach(v=>{if(v._blocked){if(v.sprite&&!v.dead)this.floatText(v.sprite.x,v.sprite.y-18,'🛡 擋下','#cfe0ff');}else{v.hp=Math.max(0,v.hp-dmg);}}); this.updateEnemies();});   // 彈著→扣血(被擋則只演盾);combo 已改在 resolve 同步加
    });
  }
  // combo 顯示在目標敵右上;數字越大字越大
  showCombo(){const e=this.targetEnemy(); if(!e||!e.sprite)return;
    if(this.comboTx){this.tweens.killTweensOf(this.comboTx);this.comboTx.destroy();this.comboTx=null;}
    if(this.combo<2)return;   // 1 combo 不顯示,2 combo 以上才出
    const sz=Math.min(38,16+this.combo*1.6), x=e.sprite.x+e.cardW*0.5, y=Math.max(28,e.sprite.y-e.cardH*0.5);   // 字級上限↓、上緣夾住
    const t=this.comboTx=this.add.text(x,y,this.combo+' COMBO',{fontFamily:HITFONT,fontSize:sz+'px',color:'#ffd24a',fontStyle:'bold',stroke:'#7a2a00',strokeThickness:4}).setOrigin(1,0).setDepth(DEPTH.fx).setScale(0.5);
    this.tweens.add({targets:t,scaleX:1,scaleY:1,duration:200,ease:'Back.out'});
    this.tweens.add({targets:t,alpha:0,delay:1300,duration:400,onComplete:()=>{t.destroy();if(this.comboTx===t)this.comboTx=null;}});
  }
  // 常駐 combo 指示器(HP 條左端):combo≥2 才亮,顏色隨連擊變熱;pop=升 combo 時彈一下
  renderCombo(pop){ if(!this.comboBg)return; const c=this.combo||0;
    if(c<2){ this.comboBg.setVisible(false); this.comboTxt.setVisible(false); return; }
    const cols=[0x9ac4e0,0xffe066,0xffae3a,0xff7a3a,0xff4a2a], col=cols[Math.min(cols.length-1,c-2)];   // 2/3/4/5/6+ 越來越熱
    this.comboBg.setVisible(true).setStrokeStyle(2.5,col);
    this.comboTxt.setVisible(true).setText(''+c).setColor('#'+col.toString(16).padStart(6,'0'));
    if(pop){ this.tweens.killTweensOf([this.comboBg,this.comboTxt]); [this.comboBg,this.comboTxt].forEach(o=>o.setScale(1.45));
      this.tweens.add({targets:[this.comboBg,this.comboTxt],scaleX:1,scaleY:1,duration:240,ease:'Back.out'}); } }
  resolve(){
    const tgt=this.targetEnemy(); if(!tgt)return;
    const data=computeClears(this.board,this.boxElement,this.boxCard,tgt.el,this.amp,this.teamMaxAtk);   // 傳隊伍最高攻→無屬宮也吃「= 屬·普通」傷害
    if(!data)return;
    this.handCleared=true;
    this.combo+=1;   // combo 新定義:這塊有清→連續 +1(沒清的塊由 afterAction 歸零);取代舊「擊中次數」
    const plan=planResolve(data,this.lead,this.teamRcv,this.combo);   // battle-core:整包傷害計畫(combo倍率/隊長技/AoE/每段傷害/回血)→ 場景照演
    const {aoe,heal}=plan;
    const victims=aoe?this.enemies.filter(e=>!e.dead):[tgt];   // 單次 15 HIT↑ = 全體(全額打每隻)
    Object.keys(data.fx).forEach(e=>{const f=data.fx[e];f.attrs.forEach(a=>this.fireAttr(a,f.atk,f.level,tgt));});
    if(!this.fromBlock)Object.keys(data.fx).forEach(e=>this.storeBlock(e,data.fx[e].level));   // 清宮→生成該屬形狀塊存到卡
    data.cells.forEach(([r,c],idx)=>{const cel=this.boxElement[boxOf(r,c)], gcol=cel?EL[cel].color:0xbfe6ff, cen=this.cellCenter(r,c), gd=Math.min(idx,18)*16;   // 充能:被清的格亮起屬色微光(由弱漸強)→ 溶解時散掉化成查克拉(取代 90ms 瞬閃)
      const g=this.add.rectangle(cen.x,cen.y,RECT,RECT,gcol).setOrigin(0.5).setBlendMode(Phaser.BlendModes.ADD).setDepth(DEPTH.board+1).setAlpha(0);
      this.tweens.add({targets:g,alpha:0.55,duration:160,delay:gd,ease:'Quad.in'});
      this.tweens.add({targets:g,alpha:0,scaleX:0.6,scaleY:0.6,duration:260,delay:360+gd,ease:'Sine.out',onComplete:()=>g.destroy()});});
    if(data.hitWeak)tgt.timer+=1;
    if(this.firstClear){this.firstClear=false;track('first_clear');}
    data.cells.forEach(([r,c])=>{this.board[r][c]=null;});  // 立即從模型移除,避免重複觸發
    const n=data.cells.length;
    this._placeCleared=true;   // 逐塊 combo:這塊有清到(沒清的塊由 afterAction 把 combo 歸零)
    this.showCombo(); this.renderCombo(true);   // combo 已在頂端 +1(每塊有清才+1)+ 常駐指示器彈一下
    this.runMaxHit=Math.max(this.runMaxHit||0,n); this.runMaxCombo=Math.max(this.runMaxCombo||0,this.combo);   // 本局最佳 HIT/combo(我的紀錄/成就用)
    // 另類護盾:本手 HIT / 連段沒達門檻的敵人,這手不扣其 HP(演「🛡擋下」)
    this.enemies.forEach(e=>{e._blocked=false;});
    victims.forEach(v=>{v._blocked=((v.hitGate&&n<v.hitGate)||(v.comboGate&&this.combo<v.comboGate));});
    this.countFX(n);   // 盤面中央只留「n HIT」(清的格數);招式名/盤面 combo 已取消
    Object.keys(data.fx).forEach(e=>this.glowTeam(e));   // 參戰屬性的卡發亮
    const LEAD=460;   // 先讓 n HIT 跳出來
    const hits=data.hits||[]; let lastFire=LEAD;   // 各「有清到的宮」各自集氣→射出,時間錯開、順序不一
    hits.forEach((h,i)=>{const br=Math.floor(h.b/3)*3,bc=(h.b%3)*3,cen=this.cellCenter(br+1,bc+1);
      const cellsB=data.cells.filter(rc=>boxOf(rc[0],rc[1])===h.b);
      const col=h.el!=='neutral'?EL[h.el].color:0xbfe6ff, dmg=plan.hits[i].dmg;   // 每段傷害取自 battle-core 計畫
      const fireAt=LEAD+i*150+Math.random()*120; lastFire=Math.max(lastFire,fireAt);
      this.time.delayedCall(fireAt,()=>{this.zoneStrike(cen.x,cen.y,cellsB,col,dmg,victims,aoe&&i===0);
        if(h.el==='neutral'&&this.teamRcv>0){   // 清無屬區→回血(plan.heal,combo 已加成)
          this.time.delayedCall(330,()=>{this.playerHP=Math.min(this.maxHP,this.playerHP+heal);this.animPlayerHP(true);this.floatText(cen.x,cen.y,'💚+'+heal,'#74e09a');});}});});
    this.updateEnemies();
    this.time.delayedCall(LEAD-80,()=>{   // 清除的格平滑溶解(逐格淡化的波 → 化進各區集氣)
      this.drawGloss();   // 被清的格(board 已 null)→ 立刻收掉玻璃光澤,塊乾淨淡出
      const cc=data.cells||[]; cc.forEach((rc,idx)=>{const cell=this.cellRect(rc[0],rc[1]); if(cell)this.tweens.add({targets:cell,alpha:0,duration:260,delay:Math.min(idx,18)*16,ease:'Sine.in'});});
      this.time.delayedCall(300+Math.min(cc.length,18)*16,()=>this.refreshBoard());});
    this.time.delayedCall(lastFire+240+330+260,()=>{this.updateAll(); victims.forEach(v=>{if(v.hp<=0)this.killEnemy(v);});});   // 最後一段彈著後收死亡敵
  }
  // 形狀系統:火/水/風/土/雷 的主技=生成形狀塊存到卡(在 resolve 統一處理 storeBlock);fireAttr 只剩子屬性 陰/陽
  fireAttr(a,atk,lv,tgt){const A=CONFIG.ATTR;switch(a){
    case 'yang':{const v=Math.round(atk*A.yang_heal_rate*lv);this.playerHP=Math.min(this.maxHP,this.playerHP+v);this.tonFloat('☯陽·癒+'+v,'#74e09a');break;}   // 陽=回血(已砍)
    case 'yin':this.amp=Math.max(this.amp,2);this.tonFloat('☯陰·傷害×2','#b18cff');break;   // 陰=本手傷害×2(快殺)
  }}
  // 存放屬塊到「該屬性的卡」:優先填空卡,否則升級最低階那張;每卡最多1塊、留最高LV(上限LV5)
  storeBlock(el,lv){if(!this.stored)this.stored=[null,null,null,null,null];
    lv=Math.max(1,Math.min(5,lv));
    const slots=[]; this.teamCards.forEach((c,i)=>{if(c.el===el)slots.push(i);});
    if(!slots.length)return;
    let target=slots.find(i=>!this.stored[i]);
    if(target==null){target=slots.reduce((a,b)=>this.stored[b].lv<this.stored[a].lv?b:a,slots[0]); if(this.stored[target].lv>=lv)return;}
    this.stored[target]={el,lv,cells:randOrient(chakraShape(el,lv),el)}; this.renderStored();   // 火塊生成時就定隨機方向
    this.tonFloat(EL[el].name+'塊Lv'+lv+'→存卡','#'+EL[el].color.toString(16).padStart(6,'0'));}

  enemyAttack(e){
    let dmg=e.atk, dodged=false;
    if(this.immune>0){dodged=true;dmg=0;}
    else if(this.armor>0)dmg=Math.round(dmg*(1-this.armor));

      const tx=BX0+(W-2*BX0)*Math.max(0.05,this.playerHP/this.maxHP), ty=PHP_Y, ctrl={x:ox+(tx-ox)*0.35,y:Math.min(oy,ty)-140};   // 追蹤彈:先大幅往上、再弧線落到「目前血量的末端」(非血條最右)
      this.flyBall(ox,oy,tx,ty,col,ctrl,440,()=>{
        const fl=this.add.circle(tx,ty,18,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.fx);this.tweens.add({targets:fl,scale:2.6,alpha:0,duration:260,onComplete:()=>fl.destroy()});

      });

  }
  killEnemy(e){if(e.dead)return;
    if(this.hitLab){   // 實驗室:也演敗陣化光,演完原地重生(順便看入場動畫)→ 可一直測
      if(e._labDying)return; e._labDying=true;
      e.dead=true; if(e.bob){e.bob.stop();e.bob=null;} if(e.knockTw){e.knockTw.stop();e.knockTw=null;}
      this.playDeath(e);
      this.time.delayedCall(950,()=>{ e.dead=false; e._labDying=false; e.hp=e.max; if(e.hpTw){e.hpTw.stop();e.hpTw=null;}
        const sp=e.sprite; sp.setVisible(true); sp.clearTint&&sp.clearTint();
        [e.turnG,e.hpGfx,e.shadow].forEach(o=>{if(o)o.setVisible(true);}); if(e.card)e.card.setInteractive();
        this.enemyEnter(e,0); this.updateEnemies(); });
      return;
    }
    e.dead=true; if(e.bob){e.bob.stop();e.bob=null;} if(e.knockTw){e.knockTw.stop();e.knockTw=null;}   // ★ bob 在受擊擊退時會被設 null,務必判空(否則每次擊殺都丟例外→鎖死)
    const last=this.aliveCount()===0, isFinal=last&&this.stage>=this.stagesEff.length;
    if(isFinal){ this._finalEnemy=e; this.stageClear(); return; }   // 最後一關最後一擊:由 finalBlow 演特寫鏡頭+飛出(不在此 playDeath)
    this.playDeath(e);   // 敗陣演出:被打飛(後上)+縮小+旋轉+淡出 → 化成光芒
    if(last)this.stageClear(); else {this.targetEnemy();this.updateEnemies();}
  }
  // 最後一擊:鏡頭推近最後一隻怪特寫 → 蓄勢一下 → 白閃+飛出 → 拉回 → 久一點才進結果
  finalBlow(e){
    const cam=this.cameras.main, sp=e&&e.sprite, EOut=Phaser.Math.Easing.Quadratic.Out, EIO=Phaser.Math.Easing.Quadratic.InOut;
    if(sp){ cam.pan(sp.x, sp.y, 460, EOut); cam.zoomTo(1.9, 460, EOut); }   // 特寫推近
    this.time.delayedCall(560,()=>{   // 蓄勢後 → 白閃 + 飛出(特寫下更有張力)
      if(sp&&sp.active){const fl=this.add.circle(sp.x,sp.y,32,0xffffff,1).setBlendMode(Phaser.BlendModes.ADD).setDepth(DEPTH.fx);
        this.tweens.add({targets:fl,scale:4,alpha:0,duration:320,onComplete:()=>fl.destroy()});}
      this.playDeath(e);
    });
    this.time.delayedCall(1750,()=>{ cam.zoomTo(1,440,EIO); cam.pan(CX,Math.round(H/2),440,EIO); });   // 鏡頭拉回
    this.time.delayedCall(2250,()=>this.showResult(true));   // 飛出後停留久一點才進結果(不突兀)
  }
  // 敗陣演出:被打飛(後上)、縮小、旋轉、淡出,縮到很小再炸成光芒
  playDeath(e){const sp=e.sprite, bs=e.baseScale||1, x0=sp.x, y0=(e.restY!=null?e.restY:sp.y);
    if(e.card)e.card.disableInteractive();
    [e.turnG,e.hpGfx,e.mark,e.shadow].forEach(o=>{if(o)this.tweens.add({targets:o,alpha:0,duration:200,onComplete:()=>{o.setVisible(false);o.setAlpha(1);}});});
    this.tweens.killTweensOf(sp); sp.clearTint&&sp.clearTint();
    this.tweens.add({targets:sp, y:y0-72, x:x0+(x0<CX?-22:22), scaleX:bs*0.12, scaleY:bs*0.12, angle:220, alpha:0.15, duration:560, ease:'Quad.in',

  enemyEnter(e,delay){ if(!e||!e.sprite)return; const sp=e.sprite, bs=e.baseScale||1, ry=(e.restY!=null?e.restY:sp.y), rx=(e.card?e.card.x:sp.x); delay=delay||0;

  // 過關前進:鏡頭往前推一下 + 直向速度線往下刷過(像往深處前進到下一關)
  stageAdvanceFX(){ const cam=this.cameras.main;

    for(let i=0;i<16;i++){const x=16+Math.random()*(W-32), len=44+Math.random()*90;

  stageClear(){
    rollDrops(this.dungeon.drops[this.stage-1]).forEach((cd,i)=>{const isNew=!isOwned(cd.id);addCard(cd.id);this.runDrops.push({cd,isNew});
      this.time.delayedCall(i*240,()=>this.tonFloat('🎁 '+cd.name+(isNew?' ✦NEW':''),isNew?'#ffe04a':'#ffe08a'));});
    recordStage(this.stage, false);   // 記最佳關
    const rm=(this.diff&&this.diff.rwd)||1;   // 難度獎勵倍率
    if(this.dungeon.el && Math.random()<Math.min(0.95,0.6*rm)){addGem(this.dungeon.el);this.runGems++;   // 元素關掉進化素材「寶玉」(高難掉率更高)
      this.time.delayedCall(120,()=>this.tonFloat('🔮 '+EL[this.dungeon.el].name+'寶玉','#c5b0ff'));}
    const xp=Math.round(40*rm), gld=Math.round(300*rm), _rw=addRewards(xp,gld); this.runExp+=xp; this.runCoins+=gld;   // 戰鬥獎勵:EXP/金錢(隨難度放大)
    if(_rw._ups>0)this.tonFloat('🆙 等級提升! Lv.'+_rw.rank,'#ffe04a');
    if(this.stage>=this.stagesEff.length){markDungeonCleared(this.dungeonId);recordClear(this.dungeonId,(this.diff&&this.diff.key)||'normal');this.creditRun();this.chests++;this.finalBlow(this._finalEnemy);return;}   // 最後一關全清→記完成率+成就→最後一擊特寫演出後才進結果
    this.stage++; this.chests++; this.playerHP=Math.min(this.maxHP,this.playerHP+150);
    this.time.delayedCall(700,()=>{try{this.stageAdvanceFX();}catch(e){} this.time.delayedCall(380,()=>{try{this.startStage(true);}catch(e){console.error('startStage error',e);}});});   // 過關:前進演出 → 下一關敵人自遠方逼近入場(不清盤,盤面累積)
  }
  reshuffle(){if(this.playerHP<=CONFIG.RESHUFFLE_COST){this.gameOver('生命不足、無法再提煉');return;}

  /* UI */
  updateAll(){this.updateEnemies();this.updateBars();}
  updateEnemies(){this.enemies.forEach((e,i)=>{if(e.gateTx)e.gateTx.setVisible(!e.dead);   // 死了藏護盾門檻徽章
    if(e.dead)return;
    if(e.phases&&e.hp>0){const idx=Math.min(e.phases.length-1,Math.max(0,Math.floor((1-e.hp/e.max)*e.phases.length))); if(idx>e.phaseIdx){e.phaseIdx=idx;this.bossTransform(e);}}   // 👑 魔王:血量過門檻→變身下一屬(hp>0 才變,致命一擊不再噴變身)
    const tr=Math.max(0,Math.min(1,e.hp/e.max)), cur=(e.hpRatio==null?tr:e.hpRatio);
    if(Math.abs(cur-tr)>0.004){
      if(tr<cur)e.hpLag=cur;                                   // 受傷:白拖尾起點=舊血量
      if(e.hpTw)e.hpTw.stop(); if(e.hpLagTw)e.hpLagTw.stop();
      e.hpTw=this.tweens.add({targets:e,hpRatio:tr,duration:300,ease:'Quart.out',onUpdate:()=>this.drawHpBar(e)});           // 紅血快速到位
      e.hpLagTw=this.tweens.add({targets:e,hpLag:tr,duration:620,delay:170,ease:'Quad.in',onUpdate:()=>this.drawHpBar(e)});   // 白拖尾停一下再追上→看得到扣多少
    } else {e.hpRatio=tr;e.hpLag=tr;this.drawHpBar(e);}
    if(e.turnTx){const tm=Math.max(0,e.timer);   // 沙漏右邊的數字=剩餘出手手數;越少越紅(1手內紅、2手黃、≥3白藍)
      e.turnTx.setText(String(tm)).setColor(tm<=1?'#ff5a4a':tm===2?'#ffc24a':'#eaf3ff');}
    e.mark.setVisible(i===this.target);});}
  // 每回合:沙漏跳一下 + 翻轉到下一個 90°(累積),數字隨 updateEnemies 更新

    this.tweens.add({targets:e.turnG,y:restY-7,duration:170,yoyo:true,ease:'Quad.out'});   // 跳一下落回
  }

    this.chestTxt.setText('📦 '+(this.chests||0)); this.goldTxt.setText('💰 '+(this.gold||0));

  /* 特效 */
  // 投射物:亮白核 + 該屬色光暈 + 漸隱拖尾,加速飛向敵人(比小白點炫)
  projectile(ox,oy,tx,ty,glyph,color,delay,dmg,tgt){
    this.time.delayedCall(delay,()=>{
      const glow=this.add.circle(ox,oy,16,color,0.4).setDepth(DEPTH.proj);
      const core=this.add.circle(ox,oy,7,0xffffff,1).setDepth(DEPTH.proj);
      let fc=0;
      this.tweens.add({targets:[glow,core],x:tx,y:ty,duration:340,ease:'Quad.in',
        onUpdate:()=>{ if((fc++%3)===0&&core.active){const d=this.add.circle(core.x,core.y,5,color,0.55).setDepth(DEPTH.proj-1);
          this.tweens.add({targets:d,scale:0.2,alpha:0,duration:280,onComplete:()=>d.destroy()});} },   // 拖尾
        onComplete:()=>{glow.destroy();core.destroy();this.impact(tx,ty,color,dmg,tgt);}});
      this.tweens.add({targets:glow,scale:1.5,duration:340,ease:'Quad.in'});   // 逼近時光暈脹大

  impact(x,y,color,dmg,tgt){
    if(tgt&&!tgt.dead){tgt.sprite.setTint(0xffffff);
      const bs=tgt.baseScale||1;if(tgt.hitTw)tgt.hitTw.stop();tgt.sprite.setScale(bs);   // 縮放動畫相對基準縮放(史來姆圖 base≈0.39),先停掉前一個受擊tween避免連擊疊加變大
      tgt.hitTw=this.tweens.add({targets:tgt.sprite,scaleX:bs*1.18,scaleY:bs*1.18,duration:100,yoyo:true,onComplete:()=>{tgt.sprite.setScale(bs);tgt.sprite.clearTint();tgt.hitTw=null;}});}
    const flash=this.add.circle(x,y,12,0xffffff,0.9).setDepth(DEPTH.proj);   // 命中:亮白爆閃
    this.tweens.add({targets:flash,scale:0.2,alpha:0,duration:220,onComplete:()=>flash.destroy()});
    const ring=this.add.circle(x,y,10,color,0).setStrokeStyle(4,color,1).setDepth(DEPTH.proj);   // 彩色擴散環

    for(let i=0;i<6;i++){const a=i/6*Math.PI*2, sp=this.add.circle(x,y,3,color,0.9).setDepth(DEPTH.proj);   // 碎片四射
      this.tweens.add({targets:sp,x:x+Math.cos(a)*26,y:y+Math.sin(a)*26,alpha:0,scale:0.3,duration:340,ease:'Quad.out',onComplete:()=>sp.destroy()});}

  floatText(x,y,str,color){const t=this.add.text(x,y,str,{fontFamily:EMOJIFONT,fontSize:'19px',color,fontStyle:'bold'}).setOrigin(0.5).setDepth(DEPTH.fx);

  // 敵人扣血數字:大紅「-N」彈出後上飄淡出
  dmgPop(x,y,n){const t=this.add.text(x,y-16,'-'+n,{fontFamily:EMOJIFONT,fontSize:'27px',color:'#ff5040',fontStyle:'bold',stroke:'#350200',strokeThickness:5}).setOrigin(0.5).setDepth(DEPTH.fx).setScale(0.4);

  // 打擊頓格:命中瞬間凍住整個場景 ~ms(tween+計時器 timeScale=0,真實時間後復原)→ 打到肉的份量
  hitStop(ms){ if(this._hitStop)return; this._hitStop=true; this.tweens.timeScale=0; this.time.timeScale=0;
    setTimeout(()=>{ this.tweens.timeScale=1; this.time.timeScale=1; this._hitStop=false; }, ms); }
  // 敵人受擊擊退:後退(上移+縮小)→ 停頓 → 慢慢回到原位
  knockEnemy(e){ if(!e||!e.sprite)return; const sp=e.sprite, ry=(e.restY!=null?e.restY:sp.y), bs=e.baseScale||1;
    if(e.bob){e.bob.stop();e.bob=null;}                       // 暫停上下浮動,避免和擊退 y 衝突
    if(e.knockTw)e.knockTw.stop();

      onComplete:()=>{
        e.knockTw=this.tweens.add({targets:sp,y:ry,scaleX:bs,scaleY:bs,delay:150,duration:440,ease:'Quad.out',   // ②停頓後慢慢回位
