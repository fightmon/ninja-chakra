<script>
/* ===== 純邏輯(N/EL/SHAPES/CONFIG/computeClears/種子亂數 等戰鬥核心已抽到 battle-core.js,瀏覽器當共用全域)===== */
const KEYS = ['fire','wind','thunder','earth','water'];
const MONSTER_IMG = { water:'art/monsters/slime_water.png', fire:'art/monsters/slime_fire.png', thunder:'art/monsters/slime_thunder.png', earth:'art/monsters/slime_earth.png', wind:'art/monsters/slime_wind.png' };   // 舊五屬史萊姆(fallback);無對應則用 emoji 臉。圖檔放 001_website/art/monsters/
const CARD_ART = { c03:1, c06:1, c19:1, c12:1, c10:1 };   // 有角色圖的卡(狗狗隊001:火c03/水c06/雷c19/風c12/土c10)→ art/cards/<id>_thumb.webp(小)+_full.webp(大)
function cardArtKey(id, size){ return (id&&CARD_ART[id]) ? ('card_'+id+'_'+size) : null; }   // 回傳 texture key(thumb/full),無圖回 null→退回 emoji
// 圖鑑分組:6 物種隊(權威藍圖)。目前只有犬隊有對應卡(狗狗隊5張/各屬);其餘隊先占位「即將推出」。未歸隊的卡放底部「未歸隊」區。
const SPECIES_TEAMS=[
  {emoji:'🐱',name:'貓隊',  color:'#8fd16a',cards:null},
  {emoji:'🐶',name:'犬隊',  color:'#e0c890',cards:{fire:'c03',water:'c06',thunder:'c19',earth:'c10',wind:'c12'}},
  {emoji:'🐦',name:'鳥隊',  color:'#c79bff',cards:null},
  {emoji:'🐹',name:'鼠隊',  color:'#d8b890',cards:null},
  {emoji:'🐰',name:'兔隊',  color:'#e89ab0',cards:null},
  {emoji:'🇹🇼',name:'台灣隊',color:'#8fe0a8',cards:null},
];
const DEX_EL5=['fire','water','thunder','earth','wind'];
const DEX_ASSIGNED=new Set(['c03','c06','c19','c10','c12']);   // 已歸物種隊(犬隊)的卡 → 不重複進「未歸隊」
// ===== 程序化音效(WebAudio 即時合成,零檔案/零版權/離線)=====
const SFX=(()=>{
  let ctx=null, sfxMute=false, bgmOn=false;
  try{ sfxMute=localStorage.getItem('nb_mute')==='1'; bgmOn=localStorage.getItem('nb_bgm')==='1'; }catch(e){}   // 音效靜音 / 背景音 各自獨立;BGM 預設關
  function ac(){ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ ctx=null; } } if(ctx&&ctx.state==='suspended')ctx.resume(); return ctx; }
  function T(freq,dur,o){ o=o||{}; const c=ac(); if(!c)return; const t=c.currentTime+(o.delay||0), g=o.gain||0.18;   // 低階單音(不檢查靜音,由呼叫端把關)
    const osc=c.createOscillator(), gn=c.createGain(); osc.type=o.type||'sine';
    osc.frequency.setValueAtTime(freq,t); if(o.freq2)osc.frequency.exponentialRampToValueAtTime(Math.max(1,o.freq2),t+dur);
    gn.gain.setValueAtTime(0.0001,t); gn.gain.exponentialRampToValueAtTime(g,t+0.005); gn.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    osc.connect(gn).connect(c.destination); osc.start(t); osc.stop(t+dur+0.02); }
  function N(dur,o){ o=o||{}; const c=ac(); if(!c)return; const t=c.currentTime+(o.delay||0), g=o.gain||0.15;
    const n=Math.max(1,Math.floor(c.sampleRate*dur)), buf=c.createBuffer(1,n,c.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
    const src=c.createBufferSource(); src.buffer=buf; const f=c.createBiquadFilter(); f.type='lowpass'; f.frequency.value=o.lp||2000;
    const gn=c.createGain(); gn.gain.setValueAtTime(g,t); gn.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(f).connect(gn).connect(c.destination); src.start(t); src.stop(t+dur+0.02); }
  const sfx=(fn)=>{ if(sfxMute)return; if(!ac())return; fn(); };   // 音效:靜音時整批不發
  // 背景音:緩慢五聲音階 loop + 墊底八度,低音量環境感(與音效靜音分開控制)
  const BGM=[392,440,523,587,659,587,523,440];   // G A C D E D C A
  let bgmTimer=null, bgmIdx=0;
  function bgmNote(){ if(!bgmOn){stopBgm();return;} if(!ac())return; const f=BGM[bgmIdx%BGM.length]; bgmIdx++;
    T(f,1.7,{type:'triangle',gain:0.035}); T(f/2,1.9,{type:'sine',gain:0.022}); }
  function startBgm(){ if(bgmTimer||!bgmOn)return; if(!ac())return; bgmNote(); bgmTimer=setInterval(bgmNote,1350); }
  function stopBgm(){ if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null;} }
  return {
    resume(){ ac(); },
    isMuted(){ return sfxMute; }, setMute(m){ sfxMute=!!m; try{localStorage.setItem('nb_mute',m?'1':'0');}catch(e){} if(!m)ac(); },
    bgmEnabled(){ return bgmOn; }, setBgm(b){ bgmOn=!!b; try{localStorage.setItem('nb_bgm',b?'1':'0');}catch(e){} b?startBgm():stopBgm(); },
    startBgm:startBgm, stopBgm:stopBgm,
    place(){ sfx(()=>T(330,0.06,{type:'triangle',gain:0.10,freq2:210})); },                                  // 放塊:軟 click
    clear(combo){ sfx(()=>{ const f=380+Math.min(combo||1,6)*70; T(f,0.12,{type:'square',gain:0.09,freq2:f*1.5}); N(0.07,{gain:0.05,lp:3500}); }); },   // 消塊:隨 combo 升調
    hit(pw){ sfx(()=>{ pw=Math.min(pw||1,2.2); N(0.09,{gain:0.16*pw,lp:1800}); T(150,0.13,{type:'sine',gain:0.18,freq2:60}); if(pw>=1.7)T(520,0.09,{type:'square',gain:0.10,freq2:880,delay:0.02}); }); },   // 打擊:thock,大HIT加亮
    skill(){ sfx(()=>{ T(220,0.26,{type:'sawtooth',gain:0.13,freq2:880}); N(0.16,{gain:0.06,lp:4200}); }); },   // 主動技:充能 whoosh
    enemyHit(){ sfx(()=>{ N(0.13,{gain:0.15,lp:1100}); T(110,0.16,{type:'sine',gain:0.16,freq2:48}); }); },     // 敵攻:thud
    heal(){ sfx(()=>{ T(523,0.14,{type:'sine',gain:0.11}); T(784,0.18,{type:'sine',gain:0.09,delay:0.07}); }); },
    win(){ sfx(()=>[523,659,784,1047].forEach((f,i)=>T(f,0.22,{type:'triangle',gain:0.13,delay:i*0.12}))); },
    lose(){ sfx(()=>[440,330,247,196].forEach((f,i)=>T(f,0.3,{type:'sawtooth',gain:0.11,delay:i*0.14}))); },
    button(){ sfx(()=>T(660,0.04,{type:'square',gain:0.05})); },
  };
})();
if(typeof window!=='undefined')window.addEventListener('pointerdown',()=>SFX.resume(),{once:true});   // 首次點擊解鎖音訊(瀏覽器禁自動播放)
// ===== 新手教學:腳本化引導戰鬥(事件推進)。on=完成這步的事件;setup=進這步先佈置盤面 =====
const TUT_STEPS=[
  {on:'tap',  msg:'👊 歡迎來到《忍塊查克拉》!\n我帶你打贏第一場 —— 點任意處繼續。'},
  {on:'place',msg:'① 放塊:把下面托盤的方塊拖到盤面發亮處,\n填滿一整「行 / 列 / 3×3 宮」就會消除!', setup:'place1', hint:'gap'},
  {on:'clear',msg:'② 清掉「屬性宮」其實就是攻擊敵人 ⚔\n敵人是火、你清「水之宮」→ 水剋火 →\n打更痛,還把牠的出手往後推(沙漏 +1)!', setup:'water', hint:'gap'},
  {on:'aoe',  msg:'③ 一次清「15 格以上」→【全體攻擊】💥\n一次打到所有敵人!\n把發亮處填滿、清掉這一大片試試', setup:'aoe', hint:'gap'},
  {on:'enemyhit',msg:'④ 敵人左上的沙漏,在你放完一輪塊時會倒數,\n變成 0 就會攻擊你,清太慢會被打死哦…', setup:'threat', pos:'mid', hint:'glass'},
  {on:'heal', msg:'⑤ 被咬了一口!灰色「無屬區」清掉會回血 💚\n把發亮的無屬宮填滿、清掉它補血。', setup:'neutral', hint:'gap'},
  {on:'active',msg:'⑥ 卡片蓄滿會發亮 → 點發亮的圓鈕放【主動技】!\n火狗「業火奔流」把一隻打飛 🔥\n(每張卡主動技不同,詳情到背包點卡看)', setup:'charge', hint:'card', pos:'bottom'},
  {on:'win',  msg:'⑦ 填滿角色屬性宮,會出現屬性塊可使用,\n抓下來,它能覆蓋盤面已有的塊(任意宮都能填)!\n填滿發亮的缺口、清掉收尾過關 🎉', setup:'finish', hint:'store', pos:'bottom'},
];
// 角色詳細頁的「各屬環境動畫」:在 (cx,cy,w,h) 區域疊屬性色粒子(疊在圖上、additive)。parent=要掛的容器(modal 容器或 layer)。
// 用 yoyo+repeat:-1(Phaser 會在物件 destroy 時自動清,無 onComplete 遞迴破圖風險)。
function elementBgFX(scene, add, el, cx, cy, w, h){   // add(o)=把粒子掛到對的層並回傳
  const col = (EL[el] && EL[el].color) || 0xffffff, ADD = Phaser.BlendModes.ADD, N = 14;
  for(let i=0;i<N;i++){
    const sx = cx - w/2 + 8 + Math.random()*(w-16), sy = cy - h/2 + 8 + Math.random()*(h-16);
    const p = scene.add.circle(sx, sy, 2.5 + Math.round(Math.random()*4), col, 0.7).setBlendMode(ADD);
    add(p);
    let dx=0, dy=-48, dur=1400;
    if(el==='fire'){ dy=-56; dur=1200; } else if(el==='water'){ dy=-40; dur=2200; }
    else if(el==='wind'){ dx=64; dy=8; dur=1900; } else if(el==='earth'){ dy=44; dur=2200; }
    else if(el==='thunder'){ dx=0; dy=0; dur=520; }   // 雷=原地閃
    scene.tweens.add({ targets:p, x:sx+dx+(Math.random()-0.5)*22, y:sy+dy,
      alpha:{ from:0.75, to: el==='thunder'?1:0.06 }, duration:dur+Math.random()*700,
      delay:Math.random()*800, yoyo:true, repeat:-1, ease:'Sine.inOut' });
  }
}
// 在 scene 的 (x,y) 疊上卡片角色圖(size 邊長;kind thumb/full)。有圖回 image(掛 scene.L 層,rebuild 會清)、無圖回 null。
function cardImgOn(scene, x, y, size, cardId, kind){
  const ak=cardArtKey(cardId, kind||'thumb');
  if(ak && scene.textures.exists(ak)){ const im=scene.add.image(x,y,ak).setDisplaySize(size,size).setOrigin(0.5); return scene.L?scene.L(im):im; }
  return null;
}
// ===== 共用卡片詳細頁(卡冊與編隊共用同一份;以卡冊版為準)=====
// scene=場景;add(o)=把物件掛到對的層(this.L 或 container.add)並回傳;cd=卡;opt={manage,onClose,onFuse,onDissolve}
function cardDetailPanel(scene, add, cd, opt){
  opt = opt || {};
  const py=Math.round(H/2), PH=Math.min(H-30,680), T=py-PH/2, L=CX-176;
  const elc=EL[cd.el].color, ac=activeSkill(cd.el), ls=leadSkill(cd.id);
  const lv=getCardLv(cd.id), n=(loadOwned()[cd.id]||0), atk=cardAtk(cd.id);
  const exp=getCardExp(cd.id), need=expToNext(lv), mx=lv>=MAXLV;
  const RI={human:{n:'人忍',e:'🥷',c:'#7fc1ff',bg:0x16314d},yokai:{n:'妖怪',e:'👹',c:'#e0905a',bg:0x3a2418},beast:{n:'靈獸',e:'🐾',c:'#8fd16a',bg:0x1d3a1f}};
  const ri=RI[cd.race]||RI.human;
  const txt=(x,y,s,fs,col,ox,bold)=>add(scene.add.text(x,y,s,{fontFamily:EMOJIFONT,fontSize:fs,color:col||'#f3e9d8',fontStyle:bold?'bold':'normal'}).setOrigin(ox==null?0.5:ox,0.5));
  const rect=(x,y,w,h,col,a)=>add(scene.add.rectangle(x,y,w,h,col,a==null?1:a));
  const mkbtn=(x,y,w,h,label,fill,stroke,col,fs,cb)=>{const r=add(scene.add.rectangle(x,y,w,h,fill).setStrokeStyle(2,stroke).setInteractive());tapBind(scene,r,cb);add(scene.add.text(x,y,label,{fontFamily:EMOJIFONT,fontSize:fs,color:col,fontStyle:'bold'}).setOrigin(0.5));return r;};
  // 遮罩(點背景關閉)+ 面板
  tapBind(scene,rect(CX,H/2,W,H,0x000000,0.82).setInteractive(),()=>opt.onClose&&opt.onClose());
  rect(CX,py,406,PH,0x1c140c).setStrokeStyle(2,0xffd56a).setInteractive();
  // 標頭
  txt(CX,T+22,'No.'+cd.id.replace(/\D/g,'').padStart(3,'0')+'   '+starStr(cd.id),'13px','#ffd56a',0.5);
  txt(CX,T+46,(cd.hero?'👑 ':'')+cd.name,'25px','#f3e9d8',0.5,true);
  // 滿版角色圖(3:2)+ 各屬環境動畫
  const aCY=T+190, fk=cardArtKey(cd.id,'full');
  rect(CX,aCY,378,252,0x0a0a12).setStrokeStyle(2,0x000000,0.3);   // 暗色底(角色圖是透明背景,底用暗色)
  rect(CX,aCY,378,252,EL[cd.el].dark,0.45);   // 疊一層該屬暗色調 → 各屬有自己的暗背景氛圍
  if(fk&&scene.textures.exists(fk))add(scene.add.image(CX,aCY,fk).setDisplaySize(378,252).setOrigin(0.5));   // 透明背景的角色疊在暗底之上→角色清楚
  else txt(CX,aCY,EL[cd.el].name,'64px','#1a1208',0.5,true);
  elementBgFX(scene, add, cd.el, CX, aCY, 378, 252);   // 環境動畫粒子疊在角色「之上」(additive 氛圍)→ 滿版立繪會擋住背後的粒子,故疊在上層才看得見
  // 屬性 + 種族 徽章(疊左上、種族在屬性下)
  rect(CX-126,T+76,112,28,EL[cd.el].dark,0.92).setStrokeStyle(1,elc); txt(CX-126,T+76,EL[cd.el].fx+' '+EL[cd.el].name+'屬','15px','#f3e9d8',0.5,true);
  rect(CX-126,T+108,112,28,ri.bg,0.92).setStrokeStyle(1,Phaser.Display.Color.HexStringToColor(ri.c).color); txt(CX-126,T+108,ri.e+' '+ri.n,'15px',ri.c,0.5,true);
  // 主技形狀圖示(右疊、深色底):5×5 格,LV1→LV5 循環變形演示主技生成的形狀塊
  { const BC=CX+126, BY=T+104, GS=5, cs=14, half=(GS-1)/2*cs;
    rect(BC,BY,82,82,0x0a0a14,0.82).setStrokeStyle(1,elc);
    const cells=[];
    for(let r=0;r<GS;r++)for(let c=0;c<GS;c++){ cells.push(rect(BC-half+c*cs, BY-half+r*cs, cs-2, cs-2, 0x000000, 0.18).setStrokeStyle(1,0x3a3a3a,0.35)); }
    const setLv=(lv)=>{ const nc=normCells(chakraShape(cd.el,lv));
      const maxR=Math.max(...nc.map(c=>c[0])), maxC=Math.max(...nc.map(c=>c[1]));
      const offR=Math.floor((GS-1-maxR)/2), offC=Math.floor((GS-1-maxC)/2), occ=new Set(nc.map(([r,c])=>(r+offR)+','+(c+offC)));
      for(let r=0;r<GS;r++)for(let c=0;c<GS;c++){ const cell=cells[r*GS+c], on=occ.has(r+','+c); cell.setFillStyle(on?elc:0x000000, on?1:0.18).setStrokeStyle(1, on?0xffffff:0x3a3a3a, on?0.5:0.35); } };
    let lastLv=0; setLv(1); const drv={v:0};
    const tw=scene.tweens.add({targets:drv, v:5, duration:3600, repeat:-1, ease:'Linear', onUpdate:()=>{ if(!cells[0]||!cells[0].active){tw.stop();return;} const L2=Math.max(1,Math.min(5,Math.floor(drv.v)+1)); if(L2!==lastLv){lastLv=L2;setLv(L2);} }});   // LV1→5 循環變形;面板銷毀(格子失效)即自動停
  }
  // 數值區塊:左 生命/攻擊/回復,右 Lv/持有
  rect(CX,T+374,378,92,0x120d07).setStrokeStyle(1,0x4a3a22); rect(CX+20,T+374,1,76,0x4a3a22);
  const row=(yy,ic,lab,val,lc)=>{txt(L,yy,ic+' '+lab,'16px',lc,0);txt(CX-4,yy,String(val),'21px','#ffffff',1,true);};
  row(T+348,'❤️','生命',cardHp(cd.id),'#ff9a9a'); row(T+374,'⚔️','攻擊',atk,'#ffcf9a'); row(T+400,'💚','回復',cardRcv(cd.id),'#9ae0a0');
  txt(CX+36,T+356,'Lv.'+lv+(mx?'  最大':' / '+MAXLV),'16px','#cfe0e8',0,true); txt(CX+36,T+394,'持有 ×'+n,'16px','#cfe0e8',0);
  // EXP 條
  rect(L,T+426,352,6,0x000000,0.4).setOrigin(0,0.5); rect(L,T+426,352*(mx?1:Math.min(1,exp/need)),6,0x6ac0ff).setOrigin(0,0.5);
  // 主動技 / 隊長技 / 主技
  rect(CX,T+478,378,48,0x16202c).setStrokeStyle(1,0x3a5a7a); txt(L,T+466,'⚡ 主動技 '+(ac?ac.name+'  (CD'+ac.cd+')':'—'),'15px','#a8d8ff',0,true); txt(L,T+490,ac?ac.desc:'','13px','#bcd4e8',0);
  rect(CX,T+532,378,48,0x2a2416).setStrokeStyle(1,0x6a5a2a); txt(L,T+520,'🎖 隊長技 '+(ls?ls.name:'—'),'15px','#ffd9a0',0,true); txt(L,T+544,ls?ls.desc:'','13px','#e8d0a8',0);
  // 底排按鈕(manage=卡冊→強化/解散;否則=只關閉)
  if(opt.manage){
    mkbtn(CX-86,T+602,158,44,'⬆️ 強化合成',0x2e3a22,0x6aaa4c,'#eafce0','15px',()=>opt.onFuse&&opt.onFuse());
    mkbtn(CX+86,T+602,158,44,'✖ 關閉',0x2a2218,0x5a4a32,'#cfc0a8','15px',()=>opt.onClose&&opt.onClose());
    const dz=add(scene.add.text(CX+186,T+22,'♻️',{fontFamily:EMOJIFONT,fontSize:'22px'}).setOrigin(0.5).setInteractive()); tapBind(scene,dz,()=>opt.onDissolve&&opt.onDissolve());
  }else{
    mkbtn(CX,T+602,210,46,'✖ 關閉',0x2a2218,0x5a4a32,'#cfc0a8','17px',()=>opt.onClose&&opt.onClose());
  }
}

// 色彩工具:shadeColor(往白/往黑)、lerpColor(兩色內插)→ 給屬塊「明暗漸層流動」用
function shadeColor(col,f){let r=(col>>16)&255,g=(col>>8)&255,b=col&255;if(f>=0){r+=(255-r)*f;g+=(255-g)*f;b+=(255-b)*f;}else{const k=1+f;r*=k;g*=k;b*=k;}return (Math.round(r)<<16)|(Math.round(g)<<8)|Math.round(b);}
function lerpColor(a,b,t){const A=[(a>>16)&255,(a>>8)&255,a&255],B=[(b>>16)&255,(b>>8)&255,b&255];return (Math.round(A[0]+(B[0]-A[0])*t)<<16)|(Math.round(A[1]+(B[1]-A[1])*t)<<8)|Math.round(A[2]+(B[2]-A[2])*t);}
// 註:卡身(card)壓在 HP/鬥志之下(照規格);但「卡上的屬塊(store)與主技鈕(abtn)」是可拖/可點的前景配件,提到 HP/鬥志之上才不會被擋住。兩者空間上不與盤面重疊,故仍排在 board 之下無妨。

let H,TRAY_Y,BY0,CARDS_Y,PHP_Y,INFO_Y,BG_H,BATTLE_CY,BOARD_CY;
function recomputeLayout(){
  // 讀「真正的容器尺寸」(#game),才與 Phaser FIT 進去的容器一致→零黑邊;取不到再 fallback 視窗
  const el=(typeof document!=='undefined')?document.getElementById('game'):null;
  const vw=(el&&el.clientWidth)?el.clientWidth:((typeof window!=='undefined'&&window.innerWidth)?window.innerWidth:390);
  const vh=(el&&el.clientHeight)?el.clientHeight:((typeof window!=='undefined'&&window.innerHeight)?window.innerHeight:844);
  H=Math.max(640,Math.min(1400,Math.round(W*vh/vw)));   // 涵蓋約 1.52~3.33 的長寬比
  TRAY_Y=H-46; BY0=TRAY_Y-52-9*CS; CARDS_Y=BY0-50; PHP_Y=BY0-16; INFO_Y=BY0-2;   // 板面/托盤盡量往下、卡列貼緊板面 → 上方戰鬥區留多一點
  BG_H=BY0+22; BATTLE_CY=Math.round((CARDS_Y-29)/2);   // 背景延伸到盤面上緣+22;敵人置中於 nav(26) 與主動技鈕(CARDS_Y-55) 之間
  BOARD_CY=BY0+Math.round(9*CS/2);   // 盤面正中央(9×9 格的中心)→ 暴擊/連印/鬥志等操控盤面的特效字都以此置中
}

const SAVE_KEY='ninja_save';
function defaultMeta(){return {name:'忍者',rank:1,exp:0,coins:0,stones:30,stamina:50,staminaMax:50,staTs:null,pity:0,boxBuy:0,dayKey:null,dailyN:0};}   // 首登送 30 鑽;name=用戶名稱(其他可改);pity=結印保底;boxBuy=魔法石擴背包次數;dayKey/dailyN=每日登入
function defaultSave(){const cards=STARTER.map((id,i)=>({u:'k'+(i+1),id}));return {ver:1,cards,uidSeq:STARTER.length,team:STARTER.slice(),cardLv:{},cardEvo:{},gems:{fire:0,water:0,thunder:0,earth:0,wind:0},progress:{cleared:false,clears:0,bestStage:0},meta:defaultMeta(),settings:{welcome:true}};}   // 個體制:每張卡=cards 陣列裡一個獨立個體(各佔一背包格)
function writeSave(s){try{s.updatedAt=Date.now();localStorage.setItem(SAVE_KEY,JSON.stringify(s));}catch(e){}}   // 每次寫入蓋時間戳(雲端衝突解決:新覆舊)
function loadSave(){let s=null;try{s=JSON.parse(localStorage.getItem(SAVE_KEY));}catch(e){}
  if(!s||typeof s!=='object'){s=defaultSave();
    let old=null;try{old=JSON.parse(localStorage.getItem('ninja_owned'));}catch(e){}   // 遷移更舊版持有卡(計數map)
    if(old&&typeof old==='object'){let seq=0;s.cards=[];Object.keys(old).forEach(id=>{const n=old[id]||0;for(let k=0;k<n;k++)s.cards.push({u:'k'+(++seq),id});});s.uidSeq=seq;}
    writeSave(s);}
  // ── 個體制遷移:舊存檔 owned{id:張數} → cards[{u,id}](每張各一個個體、各佔一格)──
  if(!Array.isArray(s.cards)){let seq=0;s.cards=[];const o=(s.owned&&typeof s.owned==='object')?s.owned:{};
    Object.keys(o).forEach(id=>{const n=o[id]||0;for(let k=0;k<n;k++)s.cards.push({u:'k'+(++seq),id});});
    if(!s.cards.length)STARTER.forEach(id=>s.cards.push({u:'k'+(++seq),id}));
    s.uidSeq=seq;}
  if(s.uidSeq==null)s.uidSeq=s.cards.length;
  if(s.ver==null)s.ver=1;   // schema 版號:之後改結構就升版+寫遷移(雲存遷移用)
  delete s.owned;   // 不再以 owned 為來源(改由 cards 派生)
  if(!Array.isArray(s.team)||s.team.length!==5)s.team=STARTER.slice();
  // ── 多隊編成:teams[5]={name,ids};舊單隊 s.team → teams[0];s.team 恆鏡射「目前選中隊」 ──
  if(!Array.isArray(s.teams)||s.teams.length!==5){ const base=(Array.isArray(s.team)&&s.team.length===5)?s.team.slice():STARTER.slice();
    s.teams=[{name:'',ids:base},{name:'',ids:[]},{name:'',ids:[]},{name:'',ids:[]},{name:'',ids:[]}]; }
  s.teams.forEach(t=>{if(typeof t.name!=='string')t.name='';if(!Array.isArray(t.ids))t.ids=[];});
  if(s.teamIdx==null||s.teamIdx<0||s.teamIdx>4)s.teamIdx=0;
  { const at=s.teams[s.teamIdx]; s.team=(at&&Array.isArray(at.ids))?at.ids.slice():STARTER.slice(); }   // 鏡射(覆蓋上面那行)→ 世界地圖 loadTeam() 拿到的就是目前隊
  if(!s.progress)s.progress={cleared:false,clears:0,bestStage:0};
  if(!s.progress.dungeonsCleared)s.progress.dungeonsCleared={};
  if(!s.progress.clearsByDiff)s.progress.clearsByDiff={};   // 「關×難度」完成記錄(排行完成率用)
  if(!s.records)s.records={bestHit:0,bestCombo:0};          // 我的紀錄(個人最佳)
  if(!s.ach)s.ach={done:{},title:''};                       // 成就解鎖 + 裝備中的稱號
  if(!s.settings)s.settings={};
  if(!s.meta)s.meta=defaultMeta(); else {const _d=defaultMeta();for(const k in _d)if(s.meta[k]==null)s.meta[k]=_d[k];}
  if(!s.cardLv)s.cardLv={};
  if(!s.cardEvo)s.cardEvo={};
  if(!s.gems)s.gems={fire:0,water:0,thunder:0,earth:0,wind:0};
  if(!s.settings.welcome){s.meta.stones=(s.meta.stones||0)+30;s.settings.welcome=true;writeSave(s);}   // 既有存檔一次性補送 30 鑽(新檔已在 defaultSave 標記)
  return s;}

function tapBind(scene,obj,cb){   // 點擊守門:只在「按下與放開是同一物件、且幾乎沒移動」才觸發 → 按A拖到B放開不誤觸B

  obj.on('pointerup',(p)=>{ if(scene._tapObj===obj && Math.hypot(p.x-(scene._tapPx||p.x),p.y-(scene._tapPy||p.y))<16) cb(p); scene._tapObj=null; });
  return obj; }
function changeGridPage(scene,pageKey,dir){   // 換頁 + 滑動(像隊伍切換):卡格在 scene.gridG 容器裡,換頁後從對側滑入
  const pages=scene._pages||1, np=scene[pageKey]+dir;
  if(np<0||np>=pages){ if(scene.gridG)scene.tweens.add({targets:scene.gridG,x:0,duration:180,ease:'Back.out'}); return; }   // 到頭/尾→彈回
  scene[pageKey]=np; scene.rebuild(); if(scene.gridG){ scene.gridG.x=dir*W; scene.tweens.add({targets:scene.gridG,x:0,duration:240,ease:'Quad.out'}); } }
function bindGridSwipe(scene,top,bot,pageKey){   // 在格子區左右拖曳→跟手移動 gridG,放開過閾值換頁(慣性滑動)
  scene.input.on('pointerdown',(p)=>{ if(p.y>top&&p.y<bot){ scene._sw=true; scene._swx=p.x; scene._swDrag=false; } });
  scene.input.on('pointermove',(p)=>{ if(scene._sw&&p.isDown){ const dx=p.x-scene._swx; if(Math.abs(dx)>8)scene._swDrag=true; if(scene._swDrag&&scene.gridG)scene.gridG.x=dx*0.6; } });
  scene.input.on('pointerup',(p)=>{ if(scene._sw){ scene._sw=false; if(scene._swDrag){ const dx=p.x-scene._swx; scene._swDrag=false; if(Math.abs(dx)>46)changeGridPage(scene,pageKey,dx<0?1:-1); else if(scene.gridG)scene.tweens.add({targets:scene.gridG,x:0,duration:180,ease:'Back.out'}); } } }); }

/* 養成:卡片等級/經驗(PAD式吃卡強化,同屬×1.5經驗) */
const MAXLV=20, FEED_COST=100;
function expToNext(lv){return 50*lv;}
function getCardLv(id){const c=loadSave().cardLv[id];return c?c.lv:1;}
function getCardExp(id){const c=loadSave().cardLv[id];return c?c.exp:0;}
function _statMul(id){return EVO_MULT[getCardEvo(id)]*(1+(getCardLv(id)-1)*0.05);}   // 進化×等級 共用成長倍率
function cardAtk(id){const base=(ROSTER.find(c=>c.id===id)||{}).atk||0;return Math.round(base*_statMul(id));}
function cardHp(id){const base=(ROSTER.find(c=>c.id===id)||{}).hp||0;return Math.round(base*_statMul(id));}

function feedFodder(targetId,fodderId){let res={ok:false,msg:''};
  mutSave(s=>{
    if(s.cards.filter(c=>c.id===fodderId).length<2){res.msg='需要多餘的素材卡(同一張至少2張)';return;}
    if((s.meta.coins||0)<FEED_COST){res.msg='金錢不足(需'+FEED_COST+')';return;}
    if(!s.cardLv[targetId])s.cardLv[targetId]={lv:1,exp:0};
    const cl=s.cardLv[targetId]; if(cl.lv>=MAXLV){res.msg='已達滿級 Lv.'+MAXLV;return;}
    const f=ROSTER.find(c=>c.id===fodderId), t=ROSTER.find(c=>c.id===targetId);
    const reward=Math.round(({genin:60,chunin:150,jonin:400,kage:900}[f.rank]||60)*(f.el===t.el?1.5:1));
    const fi=s.cards.findIndex(c=>c.id===fodderId); if(fi>=0)s.cards.splice(fi,1);   // 吃掉一個素材個體(空出一格)
    s.meta.coins-=FEED_COST; cl.exp+=reward;
    let ups=0; while(cl.lv<MAXLV && cl.exp>=expToNext(cl.lv)){cl.exp-=expToNext(cl.lv);cl.lv++;ups++;}
    if(cl.lv>=MAXLV)cl.exp=0;
    res={ok:true,reward:reward,lv:cl.lv,ups:ups,same:f.el===t.el};
  });
  return res;}
const FEED_EXP={genin:60,chunin:150,jonin:400,kage:900};   // 各稀有度素材給的經驗
// 多素材一次餵入(神魔/龍族式):us=要吃掉的個體 u 陣列;每張扣 FEED_COST、同屬×1.5;升級後回結果
function feedFodderMany(targetId,us){let res={ok:false,msg:''};
  mutSave(s=>{
    if(!us||!us.length){res.msg='未選素材';return;}
    if(!s.cardLv[targetId])s.cardLv[targetId]={lv:1,exp:0};
    const cl=s.cardLv[targetId]; if(cl.lv>=MAXLV){res.msg='已達滿級 Lv.'+MAXLV;return;}
    const t=ROSTER.find(c=>c.id===targetId);
    // 先全部驗證(找出存在的個體、算經驗/花費)——確認金錢足夠後才真正吃卡,避免半途扣卡
    const valid=[]; let total=0;
    us.forEach(u=>{const i=s.cards.findIndex(c=>c.u===u); if(i<0)return; const f=ROSTER.find(c=>c.id===s.cards[i].id);
      total+=Math.round((FEED_EXP[f.rank]||60)*(f.el===t.el?1.5:1)); valid.push(u);});
    if(!valid.length){res.msg='素材已不存在';return;}
    const cost=FEED_COST*valid.length;
    if((s.meta.coins||0)<cost){res.msg='金錢不足(需'+cost+')';return;}
    valid.forEach(u=>{const i=s.cards.findIndex(c=>c.u===u); if(i>=0)s.cards.splice(i,1);});   // 通過檢查→才吃卡
    s.meta.coins-=cost; cl.exp+=total;
    let ups=0; while(cl.lv<MAXLV && cl.exp>=expToNext(cl.lv)){cl.exp-=expToNext(cl.lv);cl.lv++;ups++;}
    if(cl.lv>=MAXLV)cl.exp=0;
    res={ok:true,total:total,lv:cl.lv,ups:ups,eaten:valid.length};
  });
  return res;}
// 合成預覽(不變更存檔):回傳餵入後的 Lv/經驗/花費
function previewFeed(targetId,us){const s=loadSave(), t=ROSTER.find(c=>c.id===targetId);
  let lv=getCardLv(targetId), e=getCardExp(targetId)+0, gained=0, eaten=0;
  (us||[]).forEach(u=>{const c=s.cards.find(x=>x.u===u); if(!c)return; const f=ROSTER.find(r=>r.id===c.id);
    gained+=Math.round((FEED_EXP[f.rank]||60)*(f.el===t.el?1.5:1)); eaten++;});
  let l=lv; e+=gained;

    const labels={el:'屬性',lv:'等級',rank:'星數'};
    tapBind(this,this.add.rectangle(70,y,92,26,0x2b2014).setStrokeStyle(1,0x5a6a8a).setInteractive().setDepth(6),()=>{
      this.sortKey=this.sortKey==='el'?'lv':this.sortKey==='lv'?'rank':'el'; this.sortTxt.setText('排序:'+labels[this.sortKey]); this.layoutBench(); });
    this.sortTxt=this.add.text(70,y,'排序:屬性',{fontFamily:EMOJIFONT,fontSize:'12px',color:'#cfe0ff'}).setOrigin(0.5).setDepth(7);
    const els=[{k:null,t:'全',c:0x888888},{k:'fire',t:'火'},{k:'water',t:'水'},{k:'thunder',t:'雷'},{k:'earth',t:'土'},{k:'wind',t:'風'}];
    this.chips=[];
    els.forEach((e,i)=>{ const x=144+i*46, col=e.k?EL[e.k].color:e.c;
      const r=this.add.rectangle(x,y,40,26,col,0.9).setStrokeStyle(2,0x000000,0.3).setInteractive().setDepth(6);
      this.add.text(x,y,e.t,{fontFamily:EMOJIFONT,fontSize:'13px',color:'#1a1208',fontStyle:'bold'}).setOrigin(0.5).setDepth(7);
      tapBind(this,r,()=>{ this.filterEl=e.k; this.chips.forEach(ch=>ch.setStrokeStyle(2,0x000000,0.3)); r.setStrokeStyle(3,0xffe066,1); this.layoutBench(); });
      this.chips.push(r); });
    this.chips[0].setStrokeStyle(3,0xffe066,1);   // 預設「全」亮起
  }
  layoutBench(){   // 依 sortKey/filterEl 排序篩選 → 重新定位可見卡、隱藏被篩掉的、重算捲動
    const CS2=72, x0=48, step=81, ord={fire:0,water:1,thunder:2,earth:3,wind:4};
    let list=this.cards.slice();
    if(this.filterEl)list=list.filter(c=>c._cd.el===this.filterEl);
    const cmp={ el:(a,b)=>(ord[a._cd.el]-ord[b._cd.el])||(getCardLv(b._cd.id)-getCardLv(a._cd.id)),
                lv:(a,b)=>(getCardLv(b._cd.id)-getCardLv(a._cd.id))||(ord[a._cd.el]-ord[b._cd.el]),
                rank:(a,b)=>((b._cd.rank||0)-(a._cd.rank||0))||(ord[a._cd.el]-ord[b._cd.el]) };
    list.sort(cmp[this.sortKey]||cmp.el);
    this.cards.forEach(c=>{ c.setVisible(false); if(c.input)c.input.enabled=false; });
    list.forEach((c,i)=>{ c.setPosition(x0+(i%5)*step, this.vpTop+CS2/2+Math.floor(i/5)*step); c.setVisible(true); });
    const rows=Math.max(1,Math.ceil(list.length/5));
    this.maxScroll=Math.max(0,(this.vpTop+CS2/2+(rows-1)*step+CS2/2+12)-this.vpBot);
    this.scroll=Math.min(this.scroll,this.maxScroll); this.scrollBy(0);
  }
  switchTeamBy(dir){ this.slideTeam(dir); }
  slideTeam(dir){ if(this._sliding)return; this._sliding=true;
    saveTeamAt(getTeamIdx(), this.slots.map(s=>s.cardId).filter(Boolean));   // 切走前自動存當前隊
    this.tweens.killTweensOf(this.formG);
    this.tweens.add({targets:this.formG, x:-dir*W, duration:190, ease:'Quad.in', onComplete:()=>{   // 舊隊往移動方向滑出
      switchTeam((getTeamIdx()+dir+5)%5); this.loadTeamSlots(); this.updateSwitcher(); this.refreshStart();
      this.formG.x=dir*W;   // 新隊放到對側螢幕外
      this.tweens.add({targets:this.formG, x:0, duration:240, ease:'Quad.out', onComplete:()=>{this._sliding=false;} }); } });   // 新隊滑入(換 hero 圖感)
  }
  loadTeamSlots(){ this.slots.forEach(s=>this.clearSlot(s));   // 清空 → 載入目前選中隊(逐個體找未用的)
    (loadTeam()||[]).forEach((id,i)=>{ if(!this.slots[i])return; const cd=ROSTER.find(c=>c.id===id); if(!cd)return; const inst=this.instances.find(x=>x.id===id&&!this.cardUsed[x.u]); if(inst)this.assign(this.slots[i],inst,cd); }); }
  updateSwitcher(){ const i=getTeamIdx(), nm=teamCustomName(i); this.swName.setText('隊'+(i+1)+(nm?' · '+nm:''));
    if(this._pen)this._pen.x=this.swName.x+this.swName.width/2+16; }   // ✎ 緊跟名字右側
  doRename(){ const i=getTeamIdx(), v=window.prompt('隊伍名稱(最多 6 字,留空=隊'+(i+1)+')', teamCustomName(i)); if(v!=null){ renameTeam(i,v); this.updateSwitcher(); } }
  confirm(){ saveTeamAt(getTeamIdx(), this.slots.map(s=>s.cardId).filter(Boolean)); this.scene.manager.start('home'); this.scene.manager.stop('team'); }   // 存當前隊 + 回大廳(未滿也可離開,出戰時再擋)
  tutTeamCoach(){   // 編隊教學:綠框說明(統一教學風格)
    const g=this.add.container(0,0).setDepth(200);
    const dim=this.add.rectangle(CX,H/2,W,H,0x000000,0.55).setInteractive(); g.add(dim);
    const cy=Math.round(H*0.52);
    g.add(this.add.rectangle(CX,cy,W-24,232,0x0d1a12,0.97).setStrokeStyle(3,0x6aaa4c));
    g.add(this.add.text(CX,cy-86,'🛡️ 最後一課:出戰編隊',{fontFamily:EMOJIFONT,fontSize:'20px',color:'#bff09a',fontStyle:'bold'}).setOrigin(0.5));
    g.add(this.add.text(CX,cy-18,'① 點下方卡片 → 放進上方 5 個宮位\n② 👑 中央 = 隊長\n③ 放滿 5 隻 → 按右下「✅ 確定」完成!\n(也可按 🎲 隨機 快速組隊)',{fontFamily:EMOJIFONT,fontSize:'15px',color:'#eafce0',align:'left',lineSpacing:9,wordWrap:{width:W-72}}).setOrigin(0.5));
    const ok=this.add.rectangle(CX,cy+78,230,46,0x2e5a2c,0.97).setStrokeStyle(3,0x6aaa4c).setInteractive(); g.add(ok);
    g.add(this.add.text(CX,cy+78,'我知道了,開始編隊',{fontFamily:EMOJIFONT,fontSize:'16px',color:'#eafce0',fontStyle:'bold'}).setOrigin(0.5));
    const close=()=>{ g.destroy(); this.tutTeamArmed=true; this.refreshStart(); };
    ok.on('pointerup',close); dim.on('pointerup',close);
  }
  cardAt(x,y){ if(y<this.vpTop||y>this.vpBot)return null; for(const c of this.cards){ if(!c.visible)continue; if(Math.abs(x-c.x)<=36&&Math.abs(y-(c.y-this.scroll))<=36)return c; } return null; }   // 場景層命中:卡世界位置=(c.x, c.y-scroll),半徑 36
  slotAt(x,y){ for(const s of this.slots){ if(Math.abs(x-(s.x+this.formG.x))<=62&&Math.abs(y-s.y)<=37)return s; } return null; }   // 場景層命中宮位(124×74,含 formG 位移)
  update(){ if(this._down||this._hsDown)return; if(this._vy&&Math.abs(this._vy)>0.4){ const before=this.scroll; this.scrollBy(-this._vy); if(this.scroll===before)this._vy=0; else { this._vy*=0.93; if(Math.abs(this._vy)<=0.4)this._vy=0; } } }   // 慣性捲動:放開後帶甩動速度繼續滑,每幀 ×0.93 減速;撞邊/變慢即停
  scrollBy(d){this.scroll=Math.max(0,Math.min(this.maxScroll,this.scroll+d));this.benchG.setY(-this.scroll);
    const vpH=this.vpBot-this.vpTop;
    if(this.maxScroll<=0){this.thumb.setVisible(false);this.track.setVisible(false);}
    else{const th=Math.max(24,vpH*vpH/(vpH+this.maxScroll));this.thumb.setSize(5,th).setVisible(true);this.track.setVisible(true);
      this.thumb.setPosition(411,this.vpTop+(this.scroll/this.maxScroll)*(vpH-th));}
    this.cards.forEach(c=>{ if(!c.visible){if(c.input)c.input.enabled=false;return;} const sy=c.y-this.scroll;if(c.input)c.input.enabled=(sy>this.vpTop-30&&sy<this.vpBot+30);});}   // 被篩掉/視窗外的卡不可點(遮罩只裁畫面、不裁輸入)
  tapCard(inst,cd){if(this.cardUsed[inst.u])return;const slot=this.slots.find(s=>!s.el);if(slot)this.assign(slot,inst,cd);}
  assign(slot,inst,cd){slot.el=cd.el;slot.cardId=cd.id;slot.uid=inst.u;
    slot.rect.setFillStyle(EL[cd.el].color);slot.txt.setText(cd.name).setColor('#1a1208').setFontSize('14px');
    const dk=cardArtKey(cd.id,'full');   // 陣型用 _01 大圖(3:2 橫式,填寬格)
    if(dk&&this.textures.exists(dk)){ if(!slot.img){slot.img=this.add.image(slot.x,slot.y,dk); this.formG.add(slot.img);} else slot.img.setTexture(dk); slot.img.setDisplaySize(108,72).setVisible(true); slot.txt.setVisible(false); }
    else { if(slot.img)slot.img.setVisible(false); slot.txt.setVisible(true); }
    this.cardUsed[inst.u]=true;const card=this.cards.find(c=>c._inst.u===inst.u);
    if(card)card.setAlpha(0.22);
    this.refreshStart();}
  clearSlot(slot){ if(!slot.el)return;this.cardUsed[slot.uid]=false;
    const card=this.cards.find(c=>c._inst.u===slot.uid);if(card)card.setAlpha(1);
    slot.el=null;slot.cardId=null;slot.uid=null;slot.rect.setFillStyle(0x2b2014);slot.txt.setText('＋').setColor('#6a5a40').setFontSize('20px');
    if(slot.img)slot.img.setVisible(false); slot.txt.setVisible(true);
    this.refreshStart();}
  showCardDetail(cd){   // 久按卡片→就地詳細(共用 cardDetailPanel,版面與卡冊完全一致,只少管理鈕)
    if(this._detailG)this._detailG.destroy();
    const g=this._detailG=this.add.container(0,0).setDepth(100), close=()=>{if(this._detailG){this._detailG.destroy();this._detailG=null;}};
    cardDetailPanel(this, o=>{g.add(o);return o;}, cd, {manage:false, onClose:close});}
  randomFill(){this.slots.forEach(s=>this.clearSlot(s));
    const avail=this.instances.filter(x=>!this.cardUsed[x.u]);
    this.slots.forEach(slot=>{if(avail.length){const inst=avail.splice(rnd(avail.length),1)[0];this.assign(slot,inst,ROSTER.find(c=>c.id===inst.id));}});
    this.refreshStart();}
  refreshStart(){const n=this.slots.filter(s=>s.el).length,ok=n===5;   // 確定鈕外觀反映齊不齊(永遠可按=可離開,出戰時再擋)
    if(this.confirmBtn){ this.confirmBtn.setFillStyle(ok?0x2e5a2c:0x2b2014).setStrokeStyle(2,ok?0x5a8a3c:0x8a6a5a);
      this.confirmTxt.setText(ok?'✅ 確定':'確定 '+n+'/5').setColor(ok?'#cfe8b0':'#ffd9b0'); }
    if(this.tutTeamArmed&&this.confirmBtn){ this.tweens.killTweensOf(this.confirmBtn); this.tweens.killTweensOf(this.confirmTxt); this.confirmBtn.setScale(1); this.confirmTxt.setScale(1);
      if(ok)this.tweens.add({targets:[this.confirmBtn,this.confirmTxt],scaleX:1.1,scaleY:1.1,duration:520,yoyo:true,repeat:-1,ease:'Sine.inOut'}); } }
}

/* ===== 戰鬥(多敵 + 自由查克拉) ===== */
class GameScene extends Phaser.Scene{
  constructor(){super('game');}
  init(data){ this.presetTeam=(data&&data.team)?data.team:null; this.dungeonId=(data&&data.dungeonId)||'prologue'; this.dungeon=DUNGEONS[this.dungeonId]||DUNGEONS.prologue; this.hitLab=!!(data&&data.lab); this.diff=DIFFS_BY[(data&&data.diff)]||DIFFS_BY.normal;
    this.tut=(data&&data.tutorial)?{i:-1}:null;   // 新手教學:腳本化引導模式(全程 if(this.tut) 包住)
    this.stagesEff=resolveStages(this.dungeon, this.diff.key);   // (b) 依難度解析「有效關卡結構」(規則+覆寫);slice1 規則=0 → 與 base 全等
    this.battleSeed=startBattleSeed((data&&data.seed)!=null?data.seed:null); }   // 種子亂數:開戰播種(可由外部給種子=回放用),存 battleSeed
  preload(){ this.load.maxParallelDownloads=6;   // 限制同時下載數→對弱伺服器/弱網路更穩(避免一次塞太多卡住)
    for(const el in MONSTER_IMG){ if(!this.textures.exists('mon_'+el))this.load.image('mon_'+el, MONSTER_IMG[el]); }
    for(const k in ENEMY_IMG){ if(!this.textures.exists(k))this.load.image(k, ENEMY_IMG[k]); }
    for(const id in CARD_ART){ ['thumb','full'].forEach(s=>{ const k='card_'+id+'_'+s; if(!this.textures.exists(k))this.load.image(k, 'art/cards/'+id+'_'+s+'.webp'); }); }   // 狗狗隊角色圖(thumb小/full大)
    for(const d in DUNGEON_BG){ const b=DUNGEON_BG[d];
      if(!this.textures.exists('bg_'+d+'_back'))this.load.image('bg_'+d+'_back', b.back);
      if(!this.textures.exists('bg_'+d+'_front'))this.load.image('bg_'+d+'_front', b.front); }
    TOWER_MID.forEach(c=>{ if(!this.textures.exists(c.key))this.load.image(c.key, c.src); });   // 載入怪物圖 + 方塊敵正式美術 + 關卡背景(前/後)+ 塔中景元素方塊
    if(!this.cache.audio.exists('tut_bgm'))this.load.audio('tut_bgm','snd/tut_bgm.mp3');   // 新手教學專屬背景音樂
    if(!this.cache.audio.exists('place_align'))this.load.audio('place_align','snd/place_align.mp3');   // 拖塊對準格音
    if(!this.cache.audio.exists('place_drop'))this.load.audio('place_drop','snd/place_drop.mp3'); }   // 放塊落下音
  // 依「是否魔王×難度×元素」挑敵圖:魔王 baby→m002、beginner→m003、normal及以上→m004(最兇);雜兵 嬰兒/初級→grunt(m001)、中級以上→grunt2(m002 強化版);都沒有再退回舊史萊姆/emoji
  enemyTexKey(e){ const el=e.el; let dk=(this.diff&&this.diff.key)||'normal';
    if(this.dungeonId==='prologue')dk='baby';   // 序章=新手村:挑圖固定當嬰兒級(只換外觀,不動數值)→ 魔王 boss_baby(m002)+雜兵 grunt(m001),不出 m003 以上兇怪
    if(e.boss){ const tier=dk==='baby'?'baby':(dk==='beginner'?'beg':'nrm'); const k='boss_'+tier+'_'+el; if(this.textures.exists(k))return k; }
    else{
      if(e.arch==='caster'&&this.textures.exists('caster_'+el))return 'caster_'+el;   // 術士兵(麻痺)→法師圖,兵種一眼分得出
      const adv=(dk!=='baby'&&dk!=='beginner');
      if(adv&&this.textures.exists('guard_'+el))return 'guard_'+el; }   // 中級(normal)以上雜兵(含魔王關護衛)→m003
    if(this.textures.exists('grunt_'+el))return 'grunt_'+el;
    if(this.textures.exists('mon_'+el))return 'mon_'+el;
    return null; }
  // 敵圖體型/站位參數(純計算):魔王=登場就 1.4× 且略往後(Y-2、站護衛後面);護衛/雜兵=實體高度正規化(護衛Y+5站前面)
  enemyFitParams(e){ const szc=e.cardW, cy=e.cy, key=e.sprite.texture.key;
    const pre = key.indexOf('boss_baby')===0?'boss_baby' : key.indexOf('boss_beg')===0?'boss_beg' : key.indexOf('boss_nrm')===0?'boss_nrm' : key.indexOf('guard')===0?'guard' : key.indexOf('caster')===0?'caster' : 'grunt';
    const fit=ENEMY_FIT[pre]||ENEMY_FIT.grunt;
    let D, yNudge;
    if(e.boss){ D=szc*1.4; yNudge=-2; }   // 魔王:登場即 1.4×、略往後
    else { D=Math.min(szc*1.12,(szc*0.65)/fit.h); yNudge=e.guard?5:0; }
    return {D, y:(cy+szc*0.367)-D*(fit.bottom-0.5)+yNudge}; }
  fitEnemySprite(e){ if(!e.img||!e.sprite)return; const p=this.enemyFitParams(e);
    e.sprite.setDisplaySize(p.D,p.D); e.sprite.y=p.y; e.baseScale=e.sprite.scaleX; }
  // 待命動畫:m004 大魔王(boss_nrm)=緩慢浮動;m001~m003(雜兵/護衛/小王)=落地待命、偶爾小跳
  idleAnim(e,y){ if(!e||!e.sprite)return null;
    const fierce = e.img && e.sprite.texture && e.sprite.texture.key && e.sprite.texture.key.indexOf('boss_nrm')===0;
    if(fierce) return this.tweens.add({targets:e.sprite,y:y-4,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});           // m004 大魔王:浮動
    // 雜兵:遞迴小跳,每次間隔 1.5~3 秒「各自隨機」→ 不會所有雜兵一起跳;回傳含 stop() 控制器(相容既有 e.bob.stop())
    const sc=this; let timer=null, tw=null, off=false;
    const hop=()=>{ if(off||!e.sprite||e.dead)return;
      tw=sc.tweens.add({targets:e.sprite,y:y-15,duration:230,yoyo:true,ease:'Quad.out'});
      timer=sc.time.delayedCall(1500+Math.random()*1500, hop); };                    // 下一跳:1.5~3s 隨機
    timer=sc.time.delayedCall(Math.random()*1800, hop);                              // 首跳也隨機相位
    return { stop:()=>{ off=true; if(timer)timer.remove(false); if(tw&&tw.stop)tw.stop(); } }; }
  // 重設待機浮動(idempotent):先停舊的;已死/無 sprite/封印中→不啟動(封印=定身,不跳不浮)
  refreshBob(e){ if(e.bob){e.bob.stop();e.bob=null;}
    if(e.dead||!e.sprite||!e.sprite.active||(e.sealed>0))return;
    if(e.restY!=null)e.sprite.setY(e.restY);
    e.bob=this.idleAnim(e, e.restY!=null?e.restY:e.sprite.y); }
  // 敵 HP 條:圓角底 + 圓角血量 + 白色圓角外框(用 Graphics 重畫,hpRatio 動畫時 onUpdate 呼叫)
  drawHpBar(e){ if(!e.hpGfx)return; const g=e.hpGfx; g.clear();
    const w=e.hpW, h=e.hpH||9, rad=h/2, ratio=Math.max(0,Math.min(1,e.hpRatio==null?1:e.hpRatio));
    const lag=Math.max(ratio,Math.min(1,e.hpLag==null?ratio:e.hpLag));
    g.fillStyle(0x180b08,0.95); g.fillRoundedRect(0,-h/2,w,h,rad);                                   // 空血暗槽
    if(lag>ratio+0.003){ const lw=Math.max(0.001,w*lag), rl=Math.min(rad,lw/2); g.fillStyle(0xffe6b0,0.92); g.fillRoundedRect(0,-h/2,lw,h,rl); }   // 受傷白拖尾(剛扣掉的血先變白,再慢慢收→一眼看到扣血)
    if(ratio>0){ const fw=Math.max(0.001,w*ratio), rf=Math.min(rad,fw/2);
      g.fillStyle(e._hpColor||0xc23c2c,1); g.fillRoundedRect(0,-h/2,fw,h,rf);                        // 血量(圓角)
      g.fillStyle(0xffffff,0.22); g.fillRoundedRect(0,-h/2,fw,Math.max(1,h*0.4),rf); }              // 血量上緣高光
    g.lineStyle(1.6,0xffffff,0.95); g.strokeRoundedRect(0,-h/2,w,h,rad); }                           // 白色圓角外框
  // 我方 HP 條:同敵風格(圓角+白框+暗槽+白拖尾),綠色
  drawPlayerHp(){ if(!this.pHpGfx)return; const g=this.pHpGfx; g.clear();
    const w=W-2*BX0, h=16, rad=h/2, ratio=Math.max(0,Math.min(1,this.pHpRatio==null?1:this.pHpRatio));
    const lag=Math.max(ratio,Math.min(1,this.pHpLag==null?ratio:this.pHpLag));
    g.fillStyle(0x16160c,0.92); g.fillRoundedRect(0,-h/2,w,h,rad);                                   // 空血暗槽
    if(lag>ratio+0.003){ const lw=Math.max(0.001,w*lag), rl=Math.min(rad,lw/2); g.fillStyle(0xfff0b0,0.9); g.fillRoundedRect(0,-h/2,lw,h,rl); }   // 受傷白拖尾
    if(ratio>0){ const fw=Math.max(0.001,w*ratio), rf=Math.min(rad,fw/2);
      g.fillStyle(0x4f9e42,1); g.fillRoundedRect(0,-h/2,fw,h,rf);                                    // 綠血
      g.fillStyle(0xffffff,0.20); g.fillRoundedRect(0,-h/2,fw,Math.max(1,h*0.42),rf); }              // 上緣高光
    g.lineStyle(2,0xffffff,0.95); g.strokeRoundedRect(0,-h/2,w,h,rad); }                             // 白色圓角外框

  create(){
    this.cells=[]; this.boxLabels=[]; this.trayIcons=[]; this.trayTweens=[]; this.teamCards=[]; this.drag=null; this.enemies=[];

    // 戰鬥場景背景(由後到前):後景圖(-3)→中景火光餘燼(-2)→前景圖(-1)→盤面深底(0)。無關卡圖→漸層帶
    const hasBG=this.textures.exists('bg_'+this.dungeonId+'_back');

  onResize(){const o=H;recomputeLayout();if(Math.abs(H-o)>3){this.scale.setGameSize(W,H);this.relayout();}}
  // 中景火光:從熔岩台上緣升起的餘燼粒子(柔邊圓點貼圖,ADD 發光,暖色,往上飄+淡出)
  makeEmbers(){
    if(!this.textures.exists('ember')){ const gg=this.make.graphics({x:0,y:0,add:false});
      gg.fillStyle(0xffffff,0.5);gg.fillCircle(8,8,8); gg.fillStyle(0xffffff,1);gg.fillCircle(8,8,4.5);
      gg.generateTexture('ember',16,16); gg.destroy(); }
    if(!this.textures.exists('smoke')){ const gg=this.make.graphics({x:0,y:0,add:false}); const R=32;   // 柔邊放射煙球(疊圈做漸層,中心濃邊緣透)→ 沙塵/噴煙用
      for(let r=R;r>0;r--)gg.fillStyle(0xffffff,0.05).fillCircle(R,R,r);
      gg.generateTexture('smoke',R*2,R*2); gg.destroy(); }
    if(!this.textures.exists('petal')){ const gg=this.make.graphics({x:0,y:0,add:false});   // 櫻花瓣(橢圓,旋轉飄落時像花瓣)
      gg.fillStyle(0xffffff,1).fillEllipse(11,8,18,10);
      gg.generateTexture('petal',22,16); gg.destroy(); }
    const dg=this.dungeonId; let cfg;
    if(dg==='water') cfg={   // 水關=水泡(慢慢上升、淡藍白)
      x:{min:-135,max:135}, y:{min:-6,max:6},
      speedY:{min:-42,max:-14}, speedX:{min:-10,max:10}, accelerationY:-4,
      scale:{min:0.25,max:0.62}, alpha:{start:0.6,end:0},
      lifespan:{min:2200,max:4000}, frequency:120, quantity:1,
      tint:[0xbfefff,0x9fe0ff,0xffffff,0xa8e8ff], blendMode:'ADD' };
    else if(dg==='thunder') cfg={   // 雷關=電光火花(快、亂竄、閃爍黃白)
      x:{min:-140,max:140}, y:{min:-10,max:10},
      speedY:{min:-80,max:-20}, speedX:{min:-26,max:26}, accelerationY:-6,
      scale:{min:0.14,max:0.42}, alpha:{start:0.95,end:0},
      lifespan:{min:600,max:1500}, frequency:55, quantity:1,
      tint:[0xffff88,0xfff4a0,0xffffff,0xeaff6a], blendMode:'ADD' };
    else if(dg==='wind') cfg={   // 風關=順風飄動的葉片/氣流微粒(自左掃向右、上下微擺、淡出)
      x:{min:-W/2-50,max:-W/2+30}, y:{min:-(BATTLE_CY+BG_GROUND_OFF-26),max:46},
      speedX:{min:70,max:175}, speedY:{min:-16,max:16}, accelerationX:8,
      scale:{min:0.16,max:0.52}, alpha:{start:0.75,end:0},
      lifespan:{min:2600,max:4600}, frequency:70, quantity:1,
      tint:[0xbfe89a,0xd8ecb0,0xeef3d6,0x9fd07a], blendMode:'ADD' };
    else if(dg==='earth') cfg={   // 土關=噴煙式沙塵(柔邊煙球、邊飄邊「膨脹」+淡出、隨風橫掃、NORMAL 不發光;參考招式實驗室炮煙)
      x:{min:-W/2-30,max:W/2+30}, y:{min:-60,max:30},
      speedX:{min:26,max:95}, speedY:{min:-22,max:6}, accelerationX:8,
      scale:{start:0.3,end:1.15}, alpha:{start:0.5,end:0},   // 像噴煙:邊飄邊膨脹再散掉
      lifespan:{min:1700,max:3300}, frequency:46, quantity:1,
      tint:[0xe2d4ad,0xefe6cd,0xcdb98c,0xd9c9a0] };
    else if(dg==='prologue') cfg={   // 初始之地=櫻花散落(自上方飄落、左右搖擺、旋轉、緩緩淡出;NORMAL 不發光)
      x:{min:-W/2-20,max:W/2+20}, y:{min:-(BATTLE_CY+BG_GROUND_OFF)-12,max:-(BATTLE_CY+BG_GROUND_OFF)+44},
      speedY:{min:28,max:70}, speedX:{min:-30,max:30},
      rotate:{min:0,max:360}, scale:{min:0.5,max:1.0}, alpha:{start:0.9,end:0},
      lifespan:{min:3600,max:6400}, frequency:120, quantity:1,
      tint:[0xffd2e2,0xffe2ee,0xffc2da,0xfff0f6] };
    else cfg={   // 火關=火光餘燼
      x:{min:-135,max:135}, y:{min:-6,max:6},
      speedY:{min:-58,max:-22}, speedX:{min:-14,max:14}, accelerationY:-8,
      scale:{min:0.2,max:0.55}, alpha:{start:0.85,end:0},
      lifespan:{min:1600,max:3200}, frequency:80, quantity:1,
      tint:[0xffd24a,0xffae3a,0xff8a2e,0xffc25a], blendMode:'ADD' };
    this.embers=this.add.particles(CX,0,(dg==='earth')?'smoke':(dg==='prologue')?'petal':'ember',cfg).setDepth(DEPTH.bg-2); }
  makeTowerCubes(){ this.towerCubes=TOWER_MID.map(c=>({ img:this.add.image(0,0,c.key).setDepth(DEPTH.bg-2).setVisible(false), rx:c.rx, ry:c.ry, amp:c.amp, ph:c.ph, baseY:0 })); }   // 塔中景:5 元素方塊(定位+飄浮在 update 驅動)
  positionTowerCubes(){ if(!this.towerCubes||!this.bgBack)return;   // X 跟後景滿寬;Y 用「會隨螢幕高拉長」的比例(短螢幕=滿寬高、長螢幕=隨台面拉高)→ 方塊在高螢幕跟著往下、不卡頂
    const pw=this.bgBack.width, ph=this.bgBack.height, sc=W/pw, groundY=BATTLE_CY+BG_GROUND_OFF;
    const dispH=Math.max(Math.round(W/(pw/ph)), Math.ceil(groundY/BG_PLATFORM_FRAC));   // 比例算高:max(滿寬高, 台面對齊所需高)
    this.towerCubes.forEach(c=>{ const bx=Math.round(CX+(c.rx-0.5)*W), by=Math.round(c.ry*dispH);
      c.img.setScale(sc).setPosition(bx,by).setVisible(true); c.baseY=by; }); }
  drawBG(){const g=this.bgGfx;g.clear();const M=Math.round(H);   // M=往四周多畫一圈背景→特寫鏡頭推近/平移不會露出世界外的黑邊
    if(this.bgBack){   // 有關卡背景:後景 cover 撐滿(遠景,可裁);前景 滿寬等比不裁、台面對齊敵腳底(可微調)
      const pw=this.bgBack.width, ph=this.bgBack.height, r=pw/ph;   // 1080/1920=0.5625
      const pf=BG_PLATFORM_FRAC, groundY=BATTLE_CY+BG_GROUND_OFF;   // 台面在圖高比例 / 敵人腳底線
      // 後景:塔=滿寬等比不裁(整張後景都看得到、頂端對齊);其餘關=cover 撐滿(遠景可裁)
      if(this.dungeonId==='tower'){ this.bgBack.setDisplaySize(W, Math.round(W/r)).setPosition(CX,0).setVisible(true); }
      else { const sc=Math.max(W/pw, (H+Math.round(H*0.1))/ph); this.bgBack.setDisplaySize(Math.round(pw*sc), Math.round(ph*sc)).setPosition(CX,0).setVisible(true); }
      // 前景:寬 100%(左右不裁)、高度等比 auto、Y 對齊敵腳底(+BG_FRONT_Y_OFF 微調)
      const dhF=Math.round(W/r), topF=Math.round(groundY-dhF*pf+BG_FRONT_Y_OFF);
      if(this.bgFront)this.bgFront.setDisplaySize(W,dhF).setPosition(CX,topF).setVisible(true);
      if(this.towerCubes)this.positionTowerCubes();                                  // 塔中景方塊:跟後景 cover 同變換定位(圍繞塔)
      if(this.embers)this.embers.setPosition(CX, groundY-4);                         // 中景火光從台面升起
      if(this.bgLine)this.bgLine.setVisible(false);                                  // 有背景圖→隱藏盤面上緣分隔線(否則背景透出時變一條橫槓)
      // 可見區 100%:不畫盤面區底色,背景透到全高(盤面格子維持原本不透明,在背景上)
      return;
    }
    const g1=Math.round(H*0.34);
    g.fillStyle(0x4a6788,1);g.fillRect(-W,-M,W*3,g1+M);                              // 上半(含上緣外、兩側外)用漸層頂色鋪滿
    g.fillGradientStyle(0x4a6788,0x4a6788,0x223524,0x223524,1);g.fillRect(0,0,W,g1);  // 真正的漸層帶(盤上)
    g.fillStyle(0x223524,1);g.fillRect(-W,g1,W*3,Math.max(0,BG_H-g1));               // 中段深底(延伸兩側外)
    g.fillStyle(0x160f18,1);g.fillRect(-W,BG_H,W*3,H-BG_H+M);                        // 盤面區底色(延伸下緣外、兩側外)
    if(this.bgLine)this.bgLine.setVisible(true);}                                    // 無背景圖(漸層底)→ 顯示盤面上緣分隔線
  relayout(){
    this.cameras.main.setBounds(0,0,W,H);   // H 隨視窗變,鏡頭範圍同步
    this.drawBG();
    this.bgLine.setPosition(CX,BG_H);
    this.teamCards.forEach((card,i)=>{const x=54+i*78;card.rect.setPosition(x,CARDS_Y);card.txt.setPosition(x,CARDS_Y);
      if(card.img)card.img.setPosition(x,CARDS_Y);
      if(card.storeObj)card.storeObj.setPosition(x,CARDS_Y);if(card.abtn)card.abtn.setPosition(x,CARDS_Y-40);});
    this.renderStored();
    if(this.pHpGfx)this.pHpGfx.setPosition(BX0,PHP_Y);this.pHpTxt.setPosition(CX,PHP_Y);this.drawPlayerHp();
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)this.cellRect(r,c).setPosition(BX0+c*CS,BY0+r*CS);
    this.drawGloss();   // 視窗變動→重畫玻璃光澤
    for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3,cen=this.cellCenter(br+1,bc+1);this.boxLabels[b].setPosition(cen.x,cen.y);}
    this.trayHits.forEach(h=>h.setPosition(h.x,TRAY_Y));
    if(this.tray)this.renderTray();
    this.enemies.forEach(e=>{if(!e.card||e.dead)return;const x=e.card.x,cy=BATTLE_CY,sz=e.cardH;
      e.card.setPosition(x,cy);
      e.turnG.setPosition(x-sz/2+12,cy-sz/2+11);if(e.hpGfx)e.hpGfx.setPosition(e.hpx,cy+sz/2-3);e.mark.setPosition(x,cy-sz/2-9);if(e.shadow)e.shadow.setPosition(x,cy+BG_GROUND_OFF);
      const fy=e.img?cy:cy-Math.round(sz*0.14);if(e.img)e.sprite.setDisplaySize(sz,sz);e.baseScale=e.sprite.scaleX;if(e.bob)e.bob.stop();e.sprite.setPosition(x,fy);e.restY=fy;e.bob=this.idleAnim(e,fy);});
  }

  cellRect(r,c){return this.cells[r*N+c];}
  cellCenter(r,c){return {x:BX0+c*CS+RECT/2, y:BY0+r*CS+RECT/2};}
  pointerToCell(px,py){const c=Math.floor((px-BX0)/CS),r=Math.floor((py-BY0)/CS);
    if(r<0||r>=N||c<0||c>=N)return null;return {r,c};}

  newGame(){
    track('battle_start');
    this.locked=false;   // 鎖輸入旗標:敵方出手展演期間禁止下一手動作(避免插隊/重覆觸發)
    this.boxElement={}; this.boxCard={};
    if(this.presetTeam) ELEMENT_BOXES.forEach((b,i)=>{const card=this.presetTeam[i];this.boxCard[b]=card;this.boxElement[b]=card.el;});
    else ELEMENT_BOXES.forEach(b=>{const card=ROSTER[rnd(ROSTER.length)];this.boxCard[b]=card;this.boxElement[b]=card.el;});
    this.lead=(this.presetTeam&&this.presetTeam[2]&&LEADER_SKILLS[this.presetTeam[2].id])||null;   // 隊長技=中央位卡(編隊正中央=隊長)
    const teamHp=(this.presetTeam||[]).reduce((s,c)=>s+(c.hp||0),0)||CONFIG.PLAYER_HP_BASE;   // 隊伍血量=隊員 HP 三圍加總
    this.maxHP=Math.round(teamHp*((this.lead&&this.lead.type==='hp')?this.lead.v:1));
    this.teamRcv=(this.presetTeam||[]).reduce((s,c)=>s+(c.rcv||0),0)||0;   // 隊伍回復力總和(清無屬區回血用)
    this.teamMaxAtk=(this.presetTeam||[]).reduce((m,c)=>Math.max(m,c.atk||0),0)||0;   // 隊伍最高攻擊(無屬傷害基準=此值×普通×0.08,= 屬·普通)
    this.playerHP=this.maxHP; this.stage=1; this.resultOpen=false; this.chests=0; this.gold=0; this.runDrops=[]; this.runExp=0; this.runCoins=0; this.runGems=0;
    this.charge=[0,0,0,0,0];   // 主動技蓄力(整場累積、跨關保留)
    this.stored=[null,null,null,null,null];   // 每卡存放的屬塊 {el,lv}(跨關保留,新局/重挑才清)
    this.firstClear=true;   // 新手鉤子:本場第一次消除=隆重慶祝
    this.renderTeam(); this.startStage();
    if(this.tut && this.cache.audio.exists('tut_bgm')){ this.bgmMp3=this.sound.add('tut_bgm',{loop:true,volume:0.45}); this.bgmMp3.play(); }   // 新手教學:專屬背景音樂(MP3),進教學即播;齒輪「背景音」可關
    else SFX.startBgm();   // 一般戰鬥:程序化背景音(背景音關閉時自動 no-op)
    this.events.once('shutdown',()=>{ SFX.stopBgm(); if(this.bgmMp3){this.bgmMp3.stop();this.bgmMp3.destroy();this.bgmMp3=null;} });   // 離開戰鬥(任何方式)→停背景音
  }
  // ===== 新手教學(事件推進式教練;全程 if(this.tut) 包住,不影響正常戰鬥)=====
  tutEnemies(){ const mk=(hp)=>({el:'fire',max:hp,hp:hp,atk:16,interval:5,timer:5,burn:0,dead:false,boss:false,guard:false,hitGate:0,comboGate:0,dot:0,regen:0,paralyze:0,healAlly:0,junk:0,phases:null,phaseIdx:0,arch:null});
    return [mk(1200),mk(1200),mk(160)]; }   // 3 火敵:e2 血低(AoE 會秒掉牠→3變2),e0/e1 高血不被誤殺(累積傷害也死不了);charge/finish setup 在對的步驟才把該死的壓低
  tutStart(){ if(!this.tut)return; this.tut.i=-1; this.tutAdvance(); }

  refill(){this.tray=[pickShape(),pickShape(),pickShape()].map(c=>({c,used:false}));   // 一般隨機塊

  // 嬰兒救援判定:完全放不下、或「盤面已擁擠且這手清不掉任何線/box」→ 快解不出來,該救
  babyNeedsHelp(){ if(!this.anyPlaceable())return true;
    let filled=0; for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(this.board[r][c])filled++;
    if(filled < N*N*0.5)return false;   // 盤面還不擁擠→不救
    const canClear=this.tray.some(p=>{if(p.used||p.locked)return false; const h=this.bestPlacement(p.c); return h&&h.score>=100000;});   // score≥10萬 = 有清除
    return !canClear; }
  // 嬰兒級「多HIT工廠」:盡量生出「放下去能同時清最多線/box」的塊(順便保證有解、永不卡死)
  babyTray(){const out=[], targeted=new Set();
    for(let n=0;n<2;n++){const best=this.bestHitSet(targeted); if(!best)break; out.push({c:best.shape,used:false,hint:best.origin}); best.clears.forEach(id=>targeted.add(id));}
    while(out.length<3)out.push({c:pickShape(),used:false});
    this.tray=out;
    if(!this.anyPlaceable()){const e=this.firstEmpty(); if(e)out[0]={c:[[0,0]],used:false,hint:e};}   // 終極保底:盤上任一空格塞 1 格塊
    return out;}
  firstEmpty(){for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!this.board[r][c])return{r,c};return null;}
  // 找「填完後清掉最多結構」的空格集(來自最接近完成的線/列/box),回傳相對形狀+落點+會清的結構
  bestHitSet(exclude){exclude=exclude||new Set(); const K=6, structs=[];
    for(let r=0;r<N;r++){const e=[];for(let c=0;c<N;c++)if(!this.board[r][c])e.push([r,c]); structs.push({id:'r'+r,empties:e});}
    for(let c=0;c<N;c++){const e=[];for(let r=0;r<N;r++)if(!this.board[r][c])e.push([r,c]); structs.push({id:'c'+c,empties:e});}
    for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3,e=[];for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)if(!this.board[r][c])e.push([r,c]); structs.push({id:'b'+b,empties:e});}
    let best=null;
    structs.forEach(s=>{if(!s.empties.length||s.empties.length>K||exclude.has(s.id))return;
      const key=new Set(s.empties.map(p=>p[0]+'_'+p[1]));
      const clears=structs.filter(t=>t.empties.length&&t.empties.every(p=>key.has(p[0]+'_'+p[1]))).map(t=>t.id);
      const score=clears.length*100-s.empties.length;   // 多清優先、塊小優先
      if(!best||score>best.score){const mr=Math.min(...s.empties.map(p=>p[0])), mc=Math.min(...s.empties.map(p=>p[1]));
        best={score,clears,origin:{r:mr,c:mc},shape:s.empties.map(p=>[p[0]-mr,p[1]-mc])};}});
    return best;}
  // 固定形狀的最佳落點:在所有可放位置裡,挑「清最多線/box;否則最接近完成」者。回傳 {r,c,score}
  bestPlacement(shape){ if(!shape)return null; let best=null;
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){
      if(!canPlace(this.board,shape,r,c))continue;
      const set={}; shape.forEach(([dr,dc])=>set[(r+dr)+'_'+(c+dc)]=1);
      const fl=(rr,cc)=> !!this.board[rr][cc] || set[rr+'_'+cc];
      let clears=0, prog=0;
      for(let rr=0;rr<N;rr++){let f=true,n=0;for(let cc=0;cc<N;cc++){if(fl(rr,cc))n++;else f=false;} if(f)clears++; else prog+=n*n;}
      for(let cc=0;cc<N;cc++){let f=true,n=0;for(let rr=0;rr<N;rr++){if(fl(rr,cc))n++;else f=false;} if(f)clears++; else prog+=n*n;}
      for(let b=0;b<9;b++){const br=((b/3)|0)*3,bc=(b%3)*3; let f=true,n=0;for(let rr=br;rr<br+3;rr++)for(let cc=bc;cc<bc+3;cc++){if(fl(rr,cc))n++;else f=false;} if(f)clears++; else prog+=n*n;}
      const score=clears*100000+prog;   // 清除優先;否則填得越接近完成(n²)越好
      if(!best||score>best.score)best={r,c,score};
    }

      else rc.setFillStyle(be?EL[be].dark:NEUTRAL_DARK).setStrokeStyle(2,0x000000,0);}

  drawGloss(){const g=this.gloss; if(g)g.clear();}   // 玻璃光澤/斜角都已拿掉,只留屬色亮邊(描邊);保留空函式避免呼叫端報錯
  // 放塊:查克拉凝聚成形 —— 屬色凝聚體由略大半透明收實 + 粒子向中心收束 + 格子淡入(只演「放下後仍在盤上」的格)
  coalesceCells(list){ if(!list)return; const ADD=Phaser.BlendModes.ADD;   // list=[{r,c,el}](放下當下就記住屬性→就算馬上結印被清掉也照演凝聚)
    list.forEach((pc,idx)=>{const r=pc.r,c=pc.c; if(r<0||r>=N||c<0||c>=N||!this.board[r][c])return;   // 已被結印清掉的格→不跑「聚攏成實心塊」(交給結印的溶解→集結演出)

      const o=this.add.rectangle(cx,cy,RECT,RECT,col).setOrigin(0.5).setBlendMode(ADD).setDepth(DEPTH.board+1).setAlpha(0.5).setScale(1.35);   // 凝聚體:起始倍數 1.35(略大半透→緩緩收實)

    });

  renderStored(){if(!this.stored)return;this.teamCards.forEach((card,i)=>{const so=card.storeObj;if(!so)return;

  // 封印/麻痺:電藍微透 + 持續高頻小抖動 + 偶發電弧,直到 e.sealed 倒數到 0(每手 -1,見 endHand)才停
  sealEnemy(e,n){if(!e.sprite)return; e.sealed=(e.sealed||0)+n; const sp=e.sprite, ADD=Phaser.BlendModes.ADD;
    sp.setTint(0xaad8ff).setAlpha(0.82);

    if(e._zapLoop)return;   // 已在抖→不重複起 loop
    e._zapLoop=this.time.addEvent({delay:55,loop:true,callback:()=>{
      if(e.dead||(e.sealed||0)<=0){e._zapLoop.remove();e._zapLoop=null; if(sp.active){sp.setX(e.card?e.card.x:sp.x).setAlpha(1);sp.clearTint();} this.refreshBob(e); return;}   // 封0 → 停抖、還原、恢復待機浮動
      const bx=e.card?e.card.x:sp.x; if(sp.active)sp.setX(bx+(Math.random()-0.5)*5);

    }});

  trayRebirth(){const ADD=Phaser.BlendModes.ADD;   // 土:每塊的查克拉各自收束到「該塊自己的中心」(快→慢)→ 元素閃 → 補新塊 → 各自展開(快→慢),像重生

  // 發動主動技
  fireActive(i){if(this.resultOpen||this.locked||this.camCine||this.drag||this.earthSel||this.earthDrag||this.windPick)return;
    this.stopStuckFX();
    const card=this.teamCards[i], a=activeSkill(card.el); if(!a)return;
    if((this.charge[i]||0)<a.cd){this.tonFloat('蓄力中 '+(this.charge[i]||0)+'/'+a.cd,'#9fb0c0');return;}
    this.charge[i]=0; SFX.skill(); if(this.tut)this.tutEvent('active');
    const colHex='#'+EL[card.el].color.toString(16).padStart(6,'0');
    this.tonFloat('★ '+a.name,colHex);
    const cardObj=this.boxCard[ELEMENT_BOXES[i]], atk=cardObj?cardObj.atk:200, ox=card.rect.x, oy=card.rect.y;
    switch(card.el){
      case 'fire':{const col=EL.fire.color, hot=shadeColor(col,0.55), tgt=this.targetEnemy(); if(!tgt)break;   // 集氣蓄力 → 對「鎖定單敵」大招(AoE 留給拼圖 15 HIT 去賺,不給便宜按鈕);吃相剋
        const dmg=Math.round(atk*3*(EL.fire.beats===tgt.el?CONFIG.ADV_MULT:((EL[tgt.el]&&EL[tgt.el].beats==='fire')?CONFIG.WEAK_MULT:CONFIG.NORM_MULT)));   // 火相剋:打風×1.6、打水×0.7、其餘×1.0
        this.chargeAt(ox,oy,col,420,hot);
        this.time.delayedCall(420,()=>{ this.chakraBolt(ox,oy,tgt.sprite.x,tgt.sprite.y,col,tgt,dmg,3,hot);
          this.cameras.main.shake(240,0.009);
          this.time.delayedCall(360,()=>{ tgt.hp=Math.max(0,tgt.hp-dmg); this.updateEnemies(); if(tgt.hp<=0)this.killEnemy(tgt); }); });
        break;}
      case 'water':{const col=EL.water.color, h=Math.round(this.maxHP*0.3);   // 聚氣花火 → 用元素把傷口治好
        this.chargeAt(ox,oy,col,380);
        this.time.delayedCall(380,()=>{ this.playerHP=Math.min(this.maxHP,this.playerHP+h);
          this.floatText(CX,PHP_Y-22,'癒+'+h,'#74e09a'); this.animPlayerHP(true);
          const au=this.add.circle(ox,oy,16,col,0.5).setBlendMode(Phaser.BlendModes.ADD).setDepth(DEPTH.proj);this.tweens.add({targets:au,scale:2.4,alpha:0,duration:500,onComplete:()=>au.destroy()}); });
        break;}
      case 'thunder':{const col=EL.thunder.color;   // 聚氣花火 → 天落雷 + 麻痺
        this.chargeAt(ox,oy,col,380);
        this.time.delayedCall(380,()=>{ this.cameras.main.shake(220,0.006);   // 整體只輕抖一次(不每隻各抖)
          this.enemies.forEach((e,k)=>{if(!e.dead){e.timer+=3; this.time.delayedCall(k*90,()=>this.lightningStrike(e)); if(e.sprite)this.floatText(e.sprite.x,e.sprite.y-24,'封+3','#f4da52');}}); });
        break;}
      case 'earth':{const col=EL.earth.color;   // 聚氣花火 → 托盤塊重生
        this.chargeAt(ox,oy,col,380);

    }
    if(this.hitLab)this.charge=this.teamCards.map(c=>{const a=activeSkill(c.el);return a?a.cd:0;});   // 實驗室:主動技恆滿

  // 風技:9 宮各亮選取框,點一宮→全清化風刃單體(算 combo);點宮外=取消退還蓄力
  windSelect(i,atk){ if(this.windPick)return; const objs=[];
    const bg=this.add.rectangle(CX,H/2,W*2.5,H*2.5,0x000814,0.18).setDepth(DEPTH.board+1).setInteractive();
    bg.on('pointerup',()=>this.windCancel()); objs.push(bg);
    let any=false;
    for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3; let cn=0;
      for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)if(this.board[r][c])cn++;
      if(!cn)continue; any=true;
      const cx=BX0+bc*CS+CS*1.5, cy=BY0+br*CS+CS*1.5;
      const hi=this.add.rectangle(cx,cy,CS*3-6,CS*3-6,EL.wind.color,0.14).setStrokeStyle(3,EL.wind.color,0.95).setDepth(DEPTH.board+2).setInteractive();
      this.tweens.add({targets:hi,alpha:{from:0.14,to:0.32},duration:560,yoyo:true,repeat:-1,ease:'Sine.inOut'});
      hi.on('pointerup',()=>this.windDoPick(b,atk)); objs.push(hi);}
    if(!any){objs.forEach(o=>o.destroy()); this._windRefund(i); this.tonFloat('盤面無塊可清','#9fb0c0'); return;}
    this.windPick={i,objs};
    this.tonFloat('點一個 3×3 宮 → 全清化風刃(點外側取消)','#9fd07a'); }
  _windRefund(i){ if(i!=null){const a=activeSkill(this.teamCards[i].el); if(a){this.charge[i]=a.cd; this.renderCharges();}} }
  windCancel(){ if(!this.windPick)return; const o=this.windPick; this.windPick=null; o.objs.forEach(x=>x.destroy()); this._windRefund(o.i); this.tonFloat('取消','#9fb0c0'); }
  windDoPick(b,atk){ if(!this.windPick)return; this.windPick.objs.forEach(x=>x.destroy()); this.windPick=null;
    const br=Math.floor(b/3)*3,bc=(b%3)*3, cellsB=[];
    for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)if(this.board[r][c])cellsB.push([r,c]);
    if(!cellsB.length)return;
    this.combo+=1; const comboMult=comboMultiplier(this.combo,this.lead);   // battle-core 共用 combo 倍率
    const tgt=this.targetEnemy()||this.enemies.find(e=>!e.dead);
    const wmul=tgt?(EL.wind.beats===tgt.el?CONFIG.ADV_MULT:((EL[tgt.el]&&EL[tgt.el].beats==='wind')?CONFIG.WEAK_MULT:CONFIG.NORM_MULT)):1;
    const dmg=Math.round((cellsB.length*CONFIG.HIT_BASE+atk*wmul*CONFIG.ELEM_RATE*cellsB.length)*comboMult*WIND_SKILL_MUL);   // ×WIND_SKILL_MUL:風主動技倍率(追火單發爆發)
    cellsB.forEach(([r,c])=>{this.board[r][c]=null;}); this.refreshBoard(); this.showCombo(); this.renderCombo(true);
    const cen=this.cellCenter(br+1,bc+1), col=EL.wind.color;
    this.chargeAt(cen.x,cen.y,col,280);
    if(tgt){tgt._blocked=false; this.time.delayedCall(240,()=>{this.zoneStrike(cen.x,cen.y,cellsB,col,dmg,[tgt],false); this.time.delayedCall(360,()=>{if(tgt.hp<=0)this.killEnemy(tgt);});});}
    this.updateAll(); }
  renderTray(){
    if(this.trayTweens)this.trayTweens.forEach(t=>t.remove()); this.trayTweens=[];   // 先收掉舊脈動 tween 再銷毀(避免懸空)
    this.trayIcons.forEach(g=>g.destroy()); this.trayIcons=[];
    if(this.hitLab){this.renderHitLab();return;}   // HIT 實驗室:塊區改放各 HIT 按鈕(上方敵人+盤面照舊)
    // 特殊工具塊:亮色脈動光暈邊框 + 功能漢字(填/消/搬)→ 一眼看出是特殊塊
    const SP={water:{c:0x62b8f0,glow:0x8fd6ff,label:'填'},wind:{c:0x6ad06a,glow:0xb6ffae,label:'消'},earth:{c:0xd49a4a,glow:0xffc24a,label:'搬'}};
    this.tray.forEach((p,i)=>{if(p.used)return;
      if(p.locked){const cont=this.add.container(this.traySlots[i],TRAY_Y,[]).setDepth(DEPTH.tray);   // ⚡麻痺鎖住:灰底+🔒,本手不能用
        cont.add(this.add.rectangle(0,0,58,58,0x2a2620).setStrokeStyle(2,0x6a5a3a,0.8));
        cont.add(this.add.text(0,0,'🔒',{fontFamily:EMOJIFONT,fontSize:'26px'}).setOrigin(0.5).setAlpha(0.85));
        this.trayIcons.push(cont);return;}
      let maxr=0,maxc=0;p.c.forEach(([r,c])=>{maxr=Math.max(maxr,r);maxc=Math.max(maxc,c);});
      const span=Math.max(maxr,maxc)+1, s=Math.min(24,Math.floor(78/span)), pw=(maxc+1)*s, ph=(maxr+1)*s;   // 依最長邊連續縮放,塞進約 78px 高托盤格:小塊維持 24px,4/5 格長塊自動縮到一致高度、不頂出畫面
      const sp=SP[p.kind], cont=this.add.container(this.traySlots[i],TRAY_Y,[]).setDepth(DEPTH.tray);
      if(sp){const glow=this.add.rectangle(0,0,pw+13,ph+13,0,0).setStrokeStyle(3,sp.glow,1); cont.add(glow);   // 脈動光暈
        this.trayTweens.push(this.tweens.add({targets:glow,alpha:{from:0.3,to:1},scaleX:{from:0.9,to:1.06},scaleY:{from:0.9,to:1.06},duration:600,yoyo:true,repeat:-1,ease:'Sine.inOut'}));}
      p.c.forEach(([dr,dc])=>cont.add(this.add.rectangle(dc*s-pw/2, dr*s-ph/2, s-3, s-3, sp?sp.c:NEUTRAL_FILL).setOrigin(0).setStrokeStyle(sp?1:0, 0xffffff, sp?0.5:0)));
      if(sp)cont.add(this.add.text(0,0,sp.label,{fontFamily:EMOJIFONT,fontSize:(s>=24?'17px':'10px'),color:'#ffffff',fontStyle:'bold'}).setOrigin(0.5).setStroke('#1a1208',4));   // 功能漢字
      this.trayIcons.push(cont);});
    this.renderHint();
  }
  // 嬰兒級:把多HIT塊的建議落點畫成脈動金色格(放這裡就爆 HIT)
  renderHint(){const g=this.hintG; if(!g)return; g.clear(); if(this._hintTw){this._hintTw.remove();this._hintTw=null;}
    if(!this.diff||!this.diff.baby)return;
    const helping=this.tray.some(p=>!p.used&&p.hint);   // 只有 babyTray(救援)塊才有 .hint;一般塊→不顯示建議
    if(!helping)return;
    // 救援中:從救援塊裡挑「當下最佳一手」(用 bestPlacement 重算,盤面變動後仍準)
    let best=null, shp=null;
    this.tray.forEach(p=>{if(p.used||p.locked||!p.hint)return; const h=this.bestPlacement(p.c); if(h&&(!best||h.score>best.score)){best=h;shp=p.c;}});
    if(!best||!shp)return;
    const cells=shp.map(([dr,dc])=>[best.r+dr,best.c+dc]);
    g.fillStyle(0xffe04a,0.5); g.lineStyle(2,0xfff3b0,0.95);
    cells.forEach(([r,c])=>{if(r<0||r>=N||c<0||c>=N)return; const cen=this.cellCenter(r,c); g.fillRoundedRect(cen.x-RECT/2,cen.y-RECT/2,RECT,RECT,6); g.strokeRoundedRect(cen.x-RECT/2,cen.y-RECT/2,RECT,RECT,6);});
    this._hintTw=this.tweens.add({targets:g,alpha:{from:0.35,to:0.9},duration:620,yoyo:true,repeat:-1,ease:'Sine.inOut'});
  }
  // HIT 實驗室:塊區放各「可能解塊數」按鈕(由小到大兩排),點按完整重現該手實際遊玩畫面(招式名+型/印+全螢幕閃+n HIT+集氣攻擊),純特效不扣血/不推進

    this.charge=this.teamCards.map(c=>{const a=activeSkill(c.el);return a?a.cd:0;});   // 主動技恆滿,可隨時測
    this.trayHits.forEach(h=>h.disableInteractive());   // 實驗室不放塊,關掉托盤拖放點
    const ys=TRAY_Y, cols=[36,106,176,246,316,386];   // 兩排各 6 欄:數字 8 顆 +「2招」+「敵」+「完」
    const mk=(x,y,label,fill,hover,stroke,col,cb)=>{const bg=this.add.rectangle(x,y,62,32,fill).setStrokeStyle(2,stroke).setDepth(DEPTH.tray).setInteractive();
      const tx=this.add.text(x,y,label,{fontFamily:EMOJIFONT,fontSize:'15px',color:col,fontStyle:'bold'}).setOrigin(0.5).setDepth(DEPTH.tray);
      bg.on('pointerover',()=>bg.setFillStyle(hover)); bg.on('pointerout',()=>bg.setFillStyle(fill));
      bg.on('pointerup',()=>{bg.setFillStyle(fill);cb();}); this.trayIcons.push(bg,tx);};
    const top=[9,15,18,21,27,33];   top.forEach((n,k)=>mk(cols[k],ys-18,String(n),0x2b2014,0x3d2c18,0x6a4f28,'#ffeec4',()=>this.demoHit(n)));
    const bot=[39,45];   bot.forEach((n,k)=>mk(cols[k],ys+18,String(n),0x2b2014,0x3d2c18,0x6a4f28,'#ffeec4',()=>this.demoHit(n)));
    mk(cols[2],ys+18,'2招',0x2a1c40,0x3c2a5a,0x8a6ad0,'#d8c8ff',()=>this.demoMulti());   // 一次清除含 2 元素 → 同時出 2 招
    mk(cols[3],ys+18,'敵',0x4a1818,0x5e2020,0xc24a4a,'#ffc8c8',()=>this.demoEnemyAttack());
    mk(cols[4],ys+18,'完',0x3a2e10,0x4e3e16,0xd0a83a,'#ffe9a8',()=>this.demoFinal());   // 最後一擊特寫演出
  }
  demoFinal(){   // 實驗室演「最後一擊」特寫鏡頭:推近 → 蓄勢 → 飛出 → 拉回 → 重生(不進結果)
    const tgt=this.enemies&&this.enemies.find(e=>!e.dead); if(!tgt||tgt._labDying)return; tgt._labDying=true;

    this.time.delayedCall(1750,()=>{ cam.zoomTo(1,440,EIO); cam.pan(CX,Math.round(H/2),440,EIO); });
    this.time.delayedCall(2400,()=>{ tgt.dead=false; tgt._labDying=false; tgt.hp=tgt.max; if(tgt.hpTw){tgt.hpTw.stop();tgt.hpTw=null;}
      sp.setVisible(true); sp.clearTint&&sp.clearTint(); [tgt.turnG,tgt.hpGfx].forEach(o=>{if(o)o.setVisible(true);}); if(tgt.card)tgt.card.setInteractive();
      this.enemyEnter(tgt,0); this.updateEnemies(); });
  }
  _labCells(n,off){const cells=[];off=off||0;for(let r=Math.floor(off/N);r<N&&cells.length<n;r++)for(let c=(r===Math.floor(off/N)?off%N:0);c<N&&cells.length<n;c++)cells.push([r,c]);return cells;}
  demoHit(n){
    const tgt=this.enemies&&this.enemies.find(e=>!e.dead); if(!tgt)return;
    const els=['fire','water','thunder','earth','wind']; this._labEl=((this._labEl==null?-1:this._labEl)+1)%5; const el=els[this._labEl];
    const lv=Math.max(1,Math.min(7,Math.round(n/9)+1));   // 型/印 階(隨 HIT 升;lv≥4 全螢幕閃,lv≥6 大閃)
    const cells=this._labCells(n), burst=1+Math.max(0,n-9)/9*0.3, dmg=Math.round(n*10*burst);
    const atkAt=this.playClearFX(n, [{el, lv, fire:()=>this.chakraStrike([tgt], dmg, el, {cells, parts:[{el}], fx:{}})}]);   // 先 n HIT → 招式名 → 才攻擊
    this.time.delayedCall(atkAt+540+this.chargeMs(n)+340,()=>{tgt.hp=Math.max(0,tgt.hp-dmg);this.updateEnemies();if(tgt.hp<=0)this.killEnemy(tgt);});
  }
  demoMulti(){   // 演示「一次清除含 2 元素 → 同時出 2 招」(18 格 = 兩條線各一元素)
    const tgt=this.enemies&&this.enemies.find(e=>!e.dead); if(!tgt)return;
    const pairs=[['fire','water'],['thunder','earth'],['wind','fire'],['water','thunder'],['earth','wind']];
    this._labPair=((this._labPair==null?-1:this._labPair)+1)%pairs.length; const pr=pairs[this._labPair];
    const n=18, dmg=Math.round(n*10*(1+9/9*0.3)), half=Math.round(dmg/2);
    const cA=this._labCells(9,0), cB=this._labCells(9,9), lvA=4, lvB=4;
    const jutsu=[
      {el:pr[0], lv:lvA, fire:()=>this.chakraStrike([tgt], half, pr[0], {cells:cA, parts:[{el:pr[0]}], fx:{}})},

    ];
    const atkAt=this.playClearFX(n, jutsu);
    this.time.delayedCall(atkAt+540+340,()=>{tgt.hp=Math.max(0,tgt.hp-dmg);this.updateEnemies();if(tgt.hp<=0)this.killEnemy(tgt);});   // 每招各 9 格、無蓄力
  }
  demoEnemyAttack(){const alive=this.enemies&&this.enemies.filter(e=>!e.dead); if(!alive||!alive.length)return;
    this._labAtkI=((this._labAtkI==null?-1:this._labAtkI)+1)%alive.length; this.enemyAttack(alive[this._labAtkI]);}

  /* 拖曳放塊 */
  grabFX(p,col){ if(this.tut)this.tutCollapse();   // 一拖塊就自動收起教學說明(不擋盤面)
    try{navigator.vibrate&&navigator.vibrate(14);}catch(e){}   // 按下回饋:震動(支援的裝置)+ 觸點漣漪
    const ring=this.add.circle(p.x,p.y,12,col,0.16).setStrokeStyle(3,col,0.9).setDepth(DEPTH.drag+2);
    this.tweens.add({targets:ring,scale:2.4,alpha:0,duration:300,ease:'Quad.out',onComplete:()=>ring.destroy()}); }
  startDrag(i,p){if(this.resultOpen||this.locked||this.camCine||this.earthSel||this.earthDrag||this.windPick)return;
    const cells=this.tray[i].c, kind=this.tray[i].kind;
    const kc=kind==='water'?0x62b8f0:kind==='wind'?0x6ad06a:kind==='earth'?0xd49a4a:0xffffff;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,kc).setOrigin(0));
    this.drag={i,cells,kind,prev:this.add.container(0,0,kids).setAlpha(0.85).setDepth(DEPTH.drag),kids};this.grabFX(p,kc===0xffffff?0xffd56a:kc);this.updateDrag(p);}
  // 從卡拖「存放的屬塊」(萬用塊填空格;不佔托盤格→不推進敵,是連擊引擎)
  startStoredDrag(i,p){if(this.resultOpen||this.locked||this.camCine||this.drag||this.earthSel||this.earthDrag||this.windPick)return;
    const s=this.stored[i]; if(!s)return;
    const cells=s.cells||chakraShape(s.el,s.lv), col=EL[s.el].color;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,col).setOrigin(0));
    this.drag={store:i,cells,kind:'water',col,prev:this.add.container(0,0,kids).setAlpha(0.85).setDepth(DEPTH.drag),kids};this.grabFX(p,col);this.updateDrag(p);}
  doPlaceStored(d,r,c){if(this.resultOpen)return;
    d.cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;
      if(rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc])this.board[rr][cc]={el:this.boxElement[boxOf(rr,cc)]||'neutral'};});
    const placed=d.cells.map(([dr,dc])=>{const rr=r+dr,cc=c+dc;return (rr>=0&&rr<N&&cc>=0&&cc<N&&this.board[rr][cc])?{r:rr,c:cc,el:this.board[rr][cc].el}:null;}).filter(Boolean);
    this.stored[d.store]=null; this.renderStored();
    this.afterAction(false); this.coalesceCells(placed);   // 查克拉凝聚成形(結印時也演)
  }   // 連擊引擎:屬塊消除「也生塊」(滾雪球爽度);仍不佔托盤格→不推進敵(由 tray.every(used) 決定)
  updateDrag(p){if(!this.drag)return;this.clearGhost();
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT);
    if(!cell){this.drag.prev.setVisible(false);this.drag._lastCell=null;return;}
    { const ck=cell.r+','+cell.c; if(this.drag._lastCell!==ck){ this.drag._lastCell=ck; if(!(SFX.isMuted&&SFX.isMuted()))try{this.sound.play('place_align',{volume:0.5});}catch(e){} } }   // 對準到新格→播「對準」音
    const tx=p.x-CS/2, ty=p.y-DRAG_LIFT-CS/2; this.drag.tx=tx; this.drag.ty=ty;   // lerp 目標=手指連續位置(不貼齊格)→ 方塊滑順跟手、缺口大就追得快、接近減速=先快再慢(Woodoku 感);落點格線仍由 cell(貼齊)畫
    this.drag.prev.setVisible(true); if(!this.drag._shown){this.drag.prev.setPosition(tx,ty);this.drag._shown=true;}   // 首次直接定位,之後由 update() lerp 滑過去(滑順跟隨,不瞬間跳格)
    const k=this.drag.kind, ok=canPlace(this.board,this.drag.cells,cell.r,cell.c,k);
    const kc=this.drag.col||(k==='water'?0x62b8f0:k==='wind'?0x6ad06a:k==='earth'?0xd49a4a:0x8fffa6);
    const fillByZone=(this.drag.store!=null)||k==null||k==='water';   // 填空格類(一般塊/屬塊)→落點吃「宮的屬性」→拖影每格顯示落點宮色(所見即所得:攻擊屬性看宮不看塊)
    this.drag.kids.forEach((x,idx)=>{ if(!ok){x.setFillStyle(0xff8f8f);return;}
      if(fillByZone){const cc2=this.drag.cells[idx],rr=cell.r+cc2[0],cc=cell.c+cc2[1], ze=(rr>=0&&rr<N&&cc>=0&&cc<N)?this.boxElement[boxOf(rr,cc)]:null; x.setFillStyle(ze?EL[ze].color:NEUTRAL_FILL);}
      else x.setFillStyle(kc); });
    this.drag.cells.forEach(([dr,dc])=>{const rr=cell.r+dr,cc=cell.c+dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      let col;
      if(!ok)col=0xff8f8f;
      else if(k==='water')col=this.board[rr][cc]?0x6aa0ff:0x8fffa6;     // 重疊藍 / 填綠
      else if(k==='wind') col=this.board[rr][cc]?0x6ad06a:0x444444;     // 會消綠 / 空格灰
      else if(k==='earth')col=this.board[rr][cc]?0xd49a4a:0x444444;     // 抓取棕 / 空格灰
      else col=0x8fffa6;
      this.cellRect(rr,cc).setStrokeStyle(3,col,1);});}
  endDrag(p){if(!this.drag)return;const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.drag;
    d.prev.destroy(); this.clearGhost(); this.drag=null;
    if(cell && canPlace(this.board,d.cells,cell.r,cell.c,d.kind)){
      if(this.tut && this.tutTarget && !this.tutCovers(d,cell.r,cell.c)){ this.tutReject(); return; }   // 教學防呆:放到非指定位置→擋下提示,塊退回不消耗
      if(d.store!=null) this.doPlaceStored(d,cell.r,cell.c);
      else if(d.kind==='earth') this.earthSelect(d.i,cell.r,cell.c);
      else this.doPlace(d.i,cell.r,cell.c);
    }}
  tutCovers(d,r,c){ if(!this.tutTarget)return true; const occ=new Set(d.cells.map(([dr,dc])=>(r+dr)+','+(c+dc))); return this.tutTarget.every(([tr,tc])=>occ.has(tr+','+tc)); }   // 塊的落點要蓋滿全部指定格
  tutReject(){ this.tonFloat('請先照指示,放到發亮的缺口','#ffd56a'); this.renderTray&&this.renderTray(); this.renderStored&&this.renderStored();   // 退回(未消耗)→重畫托盤/屬塊;重新顯示手指/高亮
    if(this.tut){ const def=TUT_STEPS[this.tut.i]; if(def&&def.hint){ this.tutClearHint(); this.tutHint(def.hint); } } }
  clearGhost(){this.cells.forEach((rc,i)=>{const r=Math.floor(i/N),c=i%N;   // 清預覽邊框時:填滿格還原屬色亮邊(不然拖曳時亮邊會消失)
    if(this.board[r]&&this.board[r][c])rc.setStrokeStyle(2,shadeColor(rc.fillColor,0.55),0.5); else rc.setStrokeStyle(2,0x000000,0);});}

  /* 放塊 = 一回合(敵人推進);放純查克拉 = bonus(不推進回合) */
  doPlace(i,r,c){if(this.resultOpen)return;
    const cells=this.tray[i].c, kind=this.tray[i].kind;
    cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;
      if(kind==='wind'){if(this.board[rr][cc])this.board[rr][cc]=null;}        // 風刃:消除
      else if(!this.board[rr][cc])this.board[rr][cc]={el:this.boxElement[boxOf(rr,cc)]||'neutral'};}); // 一般/水:填(只填空格)
    const placed=(kind!=='wind')?cells.map(([dr,dc])=>{const rr=r+dr,cc=c+dc;return (rr>=0&&rr<N&&cc>=0&&cc<N&&this.board[rr][cc])?{r:rr,c:cc,el:this.board[rr][cc].el}:null;}).filter(Boolean):null;   // 放下當下記住屬性(之後就算被清也照演)
    this.tray[i].used=true;
    this.afterAction(kind==='water'||kind==='wind');
    if(placed)this.coalesceCells(placed);   // 查克拉凝聚成形(結印時也會演 → 凝聚→才清)
  }
  // 共用:放塊後處理(消除→燒傷→敵推進→補塊→卡死檢查)
  afterAction(fromBlock){
    if(!(SFX.isMuted&&SFX.isMuted())&&this.cache.audio.exists('place_drop'))try{this.sound.play('place_drop',{volume:0.7});}catch(e){}else SFX.place();   // 放塊落下音(mp3;無檔則退回程序化音)
    if(this.tut)this.tutEvent('place');
    this.stopStuckFX();   // 玩家一行動就收掉卡死循環提示(若仍卡死,handleStuck 會再開)
    this.refreshBoard(); this.renderTray();
    this.fromBlock=!!fromBlock; this._placeCleared=false; try{this.resolve();}catch(err){console.error('resolve error',err);} this.fromBlock=false;   // 防遞迴:塊清出的消除不再生塊;try 防展演例外卡死整手
    if(!this._placeCleared){this.combo=0;this.renderCombo();}   // 逐塊:這塊沒清→連段斷、combo 歸零、指示器熄掉
    if(this.tray.every(t=>t.used||t.locked)){this.endHand();return;}  // 一手放完(鎖住塊算跳過)→endHand 負責「等展演完才敵攻+補手+解鎖+卡死檢查」
    if(!this.anyPlaceable()){this.time.delayedCall(420,()=>this.handleStuck());}
    this.updateAll();
  }
  // 一手結束:鬥志/燒傷立即結算(屬我方展演),敵方出手+補新手延後到展演完才發動(以「手」為節奏)
  endHand(){
    const showed=this.handCleared;   // 本手有清除展演→敵攻多等一下;空手→快一點
    this.handCleared=false;   // combo 已改逐塊處理(放塊有清+1/沒清歸零),這裡不再動 combo/鬥志
    this.enemies.forEach(e=>{if(!e.dead&&e.burn>0){e.hp=Math.max(0,e.hp-e.burn);   // 燒傷=我方 DoT,屬展演,立即
      this.floatText(e.sprite.x,e.sprite.y-24,'🔥'+e.burn,'#ff7a63'); if(e.hp<=0)this.killEnemy(e);}});
    this.updateAll();   // 立即反映鬥志字/燒傷後血量(別等延遲回呼)
    this.locked=true;   // 鎖輸入:等我方這手展演完,敵方才出手(玩家才看得到上面的表現),再補新手解鎖
    this.time.delayedCall(showed?1200:200,()=>{   // 等我方華麗展演(HIT 數到底)演完,敵方才出手
      if(this.resultOpen){this.locked=false;return;}   // 期間已開結算/勝敗畫面→不再推進
      try{
        this.enemies.forEach(e=>{if(e.dead||e.hp<=0)return; if((e.sealed||0)>0){e.sealed--; return;} e.timer--; if(e.timer<=0){this.enemyAttack(e); e.timer=e.interval;} this.animTurnGlass(e);});   // 敵出手 + 沙漏翻半圈;★封印=整手凍結(不攻擊、計時器暫停,每手 -1 解封)。已被致死(hp≤0,死亡演出尚未播完)→不出手
        const dotRate=Math.max(0,...this.enemies.filter(e=>!e.dead&&e.hp>0&&!(e.sealed>0)).map(e=>e.dot||0));   // 🔥火關灼燒光環:有灼燒敵活著→每手扣玩家血(取最大率、不疊加);★封印中不灼燒
        if(dotRate>0){const dd=Math.max(1,Math.round(this.maxHP*dotRate));this.playerHP=Math.max(0,this.playerHP-dd);this.floatText(CX,PHP_Y-16,'🔥灼燒 -'+dd,'#ff7a4a');this.animPlayerHP(false);if(this.playerHP<=0)this.gameOver('灼燒焚身');}
        this.enemies.forEach(e=>{if(!e.dead&&e.hp>0&&!(e.sealed>0)&&e.regen>0){const hh=Math.max(1,Math.round(e.max*e.regen));e.hp=Math.min(e.max,e.hp+hh);if(e.sprite)this.floatText(e.sprite.x,e.sprite.y-24,'💚+'+hh,'#74e09a');}});   // 💚水關自我回血:每隻回血敵每手回自身血(致死 hp≤0 不回→不會復活);★封印中不自療
        const healR=Math.max(0,...this.enemies.filter(e=>!e.dead&&e.hp>0&&!(e.sealed>0)&&e.healAlly>0).map(e=>e.healAlly));   // 💚補師:有補師活著→每手治療全體友軍(逼先秒補師);★封印中的補師不補
        if(healR>0)this.enemies.forEach(e=>{if(!e.dead&&e.hp>0){const hh=Math.max(1,Math.round(e.max*healR));e.hp=Math.min(e.max,e.hp+hh);if(e.sprite)this.floatText(e.sprite.x,e.sprite.y-24,'💚+'+hh,'#74e09a');}});
        if(showed)this.charge=this.charge.map((c,i)=>{const a=activeSkill(this.teamCards[i].el);return a?Math.min(a.cd,(c||0)+1):c;});   // 主動技蓄力:本手有消塊才+1(綁消塊→不能擺爛farm蓄力跳過拼圖)
        this.renderCharges();
        this.refill(); this.renderTray(); this.updateAll(); this.applyParalyze(); this.applyJunk();   // ⚡麻痺/🔒封鎖:補新手後可能觸發
      }catch(err){console.error('endHand error',err);}
      finally{ this.locked=false; }   // ★ 無論如何都解鎖,杜絕卡死
      if(!this.anyPlaceable())this.time.delayedCall(420,()=>this.handleStuck());
    });
  }
  // 卡死處理:空盤+只剩工具塊(土/風無從施力)→自動補一般查克拉塊;否則才花血重洗
  handleStuck(){
    if(this.resultOpen||this.anyPlaceable())return;
    const empty=this.board.every(row=>row.every(c=>!c));
    const unused=this.tray.filter(t=>!t.used);
    const onlyTools=unused.length>0 && unused.every(t=>t.kind==='earth'||t.kind==='wind');
    if(empty&&onlyTools){const s=this.tray.findIndex(t=>!t.used);
      if(s>=0){this.tray[s]={c:pickShape(),used:false};this.renderTray();this.tonFloat('盤面已空,自動補查克拉塊','#cfe3ff');return;}}
    if(this.anyStoredPlaceable()){this.flashStored();this.tonFloat('托盤卡住 → 拖卡上的屬塊解圍!','#ffe066');return;}   // 有存塊能解=不扣血,提示用屬塊(真沒塊可解才花血)
    this.showReshuffleModal();
  }
  // 有任何「存的屬塊」放得下嗎(萬用塊只要有空格可填)
  anyStoredPlaceable(){if(!this.stored)return false;
    return this.stored.some(s=>{if(!s)return false;const cells=s.cells||chakraShape(s.el,s.lv);
      for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(canPlace(this.board,cells,r,c,'water'))return true;return false;});}
  // 卡死提示:能解圍的屬塊「跳+脹」一下,叫你拖它(不扣血的救命塊)
  flashStored(){this.stopStuckFX(); this.stuckTw=[]; this.stuckObj=[]; this.stuckBlk=[];
    this.teamCards.forEach((card,i)=>{const s=this.stored&&this.stored[i],so=card.storeObj;if(!s||!so)return;
      const cells=s.cells||chakraShape(s.el,s.lv);let ok=false;
      for(let r=0;r<N&&!ok;r++)for(let c=0;c<N&&!ok;c++)if(canPlace(this.board,cells,r,c,'water'))ok=true;
      if(!ok)return;
      const y0=so.y; so._baseY=y0; this.tweens.killTweensOf(so); so.setScale(1).setY(y0);
      this.stuckBlk.push(so);
      this.stuckTw.push(this.tweens.add({targets:so,y:y0-16,duration:240,yoyo:true,repeat:-1,ease:'Quad.inOut'}));            // 持續跳
      this.stuckTw.push(this.tweens.add({targets:so,scaleX:1.42,scaleY:1.42,duration:240,yoyo:true,repeat:-1,ease:'Sine.inOut'}));  // 持續脹
      const cx=card.rect.x, cy=card.rect.y;   // 卡身亮黃光環持續脈動
      const ring=this.add.rectangle(cx,cy,68,68,0,0).setStrokeStyle(4,0xffe066,1).setDepth(DEPTH.fx); this.stuckObj.push(ring);
      this.stuckTw.push(this.tweens.add({targets:ring,scaleX:1.3,scaleY:1.3,alpha:0,duration:620,repeat:-1,ease:'Quad.out'}));});}
  // 收掉卡死提示(玩家一行動就停):停 tween、銷毀光環/箭頭、屬塊歸位

  /* 土屬塊:兩段式搬移查克拉 — ①拖塊蓋住要抓的查克拉 ②再拖把它們整組搬到空位 */
  earthSelect(i,r,c){
    const cells=this.tray[i].c, sel=[];
    cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;if(rr<0||rr>=N||cc<0||cc>=N)return;

    if(!sel.length)return;

  startEarthMove(p){
    const sel=this.earthSel.cells;
    const minR=Math.min.apply(null,sel.map(s=>s.r)), minC=Math.min.apply(null,sel.map(s=>s.c));
    const rel=sel.map(s=>({dr:s.r-minR,dc:s.c-minC,el:s.el}));
    sel.forEach(s=>{this.board[s.r][s.c]=null;}); this.refreshBoard();
    const kids=rel.map(o=>this.add.rectangle(o.dc*CS,o.dr*CS,RECT,RECT,EL[o.el]?EL[o.el].color:NEUTRAL_FILL).setOrigin(0).setAlpha(0.9));
    this.earthDrag={i:this.earthSel.i, rel, orig:sel.slice(), prev:this.add.container(0,0,kids).setDepth(DEPTH.drag), kids};

  updateEarthMove(p){
    if(!this.earthDrag)return; this.clearGhost();
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT), d=this.earthDrag;
    if(!cell){d.prev.setVisible(false);return;}
    d.prev.setVisible(true).setPosition(BX0+cell.c*CS,BY0+cell.r*CS);
    const ok=d.rel.every(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;return rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc];});
    d.kids.forEach((k,idx)=>k.setFillStyle(ok?(EL[d.rel[idx].el]?EL[d.rel[idx].el].color:NEUTRAL_FILL):0xff8f8f));
    d.rel.forEach(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;if(rr<0||rr>=N||cc<0||cc>=N)return;

  endEarthMove(p){

    const ok=cell && d.rel.every(o=>{const rr=cell.r+o.dr,cc=cell.c+o.dc;return rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc];});
    if(ok){ d.rel.forEach(o=>{this.board[cell.r+o.dr][cell.c+o.dc]={el:o.el};});

  // ⚡雷·麻痺:有麻痺敵活著→每 interval 手鎖 1 塊托盤(留 ≥2 塊可用,不全鎖)
  applyParalyze(){if(this.hitLab)return;

    const cand=this.tray.map((t,i)=>i).filter(i=>this.tray[i]&&!this.tray[i].used&&!this.tray[i].locked);
    if(cand.length<2)return;   // 至少留 1 塊,不會鎖到沒得玩
    const li=cand[brnd(cand.length)]; this.tray[li].locked=true; this.renderTray();

  // 🔒 封鎖(大術士/魔王):每 N 手在盤面找一條 1×3/3×1 空格,塞詛咒塊(填滿不能放,清掉那條線才除)
  applyJunk(){if(this.hitLab)return;

    const horiz=brnd(2)===0, cands=[];
    if(horiz){for(let r=0;r<N;r++)for(let c=0;c<=N-3;c++)if(!this.board[r][c]&&!this.board[r][c+1]&&!this.board[r][c+2])cands.push([[r,c],[r,c+1],[r,c+2]]);}
    else{for(let c=0;c<N;c++)for(let r=0;r<=N-3;r++)if(!this.board[r][c]&&!this.board[r+1][c]&&!this.board[r+2][c])cands.push([[r,c],[r+1,c],[r+2,c]]);}
    if(!cands.length)return;   // 沒連續空格可塞就跳過

  // 👑 魔王階段變身:隨血量切到下一屬,換屬+換招牌行為+演出

  // 各屬區攻擊:該宮格子收束到「宮中心」→ 結印 → 射向敵人;彈著→該段扣血 + combo++(被彈著一次)

  // combo 顯示在目標敵右上;數字越大字越大

  // 常駐 combo 指示器(HP 條左端):combo≥2 才亮,顏色隨連擊變熱;pop=升 combo 時彈一下
  renderCombo(pop){ if(!this.comboBg)return; const c=this.combo||0;

  resolve(){
    const tgt=this.targetEnemy(); if(!tgt)return;
    const data=computeClears(this.board,this.boxElement,this.boxCard,tgt.el,this.amp,this.teamMaxAtk);   // 傳隊伍最高攻→無屬宮也吃「= 屬·普通」傷害

      this.tweens.add({targets:g,alpha:0.55,duration:160,delay:gd,ease:'Quad.in'});
      this.tweens.add({targets:g,alpha:0,scaleX:0.6,scaleY:0.6,duration:260,delay:360+gd,ease:'Sine.out',onComplete:()=>g.destroy()});});
    { const atkEls=Object.keys(data.fx||{});   // 相剋打弱點→該敵出手延後一手:AoE(15HIT↑)對「每隻被剋的敵人」都生效,單體只判鎖定目標
      victims.forEach(en=>{ if(!en.dead && atkEls.some(e=>EL[e]&&EL[e].beats===en.el)) en.timer+=1; }); }
    if(this.firstClear){this.firstClear=false;track('first_clear');}

    const n=data.cells.length;

    this.showCombo(); this.renderCombo(true);   // combo 已在頂端 +1(每塊有清才+1)+ 常駐指示器彈一下
    this.runMaxHit=Math.max(this.runMaxHit||0,n); this.runMaxCombo=Math.max(this.runMaxCombo||0,this.combo);   // 本局最佳 HIT/combo(我的紀錄/成就用)
    // 另類護盾:本手 HIT / 連段沒達門檻的敵人,這手不扣其 HP(演「🛡擋下」)

    this.countFX(n);   // 盤面中央只留「n HIT」(清的格數);招式名/盤面 combo 已取消
    Object.keys(data.fx).forEach(e=>this.glowTeam(e));   // 參戰屬性的卡發亮
    const LEAD=460;   // 先讓 n HIT 跳出來
    const hits=data.hits||[]; let lastFire=LEAD;   // 各「有清到的宮」各自集氣→射出,時間錯開、順序不一
    hits.forEach((h,i)=>{const br=Math.floor(h.b/3)*3,bc=(h.b%3)*3,cen=this.cellCenter(br+1,bc+1);

    this.updateEnemies();
