      const cc=data.cells||[]; cc.forEach((rc,idx)=>{const cell=this.cellRect(rc[0],rc[1]); if(cell)this.tweens.add({targets:cell,alpha:0,duration:260,delay:Math.min(idx,18)*16,ease:'Sine.in'});});
      this.time.delayedCall(300+Math.min(cc.length,18)*16,()=>this.refreshBoard());});
    this.time.delayedCall(lastFire+240+330+260,()=>{this.updateAll(); victims.forEach(v=>{if(v.hp<=0)this.killEnemy(v);});});   // 最後一段彈著後收死亡敵
  }
  // 形狀系統:火/水/風/土/雷 的主技=生成形狀塊存到卡(在 resolve 統一處理 storeBlock);fireAttr 只剩子屬性 陰/陽
  fireAttr(a,atk,lv,tgt){const A=CONFIG.ATTR;switch(a){
    case 'yang':{const v=Math.round(atk*A.yang_heal_rate*lv);this.playerHP=Math.min(this.maxHP,this.playerHP+v);this.tonFloat('☯陽·癒+'+v,'#74e09a');break;}   // 陽=回血(已砍)
    case 'yin':this.amp=Math.max(this.amp,2);this.tonFloat('☯陰·傷害×2','#b18cff');break;   // 陰=本手傷害×2(快殺)
  }}
  // 存放屬塊到「該屬性的卡」:優先填空卡,否則升級最低階那張;每卡最多1塊、留最高LV(上限LV5)
  storeBlock(el,lv){if(!this.stored)this.stored=[null,null,null,null,null];
    lv=Math.max(1,Math.min(5,lv));
    const slots=[]; this.teamCards.forEach((c,i)=>{if(c.el===el)slots.push(i);});
    if(!slots.length)return;
    let target=slots.find(i=>!this.stored[i]);
    if(target==null){target=slots.reduce((a,b)=>this.stored[b].lv<this.stored[a].lv?b:a,slots[0]); if(this.stored[target].lv>=lv)return;}
    this.stored[target]={el,lv,cells:randOrient(chakraShape(el,lv),el)}; this.renderStored();   // 火塊生成時就定隨機方向
    this.tonFloat(EL[el].name+'塊Lv'+lv+'→存卡','#'+EL[el].color.toString(16).padStart(6,'0'));}

  enemyAttack(e){
    SFX.enemyHit();   // 敵攻音
    if(this.tut)this.tutEvent('enemyhit');
    let dmg=e.atk, dodged=false;
    if(this.tut)dmg=Math.min(dmg,Math.round(this.maxHP/3));   // 教學:敵攻至多扣 1/3 滿血(不嚇人)
    if(this.immune>0){dodged=true;dmg=0;}
    else if(this.armor>0)dmg=Math.round(dmg*(1-this.armor));
    this.resetWave(); e.burn=0;
    const ox=e.sprite?e.sprite.x:CX, oy=e.sprite?e.sprite.y:60, col=EL[e.el].color, ADD=Phaser.BlendModes.ADD;
    if(e.sprite)this.tweens.add({targets:e.sprite,scaleY:(e.baseScale||1)*0.9,duration:120,yoyo:true});   // 蓄力小縮
    this.chargeAt(ox,oy,col,360);   // 敵卡中央花火集氣
    this.time.delayedCall(360,()=>{
      const tx=BX0+(W-2*BX0)*Math.max(0.05,this.playerHP/this.maxHP), ty=PHP_Y, ctrl={x:ox+(tx-ox)*0.35,y:Math.min(oy,ty)-140};   // 追蹤彈:先大幅往上、再弧線落到「目前血量的末端」(非血條最右)
      this.flyBall(ox,oy,tx,ty,col,ctrl,440,()=>{
        const fl=this.add.circle(tx,ty,18,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.fx);this.tweens.add({targets:fl,scale:2.6,alpha:0,duration:260,onComplete:()=>fl.destroy()});
        this.cameras.main.shake(220,0.01);
        this.playerHP=Math.max(0,this.playerHP-dmg);
        this.floatText(tx-12,PHP_Y-16,dodged?'迴避!':'-'+dmg,dodged?'#74e09a':'#ff8f8f');
        this.animPlayerHP(false);   // HP 動畫慢慢變少
        if(this.playerHP<=0){if(this.hitLab){this.playerHP=this.maxHP;this.animPlayerHP(false);}else this.gameOver('HP 歸零');}
      });
    });
  }
  killEnemy(e){if(e.dead)return;
    if(this.hitLab){   // 實驗室:也演敗陣化光,演完原地重生(順便看入場動畫)→ 可一直測
      if(e._labDying)return; e._labDying=true;
      e.dead=true; if(e.bob){e.bob.stop();e.bob=null;} if(e.knockTw){e.knockTw.stop();e.knockTw=null;}
      this.playDeath(e);
      this.time.delayedCall(950,()=>{ e.dead=false; e._labDying=false; e.hp=e.max; if(e.hpTw){e.hpTw.stop();e.hpTw=null;}
        const sp=e.sprite; sp.setVisible(true); sp.clearTint&&sp.clearTint();
        [e.turnG,e.hpGfx,e.shadow].forEach(o=>{if(o)o.setVisible(true);}); if(e.card)e.card.setInteractive();
        this.enemyEnter(e,0); this.updateEnemies(); });
      return;
    }
    e.dead=true; if(e.bob){e.bob.stop();e.bob=null;} if(e.knockTw){e.knockTw.stop();e.knockTw=null;}   // ★ bob 在受擊擊退時會被設 null,務必判空(否則每次擊殺都丟例外→鎖死)
    const last=this.aliveCount()===0, isFinal=last&&this.stage>=this.stagesEff.length;
    if(isFinal){ this._finalEnemy=e; this.stageClear(); return; }   // 最後一關最後一擊:由 finalBlow 演特寫鏡頭+飛出(不在此 playDeath)
    this.playDeath(e);   // 敗陣演出:被打飛(後上)+縮小+旋轉+淡出 → 化成光芒
    if(last)this.stageClear(); else {this.targetEnemy();this.updateEnemies();}
  }
  // 最後一擊:鏡頭推近最後一隻怪特寫 → 蓄勢一下 → 白閃+飛出 → 拉回 → 久一點才進結果
  finalBlow(e){
    const cam=this.cameras.main, sp=e&&e.sprite, EOut=Phaser.Math.Easing.Quadratic.Out, EIO=Phaser.Math.Easing.Quadratic.InOut;
    if(sp){ cam.pan(sp.x, sp.y, 460, EOut); cam.zoomTo(1.9, 460, EOut); }   // 特寫推近
    this.time.delayedCall(560,()=>{   // 蓄勢後 → 白閃 + 飛出(特寫下更有張力)
      if(sp&&sp.active){const fl=this.add.circle(sp.x,sp.y,32,0xffffff,1).setBlendMode(Phaser.BlendModes.ADD).setDepth(DEPTH.fx);
        this.tweens.add({targets:fl,scale:4,alpha:0,duration:320,onComplete:()=>fl.destroy()});}
      this.playDeath(e);
    });
    this.time.delayedCall(1750,()=>{ cam.zoomTo(1,440,EIO); cam.pan(CX,Math.round(H/2),440,EIO); });   // 鏡頭拉回
    this.time.delayedCall(2250,()=>this.showResult(true));   // 飛出後停留久一點才進結果(不突兀)
  }
  // 敗陣演出:被打飛(後上)、縮小、旋轉、淡出,縮到很小再炸成光芒
  playDeath(e){const sp=e.sprite, bs=e.baseScale||1, x0=sp.x, y0=(e.restY!=null?e.restY:sp.y);
    if(e.card)e.card.disableInteractive();
    [e.turnG,e.hpGfx,e.mark,e.shadow].forEach(o=>{if(o)this.tweens.add({targets:o,alpha:0,duration:200,onComplete:()=>{o.setVisible(false);o.setAlpha(1);}});});
    this.tweens.killTweensOf(sp); sp.clearTint&&sp.clearTint();
    this.tweens.add({targets:sp, y:y0-72, x:x0+(x0<CX?-22:22), scaleX:bs*0.12, scaleY:bs*0.12, angle:220, alpha:0.15, duration:560, ease:'Quad.in',
      onComplete:()=>{this.deathLight(x0,y0-64,e.el); sp.setVisible(false);}});
  }
  deathLight(x,y,el){const ADD=Phaser.BlendModes.ADD;
    const fl=this.add.circle(x,y,12,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.fx);   // 中心光芒爆閃
    this.tweens.add({targets:fl,scale:5,alpha:0,duration:440,ease:'Quad.out',onComplete:()=>fl.destroy()});
    for(let i=0;i<18;i++){const a=i/18*Math.PI*2+(Math.random()-0.5)*0.4, d=this.add.circle(x,y,3,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.fx);   // 四散光點
      this.tweens.add({targets:d,x:x+Math.cos(a)*(42+Math.random()*44),y:y+Math.sin(a)*(42+Math.random()*44)-18,alpha:0,scale:0.2,duration:520+Math.random()*240,ease:'Quad.out',onComplete:()=>d.destroy()});}
  }
  // 敵入場:從「遠處(小、偏高、淡)」浮現到定位 —— 像往深處推進後,新敵自遠方逼近
  enemyEnter(e,delay){ if(!e||!e.sprite)return; const sp=e.sprite, bs=e.baseScale||1, ry=(e.restY!=null?e.restY:sp.y), rx=(e.card?e.card.x:sp.x); delay=delay||0;
    if(e.bob){e.bob.stop();e.bob=null;} this.tweens.killTweensOf(sp);
    sp.setScale(bs*0.22).setAlpha(0).setAngle(0).setPosition(rx, ry-48);   // ★ 用敵卡原始 x(非被打飛後的位移 x)→ 重生不再往左飄
    this.tweens.add({targets:sp,alpha:1,duration:220,delay:delay});
    this.tweens.add({targets:sp,scaleX:bs,scaleY:bs,y:ry,duration:460,delay:delay,ease:'Back.out',
      onComplete:()=>{sp.setScale(bs);sp.setY(ry);this.refreshBob(e);}});
    [e.turnG,e.hpGfx,e.shadow].forEach(o=>{if(o){o.setAlpha(0);this.tweens.add({targets:o,alpha:1,duration:300,delay:delay+150});}});
  }
  // 過關前進:鏡頭往前推一下 + 直向速度線往下刷過(像往深處前進到下一關)
  stageAdvanceFX(){ const cam=this.cameras.main;
    cam.zoomTo(1.06,200,Phaser.Math.Easing.Quadratic.Out); this.time.delayedCall(220,()=>cam.zoomTo(1,300,Phaser.Math.Easing.Quadratic.InOut));   // ★ 相機效果的 ease 必須是函式(EaseMap 不收 'Quad.out' 簡寫)否則每幀丟例外→凍住
    for(let i=0;i<16;i++){const x=16+Math.random()*(W-32), len=44+Math.random()*90;
      const s=this.add.rectangle(x,-len,2.5,len,0xffffff,0.45).setOrigin(0.5,0).setDepth(DEPTH.flash);
      this.tweens.add({targets:s,y:H+len,alpha:0,duration:320+Math.random()*180,delay:Math.random()*200,ease:'Quad.in',onComplete:()=>s.destroy()});}
  }
  stageClear(){
    if(this.tut){ if(this.tutG){this.tutG.destroy();this.tutG=null;} this.time.delayedCall(500,()=>this.showResult(true)); return; }   // 教學:打完 3 敵即勝利,不給獎勵、不進下一關
    rollDrops(this.dungeon.drops[this.stage-1]).forEach((cd,i)=>{const isNew=!isOwned(cd.id);addCard(cd.id);this.runDrops.push({cd,isNew});
      this.time.delayedCall(i*240,()=>this.tonFloat('🎁 '+cd.name+(isNew?' ✦NEW':''),isNew?'#ffe04a':'#ffe08a'));});
    recordStage(this.stage, false);   // 記最佳關
    const rm=(this.diff&&this.diff.rwd)||1;   // 難度獎勵倍率
    if(this.dungeon.el && Math.random()<Math.min(0.95,0.6*rm)){addGem(this.dungeon.el);this.runGems++;   // 元素關掉進化素材「寶玉」(高難掉率更高)
      this.time.delayedCall(120,()=>this.tonFloat('🔮 '+EL[this.dungeon.el].name+'寶玉','#c5b0ff'));}
    const xp=Math.round(40*rm), gld=Math.round(300*rm), _rw=addRewards(xp,gld); this.runExp+=xp; this.runCoins+=gld;   // 戰鬥獎勵:EXP/金錢(隨難度放大)
    if(_rw._ups>0)this.tonFloat('🆙 等級提升! Lv.'+_rw.rank,'#ffe04a');
    if(this.stage>=this.stagesEff.length){markDungeonCleared(this.dungeonId);recordClear(this.dungeonId,(this.diff&&this.diff.key)||'normal');this.creditRun();this.chests++;this.finalBlow(this._finalEnemy);return;}   // 最後一關全清→記完成率+成就→最後一擊特寫演出後才進結果
    this.stage++; this.chests++; this.playerHP=Math.min(this.maxHP,this.playerHP+150);
    this.time.delayedCall(700,()=>{try{this.stageAdvanceFX();}catch(e){} this.time.delayedCall(380,()=>{try{this.startStage(true);}catch(e){console.error('startStage error',e);}});});   // 過關:前進演出 → 下一關敵人自遠方逼近入場(不清盤,盤面累積)
  }
  reshuffle(){if(this.playerHP<=CONFIG.RESHUFFLE_COST){this.gameOver('生命不足、無法再提煉');return;}
    this.playerHP-=CONFIG.RESHUFFLE_COST; this.refill(); this.renderTray(); this.updateAll();}
  gameOver(reason){if(this.resultOpen)return;
    if(!this.hitLab && (getMeta().stones||0)>0){ this.showRevive(reason); return; }   // 有魔法石→先問要不要花 1 顆復活;沒石/實驗室→直接認輸
    this.creditRun();this.showResult(false);}
  showRevive(reason){this.resultOpen=true;const g=this.overlay();const cy=H/2,cost=1;   // HP 歸零→復活問詢 model
    g.add(this.add.text(CX,cy-98,'💔 HP 歸零!',{fontFamily:EMOJIFONT,fontSize:'22px',color:'#ff8f6a',fontStyle:'bold'}).setOrigin(0.5));
    g.add(this.add.text(CX,cy-62,reason||'',{fontFamily:EMOJIFONT,fontSize:'13px',color:'#cfc0a8'}).setOrigin(0.5));
    g.add(this.add.text(CX,cy-30,'花 💎'+cost+' 復活、回滿 HP 繼續?  (剩 💎'+(getMeta().stones||0)+')',{fontFamily:EMOJIFONT,fontSize:'14px',color:'#f3e9d8'}).setOrigin(0.5));
    this.mkBtn(g,cy+18,'💎 復活(回滿 HP)',()=>{ if(spendStones(cost)){ g.destroy();this.resultOpen=false;
        this.playerHP=this.maxHP;this.animPlayerHP(true);try{SFX.heal();}catch(e){}this.cameras.main.flash(240,120,220,150,false);this.tonFloat('✨ 復活!HP 回滿','#74e09a');
      } else this.tonFloat('魔法石不足','#ff9a7a'); },0x3a5a2c);
    this.mkBtn(g,cy+78,'✖ 放棄(認輸)',()=>{ g.destroy();this.resultOpen=false;this.creditRun();this.showResult(false); });}
  creditRun(){bumpRecords(this.runMaxHit||0,this.runMaxCombo||0);const nw=checkAchievements();nw.forEach((t,i)=>this.time.delayedCall(i*320,()=>{try{this.tonFloat('🏅 解鎖稱號:'+t,'#ffe04a');}catch(e){}}));}   // 提交本局紀錄 + 檢查成就解鎖(過關與戰敗都跑)
  restartStage(){this.playerHP=this.maxHP;this.startStage();}

  /* UI */
  updateAll(){this.updateEnemies();this.updateBars();}
  updateEnemies(){this.enemies.forEach((e,i)=>{if(e.gateTx)e.gateTx.setVisible(!e.dead);   // 死了藏護盾門檻徽章
    if(e.dead)return;
    if(e.phases&&e.hp>0){const idx=Math.min(e.phases.length-1,Math.max(0,Math.floor((1-e.hp/e.max)*e.phases.length))); if(idx>e.phaseIdx){e.phaseIdx=idx;this.bossTransform(e);}}   // 👑 魔王:血量過門檻→變身下一屬(hp>0 才變,致命一擊不再噴變身)
    const tr=Math.max(0,Math.min(1,e.hp/e.max)), cur=(e.hpRatio==null?tr:e.hpRatio);
    if(Math.abs(cur-tr)>0.004){
      if(tr<cur)e.hpLag=cur;                                   // 受傷:白拖尾起點=舊血量
      if(e.hpTw)e.hpTw.stop(); if(e.hpLagTw)e.hpLagTw.stop();
      e.hpTw=this.tweens.add({targets:e,hpRatio:tr,duration:300,ease:'Quart.out',onUpdate:()=>this.drawHpBar(e)});           // 紅血快速到位
      e.hpLagTw=this.tweens.add({targets:e,hpLag:tr,duration:620,delay:170,ease:'Quad.in',onUpdate:()=>this.drawHpBar(e)});   // 白拖尾停一下再追上→看得到扣多少
    } else {e.hpRatio=tr;e.hpLag=tr;this.drawHpBar(e);}
    if(e.turnTx){const tm=Math.max(0,e.timer);   // 沙漏右邊的數字=剩餘出手手數;越少越紅(1手內紅、2手黃、≥3白藍)
      e.turnTx.setText(String(tm)).setColor(tm<=1?'#ff5a4a':tm===2?'#ffc24a':'#eaf3ff');}
    e.mark.setVisible(i===this.target);});}
  // 每回合:沙漏跳一下 + 翻轉到下一個 90°(累積),數字隨 updateEnemies 更新
  animTurnGlass(e){
    if(!e.glass||!e.turnG)return;
    const tgt=(Math.round(e.glass.angle/180)+1)*180;   // 對齊到下一個 180°(翻半圈)→ 只在直立↔翻面切換,不會側躺像扯鈴
    this.tweens.killTweensOf(e.glass); this.tweens.add({targets:e.glass,angle:tgt,duration:340,ease:'Cubic.out'});
    const restY=BATTLE_CY-e.cardH/2+11; this.tweens.killTweensOf(e.turnG); e.turnG.setY(restY);
    this.tweens.add({targets:e.turnG,y:restY-7,duration:170,yoyo:true,ease:'Quad.out'});   // 跳一下落回
  }
  updateBars(){
    if(!this.pHpTw||!this.pHpTw.isPlaying()){this.pHpRatio=Math.max(0,Math.min(1,this.playerHP/this.maxHP));this.pHpLag=this.pHpRatio;this.drawPlayerHp();}   // 動畫扣/補血中→不瞬間蓋掉
    this.pHpTxt.setText(this.playerHP+'/'+this.maxHP);   // 去掉「我方」
    this.chestTxt.setText('📦 '+(this.chests||0)); this.goldTxt.setText('💰 '+(this.gold||0));
  }

  /* 特效 */
  // 投射物:亮白核 + 該屬色光暈 + 漸隱拖尾,加速飛向敵人(比小白點炫)
  projectile(ox,oy,tx,ty,glyph,color,delay,dmg,tgt){
    this.time.delayedCall(delay,()=>{
      const glow=this.add.circle(ox,oy,16,color,0.4).setDepth(DEPTH.proj);
      const core=this.add.circle(ox,oy,7,0xffffff,1).setDepth(DEPTH.proj);
      let fc=0;
      this.tweens.add({targets:[glow,core],x:tx,y:ty,duration:340,ease:'Quad.in',
        onUpdate:()=>{ if((fc++%3)===0&&core.active){const d=this.add.circle(core.x,core.y,5,color,0.55).setDepth(DEPTH.proj-1);
          this.tweens.add({targets:d,scale:0.2,alpha:0,duration:280,onComplete:()=>d.destroy()});} },   // 拖尾
        onComplete:()=>{glow.destroy();core.destroy();this.impact(tx,ty,color,dmg,tgt);}});
      this.tweens.add({targets:glow,scale:1.5,duration:340,ease:'Quad.in'});   // 逼近時光暈脹大
    });
  }
  impact(x,y,color,dmg,tgt){
    SFX.hit(1);   // 打擊音
    if(tgt&&!tgt.dead){tgt.sprite.setTint(0xffffff);
      const bs=tgt.baseScale||1;if(tgt.hitTw)tgt.hitTw.stop();tgt.sprite.setScale(bs);   // 縮放動畫相對基準縮放(史來姆圖 base≈0.39),先停掉前一個受擊tween避免連擊疊加變大
      tgt.hitTw=this.tweens.add({targets:tgt.sprite,scaleX:bs*1.18,scaleY:bs*1.18,duration:100,yoyo:true,onComplete:()=>{tgt.sprite.setScale(bs);if(tgt.sealed>0){tgt.sprite.setTint(0xaad8ff).setAlpha(0.82);}else tgt.sprite.clearTint();tgt.hitTw=null;}});}   // ★封印中受擊→還原藍 tint(別被白閃清掉)
    const flash=this.add.circle(x,y,12,0xffffff,0.9).setDepth(DEPTH.proj);   // 命中:亮白爆閃
    this.tweens.add({targets:flash,scale:0.2,alpha:0,duration:220,onComplete:()=>flash.destroy()});
    const ring=this.add.circle(x,y,10,color,0).setStrokeStyle(4,color,1).setDepth(DEPTH.proj);   // 彩色擴散環
    this.tweens.add({targets:ring,scale:4,alpha:0,duration:380,ease:'Quad.out',onComplete:()=>ring.destroy()});
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2, sp=this.add.circle(x,y,3,color,0.9).setDepth(DEPTH.proj);   // 碎片四射
      this.tweens.add({targets:sp,x:x+Math.cos(a)*26,y:y+Math.sin(a)*26,alpha:0,scale:0.3,duration:340,ease:'Quad.out',onComplete:()=>sp.destroy()});}
    this.cameras.main.shake(150,0.005);
  }
  floatText(x,y,str,color){const t=this.add.text(x,y,str,{fontFamily:EMOJIFONT,fontSize:'19px',color,fontStyle:'bold'}).setOrigin(0.5).setDepth(DEPTH.fx);
    this.tweens.add({targets:t,y:y-40,alpha:0,duration:900,ease:'Quad.out',onComplete:()=>t.destroy()});}
  // 敵人扣血數字:大紅「-N」彈出後上飄淡出

  // 打擊頓格:命中瞬間凍住整個場景 ~ms(tween+計時器 timeScale=0,真實時間後復原)→ 打到肉的份量

  // 敵人受擊擊退:後退(上移+縮小)→ 停頓 → 慢慢回到原位
  knockEnemy(e){ if(!e||!e.sprite)return; const sp=e.sprite, ry=(e.restY!=null?e.restY:sp.y), bs=e.baseScale||1;
    if(e.bob){e.bob.stop();e.bob=null;}                       // 暫停上下浮動,避免和擊退 y 衝突

      }}); }
  // 查克拉集結成印 → 射向敵人(全程 additive 疊光=真發光)
  chakraBez(a,c,b,t){const it=1-t;return {x:it*it*a.x+2*it*t*c.x+t*t*b.x, y:it*it*a.y+2*it*t*c.y+t*t*b.y};}   // 二次貝茲
  chakraBez3(a,c1,c2,b,t){const it=1-t,it2=it*it,t2=t*t;return {x:it2*it*a.x+3*it2*t*c1.x+3*it*t2*c2.x+t2*t*b.x, y:it2*it*a.y+3*it2*t*c1.y+3*it*t2*c2.y+t2*t*b.y};}   // 三次貝茲
  chakraArc(a,b,mag){const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,dx=b.x-a.x,dy=b.y-a.y,L=Math.hypot(dx,dy)||1;return {x:mx-dy/L*mag, y:my+dx/L*mag};}   // 控制點:中點往垂直偏 mag → 弧線
  chargeMs(hit){ return hit>=15 ? Math.min(1100,Math.round(220+(hit-15)*28)) : 0; }   // 15 HIT 以上才蓄力;HIT 越高粒子炮持續收束越久(15→220ms…45→1060ms)
  chakraStrike(victims, dealt, topEl, data){
    const ADD=Phaser.BlendModes.ADD, LP={x:CX,y:BOARD_CY}, col=topEl?EL[topEl].color:0xbfe6ff;   // 集結到盤面中心
    const hit=(data.cells||[]).length, pw=Math.min(5,Math.max(1,hit/9)), gs=1+(pw-1)*0.4;   // HIT 越多→集氣/印/彈/爆越大(9→×1、18→×1.4、27→×1.8、36→×2.2、45→×2.6)
    const seen={}; (data.parts||[]).forEach(pt=>{if(pt.el&&pt.el!=='neutral'&&!seen[pt.el]){seen[pt.el]=1;this.glowTeam(pt.el);}});
    const core=this.add.circle(LP.x,LP.y,3,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);   // 集氣球:亮白核 + 屬色光暈,漸大
    const glow=this.add.circle(LP.x,LP.y,7,col,0.55).setBlendMode(ADD).setDepth(DEPTH.proj);
    this.tweens.add({targets:core,scale:4.5*gs,duration:480,ease:'Quad.in'});
    this.tweens.add({targets:glow,scale:5*gs,duration:480,ease:'Quad.in'});

    cells.slice(0,28).forEach((rc,i)=>{const o=this.cellCenter(rc[0],rc[1]);
      this.time.delayedCall((i%10)*16,()=>{
        const dx=o.x-LP.x, dy=o.y-LP.y, sa=Math.atan2(dy,dx)+(Math.random()-0.5)*1.5;   // 大致離心方向 + 隨機
        const sp={x:o.x+Math.cos(sa)*(28+Math.random()*34), y:o.y+Math.sin(sa)*(28+Math.random()*34)-(8+Math.random()*16)};
        const d=this.add.circle(o.x,o.y,4,col,0.9).setBlendMode(ADD).setDepth(DEPTH.proj-1);
        this.tweens.add({targets:d,x:sp.x,y:sp.y,scale:1.25,duration:140,ease:'Quad.out',onComplete:()=>{   // ①散開(外甩)
          const a={x:sp.x,y:sp.y}, b={x:LP.x,y:LP.y}, ctrl=this.chakraArc(a,b,26+Math.random()*40), ob={t:0};
          this.tweens.add({targets:ob,t:1,duration:280+(i%5)*38,ease:'Quad.in',                            // ②沿弧線奔向中心
            onUpdate:()=>{const p=this.chakraBez(a,ctrl,b,ob.t);d.setPosition(p.x,p.y).setScale(1.25-ob.t*1.05);},
            onComplete:()=>d.destroy()});

      });
    });
    const fireBolts=()=>{victims.forEach((v,k)=>{if(!v.sprite)return;this.time.delayedCall(k*60,()=>this.chakraBolt(LP.x,LP.y,v.sprite.x,v.sprite.y,col,v,dealt,pw));});};
    this.time.delayedCall(540,()=>{   // 集結完成 → 印爆閃 → (大 HIT 再二次蓄力) → 射出(規模隨 HIT)

      const seal=this.add.circle(LP.x,LP.y,16*gs,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);
      this.tweens.add({targets:seal,scale:3.2,alpha:0,duration:220,ease:'Quad.out',onComplete:()=>seal.destroy()});
      const sg=this.add.circle(LP.x,LP.y,20*gs,col,0.6).setBlendMode(ADD).setDepth(DEPTH.proj);
      this.tweens.add({targets:sg,scale:2.4,alpha:0,duration:300,ease:'Quad.out',onComplete:()=>sg.destroy()});
      this.cameras.main.shake(110+pw*35,0.005+pw*0.002);
      const chDur=this.chargeMs(hit);
      if(chDur>0){   // 粒子炮蓄力:粒子持續從 360° 外圍「不斷」往中心收束,HIT 越高收束越久,蓄滿才射出
        const cc=this.add.circle(LP.x,LP.y,6*gs,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);   // 蓄力核:整段持續長大(能量累積)
        this.tweens.add({targets:cc,scaleX:4.2,scaleY:4.2,duration:chDur,ease:'Quad.in'});
        const cg=this.add.circle(LP.x,LP.y,9*gs,col,0.5).setBlendMode(ADD).setDepth(DEPTH.proj);
        this.tweens.add({targets:cg,scaleX:4.6,scaleY:4.6,duration:chDur,ease:'Quad.in'});
        const tick=28, cnt=4+Math.round(pw*0.9);   // 持續噴流(更濃更狂):每 ~28ms 灑一波朝中心的火花,整段不間斷
        this.time.addEvent({delay:tick, repeat:Math.max(1,Math.floor(chDur/tick))-1, callback:()=>{
          for(let j=0;j<cnt;j++){const a=Math.random()*Math.PI*2, r0=54+pw*12+Math.random()*52, sx=LP.x+Math.cos(a)*r0, sy=LP.y+Math.sin(a)*r0;
            const d=this.add.rectangle(sx,sy,12+Math.random()*11,3,(j%3===0?0xffffff:col)).setOrigin(0,0.5).setRotation(a+Math.PI).setBlendMode(ADD).setDepth(DEPTH.proj);
            this.tweens.add({targets:d,x:LP.x,y:LP.y,scaleX:0.16,alpha:0.18,duration:190+Math.random()*150,ease:'Quad.in',onComplete:()=>d.destroy()});}
        }});
        this.time.delayedCall(chDur,()=>{   // 蓄滿 → 印爆閃(更亮)→ 射出
          cc.destroy(); cg.destroy();
          const fl=this.add.circle(LP.x,LP.y,18*gs,0xffffff,1).setBlendMode(ADD).setDepth(DEPTH.proj);
          this.tweens.add({targets:fl,scale:3.8,alpha:0,duration:240,ease:'Quad.out',onComplete:()=>fl.destroy()});

  // 查克拉彈:沿弧線飛 + 逐段描出的弧線軌跡線(亮白核 + 屬色光暈,像子機/追蹤彈)
  chakraBolt(ox,oy,tx,ty,color,tgt,dmg,pw,hot){
    pw=pw||1; hot=hot||0xffffff; const ADD=Phaser.BlendModes.ADD, a={x:ox,y:oy}, b={x:tx,y:ty}, bs=1+(pw-1)*0.4;   // bs:彈體/軌跡隨 HIT 變粗大;hot=高光色(預設白)
    const ctrl=this.chakraArc(a,b,(Math.random()<0.5?1:-1)*(55+Math.random()*45));
    const glow=this.add.circle(ox,oy,22*bs,color,0.85).setBlendMode(ADD).setDepth(DEPTH.proj);   // 屬色光暈:加大加濃→屬色壓過白核
    const core=this.add.circle(ox,oy,6*bs,hot,1).setBlendMode(ADD).setDepth(DEPTH.proj);          // 亮核縮小→不洗白
    const trail=this.add.graphics().setDepth(DEPTH.proj-1).setBlendMode(ADD), ob={t:0};

      onUpdate:()=>{const p=this.chakraBez(a,ctrl,b,ob.t); glow.setPosition(p.x,p.y); core.setPosition(p.x,p.y);
        trail.clear(); const N=Math.max(2,Math.round(ob.t*26));

        trail.lineStyle(2*bs,hot,0.85); trail.beginPath(); trail.moveTo(a.x,a.y); for(let i=1;i<=N;i++){const q=this.chakraBez(a,ctrl,b,ob.t*i/N);trail.lineTo(q.x,q.y);} trail.strokePath();},
      onComplete:()=>{glow.destroy();core.destroy(); this.tweens.add({targets:trail,alpha:0,duration:360,onComplete:()=>trail.destroy()}); this.chakraImpact(tx,ty,color,tgt,dmg,Math.atan2(ty-ctrl.y,tx-ctrl.x),pw,hot);}});   // 傳入到達角度(貝茲末端切線)+ HIT 規模 + 高光色
    this.tweens.add({targets:glow,scale:1.5,duration:320,ease:'Quad.in'});

  // ang=查克拉彈到達角度→火花/粒子依「擊中角度」散開(大半往來向反向潑回 back-splash、少數穿透)
  chakraImpact(x,y,color,tgt,dmg,ang,pw,hot){
    const ADD=Phaser.BlendModes.ADD; pw=pw||1; hot=hot||0xffffff; const ps=1+(pw-1)*0.4;   // ps:命中規模隨 HIT(9→×1、18→×1.4、27→×1.8);hot=高光色

      this.knockEnemy(tgt);}   // 擊退(後退縮小→停頓→回位)
    const flash=this.add.circle(x,y,15*ps,hot,1).setBlendMode(ADD).setDepth(DEPTH.proj);   // 高光爆閃(縮小快收→不蓋火花;HIT 越多越大)
    this.tweens.add({targets:flash,scale:0.2,alpha:0,duration:170,onComplete:()=>flash.destroy()});
    const halo=this.add.circle(x,y,30*ps,color,0.7).setBlendMode(ADD).setDepth(DEPTH.proj);   // 命中屬色光暈:加大加濃→看得出屬性
    this.tweens.add({targets:halo,scale:1.6,alpha:0,duration:320,ease:'Quad.out',onComplete:()=>halo.destroy()});
    [[14,5,420,color],[10,7,560,hot]].forEach(o=>{const ring=this.add.circle(x,y,o[0]*ps,0,0).setStrokeStyle(5,o[3],1).setBlendMode(ADD).setDepth(DEPTH.proj);   // 雙擴散環
      this.tweens.add({targets:ring,scale:o[1],alpha:0,duration:o[2],ease:'Quad.out',onComplete:()=>ring.destroy()});});

    const nL=Math.round(14+pw*6), lf=1+(pw-1)*0.25;   // 9→20、18→26、27→32 道
    for(let i=0;i<nL;i++){const a=i/nL*Math.PI*2+(Math.random()-0.5)*0.5, len=(15+Math.random()*16)*lf;

      this.tweens.add({targets:sp,x:x+Math.cos(a)*(48+Math.random()*64),y:y+Math.sin(a)*(48+Math.random()*64),alpha:0,scaleX:0.18,duration:560+Math.random()*340,ease:'Quad.out',onComplete:()=>sp.destroy()});}

      this.tweens.add({targets:d,x:x+Math.cos(a)*(42+Math.random()*52),y:y+Math.sin(a)*(42+Math.random()*52),alpha:0,scale:0.2,duration:540+Math.random()*280,ease:'Quad.out',onComplete:()=>d.destroy()});}

  }

  countFX(n){

  // 統一攻擊展演:先「n HIT」(快)→ 同位置換成招式名(1~2 招上下並列同時出)→ 才發動各招攻擊(微錯開);回傳最後一招攻擊時點(ms)

/* ===== 卡冊 → 背包(怪物箱):網格 → 點卡進詳細頁 + 操作 ===== */
class CollectionScene extends Phaser.Scene{
  constructor(){super('collection');}
  init(d){this.sel=(d&&d.sel)||null;
    if(this.sortMode==null)this.sortMode=0;
    if(this.filterEl===undefined)this.filterEl=null;
    if(this.boxPage==null)this.boxPage=0;}
  create(){this.add.rectangle(CX,H/2,W,H,0x160f18);this.rebuild();
    bindGridSwipe(this,170,H-92,'boxPage');   // 格子區拖曳換頁(慣性滑動)
    this.scale.on('resize',()=>{const o=H;recomputeLayout();if(Math.abs(H-o)>3){this.scale.setGameSize(W,H);this.rebuild();}});}
  rebuild(){if(this.layer)this.layer.destroy();this.layer=this.add.container(0,0);this.gridG=null;this.draw();}
  L(o){this.layer.add(o);return o;}
  txt(x,y,s,size,col,ox,bold){return this.L(this.add.text(x,y,s,{fontFamily:EMOJIFONT,fontSize:Math.max(15,parseInt(size||'16',10)||16)+'px',color:col||'#f3e9d8',fontStyle:bold?'bold':'normal'}).setOrigin(ox==null?0.5:ox,0.5));}   // 全選單字級最小 15px(手機可讀)
  rect(x,y,w,h,col,a){return this.L(this.add.rectangle(x,y,w,h,col,a==null?1:a));}
  btn(x,y,w,h,label,cb,o){o=o||{};const r=this.L(this.add.rectangle(x,y,w,h,o.col==null?0x2b2014:o.col).setStrokeStyle(2,o.stroke==null?0x5a4128:o.stroke).setInteractive());
    if(label)this.txt(x,y,label,o.fs||'14px',o.color||'#f3e9d8',0.5,o.bold);tapBind(this,r,cb);return r;}
  toast(msg){const t=this.add.text(CX,Math.round(H*0.4),msg,{fontFamily:EMOJIFONT,fontSize:'15px',color:'#ffd56a',fontStyle:'bold',backgroundColor:'#000000cc',padding:{x:12,y:8}}).setOrigin(0.5).setDepth(2000);
    this.tweens.add({targets:t,alpha:0,delay:900,duration:400,onComplete:()=>t.destroy()});}
  // 擴背包慶祝動畫(直接掛場景、不進 layer→rebuild 不清掉):閃光+震+擴散環+四射星火+「背包+5」大字+新上限
  playExpandFX(newCap){
    const cyc=Math.round(H*0.42);
    this.cameras.main.flash(220,150,120,220,false); this.cameras.main.shake(180,0.006);
    const ring=this.add.circle(CX,cyc,34,0,0).setStrokeStyle(5,0xb18cff,1).setDepth(2998);
    this.tweens.add({targets:ring,scale:6,alpha:0,duration:640,ease:'Quad.out',onComplete:()=>ring.destroy()});
    for(let i=0;i<12;i++){const a=i/12*Math.PI*2, sp=this.add.text(CX,cyc,'✦',{fontFamily:EMOJIFONT,fontSize:'18px',color:i%2?'#ffe08a':'#d8c8ff'}).setOrigin(0.5).setDepth(2998);
      this.tweens.add({targets:sp,x:CX+Math.cos(a)*120,y:cyc+Math.sin(a)*120,alpha:0,scale:0.4,duration:640,ease:'Quad.out',onComplete:()=>sp.destroy()});}
    const t=this.add.text(CX,cyc,'✨ 背包 +5 ✨',{fontFamily:EMOJIFONT,fontSize:'32px',color:'#e8d8ff',fontStyle:'bold',stroke:'#3a2a5a',strokeThickness:7}).setOrigin(0.5).setDepth(3000).setScale(0.3);
    this.tweens.add({targets:t,scale:1.1,duration:300,ease:'Back.out'});
    this.tweens.add({targets:t,scaleX:1.18,scaleY:1.18,duration:420,yoyo:true,delay:300,ease:'Sine.inOut'});
    this.tweens.add({targets:t,y:cyc-46,alpha:0,delay:820,duration:520,onComplete:()=>t.destroy()});
    const c2=this.add.text(CX,cyc+44,'→ '+newCap+' 格',{fontFamily:EMOJIFONT,fontSize:'18px',color:'#cfe0ff',fontStyle:'bold',stroke:'#1a2030',strokeThickness:4}).setOrigin(0.5).setDepth(3000).setAlpha(0);
    this.tweens.add({targets:c2,alpha:1,duration:260,delay:180});
    this.tweens.add({targets:c2,alpha:0,delay:1300,duration:480,onComplete:()=>c2.destroy()});
    // 5 個新欄位一格格依序冒出來(像格子被加進背包)
    const sw=26, gp=7, tot=5*sw+4*gp, sx0=CX-tot/2+sw/2, sy=cyc+82;
    for(let i=0;i<5;i++){const b=this.add.rectangle(sx0+i*(sw+gp),sy,sw,sw,0x4a3a6a,1).setStrokeStyle(2,0xd8c8ff,1).setDepth(3000).setScale(0);
      this.tweens.add({targets:b,scale:1,duration:260,delay:280+i*150,ease:'Back.out'});   // 依序彈出
      this.tweens.add({targets:b,alpha:0,delay:280+i*150+820,duration:420,onComplete:()=>b.destroy()});}
  }
  draw(){
    const cards=loadSave().cards, cap=boxCap(), cnt=cards.length, full=cnt>=cap;
    this.txt(CX,30,'🎒 背包(卡冊)','22px','#f3e9d8',0.5,true);
    this.txt(CX,54,'BOX '+cnt+' / '+cap+'　·　收集 '+ownedCount()+'/'+ROSTER.length+' 種','13px',full?'#ff8f6a':'#b9a584',0.5);
    const g=loadSave().gems; this.txt(CX,72,'🔮 '+ELEM_DUNGEONS.map(e=>EL[e].name+(g[e]||0)).join(' '),'13px','#b9a0ff',0.5);
    // 排序 / 擴背包
    this.btn(108,98,150,32,'↕ 排序:'+SORT_MODES[this.sortMode].name,()=>{this.sortMode=(this.sortMode+1)%SORT_MODES.length;this.boxPage=0;this.rebuild();},{col:0x2b2014,stroke:0x5a6a8a,color:'#cfe0ff',fs:'14px'});
    this.btn(300,98,150,32,'➕ 擴背包 1💎+5格',()=>{const r=buyBoxSlots();if(r.ok){this.rebuild();this.playExpandFX(r.cap);}else this.toast(r.msg);},{col:0x2e2a3a,stroke:0x7a6aaa,color:'#d8c8ff',fs:'14px'});
    const chips=[['全',null]].concat(ELEM_DUNGEONS.map(e=>[EL[e].name,e]));
    chips.forEach((ch,i)=>{const x=38+i*64, on=this.filterEl===ch[1];
      this.btn(x,132,58,32,ch[0],()=>{this.filterEl=ch[1];this.boxPage=0;this.rebuild();},{col:on?(ch[1]?EL[ch[1]].color:0x3a5a2c):0x2b2014,stroke:on?0xffd56a:0x4a3824,color:(on&&ch[1])?'#1a1208':(on?'#cfe8b0':'#b9a584'),fs:'15px',bold:on});});
    // 個體清單:每張卡各佔一格(不疊×N),套元素篩選 + 排序
    let list=cards.map((c,i)=>{const r=ROSTER.find(x=>x.id===c.id)||{};return Object.assign({_i:i,u:c.u},r);});
    if(this.filterEl)list=list.filter(c=>c.el===this.filterEl);
    list=list.sort(SORT_MODES[this.sortMode].fn);
    if(!this.filterEl){const empties=Math.max(0,cap-list.length);for(let e=0;e<empties;e++)list.push(null);}   // 全屬視圖:卡片後補「空欄」到上限→看得到還剩幾格
    // 正方形、一排 5 欄、分頁(5×6=30/頁)
    const cols=5, perPage=30, cw=64, gx=76, gy=74, x0=CX-2*gx, y0=192;
    const pages=Math.max(1,Math.ceil(list.length/perPage));
    if(this.boxPage>=pages)this.boxPage=pages-1; if(this.boxPage<0)this.boxPage=0;
    const pageList=list.slice(this.boxPage*perPage,(this.boxPage+1)*perPage);

/* ===== 強化合成(養成) ===== */
class FuseScene extends Phaser.Scene{

    const sel=this.sel||[];
    const lv=getCardLv(this.target),atk=cardAtk(this.target),exp=getCardExp(this.target),need=expToNext(lv),mx=lv>=MAXLV;
    const pv=(sel.length&&!mx)?previewFeed(this.target,sel):null;   // 選了素材→即時預覽結果

    this.txt(40+bw,144,mx?'MAX':(pv?('+'+pv.gained+' exp'):(exp+'/'+need)),'13px',pv?'#163f0a':'#10303f',1,true);
    this.btn(CX,186,150,32,'🔄 換強化對象',()=>{this.mode='pick';this.sel=[];this.rebuild();},{col:0x2e2a3a,stroke:0x5a6a8a,color:'#cfe0ff',fs:'14px'});

    let feedList=[];

    feedList.sort((a,b)=>((b.cd.el===t.el?1:0)-(a.cd.el===t.el?1:0))||a.cd.id.localeCompare(b.cd.id));
    const cols=5, cw=58, gx=74, gy=64, x0=CX-2*gx, y0=250;

    const pages=Math.max(1,Math.ceil(feedList.length/perPage)); this._pages=pages;

    const pageList=feedList.slice(this.feedPage*perPage,(this.feedPage+1)*perPage);
    if(!feedList.length){this.txt(CX,300,'目前沒有多餘的卡可當素材','13px','#9a8a6a',0.5);this.txt(CX,324,'(去元素關多收幾張同卡)','13px','#7a6a4a',0.5);}
    const _realL=this.layer, gridG=this.gridG=this.add.container(0,0); this.layer.add(gridG); this.layer=gridG;   // 素材格暫導入可滑動 gridG(畫完還原)
    pageList.forEach((it,k)=>{const c=it.cd, u=it.u, cx=x0+(k%cols)*gx, cy=y0+Math.floor(k/cols)*gy, same=c.el===t.el, oi=sel.indexOf(u), on=oi>=0;
      tapBind(this,this.rect(cx,cy,cw,cw,EL[c.el].color).setStrokeStyle(on?4:2,on?0x4affd0:(same?0xffd56a:0x000000),on?1:(same?1:0.3)).setInteractive(),()=>this.toggleSel(u));

      this.txt(cx,cy+19,same?'同屬×1.5':'素材','9px',same?'#7a3000':'#3a2c12',0.5);
      if(on){this.rect(cx+cw/2-12,cy-cw/2+12,20,20,0x12a86a).setStrokeStyle(2,0xffffff);this.txt(cx+cw/2-12,cy-cw/2+12,String(oi+1),'13px','#ffffff',0.5,true);}});   // 選取序號角標
    this.layer=_realL;   // 還原:分頁/其餘元素回主 layer
    if(pages>1){const py=y0+rowsFit*gy-2;
      this.btn(CX-74,py,52,28,'◀',()=>changeGridPage(this,'feedPage',-1),{fs:'15px'});
      this.txt(CX,py,(this.feedPage+1)+' / '+pages,'15px','#cfe0e8',0.5);
      this.btn(CX+74,py,52,28,'▶',()=>changeGridPage(this,'feedPage',1),{fs:'15px'});}
    // 合成確認 bar(神魔/龍族式:選好才按)
    const canFuse=sel.length>0 && !mx;
    this.btn(CX,H-96,330,50, canFuse?('⚡ 合成  '+sel.length+'/5  ·  '+(FEED_COST*sel.length)+'金'):(mx?'已達滿級 Lv.'+MAXLV:'點素材選取後可合成'),
      ()=>this.tryFuse(),{col:canFuse?0x2e3a22:0x241a10,stroke:canFuse?0x6aaa4c:0x3a2e1c,color:canFuse?'#eafce0':'#7a6a4a',bold:true,fs:'18px'});
    this.back();
  }
  toggleSel(u){this.sel=this.sel||[]; const i=this.sel.indexOf(u);
    if(i>=0)this.sel.splice(i,1); else { if(this.sel.length>=5){this.toast('一次最多 5 張');return;} this.sel.push(u); }

  scene:[HomeScene, TeamScene, GameScene, CollectionScene, FuseScene, DexScene],
});
track('open');   // 開遊戲心跳(回流追蹤;ANALYTICS_URL 空時自動 no-op)
// 預載字型字符(招式名毛筆字的所有用字 + HIT 數字)→ 首次展演就已是設計字型,不掉回退
try{ if(document.fonts&&document.fonts.load){
  const _jc=KATA.join('')+Object.keys(JUTSU).map(e=>JUTSU[e].join('')).join('');
  document.fonts.load("700 28px 'LXGW WenKai TC'", _jc);
  document.fonts.load("400 40px 'Russo One'", '0123456789 HITCOMBO');
}}catch(e){}
// HIT 實驗室入口:網址加 #hitlab → 直接進戰鬥的 lab 模式(塊區放各 HIT 按鈕,演示招式規模)
window.GAME.events.once('ready',function(){
  if(location.hash==='#hitlab'){
    const team=['fire','water','thunder','earth','wind'].map(el=>ROSTER.find(c=>c.el===el)||ROSTER[0]);
    window.GAME.scene.start('game',{team:team,dungeonId:'tower',lab:true});
    window.GAME.scene.stop('home');
  }
});
// 真機轉向 / 瀏覽器縮放 / 網址列伸縮 → 即時重算高度 + 重排(不黑邊、不用重整)
window.addEventListener('resize',function(){
  const o=H; recomputeLayout();
  if(Math.abs(H-o)>3){
    window.GAME.scale.setGameSize(W,H);
    const gs=window.GAME.scene.getScene('game');
    if(gs && window.GAME.scene.isActive('game') && gs.relayout) gs.relayout();
  }
});
</script>
</body>
</html>
