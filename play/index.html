function randOrient(cells,el){if(el==='water'||el==='wind')return cells;
  let out=cells.map(x=>x.slice());const t=rnd(4);for(let k=0;k<t;k++)out=rot90(out);
  if(rnd(2))out=normCells(out.map(([r,c])=>[r,-c]));   // 隨機鏡像
  return out;}

function rnd(n){return Math.floor(Math.random()*n);}
function pickShape(){let r=rnd(WSUM);for(const s of SHAPES){r-=s.w;if(r<0)return s.c.map(x=>x.slice());}}
function boxOf(r,c){return Math.floor(r/3)*3+Math.floor(c/3);}
function canPlace(board,cells,r,c,kind){
  const inB=cells.every(([dr,dc])=>{const rr=r+dr,cc=c+dc;return rr>=0&&rr<N&&cc>=0&&cc<N;});
  if(!inB)return false;
  if(kind==='water')return cells.some(([dr,dc])=>!board[r+dr][c+dc]);   // 水塊:界內 + 至少一格空(可填)
  if(kind==='wind') return cells.some(([dr,dc])=> board[r+dr][c+dc]);   // 風刃:界內 + 至少一格有方塊(可消)
  if(kind==='earth')return cells.some(([dr,dc])=> board[r+dr][c+dc]);   // 土塊:界內 + 至少一格有方塊(可抓取搬移)
  return cells.every(([dr,dc])=>!board[r+dr][c+dc]);                    // 一般塊:全空
}
function computeClears(board, boxElement, boxCard, enemyEl, ampMult){
  let rows=[],cols=[],boxes=[];
  for(let r=0;r<N;r++)if(board[r].every(x=>x))rows.push(r);
  for(let c=0;c<N;c++){let f=true;for(let r=0;r<N;r++)if(!board[r][c])f=false;if(f)cols.push(c);}
  for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3;let f=true;
    for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)if(!board[r][c])f=false;if(f)boxes.push(b);}
  const groups=rows.length+cols.length+boxes.length;
  if(groups===0)return null;
  const cellSet=new Set();
  rows.forEach(r=>{for(let c=0;c<N;c++)cellSet.add(r+'_'+c);});
  cols.forEach(c=>{for(let r=0;r<N;r++)cellSet.add(r+'_'+c);});
  boxes.forEach(b=>{const br=Math.floor(b/3)*3,bc=(b%3)*3;for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)cellSet.add(r+'_'+c);});
  const mult=(el)=> el==='neutral'?1 : (EL[el].beats===enemyEl?CONFIG.ADV_MULT : (EL[enemyEl].beats===el?CONFIG.WEAK_MULT:CONFIG.NORM_MULT));
  // 逐格屬性傷害:不論宮清/線清,「每個被清的屬區格」都算該屬攻擊(card.atk × 相剋 × CELL_RATE);中性格每格固定底。cellSet 已去重→不會重複計
  const elemCells={};
  cellSet.forEach(k=>{const p=k.split('_');const e=boxElement[boxOf(+p[0],+p[1])];if(e)elemCells[e]=(elemCells[e]||0)+1;});   // 各屬區被清格數
  let total=Math.round(cellSet.size*CONFIG.HIT_BASE), hitWeak=false, parts=[];   // 基礎:每個被清的格(含中性)都算 HIT_BASE → 清越多越強
  ELEMENT_BOXES.forEach(b=>{const card=boxCard[b], e=boxElement[b]; if(!card||e==null)return; const n=elemCells[e]||0; if(!n)return;
    const d=Math.round(card.atk*mult(e)*ampMult*CONFIG.ELEM_RATE*n); total+=d;   // 屬區格再額外加:n × 卡攻擊 × 相剋 × ELEM_RATE
    if(EL[e].beats===enemyEl)hitWeak=true;
    const br=Math.floor(b/3)*3,bc=(b%3)*3; parts.push({el:e,d,r:br+1,c:bc+1});});
  const fx={};
  ELEMENT_BOXES.forEach(b=>{const card=boxCard[b];if(!card)return;const br=Math.floor(b/3)*3,bc=(b%3)*3;
    let hit=false;for(let r=br;r<br+3&&!hit;r++)for(let c=bc;c<bc+3;c++)if(cellSet.has(r+'_'+c))hit=true;
    if(!hit)return;const e=card.el;const o=fx[e]||(fx[e]={atk:0,attrs:[]});
    o.atk=Math.max(o.atk,card.atk);card.attrs.forEach(a=>{if(o.attrs.indexOf(a)<0)o.attrs.push(a);});});
  Object.keys(fx).forEach(e=>{fx[e].level=Math.min(7,Math.floor((elemCells[e]||0)/3))||1;});
  const hits=[];   // 各「有清到的 3×3 宮」=一段攻擊:該宮被清格數 + 傷害(基礎+屬性);Σdmg=total
  for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3;let cn=0;
    for(let r=br;r<br+3;r++)for(let c=bc;c<bc+3;c++)if(cellSet.has(r+'_'+c))cn++;
    if(!cn)continue;
    const el=boxElement[b],card=boxCard[b];let d=cn*CONFIG.HIT_BASE,hel='neutral';
    if(el!=null&&card){d+=Math.round(card.atk*mult(el)*ampMult*CONFIG.ELEM_RATE*cn);hel=el;}
    hits.push({b,el:hel,cells:cn,dmg:Math.round(d)});}
  return {groups,cells:[...cellSet].map(k=>k.split('_').map(Number)),parts,total,hitWeak,fx,hits};
}

// 戰鬥畫面 z-index 分層(由下往上):背景→敵方→我方卡→鬥志/HP→盤面→托盤→暫態特效→nav(最高);暫態特效字壓在盤面之上、僅次 nav
const DEPTH={bg:0, enemy:10, card:20, hp:30, morale:32, store:34, abtn:38, board:40, tray:50, drag:56, proj:60, flash:62, fx:66, nav:90};
// 色彩工具:shadeColor(往白/往黑)、lerpColor(兩色內插)→ 給屬塊「明暗漸層流動」用
function shadeColor(col,f){let r=(col>>16)&255,g=(col>>8)&255,b=col&255;if(f>=0){r+=(255-r)*f;g+=(255-g)*f;b+=(255-b)*f;}else{const k=1+f;r*=k;g*=k;b*=k;}return (Math.round(r)<<16)|(Math.round(g)<<8)|Math.round(b);}
function lerpColor(a,b,t){const A=[(a>>16)&255,(a>>8)&255,a&255],B=[(b>>16)&255,(b>>8)&255,b&255];return (Math.round(A[0]+(B[0]-A[0])*t)<<16)|(Math.round(A[1]+(B[1]-A[1])*t)<<8)|Math.round(A[2]+(B[2]-A[2])*t);}
// 註:卡身(card)壓在 HP/鬥志之下(照規格);但「卡上的屬塊(store)與主技鈕(abtn)」是可拖/可點的前景配件,提到 HP/鬥志之上才不會被擋住。兩者空間上不與盤面重疊,故仍排在 board 之下無妨。
// 版面高度依「當下」裝置比例算(尺寸變化時即時重算),FIT 不黑邊;上下錨定
let H,TRAY_Y,BY0,CARDS_Y,PHP_Y,INFO_Y,BG_H,BATTLE_CY,BOARD_CY;
function recomputeLayout(){
  // 讀「真正的容器尺寸」(#game),才與 Phaser FIT 進去的容器一致→零黑邊;取不到再 fallback 視窗
  const el=(typeof document!=='undefined')?document.getElementById('game'):null;
  const vw=(el&&el.clientWidth)?el.clientWidth:((typeof window!=='undefined'&&window.innerWidth)?window.innerWidth:390);
  const vh=(el&&el.clientHeight)?el.clientHeight:((typeof window!=='undefined'&&window.innerHeight)?window.innerHeight:844);
  H=Math.max(640,Math.min(1400,Math.round(W*vh/vw)));   // 涵蓋約 1.52~3.33 的長寬比
  TRAY_Y=H-46; BY0=TRAY_Y-52-9*CS; CARDS_Y=BY0-50; PHP_Y=BY0-16; INFO_Y=BY0-2;   // 板面/托盤盡量往下、卡列貼緊板面 → 上方戰鬥區留多一點
  BG_H=BY0+22; BATTLE_CY=Math.round((CARDS_Y-29)/2);   // 背景延伸到盤面上緣+22;敵人置中於 nav(26) 與主動技鈕(CARDS_Y-55) 之間
  BOARD_CY=BY0+Math.round(9*CS/2);   // 盤面正中央(9×9 格的中心)→ 暴擊/連印/鬥志等操控盤面的特效字都以此置中
}

/* F6 統一存檔:持有卡 / 編隊 / 進度 / 設定 一個物件全自動存 localStorage */
const SAVE_KEY='ninja_save';
function defaultMeta(){return {rank:1,exp:0,coins:0,stones:30,stamina:50,staminaMax:50,staTs:null,pity:0,boxBuy:0,dayKey:null,dailyN:0};}   // 首登送 30 鑽;pity=結印保底;boxBuy=魔法石擴背包次數;dayKey/dailyN=每日登入
function defaultSave(){const cards=STARTER.map((id,i)=>({u:'k'+(i+1),id}));return {ver:1,cards,uidSeq:STARTER.length,team:STARTER.slice(),cardLv:{},cardEvo:{},gems:{fire:0,water:0,thunder:0,earth:0,wind:0},progress:{cleared:false,clears:0,bestStage:0},meta:defaultMeta(),settings:{welcome:true}};}   // 個體制:每張卡=cards 陣列裡一個獨立個體(各佔一背包格)
function writeSave(s){try{s.updatedAt=Date.now();localStorage.setItem(SAVE_KEY,JSON.stringify(s));}catch(e){}}   // 每次寫入蓋時間戳(雲端衝突解決:新覆舊)
function loadSave(){let s=null;try{s=JSON.parse(localStorage.getItem(SAVE_KEY));}catch(e){}
  if(!s||typeof s!=='object'){s=defaultSave();
    let old=null;try{old=JSON.parse(localStorage.getItem('ninja_owned'));}catch(e){}   // 遷移更舊版持有卡(計數map)
    if(old&&typeof old==='object'){let seq=0;s.cards=[];Object.keys(old).forEach(id=>{const n=old[id]||0;for(let k=0;k<n;k++)s.cards.push({u:'k'+(++seq),id});});s.uidSeq=seq;}
    writeSave(s);}
  // ── 個體制遷移:舊存檔 owned{id:張數} → cards[{u,id}](每張各一個個體、各佔一格)──
  if(!Array.isArray(s.cards)){let seq=0;s.cards=[];const o=(s.owned&&typeof s.owned==='object')?s.owned:{};
    Object.keys(o).forEach(id=>{const n=o[id]||0;for(let k=0;k<n;k++)s.cards.push({u:'k'+(++seq),id});});
    if(!s.cards.length)STARTER.forEach(id=>s.cards.push({u:'k'+(++seq),id}));
    s.uidSeq=seq;}
  if(s.uidSeq==null)s.uidSeq=s.cards.length;
  if(s.ver==null)s.ver=1;   // schema 版號:之後改結構就升版+寫遷移(雲存遷移用)
  delete s.owned;   // 不再以 owned 為來源(改由 cards 派生)
  if(!Array.isArray(s.team)||s.team.length!==5)s.team=STARTER.slice();
  if(!s.progress)s.progress={cleared:false,clears:0,bestStage:0};
  if(!s.progress.dungeonsCleared)s.progress.dungeonsCleared={};
  if(!s.settings)s.settings={};
  if(!s.meta)s.meta=defaultMeta(); else {const _d=defaultMeta();for(const k in _d)if(s.meta[k]==null)s.meta[k]=_d[k];}
  if(!s.cardLv)s.cardLv={};
  if(!s.cardEvo)s.cardEvo={};
  if(!s.gems)s.gems={fire:0,water:0,thunder:0,earth:0,wind:0};
  if(!s.settings.welcome){s.meta.stones=(s.meta.stones||0)+30;s.settings.welcome=true;writeSave(s);}   // 既有存檔一次性補送 30 鑽(新檔已在 defaultSave 標記)
  return s;}

function markDungeonCleared(id){mutSave(s=>{if(!s.progress.dungeonsCleared)s.progress.dungeonsCleared={};s.progress.dungeonsCleared[id]=true;if(id==='prologue')s.progress.cleared=true;});}
function isDungeonCleared(id){return !!(loadSave().progress.dungeonsCleared||{})[id];}
function isDungeonUnlocked(id){const dc=loadSave().progress.dungeonsCleared||{};
  if(id==='prologue')return true;
  if(id==='tower')return ELEM_DUNGEONS.every(e=>dc[e]);
  if(ELEM_DUNGEONS.indexOf(id)>=0)return !!dc.prologue;
  return false;}
/* 養成:卡片等級/經驗(PAD式吃卡強化,同屬×1.5經驗) */
const MAXLV=20, FEED_COST=100;
function expToNext(lv){return 50*lv;}
function getCardLv(id){const c=loadSave().cardLv[id];return c?c.lv:1;}
function getCardExp(id){const c=loadSave().cardLv[id];return c?c.exp:0;}
function _statMul(id){return EVO_MULT[getCardEvo(id)]*(1+(getCardLv(id)-1)*0.05);}   // 進化×等級 共用成長倍率
function cardAtk(id){const base=(ROSTER.find(c=>c.id===id)||{}).atk||0;return Math.round(base*_statMul(id));}
function cardHp(id){const base=(ROSTER.find(c=>c.id===id)||{}).hp||0;return Math.round(base*_statMul(id));}
function cardRcv(id){const base=(ROSTER.find(c=>c.id===id)||{}).rcv||0;return Math.round(base*_statMul(id));}
function leveledTeam(ids){return ids.map(id=>{const c=ROSTER.find(x=>x.id===id);return c?Object.assign({},c,{atk:cardAtk(id),hp:cardHp(id),rcv:cardRcv(id),lv:getCardLv(id)}):null;}).filter(Boolean);}
function feedFodder(targetId,fodderId){let res={ok:false,msg:''};
  mutSave(s=>{
    if(s.cards.filter(c=>c.id===fodderId).length<2){res.msg='需要多餘的素材卡(同一張至少2張)';return;}
    if((s.meta.coins||0)<FEED_COST){res.msg='金錢不足(需'+FEED_COST+')';return;}
    if(!s.cardLv[targetId])s.cardLv[targetId]={lv:1,exp:0};
    const cl=s.cardLv[targetId]; if(cl.lv>=MAXLV){res.msg='已達滿級 Lv.'+MAXLV;return;}
    const f=ROSTER.find(c=>c.id===fodderId), t=ROSTER.find(c=>c.id===targetId);
    const reward=Math.round(({genin:60,chunin:150,jonin:400,kage:900}[f.rank]||60)*(f.el===t.el?1.5:1));
    const fi=s.cards.findIndex(c=>c.id===fodderId); if(fi>=0)s.cards.splice(fi,1);   // 吃掉一個素材個體(空出一格)
    s.meta.coins-=FEED_COST; cl.exp+=reward;
    let ups=0; while(cl.lv<MAXLV && cl.exp>=expToNext(cl.lv)){cl.exp-=expToNext(cl.lv);cl.lv++;ups++;}
    if(cl.lv>=MAXLV)cl.exp=0;
    res={ok:true,reward:reward,lv:cl.lv,ups:ups,same:f.el===t.el};
  });
  return res;}
function dissolveCard(id){let res={ok:false,msg:''};   // 分解重複個體換金幣(保護最後一張)
  mutSave(s=>{const cnt=s.cards.filter(c=>c.id===id).length; if(cnt<2){res.msg='只剩 1 張,無法分解';return;}
    const c=ROSTER.find(x=>x.id===id), gain={genin:50,chunin:150,jonin:400,kage:800}[c.rank]||50;
    const i=s.cards.findIndex(x=>x.id===id); if(i>=0)s.cards.splice(i,1);
    s.meta.coins=(s.meta.coins||0)+gain; res={ok:true,gain:gain,left:cnt-1};});
  return res;}
function setLeader(id){mutSave(s=>{s.team=[id].concat(s.team.filter(x=>x!==id)).slice(0,5);});}   // 設為隊長(放隊首)
/* 進化(PAD/神魔共通:滿級+寶玉素材→升階):gems 寶玉 + cardEvo 進化階 */
const EVO_MAX=2, EVO_MULT=[1,1.6,2.4];
function evoReq(tier){return {gems:3+tier*3, coins:1000+tier*2000};}
function getCardEvo(id){return loadSave().cardEvo[id]||0;}
function cardStars(id){const c=ROSTER.find(x=>x.id===id);return Math.min(6,({genin:1,chunin:2,jonin:3,kage:4}[c.rank]||1)+getCardEvo(id));}
function starStr(id){return '★'.repeat(cardStars(id));}
function getGems(el){return loadSave().gems[el]||0;}
function addGem(el,n){mutSave(s=>{s.gems[el]=(s.gems[el]||0)+(n||1);});}
function canEvolve(id){const c=ROSTER.find(x=>x.id===id),t=getCardEvo(id);
  if(t>=EVO_MAX)return {ok:false,msg:'已達進化上限'};
  if(getCardLv(id)<MAXLV)return {ok:false,msg:'需先練滿 Lv.'+MAXLV};
  const req=evoReq(t);
  if(getGems(c.el)<req.gems)return {ok:false,msg:'需 '+req.gems+' 顆'+EL[c.el].name+'寶玉(有'+getGems(c.el)+')'};
  if((getMeta().coins||0)<req.coins)return {ok:false,msg:'需 '+req.coins+' 金'};
  return {ok:true,req:req};}
function evolveCard(id){const chk=canEvolve(id);if(!chk.ok)return chk;const c=ROSTER.find(x=>x.id===id);
  mutSave(s=>{const req=evoReq(s.cardEvo[id]||0);s.gems[c.el]-=req.gems;s.meta.coins-=req.coins;
    s.cardEvo[id]=(s.cardEvo[id]||0)+1;s.cardLv[id]={lv:1,exp:0};});
  return {ok:true,tier:getCardEvo(id)};}
/* 經濟:體力(時間回復)/ 經驗·等級 / 金錢 / 魔法石 */
const REGEN_MS=20000;   // 體力每 20 秒 +1
function syncStamina(m){if(m.staTs==null){m.staTs=Date.now();return;}
  if(m.stamina>=m.staminaMax){m.staTs=Date.now();return;}
  const g=Math.floor((Date.now()-m.staTs)/REGEN_MS);
  if(g>0){m.stamina=Math.min(m.staminaMax,m.stamina+g); m.staTs=(m.stamina>=m.staminaMax)?Date.now():m.staTs+g*REGEN_MS;}}
function getMeta(){return mutSave(s=>syncStamina(s.meta)).meta;}
function spendStamina(n){let ok=false;mutSave(s=>{syncStamina(s.meta);if(s.meta.stamina>=n){s.meta.stamina-=n;s.meta.staTs=Date.now();ok=true;}});return ok;}
function staFullSec(){const m=getMeta();if(m.stamina>=m.staminaMax)return 0;return Math.ceil(((m.staminaMax-m.stamina)*REGEN_MS-(Date.now()-m.staTs))/1000);}
function expForLevel(rank){return 80+rank*40;}
function addRewards(exp,coins,stones){return mutSave(s=>{const m=s.meta;m.coins=(m.coins||0)+(coins||0);m.stones=(m.stones||0)+(stones||0);m.exp=(m.exp||0)+(exp||0);
  let need=expForLevel(m.rank),ups=0;while(m.exp>=need){m.exp-=need;m.rank++;m.staminaMax+=2;m.stamina=m.staminaMax;ups++;need=expForLevel(m.rank);}m._ups=ups;}).meta;}
function spendStones(n){let ok=false;mutSave(s=>{if((s.meta.stones||0)>=n){s.meta.stones-=n;ok=true;}});return ok;}
function refillStamina(){mutSave(s=>{s.meta.stamina=s.meta.staminaMax;s.meta.staTs=Date.now();});}
function devSetAllLv(lv){lv=Math.max(1,Math.min(MAXLV,lv));mutSave(s=>{const ids={};s.cards.forEach(c=>ids[c.id]=1);Object.keys(ids).forEach(id=>{s.cardLv[id]={lv:lv,exp:0};});});}   // 測試:全持有卡設成指定等級
function devUnlockAll(){mutSave(s=>{['prologue','fire','water','thunder','earth','wind','tower'].forEach(id=>{s.progress.dungeonsCleared[id]=true;});s.progress.cleared=true;});}   // 測試:解鎖全關(含塔)
// 每日登入獎勵:7 天循環,寬鬆(每個歷天可領一次、漏天不歸零、循環)
const DAILY=[
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:1,ic:'💎',label:'魔法石 ×1'},
  {t:'stones',v:6,ic:'🎁',label:'魔法石 ×6(全勤+5)'},
];
function todayKey(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function dailyAvailable(){return loadSave().meta.dayKey!==todayKey();}
function dailyIndex(){return (loadSave().meta.dailyN||0)%7;}
function claimDaily(){let res=null;mutSave(s=>{const m=s.meta;if(m.dayKey===todayKey())return;
  const n=(m.dailyN||0)%7, rw=DAILY[n]; let gemEl=null;
  if(rw.t==='coins')m.coins=(m.coins||0)+rw.v;
  else if(rw.t==='stones')m.stones=(m.stones||0)+rw.v;
  else if(rw.t==='stamina'){m.stamina=m.staminaMax;m.staTs=Date.now();}
  else if(rw.t==='gem'){const e=['fire','water','thunder','earth','wind'][rnd(5)];s.gems[e]=(s.gems[e]||0)+rw.v;gemEl=e;}
  m.dailyN=n+1; m.dayKey=todayKey();
  res={day:n+1,ic:rw.ic,label:rw.label,gemEl};});
  return res;}
const RANK_POOL={genin:ROSTER.filter(c=>c.rank==='genin'),chunin:ROSTER.filter(c=>c.rank==='chunin'),jonin:ROSTER.filter(c=>c.rank==='jonin'),kage:ROSTER.filter(c=>c.rank==='kage')};
function pickDrop(spec){let pool=ROSTER;if(spec.el)pool=pool.filter(c=>c.el===spec.el);
  if(spec.rank)pool=pool.filter(c=>c.rank===spec.rank); else pool=pool.filter(c=>c.rank!=='kage');   // 影忍只能抽卡取得,不從刷關掉落
  return pool.length?pool[rnd(pool.length)]:null;}
function rollDrops(table){const out=[];(table||[]).forEach(d=>{if(Math.random()<d.rate){const c=pickDrop(d);if(c)out.push(c);}});return out;}

/* ===== 轉蛋(簡單版:雙池 + 機率公示) ===== */
const GACHA={
  premium:{name:'結印轉蛋',cur:'stones',icon:'💎',cost1:5,   cost10:50,  rates:[['genin',0.50],['chunin',0.35],['jonin',0.12],['kage',0.03]]},
  normal: {name:'一般轉蛋',cur:'coins', icon:'💰',cost1:1000,cost10:9000,rates:[['genin',0.70],['chunin',0.28],['jonin',0.02]]},
};
function rollRarity(rates){const r=Math.random();let acc=0;for(let k=0;k<rates.length;k++){acc+=rates[k][1];if(r<acc)return rates[k][0];}return rates[rates.length-1][0];}
function gachaPull(bankey){const pool=RANK_POOL[rollRarity(GACHA[bankey].rates)];return pool[rnd(pool.length)];}
function spendCoins(n){let ok=false;mutSave(s=>{if((s.meta.coins||0)>=n){s.meta.coins-=n;ok=true;}});return ok;}
const PITY_MAX=50;   // 結印轉蛋保底:第 50 抽必得影忍(kage)
function getPity(){return loadSave().meta.pity||0;}
function setPity(n){mutSave(s=>{s.meta.pity=n;});}
function doGacha(bankey,count){const b=GACHA[bankey],cost=count===10?b.cost10:b.cost1;
  const ok=b.cur==='stones'?spendStones(cost):spendCoins(cost); if(!ok)return null;
  const out=[];
  for(let i=0;i<count;i++){let c,pityHit=false;
    if(bankey==='premium'){let p=getPity();
      if(p>=PITY_MAX-1){c=RANK_POOL.kage[rnd(RANK_POOL.kage.length)];setPity(0);pityHit=true;}   // 第50抽保底:必影忍
      else{c=gachaPull(bankey);if(c.rank==='kage')setPity(0);else setPity(p+1);}                  // 抽到影忍歸零、否則+1
    }else{c=gachaPull(bankey);}
    out.push({cd:c,isNew:!isOwned(c.id),pity:pityHit});addCard(c.id);
  }
  track('gacha');
  return out;}

/* ===== 出戰編隊 ===== */
class TeamScene extends Phaser.Scene{
  constructor(){super('team');}
  create(){
    recomputeLayout();   // 確保 H 是當下裝置高度
    this.add.rectangle(CX,H/2,W,H,0x160f18);   // 不透明底(卡捲到邊緣不穿幫)
    // ===== 固定上方:標題 + 5 宮位 =====
    const headBot=300;
    this.add.rectangle(CX,headBot/2,W,headBot,0x191017).setStrokeStyle(1,0x2a2018).setDepth(5);   // 上方固定區底(蓋住捲上來的卡)
    this.add.text(CX,28,'出戰編隊',{fontFamily:EMOJIFONT,fontSize:'22px',color:'#f3e9d8',fontStyle:'bold'}).setOrigin(0.5).setDepth(6);
    const defs=[{n:'左上',x:128,y:106},{n:'右上',x:292,y:106},{n:'中央',x:CX,y:182},
                {n:'左下',x:128,y:258},{n:'右下',x:292,y:258}];
    this.slots=defs.map(d=>{
      this.add.text(d.x,d.y-40,d.n,{fontFamily:EMOJIFONT,fontSize:'12px',color:'#c9b48f'}).setOrigin(0.5).setDepth(6);
      const rect=this.add.rectangle(d.x,d.y,108,62,0x2b2014).setStrokeStyle(2,0x4a3824).setInteractive().setDepth(6);
      const txt=this.add.text(d.x,d.y,'＋',{fontFamily:EMOJIFONT,fontSize:'20px',color:'#6a5a40'}).setOrigin(0.5).setDepth(6);
      const slot={el:null,cardId:null,uid:null,rect,txt,x:d.x,y:d.y};
      rect.on('pointerup',()=>this.clearSlot(slot));
      return slot;
    });
    this.add.text(CX,headBot-13,'點卡片放入 · 點宮位取消',{fontFamily:EMOJIFONT,fontSize:'10px',color:'#7a6a50'}).setOrigin(0.5).setDepth(6);

    // ===== 下方:可捲動卡區(5 張一排、正方形、點選加入) =====
    this.vpTop=headBot+8; this.vpBot=H-128; const vpH=this.vpBot-this.vpTop;
    const CS2=72, x0=48, step=81;
    const my=loadSave().cards.filter(x=>ROSTER.find(c=>c.id===x.id));   // 個體制:全部背包個體(含重複),與背包一致
    this.instances=my;
    this.benchG=this.add.container(0,0).setDepth(1);
    const mg=this.make.graphics(); mg.fillStyle(0xffffff); mg.fillRect(12,this.vpTop,396,vpH);
    this.benchG.setMask(mg.createGeometryMask());
    this.cardUsed={}; this.cards=[];
    my.forEach((inst,i)=>{
      const cd=ROSTER.find(c=>c.id===inst.id);
      const c=i%5, r=Math.floor(i/5), cx=x0+c*step, cy=this.vpTop+CS2/2+r*step;
      const rect=this.add.rectangle(0,0,CS2,CS2,EL[cd.el].color).setStrokeStyle(2,0x000000,0.25);
      const nm=this.add.text(0,-20,cd.name,{fontFamily:EMOJIFONT,fontSize:'13px',color:'#1a1208',fontStyle:'bold'}).setOrigin(0.5);
      const st=this.add.text(0,2,starStr(cd.id),{fontFamily:EMOJIFONT,fontSize:'10px',color:'#3a2c12'}).setOrigin(0.5);
      const lv=this.add.text(0,20,'Lv'+getCardLv(cd.id),{fontFamily:EMOJIFONT,fontSize:'10px',color:'#3a2c12',fontStyle:'bold'}).setOrigin(0.5);
      const cont=this.add.container(cx,cy,[rect,nm,st,lv]);
      cont.setInteractive(new Phaser.Geom.Rectangle(-CS2/2,-CS2/2,CS2,CS2),Phaser.Geom.Rectangle.Contains);
      cont.on('pointerup',()=>{if(this._moved<8)this.tapCard(inst,cd);});
      cont.setData('inst',inst); this.benchG.add(cont); this.cards.push(cont);
    });
    const rows=Math.max(1,Math.ceil(my.length/5));
    this.maxScroll=Math.max(0,(this.vpTop+CS2/2+(rows-1)*step+CS2/2+12)-this.vpBot);
    this.scroll=0;
    this.track=this.add.rectangle(411,this.vpTop+vpH/2,4,vpH,0x000000,0.3).setDepth(2);
    this.thumb=this.add.rectangle(411,this.vpTop,5,40,0xffd56a,0.6).setOrigin(0.5,0).setDepth(2);
    this._moved=0; this._down=false; this._lastY=0;
    this.input.on('pointerdown',(p)=>{if(p.y>=this.vpTop&&p.y<=this.vpBot){this._down=true;this._moved=0;this._lastY=p.y;}});
    this.input.on('pointermove',(p)=>{if(this._down&&p.isDown){const dy=p.y-this._lastY;this._lastY=p.y;this._moved+=Math.abs(dy);this.scrollBy(-dy);}});
    this.input.on('pointerup',()=>{this._down=false;});
    this.input.on('wheel',(p,go,dx,dy)=>this.scrollBy(dy*0.4));
    this.scrollBy(0);   // 初始定位 thumb + cull

    // ===== 固定下方:按鈕 =====
    this.startBtn=this.add.rectangle(CX,H-92,238,52,0x2b2014).setStrokeStyle(2,0x5a8a3c).setInteractive().setDepth(6);
    this.startTxt=this.add.text(CX,H-92,'💾 確定編隊',{fontFamily:EMOJIFONT,fontSize:'21px',color:'#cfe8b0',fontStyle:'bold'}).setOrigin(0.5).setDepth(6);
    this.startBtn.on('pointerup',()=>this.launch());
    this.hint=this.add.text(CX,H-60,'',{fontFamily:EMOJIFONT,fontSize:'12px',color:'#ffd56a'}).setOrigin(0.5).setDepth(6);
    const navY=H-28, mk=(x,label,col,sc,cb)=>{const r=this.add.rectangle(x,navY,130,46,0x2b2014).setStrokeStyle(2,sc).setInteractive().setDepth(6);this.add.text(x,navY,label,{fontFamily:EMOJIFONT,fontSize:'14px',color:col}).setOrigin(0.5).setDepth(6);r.on('pointerup',cb);};
    mk(76,'🎲 隨機','#f3e9d8',0x4a3824,()=>this.randomFill());
    mk(210,'📖 卡冊 '+ownedCount()+'/'+ROSTER.length,'#cfe0ff',0x5a6a8a,()=>{this.scene.manager.start('collection');this.scene.manager.stop('team');});
    mk(344,'🏠 大廳','#ffd9b0',0x8a6a5a,()=>{const t=this.slots.map(s=>s.cardId).filter(Boolean);if(t.length===5)saveTeam(t);this.scene.manager.start('home');this.scene.manager.stop('team');});

    loadTeam().forEach((id,i)=>{if(!this.slots[i])return;const cd=ROSTER.find(c=>c.id===id);if(!cd)return;const inst=this.instances.find(x=>x.id===id&&!this.cardUsed[x.u]);if(inst)this.assign(this.slots[i],inst,cd);});  // 自動回填上次編隊(逐個體找未用的)
    this.refreshStart();
    this.scale.on('resize',()=>{const o=H;recomputeLayout();if(Math.abs(H-o)>3){this.scale.setGameSize(W,H);this.scene.restart();}});
  }
  scrollBy(d){this.scroll=Math.max(0,Math.min(this.maxScroll,this.scroll+d));this.benchG.setY(-this.scroll);
    const vpH=this.vpBot-this.vpTop;
    if(this.maxScroll<=0){this.thumb.setVisible(false);this.track.setVisible(false);}
    else{const th=Math.max(24,vpH*vpH/(vpH+this.maxScroll));this.thumb.setSize(5,th).setVisible(true);this.track.setVisible(true);
      this.thumb.setPosition(411,this.vpTop+(this.scroll/this.maxScroll)*(vpH-th));}
    this.cards.forEach(c=>{const sy=c.y-this.scroll;if(c.input)c.input.enabled=(sy>this.vpTop-30&&sy<this.vpBot+30);});}   // 視窗外的卡不可點(遮罩只裁畫面、不裁輸入)
  tapCard(inst,cd){if(this.cardUsed[inst.u])return;const slot=this.slots.find(s=>!s.el);if(slot)this.assign(slot,inst,cd);}
  assign(slot,inst,cd){slot.el=cd.el;slot.cardId=cd.id;slot.uid=inst.u;
    slot.rect.setFillStyle(EL[cd.el].color);slot.txt.setText(cd.name).setColor('#1a1208').setFontSize('14px');
    this.cardUsed[inst.u]=true;const card=this.cards.find(c=>c.getData('inst').u===inst.u);
    if(card)card.setAlpha(0.22);
    this.refreshStart();}
  clearSlot(slot){if(!slot.el)return;this.cardUsed[slot.uid]=false;
    const card=this.cards.find(c=>c.getData('inst').u===slot.uid);if(card)card.setAlpha(1);
    slot.el=null;slot.cardId=null;slot.uid=null;slot.rect.setFillStyle(0x2b2014);slot.txt.setText('＋').setColor('#6a5a40').setFontSize('20px');
    this.refreshStart();}
  randomFill(){this.slots.forEach(s=>this.clearSlot(s));
    const avail=this.instances.filter(x=>!this.cardUsed[x.u]);
    this.slots.forEach(slot=>{if(avail.length){const inst=avail.splice(rnd(avail.length),1)[0];this.assign(slot,inst,ROSTER.find(c=>c.id===inst.id));}});
    this.refreshStart();}
  refreshStart(){const n=this.slots.filter(s=>s.el).length,ok=n===5;
    this.startBtn.setFillStyle(ok?0x3a5a2c:0x2b2014);this.startTxt.setAlpha(ok?1:0.4);
    this.hint.setText(ok?'':'還需放滿 5 宮位('+n+'/5)');}
  launch(){if(this.slots.filter(s=>s.el).length!==5)return;
    saveTeam(this.slots.map(s=>s.cardId));   // 存隊 → 回大廳(戰鬥從世界地圖進場)
    this.scene.manager.start('home');this.scene.manager.stop('team');}
}

/* ===== 戰鬥(多敵 + 自由查克拉) ===== */
class GameScene extends Phaser.Scene{
  constructor(){super('game');}
  init(data){ this.presetTeam=(data&&data.team)?data.team:null; this.dungeonId=(data&&data.dungeonId)||'prologue'; this.dungeon=DUNGEONS[this.dungeonId]||DUNGEONS.prologue; this.hitLab=!!(data&&data.lab); this.diff=DIFFS_BY[(data&&data.diff)]||DIFFS_BY.normal; }
  preload(){ for(const el in MONSTER_IMG){ if(!this.textures.exists('mon_'+el))this.load.image('mon_'+el, MONSTER_IMG[el]); } }   // 載入怪物圖

  create(){
    this.cells=[]; this.boxLabels=[]; this.trayIcons=[]; this.trayTweens=[]; this.teamCards=[]; this.drag=null; this.enemies=[];

    // 戰鬥場景背景(最底層):上 ~1/3 漸層帶 + 其下深底延伸到盤面上緣(盤面壓上來)
    this.bgGfx=this.add.graphics().setDepth(DEPTH.bg); this.drawBG();
    this.bgLine=this.add.rectangle(CX,BG_H,W,2,0x000000,0.3).setDepth(DEPTH.bg);

    // nav(最高層;無背景條,文字加深色描邊保可讀)
    this.goldTxt=this.add.text(10,13,'💰 0',{fontFamily:EMOJIFONT,fontSize:'14px',color:'#ffe08a'}).setOrigin(0,0.5).setStroke('#1a1208',4).setDepth(DEPTH.nav);
    this.chestTxt=this.add.text(298,13,'📦 0',{fontFamily:EMOJIFONT,fontSize:'14px',color:'#cfe8ff'}).setOrigin(0,0.5).setStroke('#1a1208',4).setDepth(DEPTH.nav);
    const gear=this.add.text(404,13,'⚙',{fontFamily:EMOJIFONT,fontSize:'21px',color:'#f3e9d8'}).setOrigin(0.5).setStroke('#1a1208',4).setDepth(DEPTH.nav);
    gear.setInteractive(new Phaser.Geom.Rectangle(-17,-15,34,30),Phaser.Geom.Rectangle.Contains);
    gear.on('pointerup',()=>this.showMenu());

    // 我方卡(正方形,背景之上)
    for(let i=0;i<5;i++){const x=54+i*78;
      const rect=this.add.rectangle(x,CARDS_Y,62,62,0xffffff).setStrokeStyle(2,0x00000044).setInteractive().setDepth(DEPTH.card);
      rect.setData('store',i);   // 卡身=拖屬塊來源(有存塊才可拖)
      const txt=this.add.text(x,CARDS_Y,'',{fontFamily:EMOJIFONT,fontSize:'24px',color:'#1a1208'}).setOrigin(0.5).setDepth(DEPTH.card);
      const storeObj=this.add.container(x,CARDS_Y,[]).setVisible(false).setDepth(DEPTH.store);   // 屬塊存放顯示(疊在卡上,可拖)
      // 主動技小按鈕(浮在卡上方,點放;外顯 affordance)
      const abtn=this.add.container(x,CARDS_Y-40,[]).setDepth(DEPTH.abtn);
      const abg=this.add.circle(0,0,13,0x2b2014).setStrokeStyle(2,0x5a4128);
      const aic=this.add.text(0,0,'',{fontFamily:EMOJIFONT,fontSize:'12px',color:'#fff'}).setOrigin(0.5);
      abtn.add([abg,aic]); abtn.setSize(30,30).setInteractive(new Phaser.Geom.Rectangle(-15,-15,30,30),Phaser.Geom.Rectangle.Contains);
      abtn.on('pointerup',()=>this.fireActive(i));
      this.teamCards.push({rect,txt,storeObj,abtn,abg,aic,el:null,pulse:null});}

    // 我方血條 + 資訊列
    this.pHpBg=this.add.rectangle(BX0,PHP_Y,W-2*BX0,16,0x000000,0.5).setOrigin(0,0.5).setDepth(DEPTH.hp);
    this.pHp=this.add.rectangle(BX0,PHP_Y,W-2*BX0,16,0x4f9e42).setOrigin(0,0.5).setDepth(DEPTH.hp);
    this.pHpCap=this.add.circle(BX0+(W-2*BX0),PHP_Y,8,0x4f9e42).setDepth(DEPTH.hp);   // 血量末端圓頭(不要平的)
    this.pHpTxt=this.add.text(CX,PHP_Y,'',{fontFamily:EMOJIFONT,fontSize:'11px',color:'#fff'}).setOrigin(0.5).setDepth(DEPTH.hp);
    // 鬥志徽章:單字,疊在 HP 條左端(z 高於血條)
    this.moraleBg=this.add.circle(BX0+14,PHP_Y,15,0x1a140c,0.92).setStrokeStyle(2,0xffd56a).setDepth(DEPTH.morale);
    this.moraleTx=this.add.text(BX0+14,PHP_Y,'普',{fontFamily:JUTSUFONT,fontSize:'18px',color:'#fff',fontStyle:'bold'}).setOrigin(0.5).setDepth(DEPTH.morale);

    // 結印區
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)
      this.cells.push(this.add.rectangle(BX0+c*CS, BY0+r*CS, RECT, RECT, NEUTRAL_DARK).setOrigin(0,0).setDepth(DEPTH.board));
    for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3;const cen=this.cellCenter(br+1,bc+1);
      this.boxLabels[b]=this.add.text(cen.x,cen.y,'',{fontFamily:EMOJIFONT,fontSize:'17px',color:'#fff'}).setOrigin(0.5).setAlpha(0.55).setDepth(DEPTH.board);}
    this.gloss=this.add.graphics().setDepth(DEPTH.board+0.5);   // 玻璃光澤+立體斜角(疊在塊上、依 board 狀態重畫)
    this.hintG=this.add.graphics().setDepth(DEPTH.board+0.6);   // 嬰兒級:多HIT塊的建議落點高亮(脈動)

    // 托盤
    this.traySlots=[80,210,340]; this.trayHits=[];
    this.traySlots.forEach((sx,i)=>{const hit=this.add.rectangle(sx,TRAY_Y,128,100,0,0).setOrigin(0.5).setInteractive().setDepth(DEPTH.tray);hit.setData('slot',i);this.trayHits.push(hit);});

    this.input.on('gameobjectdown',(p,obj)=>{
      const si=obj.getData('store'); if(si!=null && this.stored && this.stored[si]){this.startStoredDrag(si,p);return;}   // 卡上有屬塊→拖
      const i=obj.getData('slot');
      if(i!=null && this.tray[i] && !this.tray[i].used && !this.tray[i].locked) this.startDrag(i,p);});
    this.input.on('pointermove',p=>{this.updateDrag(p);this.updateEarthMove(p);});
    this.input.on('pointerup',p=>{this.endDrag(p);this.endEarthMove(p);});
    this.input.on('pointerdown',p=>{if(this.earthSel&&!this.earthDrag)this.startEarthMove(p);});
    this.scale.on('resize',this.onResize,this);
    this.cameras.main.setBounds(0,0,W,H);   // 鏡頭鎖在世界範圍內→特寫推近/平移不會露出世界外的黑邊

    this.newGame();
  }
  onResize(){const o=H;recomputeLayout();if(Math.abs(H-o)>3){this.scale.setGameSize(W,H);this.relayout();}}
  drawBG(){const g=this.bgGfx;g.clear();const g1=Math.round(H*0.34), M=Math.round(H);   // M=往四周多畫一圈背景→特寫鏡頭推近/平移不會露出世界外的黑邊
    g.fillStyle(0x4a6788,1);g.fillRect(-W,-M,W*3,g1+M);                              // 上半(含上緣外、兩側外)用漸層頂色鋪滿
    g.fillGradientStyle(0x4a6788,0x4a6788,0x223524,0x223524,1);g.fillRect(0,0,W,g1);  // 真正的漸層帶(盤上)
    g.fillStyle(0x223524,1);g.fillRect(-W,g1,W*3,Math.max(0,BG_H-g1));               // 中段深底(延伸兩側外)
    g.fillStyle(0x160f18,1);g.fillRect(-W,BG_H,W*3,H-BG_H+M);                        // 盤面區底色(延伸下緣外、兩側外)
    g.fillStyle(0x000000,0.22);g.fillEllipse(CX,BATTLE_CY+54,W*0.82,42);}            // 敵人腳下陰影
  relayout(){
    this.cameras.main.setBounds(0,0,W,H);   // H 隨視窗變,鏡頭範圍同步
    this.drawBG();
    this.bgLine.setPosition(CX,BG_H);
    this.teamCards.forEach((card,i)=>{const x=54+i*78;card.rect.setPosition(x,CARDS_Y);card.txt.setPosition(x,CARDS_Y);
      if(card.storeObj)card.storeObj.setPosition(x,CARDS_Y);if(card.abtn)card.abtn.setPosition(x,CARDS_Y-40);});
    this.renderStored();
    this.pHpBg.setPosition(BX0,PHP_Y);this.pHp.setPosition(BX0,PHP_Y);this.pHpTxt.setPosition(CX,PHP_Y);if(this.pHpCap)this.pHpCap.y=PHP_Y;
    if(this.moraleBg){this.moraleBg.setPosition(BX0+14,PHP_Y);this.moraleTx.setPosition(BX0+14,PHP_Y);}
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)this.cellRect(r,c).setPosition(BX0+c*CS,BY0+r*CS);
    this.drawGloss();   // 視窗變動→重畫玻璃光澤
    for(let b=0;b<9;b++){const br=Math.floor(b/3)*3,bc=(b%3)*3,cen=this.cellCenter(br+1,bc+1);this.boxLabels[b].setPosition(cen.x,cen.y);}
    this.trayHits.forEach(h=>h.setPosition(h.x,TRAY_Y));
    if(this.tray)this.renderTray();
    this.enemies.forEach(e=>{if(!e.card||e.dead)return;const x=e.card.x,cy=BATTLE_CY,sz=e.cardH;
      e.card.setPosition(x,cy);
      e.turnG.setPosition(x-sz/2+12,cy-sz/2+11);e.hpBg.setPosition(x,cy+sz/2-3);e.hpFill.setPosition(e.hpx,cy+sz/2-3);e.mark.setPosition(x,cy-sz/2-9);
      const fy=e.img?cy:cy-Math.round(sz*0.14);if(e.img)e.sprite.setDisplaySize(sz,sz);e.baseScale=e.sprite.scaleX;if(e.bob)e.bob.stop();e.sprite.setPosition(x,fy);e.restY=fy;e.bob=this.tweens.add({targets:e.sprite,y:fy-4,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});});
  }

  cellRect(r,c){return this.cells[r*N+c];}
  cellCenter(r,c){return {x:BX0+c*CS+RECT/2, y:BY0+r*CS+RECT/2};}
  pointerToCell(px,py){const c=Math.floor((px-BX0)/CS),r=Math.floor((py-BY0)/CS);
    if(r<0||r>=N||c<0||c>=N)return null;return {r,c};}

  newGame(){
    track('battle_start');
    this.locked=false;   // 鎖輸入旗標:敵方出手展演期間禁止下一手動作(避免插隊/重覆觸發)
    this.boxElement={}; this.boxCard={};
    if(this.presetTeam) ELEMENT_BOXES.forEach((b,i)=>{const card=this.presetTeam[i];this.boxCard[b]=card;this.boxElement[b]=card.el;});
    else ELEMENT_BOXES.forEach(b=>{const card=ROSTER[rnd(ROSTER.length)];this.boxCard[b]=card;this.boxElement[b]=card.el;});
    this.lead=(this.presetTeam&&this.presetTeam[0]&&LEADER_SKILLS[this.presetTeam[0].id])||null;   // 隊長技=隊首卡
    const teamHp=(this.presetTeam||[]).reduce((s,c)=>s+(c.hp||0),0)||CONFIG.PLAYER_HP_BASE;   // 隊伍血量=隊員 HP 三圍加總
    this.maxHP=Math.round(teamHp*((this.lead&&this.lead.type==='hp')?this.lead.v:1));
    this.teamRcv=(this.presetTeam||[]).reduce((s,c)=>s+(c.rcv||0),0)||0;   // 隊伍回復力總和(清無屬區回血用)
    this.playerHP=this.maxHP; this.stage=1; this.resultOpen=false; this.chests=0; this.gold=0; this.runDrops=[]; this.runExp=0; this.runCoins=0; this.runGems=0;
    this.charge=[0,0,0,0,0];   // 主動技蓄力(整場累積、跨關保留)
    this.stored=[null,null,null,null,null];   // 每卡存放的屬塊 {el,lv}(跨關保留,新局/重挑才清)
    this.firstClear=true;   // 新手鉤子:本場第一次消除=隆重慶祝
    this.renderTeam(); this.startStage();
  }
  resetWave(){this.immune=0;this.armor=0;this.amp=1;}   // combo 不在此重置(敵攻擊不打斷連段);改為「整手沒清才歸零」(見 endHand)+新關歸零(startStage)
  startStage(keepBoard){
    this.stopStuckFX&&this.stopStuckFX();   // 新關/新局清掉殘留的卡死提示
    if(!keepBoard){this.board=Array.from({length:N},()=>Array(N).fill(null));this.stored=[null,null,null,null,null];}   // 跨關保留盤面+屬塊:只有新局/重挑才清,過關時累積到下一關的怪
    this.resetWave(); this.combo=0; if(!keepBoard)this.morale=(this.lead&&this.lead.type==='moraleStart')?this.lead.v:CONFIG.MORALE_START; this.handCleared=false; this.handBurst=false; this.whiffStreak=0; if(!keepBoard)this.refill();   // 新關/新局 combo 歸零   // 鬥志+托盤:跨關保留(只新局/重挑才重置/換新托盤)
    if(this.stage===1&&this.lead&&!this.hitLab)this.time.delayedCall(450,()=>{   // 隊長技:進關時在盤面中央彈出清楚橫幅(技名+效果),停留可讀(原本上緣快閃小字看不清)
      const ld=this.lead, mk=(dy,str,sz,col,sw)=>{const t=this.add.text(CX,BOARD_CY+dy,str,{fontFamily:EMOJIFONT,fontSize:sz,color:col,fontStyle:'bold',stroke:'#3a2400',strokeThickness:sw,align:'center'}).setOrigin(0.5).setDepth(DEPTH.fx).setScale(0.5);
        this.tweens.add({targets:t,scale:1,duration:260,ease:'Back.out'});
        this.tweens.add({targets:t,alpha:0,delay:1400,duration:420,onComplete:()=>t.destroy()});};
      mk(-13,'🎖 隊長技 · '+ld.name,'21px','#ffe08a',5);
      mk(15,ld.desc,'14px','#ffeec4',4);
    });
    this.spawnEnemies(); this.refreshBoard(); this.renderTray(); this.updateAll(); this.renderCharges(); this.renderStored(); this.syncMoraleState();   // 進關依目前鬥志同步「極」脈動(跨關帶來的極要持續演)
    this.paraTick=0; this.applyParalyze();   // ⚡雷·麻痺:首手就可能鎖塊
    if(this.stage===1 && !tutSeen() && !this.hitLab)this.showTutorial();   // 首次遊玩→3 步教學
  }
  spawnEnemies(){
    if(this.enemyG)this.enemyG.destroy();
    this.enemyG=this.add.container(0,0).setDepth(DEPTH.enemy);   // 敵方整層在「我方卡」之下、背景之上
    const defs=this.dungeon.stages[this.stage-1].es;
    const df=this.diff||DIFFS_BY.normal;
    // 反制混搭:上級以上 + 元素關 → 把一隻「主屬非王敵」換成「剋你剋牌」的懲罰屬(逼你不能帶純剋牌)
    let pun=null; if(df.counter&&this.dungeon.el){const C=counterOf(this.dungeon.el); pun=counterOf(C);} let punished=false;
    // 敵人招牌行為(上級↑):每屬關自己的招牌(土=HIT護盾/風=combo護盾/火=灼燒/水=自我回血;雷未做→地獄通用HIT)
    const dk=df.key, dEl=this.dungeon.el, SIG={earth:'hit',wind:'combo',fire:'burn',water:'regen',thunder:'paralyze'}, myBeh=SIG[dEl];
    const covered=(d)=>{ if(dk==='advanced')return !!d.boss; if(dk==='super')return this.stage>=2; if(dk==='hell')return true; return false; };   // 覆蓋:上級僅王/超級第2,3關/地獄全敵
    this.enemies=defs.map(d=>{
      let el=d.el; if(pun&&!punished&&d.el===dEl&&!d.boss){el=pun;punished=true;}
      const hp=Math.max(1,Math.round(d.hp*df.hp)), atk=Math.max(1,Math.round(d.atk*df.atk)), turns=Math.max(1,d.turns+(df.dt||0));
      const phases=d.phases||null;
      let beh=null;
      if(phases){el=phases[0].el;beh=phases[0].beh;}     // 魔王:初始用 phase[0] 的屬+行為(之後隨血量變身)
      else if(myBeh&&covered(d))beh=myBeh;
      else if(dk==='hell'&&dEl&&!myBeh)beh='hit';        // 無招牌屬(塔)地獄→通用 HIT15
      let hitGate=0,comboGate=0,dot=0,regen=0,paralyze=0;
      if(beh==='hit')hitGate=15;
      else if(beh==='combo')comboGate=2;
      else if(beh==='burn')dot=({advanced:0.02,super:0.03,hell:0.04}[dk])||0.03;     // 灼燒:每手扣玩家 maxHP×率
      else if(beh==='regen')regen=({advanced:0.04,super:0.06,hell:0.08}[dk])||0.06;  // 自我回血:每手回自身 max×率
      else if(beh==='paralyze')paralyze=(dk==='advanced')?2:1;                       // 麻痺:每 N 手鎖 1 塊托盤
      return {el,max:hp,hp:hp,atk:atk,interval:turns,timer:turns,burn:0,dead:false,boss:!!d.boss,hitGate:hitGate,comboGate:comboGate,dot:dot,regen:regen,paralyze:paralyze,phases:phases,phaseIdx:0};
    });
    const n=this.enemies.length, slot=380/n;
    this.enemies.forEach((e,i)=>{
      const x=20+slot*(i+0.5), cy=BATTLE_CY;
      const szc=Math.max(50,Math.min(slot-8,126,Math.round((CARDS_Y-81)*0.92)));   // 敵欄正方形邊長:取寬度/高度空檔較小者(矮螢幕自動縮小)
      e.cardW=szc; e.cardH=szc;
      e.card=this.add.rectangle(x,cy,szc,szc,0x000000,0).setInteractive();   // 無底色:透明矩形只當點擊區
      e.card.on('pointerdown',()=>this.selectTarget(i));
      if(MONSTER_IMG[e.el]&&this.textures.exists('mon_'+e.el)){   // 有怪物圖→滿版置中;否則用 emoji 臉
        e.sprite=this.add.image(x,cy,'mon_'+e.el).setOrigin(0.5).setInteractive(); e.sprite.setDisplaySize(szc,szc); e.img=true;
      }else{
        e.sprite=this.add.text(x,cy-Math.round(szc*0.14),EL[e.el].face,{fontFamily:EMOJIFONT,fontSize:Math.round(szc*0.5)+'px'}).setOrigin(0.5).setInteractive();
      }
      e.baseScale=e.sprite.scaleX;   // 受擊縮放動畫的基準(圖=szc/320、emoji=1),回彈要回到這個值,不能歸 1
      e.sprite.on('pointerdown',()=>this.selectTarget(i));
      e.turnG=this.add.container(x-szc/2+12,cy-szc/2+11,[]);   // 出手倒數:沙漏+數字,移到敵卡左上
      e.glass=this.add.text(0,0,'⏳',{fontFamily:EMOJIFONT,fontSize:'16px'}).setOrigin(0.5);
      e.turnTx=this.add.text(11,0,String(e.timer),{fontFamily:EMOJIFONT,fontSize:'18px',color:'#eaf3ff',fontStyle:'bold',stroke:'#1a0d05',strokeThickness:4}).setOrigin(0,0.5);
      e.turnG.add([e.glass,e.turnTx]);
      e.hpW=szc-10; e.hpx=x-e.hpW/2;
      e.hpBg=this.add.rectangle(x,cy+szc/2-3,e.hpW,8,0x000000,0.6).setOrigin(0.5);   // HP:壓在敵圖下緣(再往下 6px)
      e.hpFill=this.add.rectangle(e.hpx,cy+szc/2-3,e.hpW,8,e.boss?0xff7a3a:0xc23c2c).setOrigin(0,0.5);
      e.mark=this.add.text(x,cy-szc/2-9,'▼',{fontFamily:EMOJIFONT,fontSize:'14px',color:'#ffd56a',fontStyle:'bold'}).setOrigin(0.5).setVisible(false);   // 目標指標(取代黃框)
      e.restY=e.sprite.y;   // 受擊擊退/回位的基準 y
      e.bob=this.tweens.add({targets:e.sprite,y:e.sprite.y-4,duration:1200,yoyo:true,repeat:-1,ease:'Sine.inOut'});
      let gt=null,gc='#cfe0ff';   // 招牌行為徽章(教學)
      if(e.hitGate){gt='🛡'+e.hitGate+' HIT';} else if(e.comboGate){gt='🛡'+e.comboGate+' COMBO';}
      else if(e.dot){gt='🔥 灼燒';gc='#ffb09a';} else if(e.regen){gt='💚 回血';gc='#9ae0a8';} else if(e.paralyze){gt='⚡ 麻痺';gc='#ffe98a';}
      if(gt){e.gateTx=this.add.text(x,cy+szc/2+9,gt,{fontFamily:EMOJIFONT,fontSize:'10px',color:gc,fontStyle:'bold',stroke:'#0a1420',strokeThickness:3}).setOrigin(0.5);}
    });
    // 敵方同層 z 序:敵中 > 敵左 > 敵右(越靠中央畫越上;同距時左>右)。依此由後往前加入容器
    const zorder=this.enemies.map((e,i)=>i).sort((a,b)=>{
      const da=Math.abs(this.enemies[a].card.x-CX), db=Math.abs(this.enemies[b].card.x-CX);
      return da!==db ? db-da : this.enemies[b].card.x-this.enemies[a].card.x;
    });
    zorder.forEach(i=>{const e=this.enemies[i];[e.card,e.sprite,e.turnG,e.hpBg,e.hpFill,e.mark,e.gateTx].filter(Boolean).forEach(o=>this.enemyG.add(o));});
    this.enemies.forEach((e,i)=>this.enemyEnter(e, i*120));   // 自遠方逼近入場(交錯)
    this.target=0;
  }

  bestHitSet(exclude){exclude=exclude||new Set(); const K=6, structs=[];

      const score=clears.length*100-s.empties.length;   // 多清優先、塊小優先

  renderTray(){

  // 嬰兒級:把多HIT塊的建議落點畫成脈動金色格(放這裡就爆 HIT)

  // HIT 實驗室:塊區放各「可能解塊數」按鈕(由小到大兩排),點按完整重現該手實際遊玩畫面(招式名+型/印+全螢幕閃+n HIT+集氣攻擊),純特效不扣血/不推進

  demoFinal(){   // 實驗室演「最後一擊」特寫鏡頭:推近 → 蓄勢 → 飛出 → 拉回 → 重生(不進結果)

  _labCells(n,off){const cells=[];off=off||0;for(let r=Math.floor(off/N);r<N&&cells.length<n;r++)for(let c=(r===Math.floor(off/N)?off%N:0);c<N&&cells.length<n;c++)cells.push([r,c]);return cells;}
  demoHit(n){

  demoMulti(){   // 演示「一次清除含 2 元素 → 同時出 2 招」(18 格 = 兩條線各一元素)

  /* 拖曳放塊 */
  startDrag(i,p){if(this.resultOpen||this.locked||this.earthSel||this.earthDrag)return;
    const cells=this.tray[i].c, kind=this.tray[i].kind;
    const kc=kind==='water'?0x62b8f0:kind==='wind'?0x6ad06a:kind==='earth'?0xd49a4a:0xffffff;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,kc).setOrigin(0));
    this.drag={i,cells,kind,prev:this.add.container(0,0,kids).setAlpha(0.85).setDepth(DEPTH.drag),kids};this.updateDrag(p);}
  // 從卡拖「存放的屬塊」(萬用塊填空格;不佔托盤格→不推進敵,是連擊引擎)
  startStoredDrag(i,p){if(this.resultOpen||this.locked||this.drag||this.earthSel||this.earthDrag)return;
    const s=this.stored[i]; if(!s)return;
    const cells=s.cells||chakraShape(s.el,s.lv), col=EL[s.el].color;
    const kids=cells.map(([dr,dc])=>this.add.rectangle(dc*CS,dr*CS,RECT,RECT,col).setOrigin(0));
    this.drag={store:i,cells,kind:'water',col,prev:this.add.container(0,0,kids).setAlpha(0.85).setDepth(DEPTH.drag),kids};this.updateDrag(p);}
  doPlaceStored(d,r,c){if(this.resultOpen)return;
    d.cells.forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;
      if(rr>=0&&rr<N&&cc>=0&&cc<N&&!this.board[rr][cc])this.board[rr][cc]={el:this.boxElement[boxOf(rr,cc)]||'neutral'};});
    const placed=d.cells.map(([dr,dc])=>{const rr=r+dr,cc=c+dc;return (rr>=0&&rr<N&&cc>=0&&cc<N&&this.board[rr][cc])?{r:rr,c:cc,el:this.board[rr][cc].el}:null;}).filter(Boolean);
    this.stored[d.store]=null; this.renderStored();

  }   // 連擊引擎:屬塊消除「也生塊」(滾雪球爽度);仍不佔托盤格→不推進敵(由 tray.every(used) 決定)
  updateDrag(p){if(!this.drag)return;this.clearGhost();
    const cell=this.pointerToCell(p.x,p.y-DRAG_LIFT);
    if(!cell){this.drag.prev.setVisible(false);return;}
    this.drag.prev.setVisible(true).setPosition(BX0+cell.c*CS, BY0+cell.r*CS);
    const k=this.drag.kind, ok=canPlace(this.board,this.drag.cells,cell.r,cell.c,k);
    const kc=this.drag.col||(k==='water'?0x62b8f0:k==='wind'?0x6ad06a:k==='earth'?0xd49a4a:0x8fffa6);
    this.drag.kids.forEach(x=>x.setFillStyle(ok?kc:0xff8f8f));
    this.drag.cells.forEach(([dr,dc])=>{const rr=cell.r+dr,cc=cell.c+dc;if(rr<0||rr>=N||cc<0||cc>=N)return;
      let col;
      if(!ok)col=0xff8f8f;
      else if(k==='water')col=this.board[rr][cc]?0x6aa0ff:0x8fffa6;     // 重疊藍 / 填綠
      else if(k==='wind') col=this.board[rr][cc]?0x6ad06a:0x444444;     // 會消綠 / 空格灰
      else if(k==='earth')col=this.board[rr][cc]?0xd49a4a:0x444444;     // 抓取棕 / 空格灰
      else col=0x8fffa6;
